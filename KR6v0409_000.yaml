body:
  text: 正名録自序原本清康熙三十三年原刻本校本無粵自拈花一脈三十三傳至曹溪六祖析為二支一為青原思一為南嶽讓思下出曹洞雲門法眼讓下出臨濟溈仰斯二支五宗紀諸燈録載在龍藏其來舊矣至宋徽宗時有好事者突出天王偽碑紊亂宗支幸宗門斥其為誤元順帝時妄僧雲壑瑞援偽碑作心燈録以致沮抑不行逮本朝順治間妄僧費隱容亦援偽碑作五燈嚴統恣臆刪改駭人心目幸諸護法公評有司公討卒至燬板罪案久定稍知有王法者必不蹈人覆轍也因想元時心燈偽書不有護法公闢有司公討奚能抑之不行耶奈年深代遠其公闢公討之公論漸為泯沒而彼偽碑往往為好事者借為釁端楷嘗憂之於是裒輯從前諸大老所有公論成書十卷命名衛燈録非惟見諸公弘法之盛心抑以見天下之公論必不可已也今霽崙永公復將奉憲所燬之偽書改名五燈全書紊倫亂譜靡所不至楷不忍坐視故述正名録併書以勸誡之而永公堅執我見確意不回且謂引證辨解各有根據嗟乎以之自誤猶可以之誤天下後世必不可也楷乃奮力廣搜祖父舊章兼採後人新條準以甲子編年考其州郡之分野人代之後先師資之授受宗支之來源其間述古辨今事重言復不顧繁瑣務期理明用壽梨棗公諸天下知我罪我我無辭焉時皇清康熙三十三年歲次甲戌季夏衡陽後學比丘智楷題於潞河旅舍
