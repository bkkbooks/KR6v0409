body:
  text: 衡陽後學智楷惟直氏述二支五宗來源考之三五燈全書凡例曰一天王於馬祖天皇於石頭皆前人所定之案見諸典籍不啻數十種悉從龍藏佛祖通載中原本根據庶令統系無差按霽崙自序曰自康熙癸亥入京廣徵博採謹以古今遺集探其事實其理不當而言冗僞者則刪之其旨不二而機冥合者則增之繼而考訂宗派申明大端不使金鍮溷雜務期支緒詳明引證辨解各有根據靡不窮探極討編成垂二百餘萬言名曰五燈全書哂將謂霽崙有多少書可搜可討可根可據以譜雲法二宗於馬祖之下元來止據通載一書則此序豈不成自誑以誑世乎按通載亦惟援丘碑以成傳余不憚繁瑣次第辨出一以曉霽崙之迷一以供天下後世著述家之所考較云爾五燈會元宋靈隱大川普濟編集元天衣業海子清重刻天竺延俊序重刻五燈會元序其略曰至元間雲壑瑞禪師作心燈録最為詳盡特援丘玄素所製塔銘以龍潭信公出馬祖下致人沮抑不傳於世識者惜焉至正二十四年甲辰四月杭州中天竺延俊序青原下二世石頭遷禪師法嗣荊州天皇道悟禪師婺州東陽張氏子神儀挺異幼而生知年十四懇求出家父母不聽遂損減飲膳日才一食形體羸悴父母不得已而許之依明州大德披削二十五詣杭州竹林寺具戒精修梵行推為勇猛或風雨昏夜晏坐丘冢身心安靜離諸怖畏一日遊餘杭首謁徑山國一受心法服勤五載後參馬祖重印前解法無異說依止二夏乃謁石頭而致問曰離卻定慧以何法示人頭曰我這裏無奴婢離箇甚麼曰如何明得頭曰汝還撮得虛空麼曰恁麼則不從今日去也頭曰未審汝早晚從那邊來曰道悟不是那邊人頭曰我早知汝來處也曰師何得贓誣於人頭曰汝身見在曰雖然如是畢竟如何示於後人頭曰汝道誰是後人師從此頓悟罄殫前二哲匠言下有所得心後卜荊州當陽紫陵山學徒駕肩接迹都人士女嚮風而至時崇業寺上首以狀聞於連帥迎入城郡之左有天皇寺乃名藍也因火而廢主僧靈鑑將謀修復乃曰苟得悟禪師為化主必能福我乃中宵潛往哀請肩舁而至時江陵尹右僕射裴公稽首問法致禮勤至師素不迎送客無貴賤皆坐而揖之裴公愈加歸向由是石頭法道盛矣師因龍潭問從上相承底事如何師曰不是明汝來處不得潭曰這箇眼目幾人具得師曰淺草易為長蘆僧問如何是玄妙之說師曰莫道我解佛法好曰爭奈學人疑滯何師曰何不問老僧曰即今問了也師曰去不是汝存泊處元和丁亥四月示疾命弟子先期告終至晦日大衆問疾師驀召典座座近前師曰會麼曰不會師拈枕子拋於地上即便告寂壽六十臘三十五以其年八月五日塔於郡東此下有小注一篇辨見於後青原下三世天皇悟禪師法嗣澧州龍潭崇信禪師渚宮人也其家賣餅師少而英異初悟和尚為靈鑑潛請居天皇寺人莫之測師家於寺巷常日以十餅饋之天皇受之每食畢常留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何以返遺我邪其別有旨乎遂造而問焉皇曰是汝持來復汝何咎師聞之頗曉玄旨因投出家皇曰汝昔崇福善今信吾言可名崇信由是服勤左右一日問曰某自到來不蒙指示心要皇曰自汝到來吾未嘗不指示汝心要師曰何處指示皇曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示心要師低頭良久皇曰見則直下便見擬思即差師當下開解復問如何保任皇曰任性逍遙隨緣放曠但盡凡心別無聖解師後詣澧陽龍潭棲止僧問髻中珠誰人得師曰不賞玩者得曰安著何處師曰有處即道來有尼問如何得為僧去師曰作尼來多少時也曰還有為僧時也無師曰汝即今是甚麼曰現是尼身何得不識師曰誰識汝李翱刺史問如何是真如般若師曰我無真如般若李曰幸遇和尚師曰此猶是分外之言載第七卷佛祖歷代通載元華亭念常集出在至正元年荊州城東天皇道悟禪師協律郎符載撰碑其略云姓張氏婺州東陽人十四出家依明州大德祝髮二十五受戒於杭州竹林寺初參國一服勤五年大曆十一年隱於大梅山建中初謁江西馬祖二年參石頭乃大悟遂隱當陽紫陵山後於荊南城東有天皇寺頃因火廢僧靈鑑將謀修復乃曰苟得悟禪師為化主必能福我時江陵尹右僕射裴公稽首問法致禮迎至師素不迎送客無貴賤皆坐而揖之裴愈加敬石頭之道始盛於此師患背痛臨終大衆問疾師驀召典座近前師曰會麼對曰不會師拈枕子拋於地上即便告寂壽六十坐三十五夏法嗣三世曰惠真曰幽閒曰文賁實元和二年四月十三日也載大藏我字函二十卷元和十三年四月十三日天王道悟禪師入寂唐正議大夫戶部侍郎平章事荊南節度使丘玄素撰碑云道悟渚宮人姓崔氏子玉之後胤也年十五依長沙寺曇翥律師出家二十三詣嵩山受戒三十三參石頭頻沐指示曾未投機次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊州去郭不遠結草為廬後因節使顧問左右申其端緒節使親臨訪道見其路隘車馬難通極目荒榛曾未修削覩茲發怒令人擒師拋於水中旌斾才歸乃見遍衙火發內外烘焰莫可近之唯聞空中聲曰我是天王神我是天王神節使回心設拜烟焰都息宛然如初遂往江邊見師在水都不濕衣節使重申懺悔迎請在衙供養於府西造寺額號天王師常云快活快活及臨終時叫苦苦又云閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅壽八十二夏六十三嗣法一人曰崇信即龍潭也論曰寂音尊者曰荊州天皇寺道悟禪師如傳燈所載則曰道悟得法於石頭所居寺曰天皇婺州東陽人姓張氏年十四出家依明州大德披剃年二十五杭州竹林寺受具首謁徑山國一禪師服勤五年大曆中抵鍾陵謁馬大師經二夏乃造石頭元和丁亥四月示寂壽六十臘三十五及觀達觀穎禪師所集五家宗派則曰道悟嗣馬祖引唐丘玄素所撰碑文幾千言其略曰師號道悟渚宮人姓崔氏即子玉後胤也年十五於長沙寺禮曇翥律師出家二十三詣嵩山律德得尸羅謁石頭扣寂二年無所契悟乃入長安親忠國師三十四與侍者應真南還謁馬大師大悟於言下祝曰他日莫離舊處故復還渚宮元和十三年戊戌四月初示疾十三日歸寂壽八十二臘六十三考其傳正如兩人然玄素所載曰有傳法一人崇信住澧州龍潭南嶽讓禪師碑唐聞人歸登誕列法孫數人於後有道悟名圭峯答裴相國宗趣狀列馬祖之嗣六人首曰江陵道悟其下注曰兼稟徑山今妄以雲門臨濟二宗競者可發一笑出林間録覺夢堂重校五家宗派序云景德間吳僧道原集傳燈録三十卷自曹溪下列為兩派一曰南嶽讓讓出馬大師一曰青原思思出石頭遷自兩派下又分五宗馬大師出八十四員善知識內有百丈海海出黃檗運大溈祐二人運下出臨濟玄故號臨濟宗祐下出仰山寂故號溈仰宗八十四人內又有天王悟悟得龍潭信信得德山鑑鑑得雪峯存存下出雲門偃號雲門宗次玄沙備備出地藏琛琛出清涼益號法眼宗次石頭遷出藥山儼天皇悟二人悟下得惠真真下得幽閒閒下得文賁三世便絶唯藥山得雲巖晟晟得洞山價價得曹山章是為曹洞宗今傳燈卻收雲門法眼兩宗歸石頭下誤矣緣同時道悟有兩人一曰江陵城西天下寺道悟者渚宮人也崔子玉之後嗣馬祖元和十二年四月十三日化正議大夫丘玄素撰塔銘文幾千言其略云馬祖祝曰他日莫離舊處故復還渚宮一曰江陵城東天皇寺道悟者婺州東陽人也姓張氏嗣石頭元和二年丁亥化叶律郎符載撰塔銘二碑所載生緣出處甚詳但緣道原採集傳燈之日非一一親往討尋不過宛轉託人捃拾而得其差誤可知矣自景德至今天下四海以傳燈為據雖列剎據位立宗者不能略加究辨惟丞相無盡居士張公及呂夏卿二君子每會議宗門中事嘗曰石頭得藥山藥山得曹洞一宗教理行果言說宛轉且天皇道悟下出箇周金剛呵風罵雨雖佛祖不敢嬰其鋒恐自天皇處或有差誤寂昔尊者亦書疑之云道悟似有兩人無盡居士後於達觀穎禪師處得唐符載所撰天皇道悟塔記又討得丘玄素所作天王道悟塔記責以遍示諸方曰吾嘗疑德山洞山同出石頭下因甚垂示處作用殺活不同今以丘符二記證之朗然明白方信吾擇法驗人不謬耳寂音曰圭峯答裴相國宗趣狀列馬祖之嗣六人首曰江陵道悟其下注曰兼稟徑山今妄以雲門臨濟二宗競者可發一笑略書梗概以傳明達者庶知五家之正派如是而已載二十卷澧州龍潭崇信禪師本渚宮賣餅家子也史失其姓少時英異初悟禪師居天皇寺人莫之測師家於寺巷日常以十餅饋之悟受之每食畢常留一餅曰吾惠汝以蔭子孫一日退而省其私曰餅是我持去何以返遺我邪寧別有旨乎遂造而問焉悟曰是汝持來復汝何咎師聞頗曉玄旨因祈出家悟曰汝昔崇福善今信吾言可名崇信由是服勤左右一日問曰某自到來不蒙指示心要悟曰自汝到來吾未嘗不指示汝心要曰何處指示悟曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示心要師低頭良久悟曰見即直下便見擬思即差師當下開解乃復問如何保任悟曰任性逍遙隨緣放曠但盡凡心別無聖解師後詣澧陽龍潭棲止僧問髻中珠誰人得師曰不賞玩者得僧曰安著何處師曰有處即道來李翱問如何是真如般若師曰我無真如般若翱曰幸遇和尚師曰此猶是分外之言德山問答具本傳指月録萬曆壬寅夏瞿汝稷集崇禎庚午秋破山海明重刻荊州天皇道悟禪師據符碑嗣石頭天王道悟禪師據丘碑嗣馬祖未定宗派二人澧州龍潭崇信禪師天一德山天二巖頭雪峯天三南嶽青原宗派未定法嗣荊州天皇道悟禪師婺州東陽張氏子神儀挺異幼而生知年十四懇求出家父母不許遂減飲食父母不得已許之及出家精修梵行風雨昏夜晏坐丘冢離諸怖畏謁徑山國一受心法服勤五載次參馬祖重印前解法無異說依止二夏後謁石頭而致問曰離卻定慧以何法示人頭曰我這裏無奴婢離箇甚麼曰如何明得頭曰汝還撮得虛空麼曰恁麼則不從今日去也頭曰未審汝早晚從那邊來曰道悟不是那邊人頭曰我早知汝來處也曰師何以贓誣於人頭曰汝身現在曰雖然如是畢竟如何示於後人頭曰汝道誰是後人師從此頓悟罄殫前二哲匠言下有所得心後居天皇客無貴賤皆坐而揖江陵尹右僕射裴公稽首問法師接之無加禮裴愈歸向元和丁亥四月示疾命弟子先期告終至晦日大衆問疾師驀召典座座近前師曰會麼曰不會師拈枕子拋於地上即便告寂壽六十臘三十五嗣石頭住城東弟子三人慧真文賁幽間協律郎符載撰碑傳燈所録悉同符碑而誤以龍潭列師法嗣天王道悟禪師渚宮崔氏漢子玉之胤十五出家二十三受戒三十謁石頭頻沐指示而不契次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊門去郭不遠結草為廬節使來訪師不為加禮使怒擒師擲江中及歸見遍衙火發且聞空中天王神瞋責聲遂哀悔設拜烟焰頓息宛然如初乃躬往江邊迎師見師在水都不濕衣益自敬重於府西造天王寺供師龍潭信問從上相承底事如何師曰不是明汝來處不得潭曰這箇眼目幾人具得師曰淺草易為長蘆僧問如何是玄妙之說師曰莫道我解佛法好曰爭奈學人疑滯何師曰何不問老僧曰即今問了也師曰去不是汝存泊處師常云快活快活及臨終時叫苦苦又云閻羅王來取我也院主問曰和尚當時被節使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅當元和三年林間録作十三年戊戌戊子十月十三日也年八十二坐六十三夏嗣馬祖住城西弟子一人龍潭崇信荊南節度使丘玄素撰碑又唐聞人歸登南嶽碑圭峯答裴相國宗趣狀權德輿馬祖塔銘皆以天王為馬祖嗣佛國白達觀穎呂夏卿張無盡皆著辨證傳燈之誤獨其時同其地同其參謁石頭馬祖同故猶不能不闕疑且石頭參青原原謂因緣當在馬祖處頭旋於馬祖處大悟而竟嗣原皆釋迦之胤何彼此足分析耶載第九卷天皇澧州龍潭崇信禪師渚宮人也其家賣餅師少而英異初悟和尚為靈鑑潛請居天皇寺人莫之測師家於寺巷常日以十餅饋之天皇受之每食畢常留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何以返貽我耶其別有旨乎遂造而問焉皇曰是汝持來復汝何咎師聞之頗曉玄旨因投出家皇曰汝昔崇福善今信吾言可名崇信由是服勤左右一日問曰某自到來不蒙指示心要皇曰自汝到來吾未嘗不指示汝心要師曰何處指示皇曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低頭何處不指示心要師低頭良久皇曰見則直下便見擬思即差師當下開解復問如何保任皇曰任性逍遙隨緣放曠但盡凡心別無聖解師後詣澧陽龍潭棲止僧問髻中珠誰人得師曰不賞玩者得曰安著何處師曰有處即道來有尼問如何得為僧去師曰作尼來多少時也曰還有為僧時也無師曰汝即今是甚麼曰現是尼身何得不識師曰誰識汝李翱刺史問如何是真如般若師曰我無真如般若李曰幸遇和尚師曰此猶是分外之言載十二卷會元小注曰按景德傳燈稱青原下出石頭遷遷下出天皇悟悟下出龍潭信信下出德山鑑鑑下出雪峯存存下出雲門偃玄沙備備再傳為法眼益皆謂雲門法眼二宗來自青原石頭雖二家兒孫亦自謂青原石頭所自出不知其差誤所從來久矣道悟同時有二人一住荊南城西天王寺嗣馬祖一住荊南城東天皇寺嗣石頭其下出龍潭信者乃馬祖下天王道悟非石頭下天皇道悟也宋景定間大川濟公輯會元本傳廣續聯普五燈以成書故紀青原出三宗南嶽出兩宗於天皇章下原無小注逮元末時雲壑瑞以丘碑作心燈録收雲門法眼於馬祖下當時宰官護法秉公斥之沮抑不行業海子清重刻會元引心燈録中丘符諸碑小注天皇章下以存疑案然於大川原刻正文未敢擅改一字此一段係子清入小注作開端以鋪敘其事然後入丘符二碑次引數碑以證其實末後以數語結斷之起承轉結竟成一篇文章通載小注拙於此多矣何以明之按唐正議大夫戶部侍郎平章事荊南節度使丘玄素所撰天王道悟禪師碑云道悟渚宮人姓崔氏子玉之後胤也年十五依長沙寺曇翥律師出家二十三詣嵩山受戒三十參石頭頻沐指示曾未投機次謁忠國師三十四興國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊門去郭不遠結草為廬後因節使顧問左右申其端緒節使親臨訪道見其路隘車馬難通極目荒榛曾未修削覩茲發怒令人擒師拋於水中旌斾才歸乃見遍衙火發內外烘焰莫可近之唯聞空中聲曰我是天王神我是天王神節使回心設拜烟焰都息宛然如初遂往江邊見師在水都不溼衣節使重伸懺悔迎請在衙供養於府西造寺額號天王師常云快活快活及臨終時叫苦苦又云閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅當元和三年戊子十月十三日也年八十二坐六十三夏嗣法一人曰崇信即龍潭也是真難掩是僞不昌按嘯峯然公考唐史荊州節使之設始於肅宗至德二載從此以至哀宗天祐丙寅止共一百五十年而為荊州節度使者則有李昌夔陳少遊張伯儀嚴綬常滋宋浩段彥謨朱若汶陳儒張瓌成𬇞趙匡明等十餘人并無丘玄素名且碑銜既稱唐正議大夫戶部侍郎平章事荊南節度使則又係唐朝宰相兼領藩鎮者考唐相年表其以平章兼領荊州節度使者則有李石李德裕鄭肅本白敏中蕭鄴徐商劉瞻孔緯等諸人其拜罷遷薨皆有月日可據亦并無丘玄素名唐史既無其人則此碑從何而出鴛上維魚子遡源問曰會元所篡入細注曰唐正議大夫戶部侍郎平章事荊南節度使於元和三年戊子為天王悟作碑文而費隱解惑篇則書丘玄素為天王悟作碑係元和十三年戊戌豫於是考唐書國史上自德宗甲子興元元年起以及順宗永貞憲宗元和穆宗長慶敬宗寶曆文宗太和武宗會昌三年癸亥止上下六十年并無所謂戶部侍郎平章事荊南節度使丘玄素者則欲據一僞碑僞人而增一僞天王是何異於演琵琶記見牛丞相而信有一趙五娘耶此吾里王先生讀嚴統詩不云乎細將國史參僧史玄素碑文槩渺茫復云年表唐書昭若日徑山醉夢引丘符良有以也此撰碑之人僞矣按輿圖摘要考荊州建置春秋為楚郢都秦拔郢置南郡漢曰臨江曰荊州三國初屬蜀漢後屬吳晉曰新郡梁元帝都此隋唐曰江陵曰南都宋曰荊南明曰荊州府玄素既為唐人碑銜當曰江陵節度使或曰南都節度使為是而曰荊南者豈有唐時館職預用數百年後之建置乎此碑銜僞矣小注謂道悟二十三詣嵩山受戒三十參石頭通載謂三十三參石頭此參訪年歲僞矣稽古略注渚宮即荊門州屬安陸府管距荊州二百里小注曰汝若住持莫離舊處故有便返荊門結草為廬以應渚宮人姓崔氏之句也通載謂便返荊州結草為廬此住居僞矣拋人於水死罪也節使去二百里外親臨訪道其慕道之心可謂至矣見其路隘益生渴仰可也縱然不悅回車不訪可也道悟不犯法豈可因路隘處以死罪乎國法雖嚴終不罪及無辜節使為一方藩鎮豈有濫刑如此此訪道拋水之事僞矣荊州白馬寺曇照禪師嗣南泉願常云快活快活及臨終時叫苦苦又曰閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地照舉枕子曰汝道當時是如今是院主無對照擲枕子而逝載傳燈諸書歷歷可考丘碑偷來以為天王道悟事此機緣僞矣曇照機緣中有節使拋水之句雖未詳言某節使因某事拋水者此修燈録家刪繁取要故也今城西祗有白馬寺存焉父老尚能道及曇照叫樂叫苦之事若天王寺者絶無形跡况荊州志亦未見有載及之然丘碑機緣既屬曇照事則拋水造寺之事安知不為曇照之事乎或者爭謂必天王事然一郡之西豈有兩人之事始終如一之理乎此係造碑之人但改白馬寺為天王寺耳此拋水造寺之事僞矣小注謂天王入滅當元和三年戊子十月十三日也通載謂元和十三年戊戌四月十三日此入滅年月之事僞矣小注通載謂天王壽八十二坐六十三夏據十五歲出家則髮臘六十八二十三受戒則坐夏僅五十九而曰坐六十三夏此坐夏僞矣小注通載俱曰嗣法一人曰崇信即龍潭也龍潭之嗣天皇具述於前諸書且置勿論今即會元通載辨之真僞立見按通載紀道悟傳曰初隱當陽紫陵山後於荊南城東有天皇寺頃因火廢僧靈鑑將謀修復乃曰苟得悟律師為化主必能福我時江陵尹右僕射裴公稽首問法致禮迎至石頭之道始盛於此會元曰天皇寺主僧靈鑑中宵潛往哀請肩舁而至云云會元紀崇信傳曰青原下三世天皇悟禪師法嗣澧州龍潭崇信禪師云云觀此一題目何等明白通載曰澧州龍潭崇信禪師本渚宮賣餅家子也史失其姓少時英異初悟禪師居天皇寺人莫之測師家於寺巷日常以十餅饋之乃至賜名崇信問心要開解云云夫道悟傳中則曰靈鑑裴公請居天皇寺崇信傳中則曰初悟和尚為靈鑑請居天皇寺因家於城東天皇寺巷故得日以十餅饋城東天皇道悟因饋餅故得賜名崇信則崇信嗣城東天皇明矣按荊州城南有街名沙市城東有街名草市市中有巷曰天皇進巷南去半里即天皇寺迄今寺塔俱存城之西北向無街巷只有往來便路而已通載小注俱曰極目荒榛路隘不通則城西向無街巷明矣既無街巷則崇信家於何處饋餅何人則崇信家於寺巷者是城東天皇寺巷也明矣符碑曰荊南城東有天皇巷存焉以此證崇信家城東寺巷又明矣饋餅者是饋城東天皇道悟也則龍潭嗣天皇又明矣二書縱能竊取崇信為天王嗣其能移城東寺巷作城西寺巷乎其能以靈鑑所請之道悟居城東天皇寺改作居城西天王寺乎况二書既紀崇信嗣天皇矣何又竊嗣天王邪豈不自相矛盾况丘碑中初無龍潭問答機緣會元天皇傳中有皇因龍潭問從上相承底事如何皇曰不是明汝來處不得潭曰這箇眼目幾人具得皇曰淺草易為長蘆據此則龍潭出自天皇其來舊矣二書既於正傳正文紀龍潭嗣天皇矣何又竊嗣天王邪豈遽忘之耶抑亦有二龍潭耶古云盡信書不如無書此之謂歟此法嗣僞矣拋水造寺節使也撰碑節使也不審一人耶兩人耶如謂一人則丘碑內當有引過追悔之詞如謂兩人則當明言前任節使某人拋師水中以自別白今碑全無分曉豈非說鬼說夢乎此節使僞矣城東天皇道悟禪師者協律郎符載撰碑乃與景德傳燈合其碑云道悟姓張氏婺州東陽人十四出家依明州大德祝髮二十五受戒於杭州竹林寺初參國一留五年大曆十一年隱於大梅山建中初謁江西馬祖二年參石頭乃大悟遂隱當陽紫陵山後於荊南城東有天皇廢寺靈鑑請居之元和二年丁亥四月十一日以背痛入滅年六十坐三十五夏法嗣三人曰慧真曰文賁曰幽間今荊南城東有天皇巷存焉天皇示寂在元和二年丁亥符碑撰在丁亥可知矣過後一百九十年至宋太宗時贊寧始作高僧傳而天皇一傳本符碑而作也今之小注符碑略去全文所幸有高僧傳存焉見高僧傳即所以見符碑之全文也自元和丁亥至宋真宗景德甲辰計二百一十九年傳燈始出當云傳燈與符碑合可也反云符碑與傳燈合謬矣按高僧傳以崇信慧真文賁幽間四人悉紀為天皇法嗣小注以三人嗣天皇將崇信竊嗣天王其僞一高僧傳傳燈俱曰元和丁亥四月晦入滅小注謂四月十一日入滅通載謂十三日入滅其僞二高僧傳曰比丘慧真文賁等禪子幽間皆入室得悟者或繼坐道場或分枝化導小注曰法嗣三人曰慧真曰文賁曰幽間是以三人同一世均嗣天皇也覺夢堂序謂天皇悟下得惠真真下得幽閒閒下得文賁便絶通載於天皇傳末曰師患背痛即便告寂壽六十坐三十五夏法嗣三世曰惠真曰幽閒曰文賁實元和二年四月十三日也是以三人為天皇三世也其僞三通載曰荊州城東天皇道悟禪師協律郎符載撰碑云云試問通載符碑畢竟撰於何年若謂撰於元和二年何得預載法嗣三世於碑文中邪又何知三世後便絶邪若謂撰於三世之後且三世之後既已絶矣則求碑者何人又不當紀實元和二年邪豈三世俱死於元和二年乎若於壽六十坐三十五夏之下即當接實元和二年四月十三日也一句文理乃通蓋直記告寂之月日也而今乃於此句之下竄入法嗣三世曰惠真曰幽閒曰文賁一十三字而方接實元和二年四月十三日也之句則惠真等豈皆元和二年四月十三日之人乎文理不通文氣不貫如此僞筆一覽可見其僞四小注符碑後曰今荊南城東有天皇巷存焉子清引符碑作小注以證道悟為兩人也今此一筆不惟證天王之僞亦適足以自證竊崇信之僞矣蓋崇信家於寺巷者城東天皇寺巷也寺巷既存竊崇信嗣天王可乎此人贓兩獲於此然以高僧傳較符碑非僞也第以小注通載引以為證故而改頭換尾以致舛僞層出唐聞人歸登撰南嶽讓禪師碑列法孫數人於後有天王道悟名圭峯答裴相國宗趣狀列馬祖法嗣六人首曰江陵道悟權德輿撰馬祖塔銘載弟子慧海智藏等十一人道悟其一也南嶽讓示寂於天寶三年甲申通載謂天王入滅於元和十三年戊戌壽八十二則生當玄宗開元二十五年丁丑曰三十四參馬祖則在代宗大歷五年庚戌去上天寶甲申計二十七年矣其誅茅荊門不知幾何歲月後節使訪道造寺又不知幾何歲月觀造寺後即接入滅事則造於道悟晚年時可知矣其去天寶甲申遠甚讓公碑中列法孫道悟名尚不可何也以參馬祖時已隔二十七年故也况列天王道悟名乎莫是歸登有宿命通預知數十年後道悟住天王故列入乃祖碑中乎此歸登碑僞矣圭峯以裴公問及宗門中事故引具眼宗師數人成狀用答裴公故名宗趣狀初非與馬祖作家譜也至於首列江陵道悟者其下圭峯自注曰兼稟徑山載之林間録洎通載內可考也小注刪去兼稟徑山之句其私心畢露矣夫稟徑山者江陵城東天皇道悟也小注指為馬祖法嗣城西天王道悟何異白日見鬼夢中說夢乎此宗趣狀僞矣馬祖示寂於德宗貞元四年戊辰此時想道悟已住天王矣銘中止載道悟不載天王道悟抑又何耶按林間録洎通載述丘碑訖末附歸登碑宗趣狀二說德輿銘不聞也此係小注僞捏明矣此德輿銘僞矣呂夏卿張無盡著書皆稱道悟嗣馬祖宗門反以為誤然佛國白續燈録敘雪竇顯為大寂九世孫祖源通要録中收為馬祖之嗣達觀穎以丘玄素碑證之疑信相半蓋獨見丘碑而未見符載碑耳夏卿無盡著書即覺夢堂序也序謂無盡夏卿會議宗門中事得丘符二碑證之以道悟嗣馬祖者此也按會議在大觀元年之後達觀穎示寂在嘉祐五年相距已五十年矣無盡親言從達觀處討得二碑賫以遍示諸方以顯自己擇法驗人之眼不謬故諸方斥其為誤小注引以為證豈非誤中之誤乎佛國白乃雪竇顯四世孫望龍潭十世祖也其頌饋餅因緣曰南嶽山頭見石頭便歸古岸狎沙鷗謾分胡餅為香餌引得金龍上直鉤見大藏田字函第八卷則以石頭天皇龍潭公孫三代之世系一頌頌出何等顯明昭著夫作頌之時已知十世祖龍潭出自石頭矣而續燈之時反不知四世祖雪竇出自石頭輒續為馬祖九世孫有是理乎况續燈續五宗諸禪師也彼雲門法眼兩宗若干人咸皆續歸石頭惟以雪竇一人續歸馬祖又有是理乎遍考林間録通載諸書並無此說此係小注僞捏明矣祖源通要録係西余拱辰所集乃達觀穎之法子也覺夢堂序謂無盡從達觀處討得符碑又討得丘碑則二碑俱在達觀處小注謂獨見丘碑未見符碑此何說耶林間録謂達觀引丘碑集五家宗派以道悟嗣馬祖通要亦以道悟嗣馬祖是父子書同文也而達觀以丘碑證之疑信相半抑又何耶既見疑是不信丘碑矣則丘碑之僞可知矣然則既本丘碑集五家宗派又疑丘碑何耶是知宗派通要皆後人僞造非達觀拱辰所集之書也無乃借名古人耳夫丘碑通要達觀既見疑於前子清咸引注於天皇章下豈不疑誤天下後世之人乎古云始作俑者其無後乎達觀子清皆覆宗絶嗣今人可不戒歟今以二碑參合則應以天皇道悟嗣石頭以慧真文賁幽間嗣之而於馬祖法嗣下增入天王道悟以龍潭崇信嗣之始為不差誤矣此一段係子清作小注結斷之文也觀增入天王道悟者則馬祖法嗣中原無此人明矣按傳燈載馬祖法嗣七十六人正宗記廣搜全列至一百三十七人皆無天王道悟名二書見在皇藏可據自馬祖死後五百七十七年小注始出乃增一天王道悟於馬祖法嗣中只恐馬祖未首肯一百三十七同門未首肯也余觀馬祖法嗣如百丈南泉赫赫有名者勿論他如大梅龍山亮座主輩肥遁深隱亦有人訪之尚有片言載之燈録彼道悟為一宰相兼領節使者親臨訪道乃至拋水發火空中神現供養造寺事出異常則名播天下可知矣况又住在通衢之大邦名郡又為雲法兩宗之共祖非肥遁深隱者比何竟無一人謁之訪之致留片言載之燈録至數百年後冷灰豆爆始為子清增入耶夫增入小注可據彼纍朝名世之文獻與夫歷代敕賜之藏典不啻數十種反不敵一僞丘碑而概不可據耶然著述堂中事非庸流所預必也識見高古眼目圓明博通古今至公無我方典斯職故王先生詩云未是獲麟真手筆莫將魯史漫除刪此之謂也今之著述家請擇斯真僞可也通載紀天皇之傳本於符碑紀天王之傳本於丘碑二碑之僞辨見於前其間附小注一篇前段引林間録全文後段引覺夢堂序全文後段余昔編次衛燈録時見無盡從已死五十年之達觀處討得二碑之僞故直斷為無盡僞造蓋據贓以定罪耳今觀前段謂達觀引丘碑集五家宗派則又似非無盡僞造也按覺範見宗派丘碑以道悟嗣馬祖傳燈以道悟嗣石頭故曰考其二書似有兩人此疑詞耳非判斷確有二道悟語也及見宗趣狀首列江陵道悟其下圭峯自注曰兼稟徑山乃劃然明白知稟徑山之道悟即嗣石頭之道悟也丘碑以之嗣馬祖顯然知其僞矣彼時雲門臨濟二宗人見宗派丘碑以道悟嗣馬祖以致相競相爭蓋不考道悟原只一人故發覺範一笑於是繼輯禪林僧寶傳以釐正之自序之又命侯君序之皆以雲門法眼宗石頭又玄沙章末曰石頭之宗至是遂中興之據此則知向之林間録特為辨清宗派丘碑之僞妄非確定有二道悟也會元通載指月三書反引為證據以作著書張本豈止取笑範覺一人直令天下人絶倒今霽崙又援通載丘碑為例以譜雲法兩宗於馬祖下不惟取笑天下識者則又違背御序者多矣而又恃御序簡端之勢僥幸苟免犯憲之罪以濟其私心僭改宗譜紊亂倫敘較嚴統之罪倍甚指月一書以小注丘碑易作正文為天王傳與天皇並列題曰南嶽青原宗派未定法嗣而目録天皇名下小注曰據符碑嗣石頭天王名下小注曰據丘碑嗣馬祖未定宗派二人龍潭德山巖頭雪峯名下小注曰天一天二天三使後人可以為天皇世次可以為天王世次此所謂伏曖昧之機關亂久定之宗譜至於列龍潭德山巖頭一脈章次傳首悉加天皇二字此又以天皇紀龍潭德山巖頭世次矣則前後自相矛盾一至此也僧問天皇如何是玄妙之說一則機緣載之傳燈禪宗正脈諸書天皇因龍潭問從上相承底事如何一則機緣載之宗門統要會元一齊收入天皇傳中古今披閲者不知凡幾自宋景德甲辰至明萬歷壬寅計五百七十九年一旦為指月竊入天王傳中以僞丘碑作天王正傳已屬妄誕况又偷天皇機緣作天王機緣可謂妄誕極矣天王傳後附小注一篇即會元中之小注其僞辨見於前至謂石頭參青原原謂因緣當在馬祖處頭旋於馬祖處大悟此又妄誕極矣不必別引書以辨其僞即指月馬祖傳末曰貞元四年戊辰示寂壽八十則生當唐中宗景龍三年己酉至玄宗開元元年癸丑乃六祖示寂之年馬祖僅五歲石頭於六祖將示滅時稟命參青原一見便蒙印可是一麟足矣之機緣是時馬祖才五歲孩童何妄謂石頭參馬祖大悟邪何遽有馬祖之稱邪其僞捏誣枉古人如此指月通載會元三書於天皇天王處用盡心行至紀崇信傳異口同音皆謂崇信家於城東天皇寺巷饋餅城東天皇道悟嗣法城東天皇道悟則前此心行豈非枉用乎此誠欺不盡之天理昧不盡之良心亦天皇龍潭有靈使之吐實以皆自證其僞妄也幸我皇上留心宗門日久深知傳燈會元纘續三書紀雲門法眼來自石頭故引以為序以明諭霽崙折衷參訂以定二支五宗之譜今全書獨據一通載丘碑為例以譜雲門法眼於馬祖下試問霽崙為復是欽遵御序耶為復是違背御序耶故存誠録斥其誑君罔祖以盜名者此也吾為霽崙懼不忍坐視其自陷於誑君罔祖盜名之罪故將此是非真僞之書悉陳於前請霽崙置身於是非真僞之外然後秉至公無我之心以是非真僞而是非真僞之何等書理不當言冗僞則刪之何等書旨不二機冥合則增之何等書可根可據何等書不可根據一一折衷參訂以成全書之美庶幾報聖恩於萬一亦不孤宰官居士助梓之恩免至以浪費民財刻此無益之書則余有補於霽崙誠非淺矣
