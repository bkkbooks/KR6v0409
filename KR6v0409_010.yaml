body:
  text: 衡陽後學智楷惟直氏述濟宗世次備考之三宗統編年祥符紀蔭編纂字相兩明宣宗癸丑宣德八年禪師永慈至金陵首衆靈谷慈謁靈谷雪峯請充首座甲寅九年慈居靈谷第一座制解造武林遂至東明參祖英宗丙辰正統元年永慈領悟受法慈居祖座下經二年一日擬伸問祖掌之復擬開口祖復掌之乃豁然開悟展具珍重三拜而出祖曰居古道山三十載今日只見得這僧遂付正法宗統訛僞居多不暇論即永慈一人之事略辨之自永慈生洪武甲戌以來之事亦不及論碑中但云宣德二年出峽赴京得度復還金陵靈谷充首座并無癸丑八年之說妄栽年甲僞揑一亦無甲寅九年參東明之說僞揑二碑中亦無丙辰正統元年領悟受法之說僞揑三碑中但云留住數日下山無居座下經二年之說僞揑四碑云一見就請問無一日擬伸問僞揑五東明打三掌今云兩掌僞揑六永慈有進語盡削去改云擬伸問擬開口僞揑七碑中無豁然開悟之說僞揑八亦無遂付正法之說僞揑九碑云參東明後復至金陵住牛首三載焦山三載天界不知幾載正統二年出住翼善則參東明非宣德九年僞揑十碑云景泰二年受東明遺付衣法非正統元年僞揑十一紀蔭係靈巖儲公法孫勒古云永慈於旵和尚兩掌下開悟乃展具珍重禮三拜而立今此說本儲公僞造而來則全書之僞盡可知矣濟宗所喜者面稟親承以永慈受東明死後十年之衣偈非面稟親承也故融公僧寶傳以永慈一參旵公即以臨濟正脈囑之今儲公祖孫以永慈一參東明就開悟就付正法編纂成書刻行天下使天下後世知濟宗正傳之祖而稟親承有如此準律部言未悟謂悟未得上人法謂得上人法成大妄語諸公與正傳之祖僞揑悟由付法不惟自成大妄語罪以之誑惑天下後世其罪倍甚臨濟第二十四世祖諱永慈字海舟原籍金陵余氏生緣蜀之成都齠年出家嗣東明法住金陵東山翼善寺英宗壬戌正統七年臨濟第二十四世東山翼善祖嗣宗統碑中無原籍金陵余氏之說僞揑十二碑云正統二年住翼善以之立宗統可也而以七年立宗統僞揑十三劄付碑云正統十年賜額翼善禮部始給劄永慈住持七年永慈不知棲隱何方而預先立其宗統僞揑十四壬午天順六年臨濟第二十四世金陵東山翼善祖示寂塔於寺側永慈示寂在成化二年碑中無天順七年示寂之說僞揑十五辛酉正統六年禪師普慈自吳西洞庭來參旬日大悟慈亦字海舟吳郡海虞錢氏子世業儒出家破山寺往參鄧尉山萬峯蔚祖付以法偈遂結廬太湖西洞庭山三十年不過湖聞虛白旵祖在安溪東明說法親承萬峯祖遂往叩旬日大悟繼席東明拈香有受恩深處便為家有乳方知是阿娘之語景泰元年示寂祥符蔭曰近因文獻互見未之合考遂有海舟慈祖一二是非之疑謹按宗伯錢謙益海舟慈禪師傳歷歷明白宗伯以海虞人而傳海虞僧初非傳聞之訛此足徵先參萬峯後參東明居東明而承嗣其法者乃海虞之普慈也永慈祖原籍金陵生緣於蜀行蹟昭然詳於碑碣及雲外録嗣法東明而住金陵東山翼善寺與普慈兩人名號雖同履歷實相霄壤即如近時海虞三峯先住者為匡瀑戒青係豁堂嵒之嗣於漢祖為第四世後住者為僧鑑曉青係退翁儲和尚之嗣於漢祖為第三世若更百年後而稱述之均曰三峯青安所別其為前後彼此乎又三峯前住為檗庵正志後住為碩揆原志百年後同稱三峯志不幾滋是非一二之疑如海舟慈祖者乎以是而推天皇天王之兩道悟亦猶是也其可以任行刪削哉兩道悟之說法門自有公論引三峯青三峯志辨明海舟為二人是矣以之總嗣東明非也雲外録向未之見據公所述得契東明旵祖意乃海舟永慈翼善碑載永慈受東明旵死後十年遺付之衣偈此永慈嗣東明正公所謂詳於碑碣及雲外録是也宗伯傳以普慈先嗣萬峯後嗣東明者非正統景泰時所撰乃撰於近日是本汝祖天童悟公所立之傳之所撰也當三峯潭吉據無聞笑巖之祖訓證普慈確嗣萬峯但以古溪祭文一說銷釋不去故謂東明下必別有一海舟天童以潭吉不遵龍池源流又泥於古溪靜庵二說所以出普慈一傳謂先嗣萬峯以銷釋潭吉所引萬峯沈貫無聞笑巖四種祖訓之說謂後嗣東明以符合古溪靜庵二說之故也今公稽考碑碣及雲外録知永慈嗣法東明正潭吉所謂東明下別有一海舟者此也永慈紹旵祖後踵續高峯七世屬古溪之所祭者為靜庵之所敘者與普慈無涉今依翼善碑古溪文靜庵敘三種確據證東明嫡嗣自有海舟永慈而天童出海舟普慈重嗣東明一傳豈不顯然知為僞造矣在彼時只知有一海舟要銷釋兩家據證以折辨潭吉故撰此傳公今明知有二海舟不急修明祖系班正典型而復據僞傳收普慈為東明之嗣倒置祖孫疊訛世次較前人之罪豈不倍哉丙寅正統十一年智瑄出家領悟瑄姓范初為梓人因營建創足聞提誨而有省遂出家力參充火頭偶因火焰燎眉照鏡忽然大悟智瑄之名載永慈碑內別無一字片言之載籍何所據紀為正統十一年出家邪僞揑十六姓范者明瑄也今紀為智瑄僞揑十七明瑄出家亦未見載有年月今妄栽年甲僞揑十八因營建是自營建耶為人營建耶僞揑十九聞提誨有省是聞普慈耶永慈耶僞揑二十遂出家不審投普慈出家耶永慈耶僞揑二十一出家大悟俱在丙寅十一年耶亦有先後之時耶僞揑二十二甲戌景泰五年祖付智瑄正法瑄依祖座下久得其道付法有殺活由來總見成之記此永慈付智瑄之偈係大成僞揑不辨真僞紀為實事豈不取笑識者亦無久依座下得道之說僞揑二十三壬午天順六年臨濟第二十五世祖諱智瑄字寶峯住南京高峯寺永慈法嗣一百有四人智忍居首碑內載首嗣門人寶峯者乃智忍也元慧刻本於寶峯下僞增一瑄字為寶峯瑄今竟紀為寶峯智瑄其住高峯寺者係寶峯明瑄亦紀為智瑄儲公勒古云高峯智瑄禪師久參東山慈和尚付法偈末有殺活拈來總現成之句今此說是本勒古僞書而來以僞傳僞滅祖亂宗迄無砥止可悲可痛何所據紀智瑄天順六年住高峯耶僞揑二十四即明瑄住高峯亦未有年月今僞栽年甲僞揑二十五丁酉成化十三年禪師本瑞來參瑄祖問什麼處來曰北京乃至拂袖而出戊戌十四年祖付本瑞正法偈曰濟山棒喝如輕觸云云臨濟第二十五世南京高峯祖示寂此係天奇參寶峯明瑄於南京高峯寺之事紀為智瑄之事僞揑二十六按明瑄本傳云天奇來參無有年月今僞栽成化十三年之年甲僞揑二十七亦無戊戌十四年付法之年甲僞揑二十八憑何所據知瑄祖付天奇訖就示寂耶僞揑二十九明瑄示寂在成化八年非十四年也僞揑三十若夫智瑄除大咸僞揑景泰五年付法偈之外別無載籍可稽不知死生出處之年月事迹今以天奇參明瑄事紀為參智瑄事尤其不可况又僞栽朝代年甲於其間乎著述一事誠非草草筆之削之事要真實蓋事真足以徵信千古否則只益僞撰不惟無補法門反害法門多矣今蔭公據宗伯一僞傳紀普慈嗣東明惑元慧所增之僞名咸公所揑之僞偈儲公所勒之僞書紀明瑄為智瑄非惟紀事失真而又自為亂宗滅祖如此著述究竟於人於己有何裨益者哉况又僞揑面稟親承僞栽朝代年甲無乃罔祖誑世以盜名名為宗統實亂統也續指月録廬陵聶先集字樂禎凡例信史有闕疑之例傳燈有並載之條蓋以續佛慧命重在師承萬難以臆見刪削也瞿録竝載兩天皇悟因符碑丘碑各承宗派遂為千秋疑案紛端久矣茲録有兩海舟慈而昭然不疑者有說焉兩慈皆濟宗之人有一家言可按也一為金陵翼善開法之海舟永慈一為杭州東明繼席之海舟普慈其姓氏生里不同其長幼年歲有別其悟道機緣可證其付授時日甚殊普慈則有天童悟為之立傳花城沈貫為之作拈頌序現在也永慈則有南澗間之續燈存稿靈巖儲之南嶽單傳録現在也惟續燈萬峯嗣下削去海舟慈之沈貫問答一則另詳注於二十八世普慈章之後金陵東山翼善海舟永慈禪師按東山行實碑載師為蜀之成都余氏子生於洪武二十七年甲戌齠齔時見僧輒喜一日聞說生死事遂發志棄俗趨彭縣大隋山景德寺投禮住持獨照月師剃染後入西山住靜八載發志參方行腳首謁太初和尚請益開示父母未生前話做工夫一日初問師曰父母未生前那箇是你本來面目師即從東過西叉手而立初曰未在更道師曰兩眼相對有甚相瞞初大悅制解起單復參東普無際和尚不契乃出峽赴京得度宣德二年復還金陵靈谷挂搭雪峯和尚請師充首座制解即詣古道山參東明旵禪師一見便問無相福田衣甚麼人得披旵下座摑一掌師曰四大本空五蘊非有汝作麼生掌旵又一掌師曰一掌不作一掌用速道旵又一掌師神色不變曰老和尚名不虛譒復展具三拜而立旵曰我居古道三十載今日只見得者僧乃留旬日欲付袈裟師曰某甲不為衣來堅不受下山自此聲譽叢林金陵牛首請師領衆三載退隱天界山居太監袁誠法名智海欽師道德請住翼善寺開山說法正統五年庚申六月二十八日旵和尚留囑明白庵曰吾有衣法二物待十年後送至金陵東山海舟和尚受納付囑曰字付慈海舟訪我我無酬明年之明日西風笑點頭明年如期果寂白庵不違遺囑限滿日請首座法薦於景泰二年八月二十三日持衣賫至東山師祝香而受東明旵嗣杭州東明海舟普慈禪師按師七世孫天童悟和尚傳云蘇之常熟人姓錢世宗儒業出家於破山初至慧日寺聽講楞嚴至但有言說都無實義處乃曰言說今日愈多矣遂歸日夜閲經尋思實義面顏日悴有居士問曰師顏色有病師曰佛法不明故爾非病也士曰佛法不明何不往府中鄧尉山問取萬峯蔚和尚去師聞欣然便詣鄧尉見萬峯峯問曰沙彌何來師禮拜起曰常熟峯曰到此何為師舉前話再拜求示峯便劈頭兩棒攔背一踏以腳兩踢曰只者是實義師有省起曰好只好太費和尚心力峯笑而許之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親又曰子當匿迹護持莫輕為人師範師自以為得乃結廬於洞庭山塢二十九年一日僧至師問曰上座何處來曰安溪曰安溪有人麼曰有虛白和尚說法不異高峯曰是誰弟子曰寶藏曰有甚言句僧舉室中驗人語云心不是佛智不是道三藏不是法是甚麼下語者皆不契舉畢復問師曰參寶藏否師曰我與寶歲同參萬峯僧曰當日有何所見遂隱於此就不再參人去師曰問但有言說都無實義峯便打我從此得悟僧曰請言得之所以師曰但要人知痛癢的是實義是妙心言說盡屬皮毛僧笑曰若據此見解生死尚未了何得云悟未在未在不見道心不是佛智不是道耶師遂有疑曰彼處衆中有真大徹者麼僧曰無師即棄庵渡湖往安溪詣東明適有人設齊師至關前問明曰今日齊是甚麼滋味明曰到口方知說即遠矣師曰如何是到口味明即打滅燈曰識得燈光何處著落味即到口師無語次日黎明遣侍者請師師即至明問曰曾見人否師笑曰見只見一人說出恐驚人明曰假使親見釋迦依然是箇俗漢但說何妨師曰萬峯明曰為敘先後耶為佛法耶若敘先後萬峯會下有千人若論佛法老闍黎佛法未夢見在何驚之有若親見萬峯萬峯即今在甚麼處師面赤罔然明曰若如此不曾見萬峯師歸客寮三晝夜寢食俱忘偶值香燈繩斷墮地忽然大悟詣關前呈悟由明曰老闍黎承嗣萬峯去師曰白公為我打徹豈得承嗣萬峯明乃笑遂集衆出關升座曰瞿曇有意向誰傳迦葉無端開笑顏到此豈容七佛長文殊面赤也茫然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一派續綿綿乃擲下拄杖曰千斤擔子方全付玄要如今拄杖談以拂子擊三下下座師即入方丈禮拜明曰老僧不出月去也至二十七夜辭衆二十九日示寂師復欲遁歸洞庭四衆苦留乃繼其席嘗舉興化問克賓維那你不久為唱道之師賓曰不入者保社化曰會來不入不會不入賓曰沒交涉化便打曰克賓維那法戰不勝罰錢五貫設堂飯至來日齊飯時興化自白椎曰克賓維那法戰不勝不得喫飯即便趕出院師拈曰若為濟宗兒孫必要明他家裏事豫昔蒙萬峯老人付我偈便以為得直至今日始知我錯萬峯不錯一遇東明和尚乃明棒頭賞罰言句亦然果然悟在己而法藉師豈曰一悟即為了當如以一悟靈通不求師法正謂威音已前無師可也威音以後師師相授者此也所以克賓識得父師苦心策發已明向上關棙子洞達閨閾中事不在言宣失錢喫棒受罰出院骨碎身粉也難酬報興化萬一况打罰出院乎海長老今日所以不嗣萬峯而嗣東明者亦此也古諺云養女方知娘受苦生子乃識父辛勤誠哉是言也實有箇中大事豈容草草若與人抽釘拔楔坐獅子座為人天師抉人眼翳紹佛祖位者必須一一透過切莫以悟為是將綱宗抹殺置而勿究何異天魔外道莽蕩招殃悔乎萬峯忌日師拈香指真曰我幾淹殺你甕裏幸是普慈若是別人不可救也爇此瓣香堪酬接引喝一喝曰只笑你護短沒頭師佛法當人情展坐具禮拜又拈香曰此一瓣香供養東明長老一片赤心鞭策令我洞達宗源連喝兩喝曰一言豈盡普慈心千古兒孫贊報恩又拈香曰此一瓣香供養昔日師僧指南之力若不蒙師何由今日他日到來拄杖三十喫有分堪報不報之恩喝一喝曰受恩深處便為家有乳方知是阿娘禮拜起說偈曰源頭只在喝中存三要三玄四主賓五棒當人言下會四料還須句裏明末後真機死活句個中消息在師承碎形粉骨酬師德將此身心報佛恩慟哭歸方丈臨示寂說偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打圓相曰釋迦至我六十二世有不可數老和尚又打圓相曰多向者裏安身咄乃投筆而逝景泰元年全身塔於東明左側得法十二人東明旵嗣師著拈頌一帙行世花城弟子沈貫為之序其略曰海舟嗣旵公一事自佛至今無有其人人我四相些微未盡者不能為之師誠古佛再現人間也無奈師年邁臘尊出世無何而入滅宗風未能大暢寰中惟有拈頌古德機緣百則令慧日重開破暗千古其頌或引人詩句出自手眼有合佛祖意者採托而成之個中意旨是非不敢固必但見師之操履人品為法忘形去名存實自無苟足而其頌拈量不妄意測度謬為撰述者也明眼人見之究之奉行有日在嗟乎今時魔熾法殘拈花一脈寥寥不顯於世真正宗師煨鐺山穴保養道胎俟時待緣暗流枝派使兒孫布揚祖道雲興雨澍潤澤靈根佛祖花開香浮震日觸聞其香咸令悟入者舍師之裔其誰歟時景泰丁丑三月九日山曉皙禪師崇正録云潭吉五宗救中之說總以未見永慈之碑誤之天童先師翁闢妄救中答潭公書云老僧誠有意探討故刻小字印於語録之前數年竟不能得邇來有法姪山茨將海舟寶峯二祖機緣刻行於世蓋得之丹壑查居士家藏佛祖源流中者然則萬峯蔚出寶藏持持出東明旵旵出海舟慈慈出寶峯瑄又得靜庵素禪師語録素為海舟二世孫敘聯芳圖始自釋迦遞代相承敘至東明旵海舟慈雲溪瑛瑛與寶峯瑄為昆季焉據是源流的的相承海舟慈為東明旵祖之嗣無疑矣當時潭公聞先師翁之言始得豁然嗣後竟無餘議但俱未見翼善之碑誤以普慈為永慈耳樂讀氏曰海舟永慈翼善碑按康熙元年大咸咸公住東山時始為刊布四方一時名衲皆宗之前人俱未之見焉其東明海舟普慈傳乃悟老人作於崇禎年間山茨際公住東明時刊行也不謂翼善一碑誵訛互異不得已而兼存之所謂余生也晚前不見古人後不見來者惟有多聞闕疑已耳古今僞碑甚多世之譜牒造端恆有之具戒衲子有是事乎昔之天皇天王今之永慈普慈並載為是知我罪我我何畏焉杭州東明寶峯智瑄舊傳原是明瑄聶公妄改智瑄禪師蘇州吳江范氏子在俗為木匠因海舟和尚造塔院斧傷自足痛甚索酒喫舟聞之往謂曰適來范作頭傷足猶可假若斫去頭有千石酒與作頭喫作頭能喫否師恍然有警遂求為僧舟即與披剃曰今日汝頭落也師曰頭雖落好喫酒人頭不落也乃充火頭一日負柴次舟見曰將荊棘作麼師曰是柴舟便呵呵大笑師罔然無措舟曰是柴將去燒卻師起疑曰和尚畢竟是甚麼道理故問我我不能答是日刻意參究不覺被火燎去眉毛面如刀割以鏡照之豁然大悟作偈曰負薪和尚喚作棘火𦦨燒眉面皮急祖師妙旨鏡中明一鑑令人玄要得乃呈於舟舟便打師奪拄杖曰只條六尺竿幾年不用今日又要重拈舟大笑師又呈偈曰棒頭著處血痕斑笑裏藏刀仔細看若非英靈真漢子死人喫棒舞喃喃舟曰即此偈語可紹吾宗果是從緣入者永不退失從疑得者妙用隨機乃付偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深山止從此名聞遐邇學者雲集一日天奇瑞參師問甚麼處來奇曰北京師曰只在北京為復別有去處奇曰隨方瀟灑師曰曾到四川否奇曰曾到師曰四川境界與此間如何奇曰江山雖異雲月一般師舉起拳曰四川還有者箇麼奇曰無師曰因甚卻無奇曰非我境界師曰如何是汝境界奇曰諸佛不能識誰敢強安名師曰汝豈不是著空奇曰終不向鬼窟裏作活計師曰西天九十六種外道汝是第一奇拂袖便出師以偈付曰濟山棒喝如輕觸殺活從教手眼親聖解凡情俱坐斷曇花猶放一枝新時座下得法五人奇居首焉成化八年壬辰十二月九日師無疾而逝全身塔於東明寺左海舟慈嗣竟陵荊門天奇本瑞禪師略曰參寶峯瑄和尚於高峯針芥相契遂蒙印證寶峯瑄嗣聶公以姓氏生里長幼年歲辨海舟為二人是矣以二人俱嗣東明非也按古溪祭文打頭則曰祭東山翼善堂上高峯下第七代圓寂本師海舟大和尚原祭永慈明矣永慈紹旵祖百年之踵續高峯七世之燈住持金陵東山翼善者也與普慈無涉潭吉明謂龍池因符合續高峯七世之數故以海舟普慈嗣東明豈非大誤然而未列章次天童復踵龍池之誤為普慈立先嗣萬峯後嗣東明之一傳以折辨潭吉故也據公所引山曉之說謂俱未見翼善之碑誤以普慈為永慈公今得翼善碑明知永慈係東明嫡嗣彼天童以普慈嗣東明符合七世之數者錯誤炳然更復何辨然則咸知誤矣須以誤嗣東明之普慈發放何地消歸何人可也而乃復據天童之僞傳收為東明之重嗣豈非誤之又誤者乎至引沈序以證成實不知反證成僞矣按沈貫撰萬峯塔銘署諱自稱隱士以同知休官林下稱隱士大約五六十歲時塔銘撰在洪武十六年春至景泰丁丑計七十四年世豈有百二三十歲之沈貫為普慈作序乎又丁丑正月十七日英宗復辟改景泰八年為天順元年二月朔廢景帝復為郕王是月十九日郕王薨而三月九日何復有景泰年號為沈貫作序署款乎據是則此序此傳係天童僞造明矣僞傳以普慈被行腳僧勘驗一上被東明問得面赤無對屈辱極矣數十年來莫得而申之萬峯蒙濫付非人之罪數十年來莫得而雪之幸祖父有靈使翼善碑出則萬峯之罪得以雪之普慈之屈得以申之不急急修明世次仰答祖父靈明而反據僞傳收為重嗣使普慈枉受屈辱之恥終古莫申萬峯濫付非人之罪終古莫雪可悲可痛至謂信史有闕疑之例傳燈有並載之條如梅谷悅公以明瑄智瑄何妨並列何得私憑臆見擅改明瑄為智瑄自公改後天下後世只知有一寶峯智瑄而寶峯明瑄豈不被公抹殺之矣又以天奇為智瑄之嗣亂宗滅祖莫此為甚最好笑如此亂宗滅祖之事不見有一人辨正之如檗巖黃公反讚其書載筆精妙確有卓見高識為功於傳燈無盡相雨蔭公反引為例以二海舟録嗣東明不審濟宗尊宿喜於訛誤相承耶抑亦稽考無人耶此吾莫解述以問世續燈存稿南澗通問編定字箬庵南澗行昱梓行字曉庵萬峯蔚禪師法嗣海舟慈禪師居士沈貫問修多羅教如標月指若復見月了知所標畢竟非月此理如何師舉手曰指耶月耶士罔措師拍案一下士釋然有省東明旵禪師法嗣金陵東山翼善海舟永慈禪師成都余氏子生於洪武二十七年幼孤見僧輒喜一日聞生死事大發心出家奮志訪尋知識首見太初問父母未生前那個是汝本來面目師即從東過西叉手而立初曰不是不是師曰兩眼對兩眼宣德三年出峽遊燕京南還至武林謁東明問無相福田衣何人合得披明便掌師曰作麼明又掌師曰一掌不作一掌用又如何明復掌師曰老和尚名不虛傳大展具三拜未幾復遊金陵正統二年大監袁誠欽師道德請師開法翼善五年五月二十九日東明專僧送衣拂至有偈曰分付慈海舟訪我我無酬明年之明日西風笑點頭明年東明如期示寂金陵慈禪師法嗣金陵高峯寶峯明瑄禪師天奇參師問甚麼處來奇曰北京師曰只在北京為復別有去處奇曰隨方瀟灑師曰曾到四川麼奇曰曾到師曰四川境界與此間如何奇曰江山雖異雲月一般師舉起拳曰四川還有者個麼奇曰無師曰因甚卻無奇曰非我境界師曰如何是汝境界奇曰諸佛不能識誰敢強安名師曰汝豈不是著空奇曰終不向鬼窟裏作活計師曰西天九十六種外道汝是第一奇拂袖便出師以偈付曰濟山棒喝如輕觸殺活從茲手眼親聖解凡情俱坐斷曇花猶放一枝新寶峯瑄禪師法嗣竟陵荊門天奇本瑞禪師章次不録闢妄救移萬峯下普慈明瑄天奇一脈系於東明下世次疊訛祖孫倒置數十年來幾莫能辨今以永慈嗣東明符合翼善碑古溪文靜庵敘三種舊章以普慈還嗣萬峯符合無聞笑巖等十種祖訓俾兩家世次有準式憑千古以釋天童之錯誤於法門不無小補如何又留普慈之子孫明瑄天奇而為永慈之子孫不亦依舊疊訛世次倒置祖孫耶普慈傳重嗣東明一事雖係天童僞造然參萬峯一段悟由洎生緣皆實事可録也而一槩削去惟録沈貫一則語成何章次莫是其間有嫌疑耶抑亦刪繁取要當如是削薄耶又住居縱不載東明亦當載洞庭今一槩不載使普慈竟為箇無地頭漢成何體統又海慈舟三字卻有二人因同名號往往混為一人幸法派有普永之別今不詳載亦削去普字惟曰海舟慈是何高裁永慈何幸獲此螟蛉子孫普慈何罪斬絶嫡子親孫而削薄章次列於旁出猶之乎不還也又何異亂宗滅祖耶永慈碑云正統五年六月二十八日東明示寂遺囑明白庵曰吾有衣法二物待十年後送至土山海舟和尚受納付囑曰字付慈海舟云云白庵於景泰二年八月二十三日專僧持衣至土山永慈祝香而受今日正統五年五月二十九日東明專僧送衣拂至濟宗人最喜者是面稟親承意謂東明死後十年白庵代付非面稟親承不若於正統五年東明未死之日以完成師資授受一事豈不是面稟親承然則天童作普慈傳墮燈大悟出關付法亦面稟親承也公嫌其僞造故削去之今又自己僞造面稟親承之事豈不自誑以誑世乎他如融公以永慈一投機於虛白即以臨濟正脈囑之之面稟親承蔭公以永慈一參東明於兩掌下即時開悟即以正法付之之面稟親承豈不更直捷痛快殺人公今縱弄出箇面稟親承其奈間隔數年較融蔭二公拙之多矣又濟宗人付法喜歡拂子而偈次也故咸公與智瑄僞揑法偈一首元慧僞揑祖衣一頂拂子一枝今存稿以永慈既有衣偈二物所少者一拂也故又僞增一拂豈不更冠冕耶又偈語乃決別意非付法意也縱然改字字為分字不見得筆力之高不若機緣削去下座摑掌汝作麼生速道諸字眼不惟筆力高健亦令人見之不致人疑翼善碑為後人僞造若夫亂宗滅祖之事吾雖愚魯不敢從命五燈全書聖感超永集字霽崙萬峯蔚禪師法嗣海舟普慈禪師蘇州常熟錢氏子初出家破山聽楞嚴至但有言說都無實義處有疑往參萬峯問但有言說都無實義如何是實義峯劈頭兩棒攔胸一踏曰只者是實義師起曰是即是太費和尚心力峯然之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親居士沈貫問修多羅教如標月指若復見月了知所標畢竟非月此理如何師舉手曰指耶月耶士罔措師拍案一下士釋然有省東明旵禪師法嗣金陵東山翼善海舟永慈禪師成都余氏子生於明高帝洪武甲戌生性慈善幼孤見僧輒喜一日聞生死事發心出家奮志趨彭縣大隨山景德寺從獨照月剃染後月示寂師入西山庵居八載棄去尋訪知識首謁太初原問父母未生前那個是汝本來面目師即從東過西叉手而立原曰不是不是師曰兩眼對兩眼原頷之宣德丁未出峽遊燕京南還至武林謁東明旵問無相福田衣何人合得披旵便掌師曰四大本空五蘊非有作麼生掌旵又掌師曰一掌不作一掌用又如何旵復掌師神色不變曰老和尚名不虛傳遂展具三拜而立旵曰我居古道二十載今日只見得者僧大衆弗得輕慢自此聲譽叢席未幾復遊金陵牛首挂搭請師前堂領衆三載復隱全椒焦山三載後至天界憩隱山居於正統丁巳太監袁誠欽師道德請師開法翼善庚申夏東明專僧送衣拂至有偈曰分付慈海舟訪我我無酬明年之明日西風笑點頭明年東明如期果寂成化丙戌師示寂壽七十三塔於本山茲特辨世次而永慈傳去取點綴不暇較也二海舟來源世次備述於前茲不贅按普慈一傳前載生緣悟由初住洞庭後住東明洎示寂東明建塔東明皆實事今為普慈傳者論住處縱不載東明亦當載洞庭論姓氏機語當載生緣悟由論後事當載示寂建塔存稿不分真僞一槩削去惟載沈貫問答一段不審其間有嫌疑耶抑僧史當如是刻薄耶今全書依存稿以普慈還嗣萬峯理也傳中既補入生緣悟由授受之事亦當補入住持後事可也今二書削薄章次關係法門事小第列普慈為旁枝以永慈為正傳紊亂宗譜關係法門之大者莫大於此翼善慈禪師法嗣金陵翼善寶峯智瑄此係明瑄之傳霽崙偷來作智瑄之傳削去南京寶峯明瑄六字僞改金陵翼善寶峯智瑄八字是抹殺一寶峯明瑄獨顯一寶峯智瑄禪師吳江范氏子素業木工因海舟慈建塔院失斧傷足痛甚索酒慈曰范作頭傷足猶可假若斫去頭有千石酒與作頭喫能喫否師有省即求為僧慈與披剃曰今日汝頭落也師曰頭雖落好喫酒人頭不落也乃充火頭一日負薪慈見曰將荊棘作麼師曰是柴慈呵呵大笑師罔然慈曰是柴將去燒卻師疑曰和尚畢竟有什麼道理故爾問我是夕刻意參究不覺被火燎眉面如刀割以鏡照之忽然大悟呈偈曰負薪和尚喚作棘火焰燒眉面皮急祖師妙旨鏡中明一鑑令人玄要得慈便打師奪拄杖曰者條六尺竿幾年不用今日又要重拈慈大笑師又呈偈曰棒頭著處血痕斑笑裏藏刀仔細看若非英靈真漢子死人喫棒舞喃喃慈曰即此偈語可紹吾宗傳中凡曰慈者普慈也師者明瑄也此係明瑄普慈父子問答之事今於傳前改東明慈禪師法嗣為翼善慈禪師法嗣又於傳首改南京寶峯明瑄為金陵翼善寶峯智瑄竟做智瑄永慈父子問答之事乃付偈曰山茨際公出明瑄傳於此曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深山止今削去此偈入僞偈曰迷悟猶如空裏雲碧天明淨了無痕歷然世界其中露殺活拈來總現成此係大威咸公僞揑永慈付智瑄之偈妄言得自房僧破簏敗紙中從此名聞遐邇學者川赴出世金陵高峯此十六字係明瑄事次遷翼善此四字係霽崙僞揑天奇瑞參師問甚處來瑞曰北京師曰只在北京為復別有去處瑞曰隨方瀟灑師曰曾到四川否瑞曰曾到師曰四川境界與此間如何瑞曰江山雖異雲月一般師舉起拳曰四川還有者個麼瑞曰無師曰因甚卻無瑞曰非我境界師曰如何是汝境界瑞曰諸佛不能識誰敢強安名師曰汝豈不是著空瑞曰終不向鬼窟裏作活計師曰西天九十六種外道汝是第一瑞拂袖便出師喜為克家種草堪支吾道遂書偈付曰濟山棒喝如輕觸殺活從茲手眼親聖解凡情俱坐斷曇花猶放一枝新此一段係明瑄與天奇問答機緣於智瑄無涉師逝於明憲宗壬辰臘月九日此亦係明瑄事塔建翼善左纘續載明瑄傳末曰塔全身於東明寺左今霽崙削去僞改塔建翼善左闢妄救泥古溪靜庵二說雖誤割萬峯法嗣普慈為東明法嗣然按其所編歷代世次自南嶽一脈次第列來至萬峯下則曰寶藏普持曰東明慧旵曰海舟普慈曰寶峯明瑄曰天奇本瑞雖世次中有疊出寶藏東明二代而普慈明瑄天奇三代世次未曾移易一人妄改一字今霽崙據永慈碑紀永慈傳以永慈紹東明是依古溪靜庵三種舊章參訂永慈世次誠是亦當遵無聞笑巖十種祖訓以普慈明瑄天奇還歸萬峯參訂普慈世次以釋天童之誤可也今則雖以普慈還嗣萬峯而列為旁枝又偷明瑄之傳為智瑄之傳削去明瑄之名改為智瑄之名豈不是抹殺寶峯明瑄獨顯寶峯智瑄又以普慈之孫天奇為智瑄之子是乃妄認寶藏東明永慈智瑄四代異姓之人為源流中一脈所出之祖致使兩家祖訓舊章洎闢妄救五宗救續略繼燈纘續存稿諸書所列世次人名俱不相合豈不是亂宗滅祖之甚者也又於傳內削去普慈付明瑄臨濟兒孫是獅子之真偈插入永慈付智瑄迷悟猶如空裏雲之僞偈殊不知此偈乃大咸僞揑妄言得自房僧破簏敗紙中公然刻布於世競相援引以為著書立言之張本噫何惑之甚也夫既曰破簏敗紙不過零碎廢紙也而房僧破簏中所有敗紙亦不過疏語紙也且永慈之後住翼善者為清古源智清之後雖不知為何人然永慈子孫頗多必也數代之後漸成房僧何得有法偈而落房僧廢紙中乎况永慈迄今二百餘年而房僧破簏曾不一更換乎簏中所貯敗紙曾不一焚燒乎積之二百年後始為大咸檢出真耶僞耶余不得而知也按普慈示寂在景泰元年景泰之前為正統則普慈付明瑄之偈書在正統年閒可知矣永慈付智瑄之偈載景泰五年然偈之真僞勿論即此一偈以見普慈永慈明瑄智瑄師承上下授受後先朝代年甲種種各別如何混合得來今霽崙打渾混合削真入僞棄嫡祖庶豈不是亂宗滅祖之甚者也明瑄出世金陵者金陵之高峯寺也從不聞有次遷翼善之說即智瑄亦絶不聞出世何地何剎次遷何地何剎也永慈為翼善第一代智清為第二代載之行實碑內今霽崙紀智瑄出世高峯次遷翼善不審所載何碑何書言不該典非君子之所談既無載籍可稽何遽僞揑出世高峯次遷翼善耶雖楚山有贈瑄玉峯掩關翼善之偈豈掩關遂為一代住持乎若以掩關為住持余更有說焉按楚山贈偈在景泰三年智瑄受付在景泰五年豈未受付前掩關翼善便為一代住持乎若夫明瑄非惟受普慈付囑在正統間其出世高峯亦在正統間何以知之按金陵梵剎志載高峯乃古寺也正統十四年敕賜為崇化寺據天奇行實自謂到南京高峯寺參寶峯瑄和尚不曰到崇化直曰到高峯則明瑄出世高峯在正統十四年之前可知矣觀此則知天奇參明瑄亦在十四年之前明矣智瑄受付在景泰五年豈未受付六七年前便為天奇所參之師乎自尚未受人付而先付人之法乎據此則普慈永慈明瑄智瑄授受出世種種各別如何混合得來且天童闢妄救列世次人名於海舟普慈下不曰寶峯明瑄乎於明瑄下不曰天奇本瑞乎今霽崙擅改明瑄為智瑄謂出世金陵高峯又僞揑次遷翼善豈不是亂宗滅祖之甚者也按闢妄救續略纘續諸書所紀海舟普慈法嗣曰南京寶峯明瑄紀明瑄法嗣曰天奇本瑞則天奇嗣明瑄明矣天奇行實自謂到南京高峯寺參寶峯瑄和尚則天奇嗣明瑄又明矣按明瑄傳內載天奇瑞參師問甚處來乃至付偈者皆出載天奇行實也今霽崙既於傳首改明瑄為智瑄紀為永慈法嗣矣又削去普慈付明瑄之偈插入永慈付智瑄之偈又載智瑄出世高峯次遷翼善然後載天奇參師者徑是參寶峯智瑄也付偈者徑是智瑄付天奇也如此詭譎致使終古誵訛豈不是亂宗滅祖之甚者也按東明寺左有塔院一所院後右為東明旵塔左一排五塔中為海舟普慈塔右二塔未有題名左第一為寶峯明瑄塔第二為普同塔後人以二寶峯混合為一寶峯徑指為翼善寶峯上為永慈之嗣下為天奇之師以證成一己之私說矣惟慮東明寺左有明瑄全身塔在焉恐後據此塔以駁私說之案遂將明瑄塔面題名鏟去殆盡按翼善左有寺名退居寺後有大小塔二中大塔謂是永慈塔塔面未有題名左小塔謂是智瑄塔詢其所以其說不一一說此塔面向有玉峯瑄禪師塔六字一說後見玉字上添一宀頭近又不然於塔腰間抽去一盤舊石易以新石題曰翼善堂上第一代先師寶峯瑄和尚塔十五字按行實碑載永慈為翼善第一代繼住持者為智清而智瑄縱有住持不知在第幾代今小塔遽題智瑄為翼善第一代不知置永慈智清於何處耶又智瑄之名獨載永慈碑內從不聞號寶峯也惟楚山録中有贈偈曰瑄玉峯小塔向曰玉峯瑄兩說吻合徵驗有據則智瑄向號玉峯明矣而號寶峯者始見此塔面新題則係易石之人改玉峯為寶峯以為混二寶峯為一寶峯之張本故山曉皙公寶積録直謂二海舟慈向有是說二寶峯瑄從未之聞且力辨止有一寶峯智瑄則寶峯明瑄被山曉一筆抹殺之而鏟塔易石改號之事於此微露矣纘續紀明瑄傳末明載塔全身於東明寺左今霽崙削去之僞改塔建翼善左亦即此意豈不是亂宗滅祖之甚者也按智瑄名獨載永慈碑內別無見載亦別無一字所紀至順治末年大咸始於房僧破簏敗紙中檢出永慈偈稿縱真亦付智瑄之偈於明瑄無涉也正宗録知其無涉不敢混合為一故以智瑄普瑄並列永慈下存稿不收智瑄徑以明瑄嗣永慈幸明瑄之名未曾改易後世高明得以釐正濟宗世次賴有此名存焉今霽崙遽於傳首截去明瑄之名安上智瑄之名是猶斬去馬頭易以鹿頭又於傳中刪去明瑄之偈插入智瑄之偈是猶鑿去虎腰補以狐腰又於傳尾削去塔全身於東明寺左改為塔建翼善左是猶截去龍尾續以蛇尾非惟欺世惑人實乃終古莫辨豈不是亂宗滅祖之甚者也寶峯瑄禪師法嗣竟陵荊門天奇本瑞禪師章次不録寂後門人於弘治戊午建塔於衛輝府輝縣白鹿山白雲寺左按天奇録不見載出世某地建塔何處今霽崙列天奇章次載住處曰竟陵荊門者蓋天奇出家處以出家處紀為住處無不可也余嘗躬到白雲見天奇塔背有碑曰弘治十一年歲次戊午某月日立今霽崙曰寂後門人於弘治戊午建塔白雲寺左者是依天奇塔碑也亦霽崙窮搜極討補載後事於天奇誠為有功又何不依塔碑以釐正天奇之世次耶按碑前載天奇法嗣曰高峯第八代遠孫二百餘人夫天奇法嗣稱高峯八代則天奇當高峯七代以是驗無聞笑巖等數種祖訓皆為可徵可信也又何得抹殺天奇之父列天奇之嫡祖為旁枝勒逼天奇認四代異姓之人為自出之祖父乎敢問霽崙為復知而故為耶為復附會鏟塔易石改號之私說耶若附會私說如扯人下水先自受其沒溺矣若知而故為非僧苑之信史實亂統之僞書也僞書豈能徵信耶悲哉
