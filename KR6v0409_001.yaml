body:
  text: 衡陽後學智楷惟直氏述二支五宗來源考之一存誠録序康熙三十二年歲次癸酉八月十日臣僧智朴伏讀當今皇帝御製曰間邪存誠戒欺去妄綸音一降儒釋咸該聖賢仙佛欽此欽遵為齊家治國修因證果之首訓也蓋凡人之處世無兩可之間不正必邪不誠必偽不實必欺不真必妄故大易著之佛氏闡之吾皇上聖諭發明之以示警示誡也近有人焉鹵莽無稽師心自用引據偽言翻亂故典不以佛心天子衛法之深衷是念而以全書自命以嗣祖沙門自署以修明僧史自任吁妄誕極矣余誠不知僧史之為何書嘗聞歷朝以來充史館之職必博學廣聞秉公持正之人善者善之惡者惡之先之後之毫無紊亂筆之削之各有體裁始成一代之信書為千古之龜鑑也今之修明僧史者能如是乎不思存誠去妄報聖恩於萬一而反作此詭譎不實之偽書誑君罔祖以盜名吾恐斯人非魔即魔所使陰以破壞我法者茲特述其渾亂宗統之一端以申明存誠去妄之義云爾存誠録二刻辨言五宗攸分其來舊矣肇自達磨六傳至大鑑為六祖慧能大師其法嗣二人曰青原思曰南嶽讓原得石頭遷遷之法嗣曰天皇悟曰藥山儼悟得龍潭信信得德山鑑鑑得雪峯存存之法嗣曰玄沙備曰雲門偃世所謂雲門宗者原之七世也備得羅漢琛琛得清涼益世所謂法眼宗者原之九世也儼得雲巖晟晟得洞山價世所謂洞山宗者原之五世也又南嶽讓得馬祖一一得百丈海海之法嗣曰黃檗運曰溈山祐運得臨濟玄世所謂臨濟宗者嶽之五世也祐得仰山寂世所謂溈仰宗者亦嶽之五世也其上五宗皆自原嶽之所出各有根柢布諸簡策載在龍藏六百餘稔曾無毫髮之假借今集五燈全書者不思皇上存誠之聖諭而反本嚴統鹵莽之偽説將雲門法眼二宗勒馬祖下且謂引證辨解各有根據余誠短昧固不知其所根何書所據何典抑不敢臆為之辨析惟據歷朝敕賜之藏典與夫諸家之文獻不辭繁衍不憚重沓謹録一十四種之節文以俟天下之明眼者評定焉其他宗偽繆姑置弗論存誠録二刻薊州盤山智朴集字拙庵宋贊寧智輪同奉敕撰高僧傳曰唐荊州天皇寺道悟傳釋道悟姓張氏婺州東陽人也受天粹氣為法王子生而神雋長而謹願年十四金翅始毛麒麟方角啓白尊老將求出家慈愛之旨不見聽許輒損薄常膳日唯一食雖體腹羸餧彌年益堅父母不獲已而許之遂往明州大德剃落年二十五依杭州竹林寺大德具戒以勇猛力扶牢強心於六度門修諸梵行常以為療膏肓者資上妙藥開暗冥者求善知識不假舟楫其濟渡乎遂蹶然振策投徑山國一禪師悟禮足始畢密受宗要於語言處識衣中珠身心豁然真妄皆遣斷諸疑滯無畏自在直見佛性中無緇磷服勤五載遂蒙印可俾其法雨潤諸叢林悟蓄力向晦冞入深阻實冀一飛摩霄乃轉遁於餘姚大梅山是時大曆十一年也層崖絶壑天籟蕭瑟敻無鄰落七日不食至誠則通物感乃靈猱㹶豰玃更饋橡栗異日野夫操斧言伐其楚偶所遭覩駭動悚息馳諭明曹謂為神奇曾不旬朔詣者成市憑嵌倚峭且構危棟資糧供具環繞方丈猛虎耽耽侶出族遊一來座側斂折肢體其類馴擾可知也夫語法者無階漸涉功者有淺深木踰鑽而見火鑑勤磨而照膽理必然矣是以掃塵纍遁巖藪服形體遺晝夜精嚴不息趣無上道其有旨哉如是者三四年矣將翔雲表慮羽毛之頽鍛欲歸寶所疑道塗之乖錯故重有咨訪會其真宗建中初詣鍾陵馬大師二年秋謁石頭上士於戲自徑山抵衡嶽凡三遇哲匠矣至此即造父習御郢人運斤兩虛其心相與吻合白月映太陽齊照洪河注大海一昧仲尼謂顏子亞聖然燈與釋迦授記根果成熟名稱普聞如須彌山特立大海繇是近佛恢張勝因凡諸國土緣會則答始卜於澧陽次居於澋口終棲於當陽柴紫山即五百羅漢翱翔地也柳松蓊鬱以含風崖巘巉巖而造天駕瀲灔之紫霞枕清冷之玉泉鸞鳳不集於蓬藋至人必宅於勢勝誠如是也洪鐘待叩童蒙求我川流星聚虛往實歸或接武於林樾或駢肩於廬舍戶外之屨爛其室盈矣荊州雄藩也都人士女動億萬計莫不擎跪稽首嚮風作焉崇業上首以狀於連帥而邀之不違願力聿來赴請屩及於虛落錫及於都城白黑為之步驟幡幢為之轇轕生難遭想得未曾有彼優波鞠多者夫何足云有天皇寺者據郡之左標異他剎號為名藍困於人火蕩為煨燼僧坊主靈鑑族而謀之以為滿人攸居必能福我夫荷擔大事蔑棄小瑕乃中宵默往肩輿而至二寺夕有所失朝有所得諍論鋒起達於尊官重於返復畢安其處江陵尹右僕射裴公搢紳清重擁旄統衆風望眄睞當時準程驅車盛禮問法勤至悟神氣灑落安詳自處徐以軟語為之獻酬必中精微洞過肯綮又常秉貞操不修逢迎一無卑貴坐而揖對裴公訝其峻拔徵其義趣謂抗俗之志當徑庭如是邪悟以為是法平等不見主客豈效世諦與人居而局狹邪裴公理冥意會投誠歸命既見仁者我心則降如熱得濯躁憒冰散自是禪宗之盛無如此者元和丁亥歲有背痛疾病弟子先期告終以夏四月晦奄然入滅春秋六十僧臘三十五以其年八月五日葬於郡東隅靈龕建塔從僧禮也悟身長七尺神韻孤傑手文魚躍頂骨犀起行在於瓔珞志在於華嚴度人説法雄健猛利其一旨云垢淨共住水波同體觸境迷著浩然忘歸三世平等本來清淨一念不起即見佛心其悟解超頓為若此也先是煙焰之末殿宇不立顧緇褐且虧瞻禮密念結構罔知權輿禪晏之際若值神物自道祠舍濱江水焉凡我強畛富於松梓悉願傾倒施僧伽藍命工覘之宛若符契於是斬巨棟幹修楹撑崖拄壑雲屯井構時維秋杪水用都涸徒衆斂手塊然無謀會一夕雨至萬株並進晨發江滸暮抵寺門剞劂之際動無乏者其餘廊廡牀案靡非幽贊事鄰語怪闕而不書其感攝靈祇皆此類也比丘慧真文責等禪子幽間皆入室得悟之者或繼坐道場或分枝化導時太常協律符載著文頌德焉世號天皇門風也又唐澧州龍潭禪院釋崇信未詳氏族信在俗為渚宮胡餅師之子弱齡宛異神府寬然昔天皇寺悟禪師隱耀藏光人莫我測信家居寺巷恆日提餅笥饋悟公齋食食畢且留一餅曰吾惠汝以蔭子孫信一日自念曰餅是我持去何以返遺我邪莫別有旨乎遂拱手問焉悟公曰是汝持來復汝何咎信聞似有驚怪因投出家便求攝受悟公曰爾昔崇福善今信吾言故名之也繇是躬於井臼供億服勤乃問悟曰未蒙指示心要悟公曰時時相示信餐稟斯言如遊子之還家若貧人之得寶直從荊渚乃詣澧陽龍潭棲止因李翱尚書激揚時乃出世後德山鑑師出其門宗風大盛矣見大藏祿字函第十卷智朴曰古稱贊寧釋氏董狐宋太宗端拱間奉敕撰高僧傳其紀天皇龍潭德山公孫師資合為一傳一千七百二十言世次彰彰可據今集五燈全書者將歷朝皇藏絶未有之天王道悟揑為龍潭崇信之師以雲門法眼兩宗收馬祖下牽引傅會溷亂譜牒詳後辨中茲不贅宋道原景德傳燈録曰行思禪師第二世南嶽石頭希遷禪師法嗣荊州天皇道悟禪師婺州東陽人也姓張氏神儀挺異幼而生知長而神雋年十四懇求出家父母不聽遂誓志損減飲膳日中一食形體羸悴父母不得已而許之依明州大德披削二十五杭州竹林寺具戒精修梵行推為勇猛或風雨昏夜晏坐丘塜身心安靜離諸怖畏一日遊餘杭首謁徑山國一禪師受心法服勤五載唐大曆中抵鍾陵造馬大師重印前解法無異説依住二夏乃謁石頭遷大師而致問曰離卻定慧以何法示人頭曰我者裏無奴婢離個什麼曰如何明得頭曰汝還撮得虛空麼曰恁麼則不從今日去也頭曰未審汝早晚從那邊來曰道悟不是那邊人頭曰我早知汝來處曰師何以贓誣於人頭曰汝身現在曰雖然如是畢竟如何示於後人頭曰汝道阿誰是後人師從此頓悟於前二哲匠言下有所得心罄殫其迹後至荊州當陽柴紫山學徒依附駕肩接迹都人士女嚮風而至時崇業寺上首以狀聞於連帥迎入城郡之左有天皇寺乃名藍也因火而廢主僧靈鑑將謀修復乃曰苟得悟禪師為化主必能福我乃中宵潛往哀請肩舁而至遂居天皇時江陵尹右僕射裴公稽首問法致禮勤至師素不迎送客無貴賤皆坐而揖之裴公愈加歸向由是石頭法道盛於此席僧問如何是玄妙之説師曰莫道我解佛法好僧曰爭奈學人疑滯何師曰何不問老僧僧曰問了也師曰去不是汝存泊處師元和丁亥四月示疾命弟子先期告終至晦日衆問疾師驀召典座座近前師曰會麼對曰不會師乃拈枕子拋於地上即便告寂壽六十臘三十五以其年八月五日塔於郡東又曰行思禪師第三世荊州天皇道悟禪師法嗣澧州龍潭崇信禪師本渚宮賣餅家子也未詳姓氏少而英異初悟和尚為靈鑑潛請居天皇寺人莫之測師家居於寺巷常日以十餅饋之悟受之每食畢常留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何以返遺我邪其別有旨乎遂造而問焉悟曰是汝持來復汝何咎師聞之頗曉玄旨因投出家悟曰汝昔崇善今信吾言可名崇信由是服勤左右一日問曰某自到來不蒙指示心要悟曰自汝到來吾未嘗不指示汝心要師曰何處指示悟曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示心要師低頭良久悟曰見則直下便見擬思即差師當下開解乃復問如何保任悟曰任性逍遙隨緣放曠但盡凡心別無聖解師後詣澧陽龍潭棲止僧問髻中珠誰人得師曰不賞玩者得僧曰安著何處師曰有處即道來尼衆問如何得為僧去師曰作尼來多少時也尼曰還有為僧時也無師曰汝即今是什麼尼曰現是尼身何得不識師曰誰識汝李翱問如何是真如般若師曰我無真如般若翱曰幸遇和尚師曰此猶是分外之言德山問久嚮龍潭到來潭又不見龍又不現師曰子親到龍潭山即休見大藏公字函第十四卷智朴曰道原得法於天台韶韶嗣法眼益望龍潭僅八世原纂傳燈録真宗詔翰林學士楊億為之較訂作序文景德初敕賜入藏其紀青原之嗣石頭石頭之嗣天皇天皇之嗣龍潭今荊州城東有天皇寺巷及祖塔現在即本鄉之父老小民亦能述其龍潭饋餅之遺事府之舊志亦詳載之也宋契嵩傳法正宗記曰大鑑之三世曰南嶽石頭希遷禪師其所出法嗣凡二十一人一曰荊州天皇道悟者一曰澧州藥山惟儼者云云又曰大鑑之四世曰荊州天皇道悟禪師其所出法嗣一人曰澧州龍潭崇信者又曰大鑑之五世曰澧州龍潭崇信禪師其所出法嗣二人一曰德山宣鑑者云云見大藏綺字函第七卷又鐔津文集載原宗集序其略曰原宗勤師證法於德山遠公印可於三角澄公澄遠皆雲門匡真大師之法孫也雲門秉雪峯存雪峯承德山鑑德山續龍潭信龍潭嗣天皇悟天皇繼石頭遷大師石頭紹廬陵思和尚思和尚受法於六祖大鑑廣菩提達磨所傳之道見大藏軻字函第十一卷智朴曰契嵩著傳法正宗記等書於嘉祐六年詣闕上進蒙旨入藏賜號明教大師嵩嗣洞山聰聰嗣文殊真真嗣德山密密嗣雲門偃乃雲門五世孫望龍潭八世也宋慧洪禪林僧寶傳自序曰曹溪之道至南嶽石頭江西馬祖而分為兩宗曹洞雲門法眼皆宗於石頭臨濟溈仰皆宗於馬祖天下叢林號為五家宗派又命長沙侯延慶作僧寶傳引曰覺範謂余曰自達磨以來六傳至大鑑鑑後析為二宗其一為石頭曹洞雲門法眼宗之其一為馬祖臨濟溈仰宗之是為五家宗派智朴曰覺範少恃才技其著述舛忤居多至晚年集禪林僧寶傳自命侯君作序告以曹洞雲門法眼三宗確歸石頭以自陳其從前之誤較之始終呶呶而不已者實霄壞矣又按覺範三十七歲出林間録當大觀元年丁亥五十四出僧寶傳當宣和六年甲辰五十八示寂當高宗建炎二年戊申名慧洪一曰德洪字覺範瑞州人嗣法於真淨文臨濟第十世也宋建溪宗永宗門統要曰青原下第三世荊州天皇道悟禪師問石頭曰離卻定慧以何法示人頭曰我者裏無奴婢離箇什麼師曰如何明得頭曰汝還撮得虛空麼師曰與麼則不從今日去也頭曰未審汝早晚從那邊來師曰某甲不是那邊人頭曰我早知汝來處師曰和尚何以贓誣於人頭曰汝身現在師曰雖然如是畢竟如何示於後人頭曰汝道阿誰是後人師從此有省見大藏惠字函第十一卷宋寶鑑法應頌古聯珠集曰澧州龍潭崇信禪師未出家時為餅鋪住在寺前每日常供餅十枚上天皇皇受已卻留一餅與之曰惠汝以蔭子孫師曰是某將來何以返曰惠汝皇曰是汝將來復汝何咎師因有悟入遂投出家佛國惟白頌曰南嶽山頭見石頭便歸古岸狎沙鷗謾分胡餅為香餌引得金龍上直鉤見大藏田字函第八卷宋東湖志磐佛祖統紀曰六祖之後為二派一曰青原思思傳石頭遷其下為曹洞雲門法眼一曰南嶽讓讓傳馬祖其下為臨濟溈仰是為五家宗派道一而已而言五其宗者由人世心病益多故治法屢為之變一棒一喝一唱一和機用縱橫殆不可以一律齊猶應病與藥之義焉見大藏昆字函二十九卷又曰唐德宗貞元四年江西馬祖道一禪師亡師得法於南嶽讓禪師其後五世派為二家曰溈仰曰臨濟又曰貞元六年衡山石頭希遷禪師亡師得法於青原思禪師其後派為三家五世而為洞山七世而為雲門九世而為法眼見大藏池字函第四十一卷又曰唐懿宗咸通六年朗州德山宣鑑禪師示寂諡見性禪師嗣龍潭青原第五世又曰十一年上素聞雪峯義存禪師名敕賜真覺大師師居山四十年法席冠天下衆至一千五百閩王事以師禮嗣德山青原第六世又曰韶州雲門交偃禪師聚徒千人漢主召入內殿時都廣州咨問法要事以師禮師得法於雪峯號雲門宗青原第七世又曰後唐明宗天成三年漳州羅漢院桂琛禪師示寂師得法於玄沙備末帝朝諡真應禪師青原第八世又曰周世宗顯德四年七月金陵清涼文益禪師示寂江南唐後主待以師禮及終諡大法眼學者號法眼宗嗣羅漢琛青原第九世俱見大藏碣字函第四十二卷宋如巹禪宗正脈曰石頭遷嗣天皇道悟禪師首謁徑山國一受心法服勤五載後參馬祖重印前解法無異説依止二夏乃謁石頭而致問曰離卻定慧以何法示人頭曰我者裏無奴婢離個甚麼曰如何明得頭曰汝還撮得虛空麼曰恁麼則不從今日去也頭曰未審汝早晚從那邊來曰道悟不是那邊人頭曰我早知汝來處也曰師何以贓誣於人頭曰汝身現在曰雖然如是畢竟如何示於後人頭曰汝道誰是後人師從此頓悟罄殫前二哲匠言下有所得心僧問如何是玄妙之説師曰莫道我解佛法好曰爭奈學人凝滯何師曰何不問老僧曰即今問了也師曰去不是汝存泊處又曰天皇悟嗣龍潭崇信禪師其家賣餅師少而英異初悟和尚為靈鑑潛請居天皇寺人莫之測師家於寺巷常日以十餅饋之天皇受之每食畢常留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何以返遺我耶莫別有旨乎遂造而問焉皇曰是汝持來復汝何咎師聞之頗曉玄旨因投出家皇曰汝昔崇福善今信吾言可名崇信由是服勤左右一日問曰某自到來不蒙指示心要皇曰自汝到來吾未嘗不指示汝心要師曰何處指示皇曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示心要師低頭良久皇曰見則直下便見擬思即差師當下開解復問如何保任皇曰任性逍遙隨緣放曠但盡凡心別無聖解見大藏勸字函第七卷雪峯廣録曰閩王請師與玄沙入內問佛法心印雪峯謂王曰山僧自從先德山石頭以來傳此祕密法門云云湖廣全省志第七十四卷三十六葉十五行起至三十八葉七行止所載天皇龍潭機緣與傳燈録諸書所紀若合符節智朴曰右大藏諸書中所載祇見有天皇道悟下出龍潭崇信絶未見有天王道悟之名按正宗記載馬祖法嗣一百三十七人亦無天王道悟之名其所有之者始於張無盡議論洞山德山垂手不同遂見疑後突出丘玄素碑謂天王之嗣馬祖龍潭之嗣天王詳載辨中智朴道悟真偽辨曰世之所謂五燈者乃禪宗之史書也宋景德元年道原創傳燈録天聖間李遵朂述廣燈録建中靖國元年佛國白著續燈録淳熙十年晦翁明輯聯燈會要嘉泰四年雷庵受纂普燈録理宗景定間大川濟見燈録浩瀚以故折衷五燈之成書而為會元其序宗派來源與前燈録所紀并無異説逮元順帝至元間雲壑瑞作心燈録始引丘符諸碑紊淆宗統以致沮抑不行至正二十四年業海清重刻會元復引心燈丘符二碑小注天皇章下然存疑焉耳本朝順治中費隱容撰五燈嚴統以存疑小注作正文勒雲門法眼歸馬祖下以應馬有四足之讖吁陋矣哉夫馬祖之真為馬也乎必欲四足具乃應其讖乎繆解之甚莫甚於此乎以致諸方公闢有司公討卒至燬板廢書幾四十年案卷攻書昭然在目嗚呼丘碑之陷人不淺也丘碑之陷人不淺也而霽崙在覆盆之下懂然不之知悍然不之顧猶本嚴統之偽説譜兩宗之世次是不得不將前人論定而重述之也孔子曰始作俑者其無後乎丘碑之謂歟蓋丘碑之出始於張無盡與呂夏卿會議宗門中事乃曰洞山德山同出石頭下因甚垂手處殺活不同因而致疑後於達觀穎處得丘符二碑乃遍告諸方始知吾擇法驗人之不繆耳符碑與燈録諸書吻合但竊去龍潭崇信為作偽碑之張本也再以丘碑論之其偽立見五燈會元小注曰唐正議大夫戶部侍郎平章事荊南節度使丘玄素所撰天王道悟禪師碑云道悟渚宮人姓崔氏子玉之後胤也年十五依長沙寺曇翥律師出家二十三詣嵩山受戒三十參石頭通載作三十三頻沐指示曾未投機次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊門通載作荊州去郭不遠結草為廬後因節使顧問左右申其端緒節使親臨訪道見其路隘車馬難通極目荒榛曾未修削覩茲發怒令人擒師拋於水中旌斾才歸乃見遍衙火發內外烘焰莫可近之唯聞空中聲曰我是天王神我是天王神節使回心設拜煙焰都息宛然如初遂往江邊見師在水都不溼衣節使重申懺悔迎請在衙供養於府西造寺額號天王師常云快活快活及臨終時叫苦苦又云閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是主無對便入滅當元和三年戊子十月十三日也年八十二坐六十三夏法嗣一人曰崇信即龍潭也然天王龍潭紀載之訛且偽者祇此丘碑而天皇龍潭證據之多且確者不可枚舉前略述纍朝名世之文獻與夫歷代敕賜之藏典一十四種異口同音紀道悟所居城東之天皇寺絶無城西之天王寺也龍潭饋餅饋城東之道悟絶無城西之道悟也因家賣餅故得日以十餅饋之因常饋餅故得命名為崇信其賣餅寺巷迄今猶存縱能改天皇為天王必不能移城東寺巷為城西寺巷也以是知龍潭之確嗣天皇也明矣而通載雖有天皇天王之繆説其紀龍潭與傳燈諸書無異再論丘碑之偽造據嘯峯然熄邪辨云考唐史則荊南節度使之設始於肅宗至德二載從此及至唐哀宗天祐丙寅止共一百五十年為荊南節度使者則有李昌夔等十餘人并無丘玄素名碑銜既稱唐正議大夫戶部侍郎平章事荊南節度使則又係唐朝宰相兼領藩鎮者考唐相年表其以平章兼領荊南節度使者則有李石李德裕鄭肅本白敏中蕭鄴徐商劉瞻孔緯等諸人其拜罷遷薨皆有月日可據亦并無丘玄素名唐史既無其人則此碑從何而出此係後人之偽造明矣惟直楷云按廣輿摘要考荊南建置春秋為楚郢都秦拔郢置南郡漢曰臨江曰荊州三國初屬蜀漢後屬吳晉曰新郡梁元帝都此隋唐曰江陵曰南都宋曰荊南明曰荊州府玄素既為唐人碑銜當曰江陵節度使或曰南都節度使為是而曰荊南者豈有唐時館職預用數百年後之建置乎此係宋人偽造明矣按會元指月録俱載天王悟入滅於元和三年戊子而林間録佛祖通載又載入滅於十三年戊戌然而人偽碑偽建置偽入滅偽并所引之機緣亦偽矣傳燈録曰荊州白馬曇照禪師嗣南泉常曰快活快活及臨終時叫苦苦又曰閻羅王來取我也院主問和尚當時被節度使拋向水中神色不動如今何得恁麼地照舉枕子曰汝道當時是如今是主無對照擲枕子而逝丘碑竊之為天王機緣豈有一府兩人兩人一事始終不差一字者無是理乎况荊州城西祇有白馬寺廢基存焉絶無所謂天王寺者則其寺偽又可知矣再考無盡於達觀穎處得碑之説據達觀示寂在嘉祐五年無盡卒於宣和三年壽七十九則生當在慶曆三年癸未也以慶曆三年至達觀示寂之年則無盡僅十有八歲矣是時習舉業之不暇何暇論及宗門中事乎至元祐六年見兜率悅時年四十有九矣始知有宗門中事去達觀示寂已三十二年矣而會議得碑之説當在三十二年之後無盡親言從達觀穎處討得丘符二碑何無根之甚也嗚呼無盡不疑二碑不出二碑之出無盡之疑也無盡之為人宋史備悉余誠不敢論定焉竊思吾宗貴省事不貴多事貴無諍不貴鬬諍此辨之出不過冀其悛過從新彼此相忘於解脫場中撫沒弦琴唱無生曲即謂之無一字也可是朴所終期於永公也已與霽崙永禪師書聞風日久會晤維艱法門細大宗趣不能一一領教也夏四月刷印人進山聞老法兄刊五燈全書誠為法門一大盛事弟獲覩殊遇慶抃歡呼七月上旬有惟直楷公來自都門詢及此事驚聞全書引證訛謬種種辨駁糳糳有據痛自悲法門不幸益何至此切念法兄道隆德備年高識廣自是探討幽窅考據精核必不蹈人覆轍録人疑案豈有泛泛成書而付諸梓人耶無是理乎設果有是惟願法兄當以史書編年再一詳考期成千秋不易之信史以報聖主衛道之深衷也無可侑函盤山志一部拙刻數種請教臨書跂望曷勝依馳八月二十五日四與永公書甲戌二月下旬遣僧持書併存誠録去獲公款待優加歸述所言殊非雅論其所言者悉據洞宗著述譜五代非臆創也又謂天皇天王據佛祖通載非嚴統也試問永公洞宗著述除淨柱烏梅本形偽説之前更有何説以為據耶偽説足據青州自撰之塔記反不足據乎偽説足據續略以前諸家金石之文獻反不足據乎請公此處下一轉語再問永公佛祖通載載龍潭崇信果誰屬耶通載云信賣餅家子居天皇寺巷日以十餅饋天皇因之賜名因之得悟其後出住龍潭與燈録諸書所載毫髮無舛殆本朝順治十年通容集嚴統出始翻亂藏典直據會元小注收龍潭為天王之法嗣援雲門法眼為馬祖之所出以致諸山公詰有司公討卒至醜態百出難於為言今公集五燈全書不能救正其非猶且從而效之為是陰懼罪案久定人所共知故遊易其詞曰據通載然通載所載果如是乎公於龍潭章中急開睡眼余埋頭盤山二十餘年未敢輕易論及法門中事恐辱宗風迫不得已四次寄書與公苦口勸誡即欲殺欲割亦不敢辭實無他惟冀報佛恩祖恩皇上衛法之深恩於萬一也存誠録二刻成寄覽拙庵和尚作存誠録初刻辨清洞宗五代二刻辨清雲門法眼兩宗述藏典古書十有四種今録十一種於前而會元通載指月三書辨見於後以下諸書皆智楷所述也
