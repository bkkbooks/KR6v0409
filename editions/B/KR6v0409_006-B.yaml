body:
  text: 衡陽後學智楷惟直氏述洞宗世次備考之二五燈全書凡例曰一洞宗世系所紀不一今從永覺賢公之補燈涵宇寬公之纘續遠門柱公之續略為霖霈公之闢謬參酌以定匪涉私裁歲壬子白巖輯祖燈大統得青州辯自書塔記因而廣考載籍得其真實確知鹿門覺來自芙蓉楷亦知續略纘續補燈諸書錯誤不足據於是清出丹霞五代釐正洞宗世系迄今二十餘年矣燈統之後有青原嫡唱洞宗彙選洞上祖憲錄散木正傳錄大鑑正燈錄天柱一燈大覺續燈洎諸語錄拈香木主署諱塔面題名悉已改正亦有年矣全書出在二十年前無怪其然今出在二十年後難道此之諸書暨上數十種古碑文獻盲無見乎若果不見何以稱窮搜極討若見而不折衷參酌於古碑古書硬據此四種錯誤之書以譜洞宗世系則其私裁畢露矣處心既私全書何公之有又不考天童淨何時人鹿門覺何時人一昧乘人之誤以誤之則著述眼何在著述無眼處心不公輒輯五燈大全豈不是自僭自專自欺自妄僭專欺妄施於五燈全書之中其立意也錯請霽崙改過私裁秉至公無我之心將余所引古碑古書洎公所例續略諸書再一參酌何等書理不當言冗偽則刪之何等書旨不二機冥合則增之何等書可根可據何等書不可根據考訂宗派申明大端不使金鍮溷雜務期支緒詳明以成全書之美不惟堪報皇上衛法之深恩於萬一亦不仰愧龍天古人矣山曉皙公寶積錄十二卷收長翁如淨禪師語錄凡八張末後附曰其嗣襄州鹿門覺參師值師上堂曰一箇烏梅似本形蜘蛛結網打蜻蛉蜻蛉落了兩片翼堪笑烏梅齩鐵釘覺忽然失笑曰早知燈是火飯熟幾多時後承印記出住鹿門載五燈續略中按如淨錄一箇烏梅是頌靈雲見桃花語非上堂語也山曉已收在頌古類中明知此非上堂語故附刻卷末而又下箇註脚曰載五燈續略中其意余知之矣意謂人或不知吾話行矣人或辨之是續略錯誤非吾寶積錯誤也此名躲身之法其心行於此見矣續略之錯誤辯見於前寶積之錯誤不辯可知矣山曉皙公寶積錄後附崇正錄洞宗世系考曰青原五傳至洞山价价七傳至投子青青四傳至真歇了了又四傳至天童淨續傳燈與世譜所載止此其後俱未詳唯附壽昌雲門於彼宗末云俟其詳者補之今崇正考洞宗祖圖依彼宗遠門禪師續略考定補輯之世系也白巖位中禪師出祖燈辨訛謂有青州辯自述塔記證天童淨下鹿門覺即八十餘年前芙蓉楷下之淨因覺將丹霞淳真歇了諸大老削去五代作洞宗源流祖圖與續略之世系迥然不合當遠公羅輯續略時搜求考覈良亦苦心片紙隻字俱不遺棄而未聞有青州辯之塔記今忽然突出其真偽之間安敢固必但辨訛中云青州辯寂於皇統九年己巳去上芙蓉楷寂於重和戊戌計三十一年謂覺辯二世每世十五年半皙考指月錄淨因覺寂於政和五年乙未計乙未去己巳三十四年豈有已寂三十四年之人復與辯平分十五年半之生世乎此一不合也按續傳燈不見署輯書人名又無序不知何年何人之書細觀書末於洞宗收止天童淨石林秀惟紀空名未列章次濟宗收止無準範有章次載範於宋理宗淳祐九年己酉示寂則此書出在淳祐間明矣亦在宋元敵國之時故於南宋國中收錄甚詳若夫齊魯燕趙秦晉之間少見收錄至於收洞宗止於石林秀以書出在宋季故人與書齊止便謂其後未詳濟宗止於無準謂其後未詳可乎何言之不經一至此乎禪燈世譜乃皙公之師木陳忞公所作按自書世譜後曰此書壽梨棗在天童其編次也在閩川蓋予取福清吳君舊文而筆削也者流通則在崇禎四年又曰至若壽昌顯聖之光復吾宗彼所謂豪傑之士乃屈辱乎二老況置於未詳法嗣之列則余豈敢抑當日此書之成余實無所考鏡如皙公謂遠公羅輯續略搜求考覈片紙隻字俱不遺棄世譜上收四七二三以及五宗落脈在天童悟止誠非細事豈可草草成書而不之搜求考覈抑又何耶既無考鏡何遽刻行既謂二老豪傑之士且能中興曹洞之宗豈有來源未詳耶且二老又非上古之人又非燕晉之遠既無考鏡何不躬走二老處問其詳悉刻行未晚遽置二老於未詳是何心耶昔崇禎三年密雲悟公赴黃檗請費隱木陳侍從焉道過浦城時天界盛住夢筆以書致之其略曰傳聞座下輕以源流拂子濫付非人致使惡風四吹凋損叢林不少等語彼時父子銜恨而去一到黃檗特借收書為名其實為報濫付非人之恨故也然則夢筆得罪忞公父子置壽昌於未詳可也若夫顯聖退己讓人舉悟公住金粟恩義俱隆亦置於未詳此何謂耶不收洞宗世系已是心行不端況置二老於未詳其心行何可勝言世譜不收洞宗世系皙公便謂其後未詳濟宗自無準下收止天童悟何從而得其詳耶海舟普慈寶峯明瑄天奇本瑞一脈來自萬峯世譜譜東明下雲溪瑛淨庵素一脈出自永慈世譜譜普慈下笑巖嗣無聞明聰世譜譜絕學正聰下笑巖法嗣止有靈谷芝等六人若禹門傳幻也日不聞也世譜俱譜笑巖下三際通東臺瑞峯一人也世譜譜為二人龍池法嗣四人世譜削雪嶠於譜外如此不審詳乎否耶至於妄譜雲門法眼於馬祖下致端伯黃公闢之禁之好不羞恥皙公見世譜未收洞宗世系引資駁辯之端已屬可恥更謂其後未詳其不知羞恥一至於此芙蓉法嗣凡二十六人只一自覺先住淨因後住鹿門原只一人若謂淨因自覺非鹿門自覺則法燈亦芙蓉嗣也覺範不應敘法燈繼鹿門自覺之法席也又不應紀鹿門自覺為法燈之兄芙蓉為法燈之師也據此則鹿門自覺即淨因自覺嗣芙蓉明矣續略以鹿門自覺嗣天童淨作洞宗源流祖圖疊出丹霞五代其錯誤辨見於前祖燈據青州塔記以誤嗣天童淨之鹿門自覺還歸芙蓉下清出丹霞五代作洞宗源流祖圖與續略自然不合何用置喙至謂白巖以塔記證天童淨下鹿門覺即八十餘年前芙蓉楷下之淨因覺觀此則皙公執淨因覺鹿門覺為二人以資駁辯之端則青州辯亦執為二人可乎增集續傳燈不云乎雪庭裕嗣萬松秀秀嗣雪巖滿滿嗣王山體體嗣磁州寶寶嗣青州辯辯嗣鹿門覺覺嗣芙蓉楷試問皙公青州之師鹿門覺畢竟是芙蓉楷之嗣耶天童淨之嗣耶嗟乎以一鹿門覺為二鹿門覺駁辯祖燈續略世系不合豈不是瞎說搜求考覈誠非易事昔白巖命僧懷誼北往兩年始得青州塔記繼命余往由江南至湖廣大陽大洪關嶺天皇鹿門諸處次至河南大乘香山風穴寶應嵩少諸剎始備得諸祖碑銘次渡黃河登太行白雲寺得天奇塔銘行至衛輝因病不能前進由開封歸德至金陵翼善得永慈行實碑回白巖與老人折衷參訂釐正洞濟兩宗世系一片苦心惟龍天鑑知以未到燕晉之念不忘故於癸酉春由齊魯走燕趙鄴晉諸省歷兩年萬餘里僅得數碑因思龍唐搜求考覈之艱若非兩宗世系有誤誠法門一大功臣矣奈何續略成於崇禎末年北地正值李賊大亂故於燕趙秦晉之地未及躬到搜討以致世次疊訛故湘和尚曰續略出於荒亂荒則不能搜羅亂則不能商訂名為續略事有由然今日子孫改正依舊聞無異辭見無異辭傳之源遠流長無異辭可謂至言也皙公夾帶心行駁辯曰當遠公羅輯續略時搜求考覈良亦苦心片紙隻字俱不遺棄而未聞有青州辯之塔記今忽然突出其真偽之間安敢固必以青州塔記為白巖得之便謂忽然突出如輪庵和尚親到京西大覺寺以驗青州塔記於勝果寺又得曹洞古源流碑月函和尚刻附疑問之後跋曰曹洞源流世次之錯訛者只在芙蓉鹿門上下之間今據曹洞古源流碑自青原思歷敘至芙蓉楷下即曰鹿門覺則丹霞五代不在源流中明矣亦謂之忽然突出可乎翼善寺大殿前有中興翼善碑寺左退居寺有永慈行實劄付二碑當天童悟公住金粟時羅搜祖父遺錄碑銘徧索諸方不獲一字至順治丁酉永慈碑始為忞公之孫得之皙公胡不謂忽然突出真偽安敢固必耶北地荒亂勿論江南浙江天崇之間太平全盛當遠公搜求往返時金陵必由之道何故竟遺翼善三碑以致濟宗世次錯七錯八抑又何耶天寧誧示寂於宣和五年會元錯刻為政和五年指月錄將誧示寂一段事又錯刻為淨因覺之事皙公不辯正指月之錯反引為駁辯塔記年代不合之端豈不取笑識者又曰謂濟大川五燈會元所收僅南宋所管之地乃若燕秦齊晉之地不及見聞故於淨因覺一脈未及收錄皙考會元中現有淨因覺及覺之門人真懿蘭住東京華嚴青州辯亦住中都華嚴既同為覺之門人又同在中都何獨收真懿蘭而不收青州辯乎此又不合也青州辯真懿蘭皆淨因覺法嗣也辯住中都華嚴即燕京蘭住東京華嚴即開封府會元收蘭遺辯者何或偶得蘭法語列為章次此古今之常事也若辯者住在金燕大川住在宋浙輯會元時非有意遺辯不收實不敢入敵國收人法稿也不特遺辯一人彼時曹洞雲門臨濟三宗人大盛金燕會元概不敢收者以其在敵國故也皙公曰考會元中現有淨因覺及覺之門人真懿蘭住東京華嚴青州辯亦住中都華嚴既同為覺之門人又同在中都何獨收真懿蘭而不收青州辯嗟乎何詞與理俱謬如此以宋浙之大川不收金燕之希辯以為駁辯之張本已屬不經故意以中都東京混為一處以二華嚴混為一華嚴以資駁辯之難端豈不是心行又曰云宋天聖丁卯去上天復壬戌計一百二十五年丕志觀玄四世每世三十一年又定宗丙午去上皇統己巳計九十七年寶體滿秀四世每世二十四年之說種種不合云云燈錄間或未載年月事迹者故曰某世至某世若干年每世若干年此大約之言也至若天聖天復丙午己巳非無據而言也雲居膺寂於唐天復二年壬戌正月三日載會元第十三卷廿九紙大陽玄寂於宋天聖五年丁卯七月十九載會元第十四卷廿一紙天聖丁卯去天復壬戌歷七朝十七主正一百二十五年青州辯寂於金熙宗皇統九年己巳臘月十二載塔記萬松秀寂於蒙古定宗元年丙午閏四月七日載纘續第一卷廿一紙定宗丙午去皇統己巳正九十七年而謂種種不合豈正人君子之公言耶又曰況續略考定補輯之書已經本朝順治年間世祖章皇帝頒入龍藏設有不合祇可闕疑豈得公然削而去之乎故崇正考洞宗祖系圖惟依續略終不敢阿白巖之辯訛也如禪燈世譜五燈嚴統無故擅改龍藏此固罪不容辭然闕疑者以其事蹟不明無所考據不得不然今濟宗疊出兩代已有聰寶諸祖數種舊章洞宗疊出五代已有古碑文獻數十種舊章不急急釐正而又闕疑則疑誤後賢倒置先德無了日矣如玄素偽碑業海引以闕疑所以疑誤世譜嚴統徒費千金博一臭名究竟於人於己有何裨益白巖所以釐正者以集書原為取信千古今準公高裁豈不更起千古之疑案乎然既依續略定洞宗祖系胡不依續略定濟宗祖系耶續略明收海舟普慈嗣東明寶峯明瑄嗣普慈天奇本瑞嗣明瑄纘續亦如是紀正公所謂入藏之書二書行世二三十年海內閱覽不知凡幾設有不合祇可闕疑豈得公然削普慈於源流祖系外狼心狠筆抹殺明瑄竊奪本傳為智瑄傳妄認永慈智瑄為自出之祖以之上嗣東明下出天奇頒為臨濟正宗源流諸祖世系圖不惟悖逆續略亦悖逆無聞笑巖之祖訓多矣甚至斥續略為無稽偽書何遽竟忘羅輯之苦心耶豈非自語矛盾續略譜濟宗世系悉本汝祖闢妄救今斥續略不亦斥其祖乎法門攸關誠非細事非留心三二十年不能詳其顛末今崇正一書不惟關係洞宗而關係濟宗不小濟水洸公出默齋筆評評青州辯塔記為偽明眼人見之付之一笑後學初機見之不免疑信相半此余以釋後學之疑不得不略辯數端於右按洸公輒引纘續為口實以罪燈統然續燈存稿正宗語錄皆洸公父兄所出之書也可曾遵纘續乎纘續雖以普慈明瑄天奇一脈譜東明下然未更易三代世次存稿正宗不惟更易世次且又紊亂倫理則藐視國法擅改龍藏之罪此洸公為父兄所供之也今又詆祖傳祖錄為邪說為偽書貶親宗嫡祖為兔角為烏有可曾遵纘續一字乎則藐視國法擅改龍藏又公自供也貶嫡祖為烏有是無祖也人而無祖罪不容誅纘續存稿悉本續略續略續會元後數百年以來之書其述洞濟兩宗諸祖事迹有得其行實塔銘者故詳氏族其未獲行實塔銘者故闕之青州辯雖未詳氏族以一時未獲行實塔銘故也今塔記係辯和尚自書出洪州黃氏親口也其未敘精究教相偈頌等事以其臨終之人兼在病中故敘事簡略續略述其精究教相偈頌等事蓋得諸從容錄請益錄宗旨緒餘文獻通考等書今洸公以纘續存稿較塔記詳略乃雌黃其說殊不知濟宗諸老於崇禎初年所出之書述本宗一脈之祖其間數代不惟未詳氏族求其片語隻字了不可得自崇禎末年及順治康熙以來所出之書較前不惟氣魄詳略絕不相類且又訛混相承洸公何不評之今乃諱本宗不之評而妄評他宗豈善知識所用心耶塔記稱祖父未嘗直稱自覺道楷曰諱自覺曰諱道楷既有諱字在上稱之有何不可若必曰上某下某此近代時風每見笑於士大夫者宜也今洸公泥於近代時風而妄評古人豈通人文士之見也塔記未敘及參臨濟雲門下某某以其臨終病中所書不遑備錄故也古人敘事多從簡且汾陽歷參七十餘員知識後謁首山亦未嘗逐一標名指姓洸公何不評之乃謂青州直曰雲門臨濟為妄其責人之甚得不為天下人恥笑也凡中興古剎稱第一代者如少林寺初係跋陀尊者開山稱第一代後達磨大師在彼面壁遂稱達磨為少林第一代嗣後二祖繼闡玄化宋時報恩禪師奉旨住持唐宋以來住持少林者不知凡幾迄金哀宗天興元年壬辰雪庭裕禪師中興亦稱少林第一代者有中興二字故也越中顯聖者唐大珠海禪師開山稱第一代自後住持曰重曜曰居耀曰宗利至萬曆年間散木老人中興亦稱顯聖第一代金陵翼善寺梁誌公禪師始創稱第一代至明正統十年永慈中興亦稱開山第一代如此者不可枚舉唐州大乘山係吉本禪師開山稱第一代後流為講寺宋徽宗皇帝革講為禪詔自覺和尚重興亦稱大乘第一代鹿門雖非覺和尚開山實係中興故稱第一代洸公株守一隅豈知名山大剎之盛蹟洪模有如此也乃謂覺不合稱第一代豈不尤為天下人所恥笑也歷代帝王以年號賜寺額者頗多如開元寺景德寺天下不知凡幾皆唐宋年號也今河南如大乘山諸古碑載宋徽宗崇寧間賜額則曰崇寧萬壽禪寺政和間賜額則曰政和萬壽禪寺又安慶府太平寺晉曰萬松寺宋太平興國年間賜額則曰太平興國禪寺如此者不可枚舉洸公井蛙諒必不知如石門文字禪久行世間萬目共覩內有法燈禪師塔銘謂燈於政和七年夏繼襄州鹿門山政和萬壽禪寺慧定禪師自覺法席洸公曾閱及乎若閱之何又謂政和年號今忽攙入寺額豈不尤為天下人所恥笑也龍池初聞燈花爆有省後見笑巖作修羅勢有省兩次言有省竟不見吐露一言半偈以見悟處深淺其承嗣笑巖大有徑庭洸公何不評之青州雪夜發明便謂不見是何因緣是何機語古人發明此事承師家印證日後更進一步者甚多如兜率悅承真淨文印證後見清素上座始得大透脫大慧杲承圓悟勤印證後在虎丘閱華嚴方得打失布袋香嚴發明此事後與溈山問答機緣頗多青州問鹿門如何是盡乾坤是學人一隻眼門曰汝被者一卷經遮卻也州擬對門搖手曰不快漆桶州於是得大透脫州雪夜發明又經半載始離鹿門則此得大透脫一則機緣安知不在半載之內問鹿門乎此機緣載在纘續正公所謂龍藏也洸公見雪夜發明無機緣遂以塔記機緣皆評為非然則笑巖聯芳偈不見有龍池法偈龍池錄中自敘笑巖付以源流斗笠準公所評若龍池錄是則聯芳偈即非若聯芳偈是則龍池錄全假又豈有二俱得當者乎禧誧禪師初住天寧次住韶山晚住丹霞於宣和五年示寂會元錯刻為政和五年指月錄又錯刻為淨因覺事洸公今謂會元彙五燈而成書每一書成必若干人搜羅訪覓云云傳燈在藏之書會元所載十遺其二會元之後有補燈補會元之失何前人搜羅訪覓之不逮致會元前遺之於傳燈後失之於補燈洸公何一評補燈除會元外從何而得而偏評禧誧之傳從何而得如此邪言謬說得不甚為天下人恥笑乎且會元不但禧誧傳中一政字之錯如巖頭傳謂頭與雪峯欽山結伴往參臨濟值濟示寂乃參德山不知德山先示寂於臨濟二年之前據如會元所載則巖頭雪峯欽山亦皆是參已死之德山又載三人離德山之門往河北參臨濟路遇定上座言濟示寂一則機緣此又前後相矛盾如此錯亂甚多洸公何不評之而偏執會元載禧誧示寂事以難青州未曾參謁耶殊不知丹霞淳於政和七年住大洪宣和元年示寂今準會元載誧示寂在政和五年而七年後繼淳公法席者又是何人耶況淳與誧伯仲也或誧退韶山院子而寓丹霞後值淳遷大洪乃繼其席青州於政和六年往參二老有何不可洸公乃謂之為無據之談不顧明眼所誚按宋史載高宗紹興十九年己巳即金熙宗亶皇統九年冬十二月丁巳夜二皷金平章政事完顏亮入寢殿弒其主亶平章秉德與眾議奉亮即位大赦改元天德按稽古略曰金熙宗亶皇統九年十二月十日為從弟岐王亮弒之其下小註曰金志金志即金史也十日即丁巳也又曰金皇統九年十二月甲子左丞相岐王亮即皇帝位改元天德亦註曰金志按丁巳為初十日則甲子乃十七日也明矣事載宋金國史古今閱覽者不知凡幾塔記書在初八日署皇統九年理也洸公誣天罔地謂初八日金完顏亮立為天德元年豈有身居其國而不識世主年號嗟乎偽捏八日改元以作妄評張本將謂欺瞞天下人天下人又誰肯受其欺瞞徒增天下人所恥笑也圓悟作碧巖集蓋為即佛祖公案以發明吾人己躬下一椿大事奈學者不能即公案而體會自己一昧胡穿亂鑿盲批瞎判所以致大慧火之乃拈條竹篦逼拶學者扣己而參單單要明自己一椿大事此宗師家為人拈卻炙膠帽子脫去鶻臭布衫因機所發之大手段大作用也塔記謂余三十年叨忝傳持宗旨接待四來唯一真諦示學徒佛祖未生前事未嘗以古人公案因緣惑亂初機增長情識知解青州嘗設百問勘驗學徒則學徒亦夥矣觀其首問聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己可見掃除公案因緣截斷穿鑿知解單提向上壁立千仞直令學徒悟明佛祖未生前事學徒誠能如是又何公案因緣之不明耶所謂但得本其末至矣此亦青州因機而發匡時救弊之大作用何異大慧所為也今洸公詡詡然便謂青州明自己不明公案藉如所評則圓悟惟明公案而不明自己大慧單明自己而不明公案謂二老情存取捨智常向背可乎既不可抑圓悟大慧又豈可獨抑青州耶洸公不知古人或時建立或時掃蕩皆因機所發初非有定法今概作死殺法科定謂公案自公案自己自自己妄評古人豈不為天下人所恥故湘翁和尚曰昔辯祖自敘受鹿門印記叨忝舉揚惟示佛祖示生前事斷不以公案惑亂初機增長情識此正為古今認依解者下頂門針砭而默齋肆口輕評謂公案即自己自己即公案明得自己不明公案此人有眼無足明得公案不明自己此人有足無眼直須眼足雙圓照用無迹然後於生死而得自在審是則默齋猶坐在鑑覺光中據泰春檢點直饒眼足雙圓照用無跡正好劈脊痛棒且教伊更參三十年何況公案即自己自己即公案穿鑿解會云云是默齋平常必以公案教習難經痛處一拶也善哉斯言藥出金瓶洸公於此言下悟明佛祖未生前事亦不可知也觀洸公眼目如此識見如此妄自標榜誇張見道不知面皮厚多少每見人述一實事必巧為無端不可解之語逆奪之使舉世哄然而述者色沮然後為快如此設心安能保其善始善終乎或曰祖訓誠不可謬解彼以臆見解之嫡祖誠不可妄黜彼以偏私黜之天理可昧良心可喪如此之人必不能善終必不能有後天道最近可拭目而待奚用辯為曰此言誠是大凡流言訕謗禍及一人不辯可也今洸公肆出邪說掩飫正理禍及兩宗貽害天下則其辯豈容緩乎余非好辯蓋出乎萬不得已大方明眼幸諒之
