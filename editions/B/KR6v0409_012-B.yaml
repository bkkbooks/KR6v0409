body:
  text: 衡陽後學智楷惟直氏述濟宗世次備考之五天笠珍禪師序顯正說云先老人論笑祖聯芳敍云不肖上承迦葉六十三世之元祖指祖天奇為元祖下繼曹溪三十一葉之真孫指父無聞為真孫玩承繼二字可見若云六十四世豈得稱父為元祖若云三十二葉豈得自稱為真孫此千古不易之論白巖以元祖指迦葉言自笑祖溯迦葉為六十三世故曰上承既指迦葉何不竟稱始祖今天下叢林皆稱迦葉為西天始祖達磨為東土初祖夫元者長嫡之謂也元孫元祖上下通稱迦葉斷無稱元祖之理焉有從己溯至迦葉自稱為元祖乎稱元者確指天奇上承六十三世之嫡祖也天下有一定之理理之所在正人君子不敢逾逾則非正人君子也笑巖諸祖十種祖訓誠一定之理也問公謬解聯芳敍莫過銷釋龍池源流中有寶藏東明二代殊不知龍池源流之有寶藏東明者原因泥古溪祭文有續高峯七世燈之句遂割萬峯下之海舟普慈寶峯明瑄天奇本瑞一脈譜東明下蓋未知東明嫡子自有一海舟永慈耳珍公今知永慈續高峯七世當清出普慈明瑄天奇一脈還譜萬峯下以釋前人之誤可也胡乃歷引元帝元后以硬證天奇為元祖害是亂真莫此為甚夫元者一也笑巖直敍迦葉為西天第一祖所以天童嘗曰自迦葉歷我師祖則六十三世自師祖遡曹溪則三十一世故曰不肖上承迦葉六十三世之元祖下繼曹溪三十一葉之真孫豈不自上而下繇後之前世系連絡血脈貫通何其明顯珍公非不知也今執元祖為天奇真孫為無聞譜其圖矯其說以簧鼓天下者無乃黨問公之說也十室之內必有正人君子豈天下正人君子盡被其惑邪然則廣通序謂笑巖望臨濟二十六代豈亦指天奇而言乎望臨濟二十六代既不可強指天奇則笑巖上承迦葉六十三世之元祖確指迦葉也望臨濟二十六代既不可強指無聞則笑巖下繼曹溪三十一葉之真孫實自謂也源流世系千古式憑豈可私一己之說以亂諸祖十種祖訓一定理乎濟水洸禪師顯正說曰從上源流曾無差爽自迦葉至萬峯蔚為五十八世蔚出寶藏持持出東明旵旵出海舟慈慈出寶峯瑄瑄出天奇瑞瑞出無聞聰是為六十四世笑巖祖翁付曇芝禪師偈曰微笑拈花第一機相傳八八未知非今將從上非非法付與英賢力荷歸相傳八八者言自迦葉至無聞也今將者笑巖自謂以法傳後也付與英賢者指曇芝也豈不是笑巖自為六十五世將從上六十四世之法付與曇芝暗成六十六世也白巖謂連曇芝為六十四世是成何說也云云濟宗源流向有定譜所以萬峯普慈明瑄天奇祖孫四代師承授受法偈可據無聞笑巖廣通公孫三代祖述來源世次較然第後人不究其源動輒更變祖牒移易宗枝致使源流疊出竊為天下憂也燈統據從上法偈來源直為釐正海內明眼靡不稱善而洸公要曲護門庭乃肆意狂吠出書曰顯正以非燈統殊乖祖訓竊為天下恥也據其謬解古人祖訓非止一端今略辯一二以破其非不致埋沒古人正意庶幾後賢有所憑據夫佛祖言教有理微而難解者事幽不易知者兼有關於事理者故古人申而明之曰解曰疏俾人易曉不致流入邪解非指東話西者比今曇芝偈有關事理請為洸公申明之古今付法偈頗多大都述其授受之意惟笑巖付曇芝偈則將從上源流世系述以付之首句謂靈山師資授受也次句謂自迦葉至曇芝一脈師資授受也歷觀四七二三以來師資授受之際莫不皆曰昔如來以正法眼藏付大迦葉展轉至我我今付汝觀此可見笑巖自謂自迦葉歷傳六十三世以至於我我今付汝當六十四傳故曰微笑拈花第一機相傳八八未知非也第三句是照應首句而言末句總結前三句之意以囑之謂我今付汝非別有法不過以如來付迦葉之正法眼藏展轉至我我今付汝故曰今將從上非非法付與英賢力荷歸不亦瞭如指掌他如無聞客牕夜話謂臨濟十八傳至高峯妙妙出中峯本本出千巖長長出萬峯蔚蔚出海舟慈慈出寶峯瑄瑄出天奇瑞則天奇當臨濟二十四傳望迦葉為六十一傳故笑巖自謂不肖上承迦葉六十三世則曇芝當相傳八八六十四世明甚又廣通序謂笑巖望臨濟二十六代則無聞望迦葉實六十二代而寶藏東明為疊出明甚今洸公迷執從上二字謂笑巖確指父無聞一人而言據如此說則其祖及曾祖高祖以上皆非從上耶如此邪說反名顯正豈不為天下人恥笑也洸公以言害辭以辭害意謬釋偈語謂自迦葉至無聞為六十四傳此不過以臆見消釋謂寶藏東明二代在源流內以表其乃父元祖真孫之說為不謬也然東明下不審祖普慈明瑄耶祖永慈智瑄耶若祖永慈智瑄此固東明子孫實非天奇祖父洸公祖之豈非棄嫡就庶冒認宗祖乎若祖普慈明瑄此固萬峯子孫天奇祖父洸公祖之誠是奈何又詆其人偽傳偽又自訂無聞為迦葉六十四傳不惟世次失準且又自語矛盾然東明下普永明智叔伯祖孫宗譜紊亂此最要緊處反諱而不言汲汲乎釋今將為笑巖自謂從上是確指無聞害是亂真豈不為天下人恥笑也笑巖聯芳敍稱不肖者自謂也元祖者指迦葉也真孫者亦自謂也意謂從自己上望迦葉為六十三世從曹溪下至自己為三十一世天笠珍公謂元祖是指天奇真孫是指無聞然則既以天奇當迦葉六十三世亦合以天奇當曹溪三十一世乃可廁寶藏東明二代於其內方合其臆說也今以無聞當曹溪三十一世按其世次已少一代既以無聞當迦葉六十四世消釋相傳八八不知非之句又以天奇當迦葉六十四世消釋祖師八八到天奇之句愈見支離廣通事笑巖最久其授受法偈機緣具載笑巖集內固非假符冒籍無法偈機緣者比觀其作北集序直稱臨濟為笑巖二十六代之祖據此則笑巖言上承六十三世是明指迦葉為元祖豈不明如指掌廣通序直稱臨濟為笑巖二十六代祖洸珍二公不能更措一詞曲為解說以其秦鏡當臺故暗諱而不言笑巖偈敍有從上今將上承下繼諸字眼便能巧其言曲其解強牽支吾以騁其臆智豈不為天下人所恥也山茨際禪師洸公叔也其所出東明祖燈錄雖綢繆附和誤紀普慈為東明旵之嗣其實未曾更變普慈明瑄天奇三代世次數十年來本宗本枝雖以源流中有寶藏東明二代而並不聞東明下有永慈智瑄其人也惟知東明下普慈明瑄天奇為所出一脈之祖各處叢林或設之以木主或傳之以真容供之祀之不知凡幾脚下兒孫語錄源流紀之頌之不知凡幾普慈明瑄俱全身塔於東明寺左歲時拜之掃之不知凡幾他如五宗救闢妄救續略繼燈纘續諸燈錄紀之載之不知凡幾天下緇素披之閱之不知凡幾今洸公一旦黜普慈明瑄為烏有先生斥二人本傳為邪說偽書若是則洸公父父子子皆偽偽相承由其偽偽相承所以終日酩酊盲批瞎判徒增天下人恥笑也曉庵昱禪師洸公兄也其所刻存稿雖以重嗣東明之普慈復列萬峯下而又割截普慈子孫明瑄天奇為永慈後裔梅谷悅禪師亦洸公兄也其所出正宗語錄傳略則以普慈永慈混合為一人行錄竟以永慈續正宗置普慈於不聞又以明瑄智瑄混合為一人上為永慈之嗣下為天奇之師洸公斥其以普永明智揉成四人而欺天下此罪之斥之誠是今洸又自謂普慈明瑄皆烏有之客智瑄明瑄皆兔角之形據此則洸公父父子子皆從空桑中授受益見其徒增天下人所恥笑也原洸公意詆祖傳祖錄為邪說偽書者蓋本寶華之說寶華指祖傳祖錄係查氏偽造者無乃為蓋覆普慈之誤嗣東明明聰之遙嗣本瑞耳普慈一傳其重嗣東明一事係後人泥續高峯七世之燈紹旵祖百年之踵二句故假揑此一叚以照應古溪祭文故也洸公詆其為偽固是也明瑄一傳敍其上嗣普慈下出天奇字字可據洸公金鍮不辨玉石俱焚概斥為邪說偽書豈不更為天下人所恥也焭絕集所載臨潼無聞聰館陶絕學聰延安無聞聰雖非笑巖之師實是天奇之嗣夢說錄所載光澤無聞聰雖非天奇之嗣實是笑巖之師寶華謂夢說錄之無聞不但非天奇之嗣亦非笑巖之師洸公亦詆夢說錄為偽書其錄既偽矣而其人又烏得為不偽耶一脈所出之祖傳偽錄偽人偽未審洸公今日所述者何書所祖者何人所祖無的人所述無的書則洸公父父子子不但訛誤相承直訛偽相承豈不愈為天下人所恥笑也古風然禪師宗本說云南嶽下二十八世海舟慈按燈錄常熟錢氏子初參萬峯蔚問曰但有言說都無實義峯劈頭便棒於棒下有省遂結廬洞庭二十餘年後有僧詰其所得謂其見解未忘因而致疑即謁東明親承激勵乃大悟遂嗣法東明據海舟臨終示眾舉拂子打圓相云釋迦至我六十二世有不可數老和尚多向者裏安身泊然而逝既云六十二世稽其代次是為東明之嗣矣金陵翼善碑亦云嗣法東明白巖辨訛據萬峯有海舟之偈當去寶藏東明二世應以海舟嗣萬峯抑尊為卑人或不從援卑為尊孰不願乎誠法係所關勢不假偽若妄階其輩則踰分而安忍昧夫親承之師乎豈若罔據之源本於浮游冒越倫次而無怍抑滅先宗而忍為者耶又謂一云海舟普慈常熟錢氏一云海舟永慈成都余氏為兩人云云者或收錄秉筆者考覈未詳然古今異鄉流寓托姓繼嗣改籍易氏一名二姓不一而多如諸葛司馬夏侯之類岐之則二姓同之則一氏又何必泥於氏籍之異而紊其統系乎即舟之名普慈永慈之謂者始於萬峯棒下有省即結廬洞庭居二十餘年將師萬峯曰普慈與寶藏普持同派明矣後既嗣法東明則於東明之派曰永慈更其派而不易其名則又昭然明矣欲白千古是非須具千古見識方可得典斯職若夫淺見寡識蒙昧兩持之流猶樵夫擬預中書堂事多見其不知量也濟宗統系之誤前人數十年不能白者謂海舟止一人故也今既有二人且各有師承生緣氏籍而不白其是非以釋前人之誤反自亂其統系抑又何耶今謂海舟初參萬峯後嗣東明又謂翼善碑亦云嗣法東明是混二海舟為一海舟矣至謂海舟將師萬峯曰普慈後嗣東明曰永慈更其派而不易其名則又抹殺翼善海舟永慈於不聞矣殊不知普慈重嗣東明一事係後人偽撰固執偽撰之事以亂統系則無聞笑巖諸祖十種祖訓從冥入冥無由而白悲哉如此見識敢擬預插㭰著述堂中妄議古今是非誠自不知量也平陽忞禪師敦本錄復白巖書其略曰我海舟慈祖興剏東山翼善禪寺其承嗣東明旵祖之事詳載豐碑歷歷可考金陵地近足下且不能徧詢博訪徒憑數紙偽書謂得自先師侍者夫則之手老僧執侍先師十五秋未見有此僧則其書可知矣乃信為實然截人世系罪豈小哉云云夫則之有無勿論白巖所得者乃無聞笑巖之祖訓洎天童親口所說道忞親筆所錄世系連絡血脈貫通真實之言也難道也是執侍先師十五秋未見有天童道忞乎嫡祖祖訓斥為偽書正公自謂非業鬼借宅狂妄失心不至於此昔公本龍池源流以萬峯下海舟慈寶峯瑄天奇瑞譜寶藏持東明旵下紀為禪燈世譜次佐天童作闢妄救亦以萬峯下普慈明瑄天奇一脈譜東明下今以翼善碑之海舟永慈嗣東明敢問忞公昔之源流世譜洎闢妄救以普慈明瑄天奇一脈嗣東明者不審發放何地消歸何人若謂留嗣東明東明自有嫡嗣永慈不應普慈重嗣之理若謂理應還嗣萬峯何謂白巖徒憑偽書截人世系責以業鬼借宅狂妄失心抑又何耶今父子公孫突出永慈偽碑妄改智瑄偽號妄揑智瑄偽偈賺他無眼阿師引著偽續燈存稿偽續僧寶傳偽正宗錄偽寶積錄偽敦本錄偽崇正錄偽續指月錄偽宗統編年偽五燈全書偽顯正說偽顯正序偽宗本說盡改明瑄范木匠為智瑄列普慈於旁出奉寶藏東明永慈智瑄四代異姓之人為源流正脈以訛傳訛亂宗滅祖皆公作俑之所致也原公之意豈有不知錯誤之理特以潭吉宗救斥公為李斯趙高之徒含恨在心無以報復故假父名出書闢之今寧將錯就錯不為修明世次者以要流行闢潭吉一案之書故也殊不知永慈碑一出則闢潭吉之書早以廢矣潭吉誖逆之罪早以出矣公不惟反招誖逆之罪又自陷於亂宗滅祖之罪白巖令人欲殺欲割而不顧者蓋不忍濟宗世次訛亂直據翼善碑古溪文靜庵敍三種舊章以永慈承嗣東明遵笑巖等十種祖訓以普慈明瑄天奇一脈還嗣萬峯以釋龍池天童洎公父父子子亂宗滅祖之罪俾普永兩家世次有準式憑千古有功濟宗不小公反出不經之言闢之其不知恩義一至於此今將十種祖訓三種舊章洎後人新條一併述陳於此請質高明乞垂公論俾彼霽崙擇取為例用佐全書期成信史法門幸甚後學幸甚興化師承疑問公乘億魏州故禪大德獎公塔碑蓋聞妙諦惟玄不可以一理測真詮至奧不可以諸相求隨萬化而泯色空而不生不滅超三界而越塵垢故無去無來此乃不思議者其惟西方釋迦牟尼佛之謂乎伏自教傳西域化被中原漢明推入夢之祥梁武顯施身之願語其大也外不見須彌之廣言其小也內不知芥子之微斯乃梵璽褒然代代相付肇自摩訶迦葉迄於師子尊者統為二十四代而後菩提達磨降於漢土至能秀分之為六而後苞披葉附派別脈分其真宗不泯不滅者則我大覺大師固有係焉和尚姓孔字存獎家本鄒魯即闕里之裔孫也乃祖乃父因官隸於薊門歷祀既深籍同編人和尚以無量劫中修菩薩行及茲降世豈同凡倫當衣采之妙齡蓄披緇之大志未踰七歲即悟三乘啟白所親懇求剃落遂於薊州盤山甘泉院依止禪大德曉方乃親杖履就侍缾盂豈顧全身惟思半偈大中五年伏遇盧龍軍節度使張公奏致壇場和尚是時戒相方具而後大中九年再遇侍中張公重啟戒壇於涿郡眾請和尚以六踰星紀三統講筵宣金石之微言示玉毫之真相禪大德玄公者即臨濟大師也和尚一申禮謁得奉指歸傳黃檗之真詮授白雲之祕訣所為醍醐味爽乍灌頂以皆醒薝蔔花香纔經手而分馥一旦旋辭舊剎願歷諸方西自京華南經水國至於攀蘿冒險蹋石眠雲經吳會興廢之都盡梁武莊嚴之地無不追窮聖迹探討禪宗後過鍾陵伏遇仰山大師方開法宇大啟禪扃赴地主之邀迎會人天之供施面陳奧義眾莫能分和尚立以剖之如刀解物仰山目眙擊指稱歎再三遽聞臨濟大師已受蒲相蔣公之請纔擬侍飛錫而遽及中條尋參隨致林疑作置杯而將渡白馬當道先太尉中令何公專發使人迎請臨濟大師和尚翼行不信宿而至於府下而乃止於觀音寺而得簪裾繼踵道俗連肩曾未期年時至遷化斯蓋和尚服勤道至展敬情深無乖靈堵之儀克盡茶毘之禮云乾符二年有幽州節度押兩審副使檢校祕書御史中丞賜紫金魚袋董廓及幽州臨壇律大德沙門僧惟信并涿州石經寺監寺律大德弘聚等咸欲指陳盤嶺祈請北歸和尚欲徇羣情將之薊部晨詣衙庭啟述行邁先時中丞韓公之叔曰贊中遽聞告去撫掌大驚乃曰南北兩地有何異也魏人何薄燕人何厚如來之教豈如是耶和尚辭不獲已許立精舍韓公之叔常侍及諸檀信鳩集財貨卜得勝概在於南甎門外通衢之左成江西禪院有如化城松柟將𣏌柏俱來文石與碔砆薦至重廊複道竹翠松青四戶八窗風輕月朗和尚樂茲幽致用化羣迷開解脫門演無量法致使天花散地水月澄空嘗與四眾人天皆臻法要六州士庶盡結勝因豈因一念俱尸奄從物化斯乃文德元年七月十二日也享齡五十九僧臘四十一有親信弟子藏暉行簡一以主喪一以弘法大德奉先師之遺命於龍紀元年八月二十二日於本院焚我真身用觀法相闔城禪律繼踵爭來四達簪裾連肩悉至於是旛花蔽日螺喧天火纔發而雲自愁薪不加而風助勢三日三夜號禮如斯於香燼之中得舍利一千餘粒諸大德各各作禮請分供養焉嗚呼雪㲲如故真儀宛然捧一履以徒悲仰雙林而莫見遂建塔於府南貴鄉縣熏風里附於先師之塔志也億到職之初曾獲瞻禮法主大德藏暉不以億才業庸淺具聞我公相請撰文億秉筆惕然得盡蕪鄙銘曰傳如來教厥惟大雄百千劫外方丈室中慈悲是念色相皆空端然不動豈染塵蒙其一矯迹三界安心四禪身雖是假道本無邊璞內有玉火中生蓮傳法何處隨其有緣其二越絕支遁匡盧遠公高情遠致迹異心同既離邪縛肯處凡籠松軒竹徑空悲夜風其三我性不動我心就然果得舍利粒粒珠圓旛花豔閃螺嗅交連唱偈作禮聲徹梵天其四寶剎新建招提舊蹤蓮芳不見葱嶺誰逢響亮朝磬清冷夜鐘歷千萬祀傳我禪宗其五瞿汝稷指月錄曰後唐莊宗車駕幸河北回至魏府行宮詔師問曰朕收中原獲得一寶未曾有人醻價師曰請陛下寶看帝以兩手舒幞頭脚師曰君王之寶誰敢醻價帝大悅賜紫衣師號師皆不受乃賜馬師乘馬忽驚墜傷足師喚院主與我做箇木柺子主做了將來師接得遶院行問僧曰汝等還識老僧麼僧曰爭得不識和尚師曰𨁸脚法師說得行不得又至法堂令維那聲鐘集眾師曰還識老僧麼眾無對師擲下柺子端然而逝拙庵和尚曰按師生於唐文宗太和四年庚戌出家於開成元年丙辰圓具於宣宗大中五年辛未入滅於僖宗文德元年戊申指月錄載後唐莊宗詔對等語逆數莊宗同光元年癸未至文德戊申師去世已三十六年矣豈復有詔對之說詔對之說恐是僖宗典籍紀載之譌耳故正之曩聞靈巖儲公刪去獎公參三聖大覺機語謂臨濟晚年退居興化東堂命獎公繼主法席面稟親承何得有參三聖大覺之事後見僧鑑青公與月函潛公作序曰十年前先師作南嶽單傳表我寶雲月兄實佐其成先師返吳山後一年戊申月兄復從文苑英華中表出魏州興化獎和尚塔碑作者為公乘億月兄作興化塔碑左記及正訛記一洗傳燈會元諸書紛錯傳妄之弊此二叚事月兄大補於法門者也據是則曩聞不虛也因覓塔碑一觀竟不可得歲癸酉夏至薊州訪拙庵和尚承以盤山志見示讀至此碑問及何從而得曰係霽崙永公送來者蓋永公亦得自靈巖也原潛公父子之意因見諸方有興化拈香遙嗣之議故致此碑之所出也據塔碑較傳燈會元不但參三聖大覺機語及拈香語之訛則莊宗詔對一叚語亦訛矣傳燈會元所載一千七百祖師不錯不訛獨獎公一人錯訛層出豈有意改面稟親承為拈香遙嗣耶然則機語盡訛而所載法嗣南院顒等安有不訛之理又藏暉行簡親承獎公繼主法席燈錄俱不載抑又何耶細讀塔碑獎公雖親承臨濟未見有機語况臨濟所止者觀音寺耳奬公所居者新剏江西院耳亦未見有退居興化東堂命奬公繼主法席面稟親承之說且載法嗣僅藏暉行簡二人彼南院顒等不聞也今以塔碑面稟親承者為確據則臨濟一宗絕於藏暉其來久矣若以傳燈會元為不訛其奈奬公嗣臨濟非面稟親承反覆推勘其疑莫決故述以請問海內高明雪巖師承疑問石源雲公闢妄說蓋闢山曉寶積錄之妄附客問四則其一客曰斷橋倫雪巖欽乃同門兄弟寶積錄削斷橋存雪巖斷橋非無準範法嗣歟雲曰有書可證也斷橋初聞麻三斤話有疑後因閱楞嚴至螻蟻無有言說而能辦事處有省曰呀趙州柏樹子話與麼徑捷未可語人往參無準於雪竇準問甚處來倫曰天台準曰過得石梁橋麼倫曰一脚蹋斷了也遂號斷橋非以斷橋為名藍為招提疑後世也準後以狗子因何有業識話命倫下語始得脫然遂令分座祇園付以偈曰真理直如絃何言復何默我今善付囑表心本無得此乃覿面親承非若後人遙禮妄稱人為父者也嗣由祇園遷瑞巖之教忠宋理宗連詔不出晚遷杭之淨慈臨終與魏國公張浚問答書偈而逝是無準在日斷橋已開堂數席矣若雪巖之參無準於徑山止一期而準入寂脚跟尚未點地及經行擡眸見古柏乃在準入寂十年之後其出頭拈香又踰七年此何異翠巖古雪輩之嗣天童哉第古人以德嗣人不似近日天童會下之代父生子耳寶積削斷橋以雪巖孤行謂足彌縫遙嗣之弊豈未覩增集傳燈五燈續略續燈存稿五宗眼五燈摘要宗門拈古彙集禪宗頌古摘珠人天信紀普恩偶筆徑山滴乳五宗聯璧諸刻載斷橋法語拈頌最為詳盡今古昭垂山曉既欲著書何不先自讀書然後命筆而呈此醜陋徒供世人檢點為也按雪巖語錄不見有行狀塔銘故生緣參訪事跡不詳但見普說中自敍十六為僧十八行脚初參雙林遠十九去靈隱見善妙峯次過淨慈依天目禮做死工夫未見說某年某歲參無準但曰在無準先師會下每遇舉主人公話便可以打個𨁝跳莫教舉起衲僧巴鼻佛祖爪牙更無下口處如是礙在胸中者僅十年後因與忠石梁過浙東天育存稿作天目訛兩山作住一日佛殿前行忽擡眸見古柏礙膺之物撲然而散始見徑山老人立地處云云據此則雪巖參無準於徑山在斷橋參無準於雪竇之後明甚斷橋有面稟親承之法偈其分座開堂皆在無準在日雪巖雖自敘在浙東育王徹悟未見有再呈見於徑山無準之說亦未見有師資授受之說據雲公謂雪巖參無準於徑山止一期而準入寂及見柏徹悟在準入寂十年之後誠如此說則雪巖嗣法無準不亦法門一大關係事乎此說刻行於世已十年矣雪巖後裔恬不為恥不見有一人辨清之為復是無所考鏡耶為復是見怪不怪耶其疑莫決故述以請問海內高明
