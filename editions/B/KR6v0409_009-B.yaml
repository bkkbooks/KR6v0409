body:
  text: 衡陽後學智楷惟直氏述濟宗世次備考之二海舟永慈劄付碑禮部為寺額事於內府抄出南京守備內官監太監袁誠題於南京土山原有古剎寺院基址一所發心從新修蓋完備未有寺額伏望聖恩憐憫乞賜禪寺寺額便益具本正統十年六月初十日奉聖旨與做翼善禪寺禮部知道欽此欽遵抄出到部參照前事擬合通行除外合行出給劄付本僧前去住持恪守戒律領眾焚修施行須至劄付者右劄付翼善禪寺住持僧永慈准此正統十年六月十六日對同都吏徐瓛劄付永慈碑石刻額曰海舟慈行實記六字而已題曰行實二字而已平陽忞禪師法孫元慧抄梓刻本云金陵東山翼善禪寺海舟慈禪師行實碑石刻無此語此訛一師諱永慈字海舟俗姓余氏蜀川成都府成都縣名族生於洪武二十七年歲次甲戌父存母亡生性慈善齠齔時見僧喜一日聞生死事遂發志棄俗趨彭縣大隋山景德禪寺投禮住持獨照月禪師剃染務勤永樂十一年五月夏本師示寂師殯送入塔畢入西山居庵八載發志參方行脚首謁太初和尚請益開示父母未生前依附做工夫一日初見問曰父母未生前那個是你本來面目師即從東過西叉手而立初曰未在更道師曰兩眼相對有甚相瞞初大悅制解起單復至東普無際和尚處舉似做工夫際追問不遜於宣德二年出峽赴京得度復還金陵靈谷挂搭雪峯和尚深契請師充首座制解造武林受具禮月公剃染此永慈出家為僧矣生洪武甲戌至宣德二年丁未出峽行年三十四別為僧已十餘年矣而云得度不審出家剃染為得度耶受具為得度耶若謂受具尚未至武林若詔剃染既為僧十餘年居庵八載兩見知識而又出家剃染者何解此訛二自有佛祖叢林以來或見道傳法如虛行者高沙彌有之未受具足戒而為人首座古今罕聞夫首座乃佛祖分座說法之職眼目人天表率叢林居大僧之首受大僧禮敬開導眾僧師範後學豈未受具之人得居斯職乎此訛三祭文云延世壽七旬三載精僧臘五十餘秋則永慈出家受戒在廾歲前今赴京得度造武林受具則又在三十四之後既出家受戒豈又有得度受具之理此訛四三十四後方得度受具至七十三僧臘僅三十餘年精僧臘五十餘秋如何銷釋此訛五近詣古道山直抵關房參見東明老和尚一見相契師禮畢就請問和尚曰無相福田衣甚麼人得披明下座摑一掌師曰四大本空五蘊非有汝作麼生掌明又一掌師曰一掌不作一掌用速道明又一掌師神色不變曰老和尚名不虛播復展具三拜而立明曰我慧旵居古道山三十載今日只見得這僧大眾弗得輕慢自此留住數日欲付與袈裟師曰某不為衣來堅不受至夜下山自此聲譽叢席既一見相契何又云禮畢就請問禮畢而後請問何云一見相契此訛六既非陞座當機一人關內一人關外問答豈有下座摑掌之理此訛七師家稱學者曰汝理也學者稱師家曰汝有是理哉此訛八東明為濟宗一代名宿豈無生機活用機不離位墮在毒海三掌打到底未出常情稱臨濟兒孫猶愧永慈於三掌之下進語未見有主賓互換衲僧手眼亦不見得投機呈解之的實何得一曰名不虛播一曰只見得這僧難道俱明陷虎之機乎喫驚打怪大似以賓看賓此訛九東明非聲勘驗方來而云大眾弗得輕慢關房相見豈有召大眾之事此訛十旵公塔銘云弟子僅百人受戒請益者數萬人則旵公座下頭角振振者不少而永慈又無超羣之見何遽云三十年獨見此一僧耶此訛十一復至金陵牛首挂搭本山住持請師前堂領眾三載制解下山復隱全椒焦山三載後至天界憩隱山居於正統二年夏守備太監袁誠法名智海聞師道德備供禮請領禮部劄住持翼善禪寺開山說法衲子雲集無虛日劄付碑明載守備太監袁誠乞賜寺額正統十年六月十六日禮部給劄今云二年夏領禮部劄住持翼善此訛十二復於正統五年六月二十八日東明示寂遺囑住持明白庵曰吾有衣法二物待十年後送至土山海舟和尚受納付囑曰字付慈海舟訪我我無酬明年之明日西風笑點頭語至來年期日示寂前弟子參師稱師為汝今師付弟子反稱海舟和尚受納付囑自拈花以來師師授受有此稱呼之例乎此訛十三寶華謂繼旵公住持者曰明覺旵公銘祖燈錄正宗錄俱曰覺明關妄救續略諸書曰普慈今永慈碑曰明白庵山曉曰永慈然繼旵公第二代住持而有明覺覺明普慈明白庵永慈五人然否誰屬也此訛十四旵公既於正統六年六月示寂而五年六月尚自住持何遺囑住持之有此訛十五偈語非付法意乃決別意也隔年書決別偈欲顯預知時至速宜令人送去至明年明日示寂方見宗師家作用非常又何必藏之十年後送人使知預知時至耶此訛十六元慧刻本於送至處增金陵東山四字其下小註云亦名土山此訛十七正統五年永慈不知棲隱何處至十年領劄住土山旵公五年遺囑何預知永慈住土山耶此訛十八白庵長老不違遺囑限滿日請首座法廣於景泰二年八月二十三日賫至土山師陞座祝香而受首嗣門人寶峯刻本於此增一瑄字此訛十九等住持清古源衣鉢明大空提點寧極庵徒孫三百餘眾所作頌古歌偈行於世師平生胸次洒落履踐清孤機用弗測希蹈城郭發言無虛出其自然行實跡繁未盡錄矣天順五年歲次辛巳刻本改辛丑此訛二十春上浣住山徒智瑄智璽焚香拜錄刻本於上浣下改云嗣法智瑄智璽等焚香拜錄此訛二十一行實錄在天順五年過後六年至成化二年永慈方示寂則錄行實時永慈猶在若永慈親口所說徒子親筆記錄自無訛偽之事今以劄付碑洎祭文證之訛偽層出非永慈親口所說瑄璽親筆所錄係後人偽造明矣元慧抄梓行實於中增改數字無大關係處悉置勿論惟於寶峯下偽增一瑄字關係法門最大不得不辨按永慈石碑載徒子一百有四人智忍居首第十三位為智瑛第二十五位為智瑄第三十八位為智璽據楚山贈智瑄偈原號玉峯而碑內稱首嗣門人寶峯者非智忍而誰元慧偽增一瑄字為寶峯瑄諸山受其所盲竟認為寶峯智瑄又一夥無知之徒硬指寶峯明瑄即寶峯智瑄是以智忍智瑄明瑄三人混合為一寶峯又一夥狂妄失心之徒改玉峯瑄塔面題名為寶峯瑄將寶峯明瑄塔面題名剗去殆盡竟抹殺一寶峯明瑄獨顯一寶峯智瑄又一夥無眼阿師偷取寶峯明瑄之傳作寶峯智瑄之傳列為天奇之師紀為正傳之祖嗟乎偽增一瑄字毒害法門至於此也今霽崙據翼善碑以譜濟宗世次不可不細心參考元慧抄梓行實後附智瑄偈曰付智瑄長老祖衣一頂拂子一枝山偈一首為助時中保任斯事云耳迷悟猶如空裏雲碧天明淨了無痕歷然世界其中露殺活拈來總現成時景泰五年歲次甲戌春二月十一日敕賜翼善禪寺開山臨濟下正嗣二十四世傳法比丘永慈親書付囑偈語之謬不暇論按能儒訓公曰大咸咸公住翼善因而廣搜先跡壬寅春於房僧破簏敗紙中檢出永慈手書付智瑄偈咸公係忞公之子元慧之師據此說則其偈忽然突出真偽之間安敢固必但永慈既為開山第一代清古源為第二代又有徒孫三百餘眾豈古源之後遽無繼席者耶必百餘年無知識住而後漸成房頭景泰五年手書偈稿預貯房僧破簏敗紙中有是理乎永慈寂成化二年去景泰五年計十三年此十三年間既非房僧所住則其偈稿又不審貯之何處自景泰五年迄康熙壬寅計二百零九年始從房僧破簏敗紙中檢出有是理乎又二百餘年之破簏曾不一更換乎所貯敗紙曾不一焚燒乎留待大咸檢出有是理乎則此偈係大咸偽揑明矣然大咸僅揑法偈一首其子元慧又偽增祖衣一頂拂子一枝及署諱書付年代事跡可謂偽之又偽者也今之修明僧史者不可不慎重細考元慧抄梓行實後附平陽忞公讚永慈偈曰長恨西江老馬駒如何又出者藞苴慈舟高閣東山頂坐裏長竿釣五湖昔作禪燈世譜收寶藏東明於世次中變亂世次之始也繼佐天童出闢妄救以海舟普慈系東明下者以不知東明下別有一海舟故也今得翼善碑明知海舟永慈係東明之嫡嗣屬古溪之所祭者為靜庵之所敘者理應修明世系班正典型仰答祖父靈明以釋天童錯誤可也而反認永慈為世次中之嫡祖豈非變亂世次之終乎帶累子孫增偽名揑偽偈以致盲盲相引著為燈錄滅祖亂宗忞公不得無罪正宗語錄南澗行悅集字梅谷凡例按聰祖夢說錄悅嘗覽之竊有可疑及覽慈祖頌古後跋此疑愈甚今讀東山近刻慈祖行實碑方決前疑故是書慈祖頌古聰祖夢說錄俱不載頌古普慈之事行實永慈之事今云慈祖頌古再云慈祖行實是混二海舟為一海舟也傳略第二十八祖海舟永慈禪師明洪武二十七年生天順間示寂示寂在成化二年非天順間姓余氏蜀川成都府成都縣名家子此係永慈之事法嗣十二人此係普慈之事第二十九祖寶峯智瑄一作明瑄禪師明成化八年十二月九日示寂姓范氏吳江人法嗣五人此係明瑄之事大鑑下二十八世祖海舟禪師行錄師諱永慈字海舟俗姓余氏蜀川成都府成都縣名族生於洪武二十七年歲次甲戌父存母亡生性慈善齠齔時見僧喜一日聞說生死事遂發志棄俗趨彭縣大隋山景德禪寺投禮住持獨照月禪師剃染務勤永樂十一年五月夏本師示寂師殯送入塔畢入西山居庵八載發志參方行脚首謁太初和尚請益開示父母未生前依附做工夫一日初見問曰父母未生前那個是你本來面目師即從東過西叉手而立初曰未在更道師曰兩眼相對有甚相謾初大悅制解起單復至東普無際和尚處舉似做工夫際追問不遜於宣德二年出峽赴京得度復還金陵靈谷挂搭雪峯和尚深契請師充首座制解造武林受具近詣古道山直抵關房參見東明老和尚一見相契師禮畢就請問和尚曰無相福田衣甚麼人得披明下座摑一掌師曰四大本空五蘊非有汝作麼生掌明又一掌師曰一掌不作一掌用速道明又一掌師神色不變曰老和尚名不虛譒復展具三拜而立明曰我慧旵居古道山三十載今日只見得者僧大眾弗得輕謾自此留住數日欲付與袈裟師曰某不為衣來堅不受至夜下山自此聲譽叢席復至金陵牛首挂搭本山住持請師前堂領眾三載制解下山復隱全椒焦山三載後至天界憩隱山居於正統二年夏守備太監袁誠法名智海欽師道德備供禮請領禮部劄住持翼善禪寺開山說法衲子雲集無虛日復於正統五年六月二十八日東明示寂遺囑住持明白庵曰吾有衣法二物待十年後送至金陵東山亦名土山海舟和尚受納付囑曰字付慈海舟訪我我無酬明年之明日西風笑點頭語至來年期日示寂白庵長老不違遺囑限滿日請首座法廣於景泰二年八月二十三日持衣齎至東山師陞座祝香而受首嗣門人寶峯瑄等住持清古源衣鉢明大空提點寧極庵徒孫三百餘眾所作頌古歌偈行於世師平生胸次灑落履踐清孤機用弗測希蹈城郭發言無虛出其自然行實迹繁未盡錄矣天順五年歲次辛巳春上浣嗣法徒智瑄智璽等焚香拜錄傳中有寶峯瑄嗣法徒諸字眼係元慧抄梓行實非石刻也大鑑下二十九世祖寶峯禪師行錄師諱智瑄號寶峯嗣金陵東山翼善慈慈親書付囑曰付智瑄長老祖衣一頂拂子一枝山偈一首為助時中保任斯事云耳迷悟猶如空裏雲碧天明淨了無痕歷然世界其中露殺活拈來總現成時景泰五年歲次甲戌春二月十一日敕賜翼善禪寺開山臨濟下正嗣第二十四世傳法比丘永慈親書付囑此係大咸元慧偽揑偽增之事辨見於前近行錄云寶峯明瑄禪師姑蘇吳江人姓范氏在俗為木匠因海舟和尚造塔院斧傷自足痛甚索酒喫舟聞之往謂曰適來范作頭傷足猶可假若斫去頭有千石酒與作頭喫作頭能喫否師有省即止酒遂求為僧舟即與披剃曰今日汝頭落也師曰頭雖落好喫酒人頭不落也乃充火頭一日師負薪舟見曰將刺棘作麼師曰是柴舟呵呵大笑師罔然舟曰是柴將去燒卻師起疑曰和尚畢竟是甚麼道理故問我我不能答是夕刻意參究不覺被火燎卻眉毛面如刀割以鏡照之豁然大悟作偈曰負薪和尚喚作棘火𦦨燒眉面皮急祖師妙旨鏡中明一鑑令人玄要得乃呈於舟舟便打師奪拄杖曰者條六尺竿幾年不用今日又要重拈舟大笑師又偈曰棒頭著處血痕斑笑裏藏刀仔細看若非英靈真漢子死人喫棒舞喃喃舟曰即此偈語可紹吾宗果是從緣入者永無退失從疑得者妙用隨機乃付偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深山止從此名聞遐邇學者雲集得法五人逝於成化八年十二月九日全身塔於東明寺右見東明祖燈錄按東山咸和尚曰咸嘗按諸方輯濟宗嫡祖源流多系悟繇籍氏獨慈祖未有確據間有闕而嗣考者乃至有謬以為常熟錢氏子不知何考有識者每疑信參半思徧訪祖席名藍稽實正謬而滌山慧子先得我心遂乃奮志孤征足迹幾徧湖海終無落處丁酉年因作源流頌至慈瑄兩祖未詳籍貫開法年地咨嗟不已旁有僧葦渡者偶云敝寺翼善向有慈海舟祖不卜是否慧聞輒大驚喜尋即偕訪到山門有碑屹立但歲久塵封模不可辨因剔抉湔滌讀之乃知為慈祖行實碑也間載籍貫悟由炳如星日而院後則慈瑄兩祖窣堵雙豎益徵諸方所傳之誤又云壬寅春因有司稽造僧籍房僧於破簏敗紙中復檢出慈祖手書付瑄祖偈一首展讀祖澤如新益喜不自持因錄附行實碑後并梓流通不獨正昔日之譌且貴祖門宗屬得詳兩祖相承原委云云悅因較瑄祖近行錄不同故錄慈祖親書傳法偈於前而行錄復載於後儻更有如滌山慧公者孤征徧訪則龍天定不孤負定有如慈祖之行實出焉大鑑下三十世祖天奇禪師章次不錄天童編刻無聞夢說錄有寶藏東明二代何疑之有悅公覽者必無聞原本客牕夜話敘從上源流見慈祖嗣萬峯所以有疑及覽慈祖頌古後跋見其先嗣萬峯後嗣東明所以疑甚今讀行實碑見慈祖的嗣東明所以決疑胡不思拈頌百則係普慈之事行實碑係永慈之事今曰慈祖頌古再曰慈祖行實此凡例混二海舟為一海舟矣傳略述永慈事訖乃曰法嗣十二人此係普慈傳末之事今錄為永慈之事此傳略混二海舟為一海舟矣永慈首嗣為智忍石碑稱首嗣門人寶峯者非智忍而何元慧抄梓行實於寶峯下偽增一瑄字竟為寶峯瑄今悅公錄為寶峯智瑄其下小註曰一作明瑄又以明瑄示寂姓氏法嗣之事錄為智瑄之事此傳略以智忍智瑄明瑄三人混合為一寶峯矣當天童與潭吉辨不能清者以其未見永慈碑是以墮於誤轍今悅公既見無聞客牕夜話又得永慈碑則普永兩家譜牒昭然明白而不斬然釐正以釋天童之誤反混合普永為一人何也胡不思萬峯偈沈貫銘明瑄傳天奇錄及塔銘無聞客牕夜話笑巖聯芳敘曇芝偈廣通序十種祖訓為何事乃撥置一邊如此詭混不惟悖逆祖訓即公提綱載古雪傳馬祖三十二葉亦自相矛盾殊不知普慈永慈雖同號海舟其諱有普永之別生緣有吳蜀之別姓氏有錢余之別出家有破山景德之別得法有萬峯東明之別法偈有龜毛字付之別住處有洞庭翼善之別示寂有景泰元年成化二年之別建塔有東明左側退居寺後之別世壽有九十六年七旬三載之別僧臘有七十四載五十餘秋之別法嗣有十二人一百四人之別載籍有普慈錄永慈碑之別混合為一人可乎勿論寶峯為智忍智瑄號玉峯即智瑄號寶峯亦不可以寶峯明瑄混合為一人何也二人雖同號寶峯其諱有明瑄智瑄之別得法有明瑄受普慈付囑在正統間智瑄受普慈付囑在景泰五年之別法偈有臨濟兒孫是獅子迷悟猶如空裏雲之別悅公雖易左為右謂明瑄全身塔於東明寺右然亦有智瑄塔在退居寺後之別混合為一人可乎又自較二人事跡不同乃並錄為永慈之子天奇之父永慈有二子可也天奇有二父可乎又與前傳略寶峯智瑄作一明瑄判然不同又正宗一代止錄一人錄至二十九代兩人并列成甚單傳正宗耶今以永慈續單傳正宗削普慈於不聞之地惑元慧偽增之名咸公偽揑之偈公然錄寶峯智瑄為天奇之師妄認寶藏東明永慈智瑄四代異姓之人為正宗一脈之祖其滅祖亂宗之甚莫甚於此咸公元慧固是罪魁忞公亦不得無罪又引咸公一篇述其得偈破簏之偽辨見於前至謂諸方以余氏海舟謬為錢氏海舟是海舟只一人也準是不但與聰寶十種祖訓不合亦與後人新條相反公為天童之孫豈有不知闢妄救以海舟為常熟錢氏子以錢氏先嗣萬峯後嗣東明者乎何得以其謬誤妄加諸方耶云正昔日之譌昔日指誰而言闢妄救強驅常熟錢氏海舟嗣東明固譌矣公又混錢氏海舟為余氏海舟不亦譌中之譌乎前此諸公辨論紛然皆以續高峯七世之句銷釋不去往往違背聰寶源流多從古溪祭文祭文明祭翼善海舟永慈永慈望高峯七世紹旵祖後踵公今住持翼善碑在目前明知余氏海舟永慈嗣東明當辨清闢妄救之譌徧告同宗修明世系仰答祖父靈明可也而反父子相與增偽名揑偽偈賺他無眼阿師引著燈錄以譌傳譌亂宗滅祖莫之知也悲哉續僧寶傳紫籜自融輯字巨靈禪師名永慈訛作普慈號海舟明洪武廿七年生於蜀之成都余氏訛作常熟錢氏弱齡聞僧說生死事大即蘊於膺經旬不就寢決志趨彭縣之大隋山訛作破山景德寺禮獨照月禪師堅求法要月喜其端厚慎重可為法門梁棟遂度之永樂癸巳月歿觀融公作僧寶傳改腔換調若意不異碑俱勿論但小註訛作普慈常熟錢氏破山之說是混二海舟為一海舟矣據永慈碑但云禮月公剃染務勤言務勤不過苦行修行而已且碑中無堅求法要乃至法門梁棟之語此偽揑一師竟入西山庵隱八載形影偶偕忽覺相應乃棄庵出謁太初和尚時年二十有八矣初受師半展遽問曰向父母未生前速道將來師從東過西初曰未在更道師曰兩眼相對初正色瞚師師趨去之據此則永慈與太初乃作家相見何碑中但云請益開示依附做工夫並無受半展趨去乃至形影偶偕忽覺相應等語此偽揑二復至東浦訪無際抵靈谷見雪峯雪峯以師悟處諦當延師為靈谷第一座到無際後有赴京得度一段何竟削去莫是已剃染又得度恐致人疑故削之耶況碑中無悟處諦當之語此偽揑三師竟自許常與同輩蹴蹋峯竊駭之然師無留意解制拂衣至安溪投機於虛白旵公離靈谷往武林受具一事竟刪去者蓋見古溪文有精僧臘五十餘秋語恐人見疑況碑中無蹴蹋竊駭之語此偽揑四已上皆永慈之事旵公以臨濟正脈囑師保任初刻云旵公不諾且當眾排師知見滲漏師大愧歸堂三晝夜色如枯木寢食俱廢偶瑠璃燈墮地大悟旵公以臨濟正脈囑師保任此普慈參東明事後重刻削去前段此偽揑五以下永慈事師乃辭去復陸沉牛首諸山正統丁巳師年四十四始領東山翼善禪寺永慈參東明相契有無相福田衣之機緣且東明當眾稱許何可刪去耶師晦養既久旦弘大化四方宿艾虛懷而仰風裁然師虎視來機故踵息未舒而神氣先萎者多矣碑中全無此語一味說鬼說夢此偽揑六正統五年庚申六月旵公化去東南學眾惟歸東山王公貴人虛己以禮致師師未嘗以一言開鑿智竇故一時雖盡愛敬莫得而親疎焉旵公化去在正統六年非五年也旵有衣偈遺囑永慈師資授受一椿大事何可削去耶况碑中無愛敬親疎等語此偽揑七緇素為師預建身後之域碑中無此說此偽揑八有范作頭者失斧傷足痛甚索酒師謂之曰范作頭傷足猶可假若斫去頭時有千石酒與作頭作頭能喫否范於言下知歸即求為僧師錄之乃充火頭刻意究竟不覺被火燎面面如刀刈取鏡照之欣舞以偈呈師師為肯可此係普慈俾明瑄范木匠造東明塔院竟竊為智瑄永慈之事豈非大錯當是時出入東山皆稱俊杰不無有望於師師惟目送而已至有已據高座而聲馳國中者求入籌室師弗顧或謂東山網漏於吞舟之魚師哂之碑中無此語說鬼說夢太多可厭此偽揑九間有古溪澄禪師常過東山師與盤桓喜其見處穩實歎曰真斷橋之後也碑中無此語此偽揑十乃舉澄以住高座寺澄初出世衲子不甚知名師以澄法語緘達諸山諸山始歸重兼仰師有衛法至公之德云據古溪本錄於天順五年屬貴冀公請住金陵兩花臺高座寺非永慈所舉也此偽揑十一天順五年辛巳師陞座說法畢一喝百逝永慈示寂在成化二年丙戌非天順五年碑中無陞座說法一喝而逝之語此偽揑十二逝之日白虹橫貫異鳥悲鳴古溪祭文云將入涅槃見衰相而白虹貫日用世尊涅槃故事非永慈實事亦無異鳥悲鳴之語此偽揑十三古溪澄哭之慟挽之以詩吊之以文其略曰道揚湖海德譒神州慈濟隆乎品彙聲名動乎王侯來西蜀而全提正令坐東山而大闡玄猷續高峯七世之燈爍羣昏而獨照紹旵祖百年之踵吞眾派以周流將入涅槃現衰相而白虹貫日既歸圓寂殮法身而夜壑藏舟澄自後不上堂亦趺坐遷化於香巖香巖之眾悽然澄徐展目曰不須如是復晏然長往祭文下小註云門人請古溪和尚作非古溪躬往東山致祭也師之門人智瑄作明瑄訛也開法金陵瑄傳天奇本瑞瑞之法嗣大振瑄即范作頭也范作頭即明瑄係天奇之師載公乃祖闢妄救中今小註云作明瑄訛是以明瑄智瑄合為一人也贊曰鄧尉至東山歷傳四世孑孑喬松其本孤矣自寶峯爍破面門而得天奇瑞公枝秀雲巒葉蔭寰中謂萬峯寶藏東明永慈歷傳四世可也謂寶峯天奇出自永慈大錯大錯或疑其先淨而後濫殊不知我此世界大賢劫中小劫二十當有千佛出興迄今劫過有九矣自拘留孫至我釋迦本師纔出四佛第十一小劫彌勒如來又二劫師子佛後有九百九十三尊在十五小劫中一齊出現惟餘樓至設以盛衰淨濫而較之可乎否耶九百九十三佛雖在一劫中出現乃次第相繼而出非同一時一齊出現也引譬天奇付三百六十人為非濫謬之又謬傳中偽揑許多讚譽之詞不暇較論第觀其意雖以二海舟混為一海舟其實抹殺普慈獨存永慈又於永慈毒害不小何也凡師資授受貴在機緣法偈有據永慈參東明有無相福田衣之機緣况東明當眾稱許者今削去之東明有遺付永慈衣偈二物此師資授受一椿大事亦削去之則於永慈雖讚譽之多而其毒害亦不少也明瑄范木匠造東明塔院指為造東山壽塔永慈塔石塔也以木匠造石塔謬之甚矣而又硬指范木匠即智瑄以之上嗣永慈下出天奇亂宗滅祖之甚莫甚於此今融公不遵無聞笑巖之祖訓不本古溪靜庵之舊章不依闢妄救續略諸新條一味自剏臆見亂宗滅祖流毒法門為害不小今之修明僧史者不可不細心考究南嶽勒古靈巖弘儲著字繼起六十一祖東山永慈禪師於旵和尚兩掌下開悟乃展具珍重禮三拜而立碑中無開悟珍重之語旵曰居古道山三十載今日祇見得這僧六十二祖高峯住高峯寺者乃明瑄也智瑄禪師智瑄不曾住高峯寺久參東山慈和尚付法偈末有殺活拈來總現成之句此係大咸偽揑之偈不可不辨六十三祖金陵本瑞禪師參瑄和尚瑄問曰甚處人師曰四川天奇江西人非四川人也瑄豎起拳曰四川還有這個麼師曰無瑄曰因甚卻無師曰非我境界瑄曰如何是你境界師曰不識瑄曰汝豈不是著空師曰終不向鬼窟裏作活計瑄曰西天九十六種你是第一種師拂袖便出天奇參寶峯明瑄於高峯寺非參智瑄也按勒古自序云弘儲南嶽讓和尚三十四世宗孫又云勒四十世以返之少林自儲公上遡南嶽正三十四世再上至少林正四十世則寶藏東明二代不在世次之中正與無聞笑巖祖訓符合三峯潭吉考辨亦合是可據也其紀世次則以釋迦文佛為始祖迦葉為一祖至萬峯為五十八祖寶藏為五十九祖東明為六十祖永慈為六十一祖智瑄為六十二祖天奇為六十三祖乃至三峯為六十八祖自己為六十九祖上望迦文為七十世乃云勒七十世以返之迦文則又廁寶藏東明兩代於世次之中非惟與無聞笑巖三峯潭吉相反且自語矛盾至於棄普慈而祖永慈以明瑄作智瑄以之上嗣永慈下出天奇不惟疊出寶藏東明二代則又妄認寶藏東明永慈智瑄四代異姓之人為相傳一脈之祖帶累子孫輯為宗統著為源流以訛傳訛亂宗滅祖儲公固是罪不容辭忞公亦不得無罪
