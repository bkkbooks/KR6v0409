body:
  text: 衡陽後學智楷惟直氏述濟宗世次備考之六無聞師承疑問天奇瑞禪師焭絕集載法嗣三百餘人俱有機緣及付法偈內有三無聞並列於右以便較考第一百七十五位臨潼無聞聰者天奇問天理非形如何得形聰曰本非造作奇曰靈機本玅如何取玅聰曰休休奇曰二相非修如何却修聰曰語默動靜奇付偈曰濟安扶弱在佳賢可目先宗救世緣彼此兩邊成兩見老漁串錦具清傳集中載某處某人者此付法之時所載生緣之處也非載開法時所住之地名曰臨潼者縣名也屬陝西西安府則此無聞乃陝西人也第二百八十六位館陶絕學聰者天奇問苦樂皆心因何外取聰曰只為不了奇曰是非皆事因何妄承聰曰錯認定盤星奇曰迷悟皆人因何不懂聰曰蚤知燈是火豈肯四方求奇付偈曰導者心同慈嫗心爭教赤子困羣陰輔成架海金梁子佛缺方知補告任館陶亦縣名屬山東東昌府則此絕學乃山東人也第三百二十四位延安無聞聰者天奇問在世忘世是如何聰曰了物非物奇曰在念忘念是如何聰曰於心無心奇曰心物俱忘時如何聰曰華山高㟮太行峨奇付偈曰破情情破破還情絕跡無私精內精知是箇中今不借盡識分付與仁行延安乃府名屬陝西則此無聞亦陝西人也其餘武安聰等不及錄要皆俱有聯芳機緣及聯芳法偈具載集中足見師資授受的有所據非可妄於移易也無聞聰禪師夢說錄住明州天童嗣法孫圓悟編古吳虛堂居士查祖恩集略傳禪師諱明聰字無聞俗姓奚母吳氏閩之邵武光澤人也生正德九年臘月五日子時誕前一日有病僧借宿母吳曰貧廬湫隘往東有廟可棲僧謝而去夜半育師明日僧死於道里人聞之咸曰此僧再來也三歲喪父次年母亦亡九歲始言十二歲叔子良又死焉外祖憐而收養不期年亦死母舅惡其命孤苦乃送於且隱庵念初禪師出家數月諸經通曉一無遺忘初愛之十七剃度二十受戒於心燈律師精毘尼部兼習止觀深究唯識等論內外典籍無不該博講眾咸服其胸次磊落天資穎達一日遊百丈山逢一耆舊曰少年英銳不去參學事遊山玩水耶師曰參學不過如是遊山可發天機耆舊曰爾今參學曾見幾員知識可曾發明己分大事耶師曰理明則性明何有別法之難我出入講席諸經大義曉然矣耆舊曰曾明法華義否師曰此經已講三次其義了然無疑耆舊曰大通智勝佛至不得成佛道四句偈義如何師一一講之耆舊罵曰吾道汝有些氣息原來弄精魂漢拂袖而去師急趨求示大義耆舊曰此偈大義講來不切當且參二三十年若不明白自有人與汝發明言竟走而不顧師向後念茲在茲日參夜究茫無端倪五六年不言不笑如癡若呆諸緇素輩咸道師為廢人一日忽聞馬嘶豁然大悟然後徧參諸善知識至三十三已上皆光澤無聞事跡參天奇和尚纔入門正值奇外出師云一出一入是同是別奇曰同別且置見出入者是阿誰師良久奇怒罵而出夜歸問知客曰今日我罵這僧在否曰在客寮奇曳杖到客寮師遂拜奇便打師曰適來某甲艸艸觸忤和尚乞慈悲寬恕奇曰老僧今日被上座勘破師曰和尚是在世忘世在念忘念某甲豈能勘破得天奇錄中無此一段語奇笑曰如何是在世忘世師曰了物非物如何是在念忘念師曰於心無心心物俱忘時如何師曰華山嶺突巍太行峯嵯峨天奇錄曰在世忘世是如何聰曰了物非物奇曰在念忘念是如何聰曰於心無心奇曰心物俱忘時如何聰曰華山高㟮太行峨所載止此並無前後問答之語意旨如何師曰洞庭湖中水大岳陽樓上人多奇曰教壞人家男女者惟汝一人乃服勤五祀禮辭天奇錄無此一段語奇付以偈曰破情情破破還情絕跡無私精內精知是箇中今不借盡籯分付與仁行此機緣法偈係延安無問事跡後住隨州關子嶺龍泉寺為開山第一世僧問如何是本來面目師曰石香亭僧曰便恁麼去時如何師曰喪却了也僧曰今朝孟夏八日天下叢林皆慶如來降誕之辰未審如來何處降生師於几上畫箇圓相僧無語此係光澤無聞事跡邵武府光澤縣屬福建管則此無聞乃福建人也按傳中所載生緣悟由出處皆光澤無聞事跡其機緣法偈皆延安無聞事跡今以延安無聞機緣法偈為光澤無聞機緣法偈是以二無聞混合為一無聞矣梅谷悅禪師正宗語錄無聞傳曰師諱明聰一本正聰字無聞此題以館陶絕學正聰與光澤無聞明聰合為一人俗姓奚母吳氏閩之邵武光澤人也生正德九年臘月五日子時誕前一日有病僧借宿母吳曰貧廬湫隘往東有廟可棲僧謝而去夜半育師明日僧死於道里人聞之咸曰此僧再來也三歲喪父次年母亦亡九歲始言十二歲叔子良又死焉外祖憐而收養不期年亦死母舅惡其命孤苦乃送於且隱庵念初禪師出家數月諸經通曉一無遺忘初愛之十七剃度二十受戒於心鐙律師精毘尼部兼習止觀深究唯識等論內外典籍無不該博講眾咸服其胸次磊落天資穎達一日遊百丈山逢一耆舊曰少年英銳不去參學事遊山玩水邪師曰參學不過如是遊山可發天機耆舊曰爾今參學曾見幾員知識可曾發明己分大事邪師云理明則性明何有別法之難我出入講席諸經大義曉然矣耆舊曰曾明法華義否師曰此經已講三次其事了然無疑耆舊曰大通智勝佛至不得成佛道四句偈義如何師一一講之耆舊罵曰吾道汝有些氣息原來弄精魂漢拂袖而去師急趨求示大義耆舊曰此偈大義講來不切當且參二三十年若不明白自有人與汝發明言竟走而不顧師向後念茲在茲日參夜究茫無端倪五六年不言不笑如癡若呆諸緇素輩咸道師為廢人一日忽聞馬嘶豁然大悟然後徧參諸善知識至三十三已上係光澤無聞跡參天奇和尚纔入門正值奇外出師云一出一入是同是別奇曰同別且置見出入者是阿誰師良久奇怒罵而出夜歸問知客曰今日我罵者僧在否曰在客寮奇曳杖到客寮師遂拜奇便打師曰適來艸艸觸忤和尚乞慈悲寬恕奇曰老僧今日被上座勘破師曰和尚是在世忘世在念忘念某甲豈能勘破得天奇錄中無此一段語此係夢說錄中揑出奇笑曰如何是在世忘世師曰了物非物如何是在念忘念師曰於心無心心物俱忘時如何師曰華山嶺突巍太行峯嵯峨此係延安無聞機緣意旨如何師曰洞庭湖中水大岳陽樓上人多奇曰教壞人家男女者惟汝一人乃服勤五祀禮辭此係夢說錄中揑出奇付以偈曰破情情破破還情絕迹無私精內精知是箇中今不借盡籯分付與仁行此法偈係延安無聞事跡後住隨州關子嶺龍泉寺為開山第一世僧問如何是本來面目師曰石香亭僧曰便恁麼去時如何師曰喪却了也僧問今朝孟夏八日天下叢林皆慶如來降誕之辰未審如來何處降生師於几上畫箇圓相僧無語此係光澤無聞事跡傳略曰絕學明聰一作正聰是以二人合為一人目錄曰延安無聞此正宗一書以三無聞合為一無聞據傳中載明聰生正德九年甲戌曰十七歲剃度在嘉靖九年庚寅曰二十受戒在嘉靖十二年癸巳曰三十三參天奇在嘉靖二十五年丙午曰服勤五載始受付囑在嘉靖三十年辛亥按天奇傳略載明弘治間示寂霽崙全書亦謂天奇示寂在弘治十一年戊午夫弘治戊午至嘉靖辛亥計五十四年豈已死五十四年之天奇尚乃付光澤無聞之法乎且無論付法之年即生正德甲戌去弘治戊午亦相間十七載况此機緣法偈原係延安無聞之事刻在弘治元年戊申至光澤無聞受囑之年計六十四年遠矣準正宗夢說二錄所紀則光澤無聞非天奇之嗣明矣正宗錄無聞傳近日重刻曰大鑑下三十一世祖無聞禪師語要隨州關子嶺龍泉寺絕學無聞正聰光澤無聞亦號絕學特其諱為明聰正聰乃館陶絕學今以館陶絕學正聰與光澤絕學無聞明聰合為一人禪師住後上堂舉僧問雲門如何是一代時教門曰對一說龍泉則不然若有人問如何是一代時教便劈脊一棒曰合取狗口此係際公偽造之語僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也問今朝四月八日天下叢林皆慶如來聖誕未審如來何處降生師於几上畫圓相示之僧無語此二則機語載夢說錄中後笑巖代僧作禮曰盡界普瞻笑巖參呈前所得見處師隨即印之次日入室禮拜師曰上座昨夜許多絡索向甚處去也巖擬對師笑曰鷂子已過新羅國巖遂問曰十聖三賢已全聖智如何道不明斯旨師厲聲曰十聖三賢你已知如何是斯旨速道速道巖頻下十餘轉語師皆不肯巖乞代師責曰著實參始得巖一日洗菜回師見問曰是甚麼曰一藍菜師曰何不別道一句曰請和尚別問於是隨問隨答師皆諾之巖欲徧參乃辭師師舉拂子曰若向者裏道得一句出格可去巖無語師曰子今向去且精一其志勿雜用心切記吾言他日大有得力處巖徧參後復謁師命烘爐師曰人人有箇本來父母子之父母何在曰一火焚之師曰恁麼則子無父母耶曰有則有只是佛眼覷不見師曰子還見否曰某亦不見師曰子何亦不見曰若見即非真父母隨即呈偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明舉似師師曰只此一偈堪紹吾宗復曰汝心即我心我心本無心無心同佛心佛心非我心又曰佛如轉輪王佛法如王命佛子豎法幢能令邪作正囑曰汝諦受持遇緣熟者智愚皆度續佛慧命須待其人此傳將生緣生年機緣法偈一概削去雖蓋覆遙嗣一事其奈收夢說錄兩則機語依舊是光澤明聰今入笑巖機緣於明聰誠為面稟親承明聰於天奇却成沒交涉既嫌生緣事跡之偽削去之又收際公偽語豈非捨偽以取偽乎正聰雖為天奇之嗣確非笑巖之師明聰的為笑巖之師確非天奇之嗣今以二人合為一人上嗣天奇下出笑巖天奇有二子可也笑巖有二父好羞好羞潭吉忍禪師五宗救無聞傳曰關子嶺無聞明聰禪師天奇嗣邵武光澤縣人也俗姓奚母吳氏將誕師前一夕有病僧告宿吳氏辭之夜半遂生師而病僧亦以是夕亡於道上里人咸謂此僧再來也師生三歲父母繼亡外祖憐而收養之未期年外祖亦死舅氏以師命孤苦乃送且隱庵為僧十七得度二十受具精毘尼兼修止觀深究唯識等論同學皆敬之一日遊百丈山逢一老宿問師曰大通智勝佛十劫坐道場佛法不現前不得成佛道此理如何師乃依文講之老宿詬罵而去師從此疑情頓發念念孜孜經五六載一日聞馬嘶豁然大悟此乃光澤無聞事實乃曰如斯之事如來明見無有錯謬此潭古見道之語非明聰語也遂參諸方得法於天奇老人焉奇問在世忘世是如何師曰了物非物奇曰在念忘念是如何師曰於心無心奇曰心物俱忘時如何師曰華山高㟮太行峨此係延安無聞機緣密雲悟禪師闢妄救無聞傳曰關子嶺絕學正聰禪師天奇嗣又號無聞此題名號以館陶絕學正聰與光澤無聞合為一人邵武人俗姓奚母吳氏將誕師前一夕有病僧告宿吳氏辭之夜半遂生師而病僧亦以是夕亡於道上里人咸謂此僧再來也師生三歲父母繼亡外祖憐而收養之未期年外祖亦死舅氏以師命孤苦乃送且隱庵為僧十七得度二十受具精毘尼兼修止觀深究唯識等論同學皆敬之一日遊百丈山逢一老宿問師曰大通智勝佛十劫坐道場佛法不現前不得成佛道此理如何師乃依文講之老宿詬罵而去師從此疑情頓發念念孜孜經五六載一日聞馬嘶豁然大悟此係光澤無聞之事乃曰如斯之事如來明見無有錯謬此係潭吉揑出悟由遂參諸方得法於天奇老人焉奇問苦樂皆心因何外取師曰祇為不了奇曰是非皆事因何妄承師曰錯認定盤星奇曰迷悟皆人因何不懂師曰早知燈是火豈向四方求此係館陶絕學聰之機緣宗救闢妄二書削去正德九年之生年無乃蓋覆遙嗣一事耳至於宗救以光澤無聞延安無聞混合為一人闢妄以館陶正聰光澤明聰混合為一人上嗣天奇下出笑巖成何體裁山茨際禪師東明祖燈錄無聞傳曰隨州關子嶺絕學正聰禪師又號無聞關子嶺無聞係光澤人雖亦號絕學特其諱為明聰絕學正聰係館陶人今以二人合為一人幼年出家參天奇奇問苦樂皆心因何外取師曰只為不了奇曰是非皆事因何妄承師曰錯認定盤星奇曰迷悟皆人因何不懂師曰蚤知燈是火豈向四方求奇肯之此乃館陶絕學之機緣也付以偈曰濟安扶弱在佳賢可目先宗救世緣彼此兩邊成兩見老漁串錦具清傳此乃臨潼無聞之法偈也又偈曰導者心同慈嫗心爭教赤子困羣陰輔成架海金梁子佛缺方知補告任此乃館陶絕學之法偈也一日奇問在世忘世是如何師曰了物非物奇曰在念忘念是如何師曰於心無心奇曰心物俱忘是如何師曰華山高㟮太行峨此乃延安無聞之機緣也後住隨州關子嶺龍泉寺為開山第一世上堂曰自佛相傳道不虛祖師八八到天奇一條拄杖傳臨濟打至於今更轉疑以拄杖卓一下云欲知佛性義當觀時節因緣拈香云此一瓣香供養天奇和尚用醻法乳之恩斂衣就座舉僧問雲門云如何是一代時教門云對一說今日有人問如何是一代時教山僧便劈脊一棒云合取狗口又舉雪峯謂巖頭云我當時在德山棒下如桶底脫相似巖頭喝云你不見道從門入者不是家珍須是自己胸中流出蓋天蓋地方有少分相應雪峯忽然大悟禮拜云師兄今日始是鰲山成道今人只管道古人特地做作教後人依規矩若恁麼正是謗他古人謂之出佛身血古人不是今人苟且豈以一言半句了當平生若扶豎宗乘續佛慧命凡吐一言半句自然坐斷天下人舌頭無你著意路作情解涉道理處看他示眾云盡大地是沙門一隻眼汝等諸人向甚麼處痾又云望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也山僧今日亦然有相見底出來麼一僧出曰某甲今日與和尚相見了也師曰相見且置見老僧箇甚麼與大眾說看僧無語師便打又僧曰得見和尚面目師曰瞎僧曰石香亭笑和尚去在師曰也須喫棒考此法語無所出載係際公偽造也居士出問今朝四月八日天下叢林皆慶如來降誕未審即今出胎也未乞和尚直指師畫一以拄杖打下座復召大眾曰見麼士作禮師便歸方丈此係光澤無聞機緣出載夢說錄中但云僧問今改作居士問又添出許少絡索庚午正月忽遁去至壬中二月復歸山五月示微疾七月朔夕謂眾曰因心不了又遊方吳越山川路渺茫拄杖一條擔日月龍泉寺裏話偏長以拄杖擲地趺坐而逝全身塔於寺右得法者三人亦此光澤無聞之事徧考諸書並無此所謂上堂拈香及舉古等語但夢說錄中有拈香語曰端為西天四七東土二三南嶽讓已下乃至先師天奇瑞和尚並無所謂祖師八八到天奇之語按居士問佛降誕一則語既在此上堂拈香法語之末何故夢說錄止載此機語而不載此上堂等語抑又何耶夢說諸書既無所載則此拈香八八之語及舉古語皆無根之談係際公偽造明矣又以四無聞混合為一人上嗣天奇下出笑巖天奇有四子可也笑巖有四父好笑好笑巨靈融禪師續僧寶傳無聞傳曰禪師諱明聰字無聞邵武光澤奚氏子也此係光澤無聞生緣宗傳臨濟師事天奇天奇之盛化也聯芳授受龍象數百員而師拔其萃然師不就疏請不藉檀脂卓立當陽開創禪社愛以劇務繩學者重振百丈之規或不堪其勞而去未期月復來歸之以故升其堂者皆挺特有志之士且函丈之室如旅泊中夜跏趺四壁凜然榻下咄咄之聲常驚達旦是以楊岐之令至師又行焉此段係融公杜撰師初受業於講肆精研性相有聲同輩憚其鋒以英邵武嘲之師獨陰疑大通智勝佛十劫坐道場佛法不現前不得成佛道此段係光澤無聞事載夢說錄乃與義學浩浩盤桓有曰既是佛矣何須更成或曰為度眾生故所以不成佛師默歎曰審如是乎遂盡棄其所好堅扣禪宗不契此段係融公杜撰忽聞馬嘶廓然自驚此係光澤無聞悟由不如夢說錄載豁然大悟更妙趨見天奇瑞禪師瑞瞋目叱出一本纔禮拜瑞便打融公用瞋目一機慣熟永慈傳中曾見今二見矣同行者曰君與和尚無緣耶師笑曰真箇那此係融公杜撰是晚瑞公問曰今日我罵底僧在否有對曰是必在公即曳杖下日過寮師迎作禮公便擊之師進曰適來艸艸觸忤和尚公按杖曰老僧今日被上座勘破師又進曰和尚是在世忘世在念忘念豈被人勘破一本云豈能勘破此段係夢說錄偽揑公曰在世忘世是如何對曰了物非物曰在念忘念是如何對曰於心無心曰心物俱忘時如何對曰華山高突太行峨此係延安無聞機緣公休去未幾以化柄囑焉且誡師曰從上真宗有子擔荷何憂哉但百獸雖潛踪於獅子聲中然千花却發豔於象王影裏子其勉之師既受囑獨入光州山居六年六安山又六年復還光州舊隱又五年始出隨州關子嶺建立龍泉寺以安來學而學者集焉此段係融公杜撰嘗謂眾曰吾師天奇老人每懼後學外著文義內生情見故有語云文義者法也情見者人也非人何以有其見非法何以有其文是以文義情見通屬人法人之不空情見難絕法之不空文義難滅文若不盡見奚能盡義若不盡情何能絕如是奔競展轉無窮發之乎文生於見義生於情返之乎見生於文情生於義先乃所引生能後乃能追生所總名曰生文滅則見滅義絕則情亡情不自忘因乎義忘而情忘見不自泯因乎文泯而見泯統名曰死死死生生實可哀哉此段出載焭絕集中此吾老人防微杜漸切實至極汝輩有志於吾宗寧可忽諸然食飯不齩米行地不蹋土又作麼生委悉此段係融公畫蛇添足是時也師之同門諸尊宿或隱或現往來衲子獨推尊龍泉為人勦絕枝蔓不涉離微惟月心寶得入龍泉之室此段係融公杜撰師嘗召寶曰玄沙不肯靈雲意作麼生對曰賊入空房曰不得艸艸寶喝師諾寶乃辭去歷載還侍師又召曰人人有箇本來父母子之父母今在何處對曰佛眼覷不見師曰子還見不對曰某亦不見師曰子何不見對曰若見則非真父母師曰如何是真父母對曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明舉似師師深肯之此段載笑巖集中僧問本來面目師答曰石香亭曰便恁麼去時如何師曰喪却了也寶曰放去較危收來太速又僧問今朝天下皆慶佛誕未審佛於何處降生師畫圓相示之僧無語寶代僧作禮云盡界普瞻此二則機語係光澤無聞機語笑巖特舉而拈之代之故一載夢說錄一載笑巖集師以大法有所倚重遂隱去經二載還龍泉龍泉牀曆益慎班白者半滿其間間有二三玅齡披田服者皆恪守律度參請如救眉然但師有辭世意矣一日師陞座說法已而擲下拄杖儼然化去塔於龍泉寺左此段隱去還來及示寂係光澤無聞事載夢說錄其間潤色數語係融公杜撰延安無聞雖係天奇之嗣實非笑巖之師光澤無聞確為笑巖之師實非天奇之嗣今以二人混合為一人上嗣天奇下出笑巖天奇有二子可也笑巖有二父豈不取笑識者然紀笑巖面稟親承於明聰是矣紀明聰面稟親承於天奇偽造之中又偽造也前於永慈傳中偽撰陞座說法畢一喝而逝今於無聞傳中又偽撰陞座說法化去偽撰太多令人刺眼箬庵問禪師續燈存稿無聞傳曰隨州關子嶺龍泉無聞絕學正聰禪師此題以光澤無聞明聰與館陶絕學正聰合為人邵武人族姓奚母吳氏髫年出家二十受具習止觀唯識等論一日有宿衲詰師曰大通智勝佛十劫坐道場佛法不現前不得成佛道其意云何師依文答之宿譏訶而去師從此激勵疑情頓發坐臥不安經六載一日聞馬嘶大悟遂往見天奇乃蒙印可此係光澤無聞事跡住後上堂舉僧問雲門如何是一代時教門曰對一說龍泉則不然若有問山僧如何是一代時教劈脊便打曰合取狗口此係山茨際公假揑載東明祖燈錄僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也問今朝四月八日天下叢林皆慶如來聖誕未審如來何處降生師於几上畫圓相示之此係光澤無聞機緣載夢說錄笑巖寶參一日圍爐次師曰人人有箇本來父母子之父母今在何處巖曰一火焚之師曰恁麼則子無父母耶巖曰有則有佛眼覷不見師曰子還見不巖曰不見師曰子何不見巖曰若見即非真父母師曰善哉巖復呈偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明呈似師師即付以偈曰汝心即吾心吾心本無心無心同佛心佛心非吾心復囑曰汝當護持緣熟智愚皆度此段載笑巖行實內師於壬申七月初一示微疾訣眾說偈趺坐而逝全身塔於寺右此係光澤無聞事實載夢說錄傳中刪去生年機緣法偈為蓋覆遙嗣一事可也以明聰正聰合為一人上嗣天奇下出笑巖成何體裁山曉皙禪師寶積錄無聞錄曰隨州龍泉無聞明聰禪師閩之邵武人族姓奚母吳氏髫年出家二十受具因看大通智勝佛十劫坐道場佛法不現前不得成佛道話疑情頓發經六載忽聞馬嘶大悟此段係光澤無聞事載夢說錄往見天奇瑞和尚纔禮拜瑞便打同行者曰君與和尚無緣耶師笑曰真箇那此段係融公揑出夢說錄可較是晚瑞問曰今日見底僧在否有曰在瑞即曳杖下旦過師迎作禮瑞便擊之師曰適來艸艸觸忤和尚瑞曰老僧今日被上座勘破師曰和尚是在世忘世在念忘念豈被勘破此段係夢說錄偽揑瑞曰在世忘世是如何曰了物非物瑞曰在念忘念是如何曰於心無心瑞曰心物俱忘時如何師曰華山突兀太行峨此係延安無聞機緣非光澤無聞機緣也瑞休去未幾受囑焉一云延安人晳公見機緣乃延安無聞之機緣故曰一云延安人則以延安無聞與光澤無聞合為一人住後上堂舉僧問雲門如何是一代時教門曰對一說龍泉則不然若有問山僧如何是一代時教劈脊便打曰合取狗口此段係山茨際公揑出載東明祖燈錄中僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也問今朝四月八日天下叢林皆慶如來聖誕未審如來何處降生師於几上畫圓相示之僧擬議師便下座此段係光澤無聞事月心寶侍師次師曰人人有箇本來父母子之父母今在何處寶曰一火焚之師曰恁麼則子無父母耶曰有則有佛眼覷不見師曰子還見否曰不見師曰子何不見曰若見即非真父母師曰善哉寶呈偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明呈似師師即付以偈曰汝心即吾心吾心本無心無心同佛心佛心非吾心復囑曰汝當護持緣熟智愚皆度此段出載笑巖集中傳中紀笑巖親承明聰是矣紀明聰親承天奇偽之又偽晳公削去正德九年生亦不過蓋覆遙嗣一事耳又以延安無聞光澤無聞混合為一人成何體裁繼起儲禪師南嶽勒古無聞傳曰玉泉明聰禪師一日聞馬嘶豁然大悟此係明聰悟由乃曰如斯之事如來明見無有錯謬此係潭吉揑出明聰住關子嶺龍泉寺非玉泉也此又不知何郡之玉泉明聰冒認為自出之祖際公以四無聞為笑巖之父今又添玉泉一人俾天奇有五子不勝其喜累他笑巖以一身而養五父不勝其苦相雨蔭禪師宗統編年無聞傳曰武宗丙寅正德元年天奇祖付明聰正法明聰生正德九年今妄栽正德元年付法偽揑一天奇示寂在弘治戊午至正德丙寅已九年矣何得有天奇付法耶偽揑二聰邵武光澤縣人姓奚母吳氏將誕前一夕有病僧告宿吳辭之夜半遂生聰而病僧是夜道亡里人咸謂此僧再來削去生正德九年無乃蓋覆遙嗣一事耳十七從隱庵得度二十受具精毘尼兼修止觀深究唯識等論一日遊百丈山逢一老宿問聰曰大通智勝佛十劫坐道場佛法不見前不得成佛道此理如何聰依文對老宿詬罵而去聰疑情頓發一日聞馬嘶豁然大悟此係明聰悟由乃曰如斯之事如來明見無有錯謬此係潭吉偽揑往謁天奇祖久之付正法印天奇死後十七年明聰始生何得有付法事耶戊辰正德三年天奇祖示寂天奇示寂在弘治十一年今妄栽年甲謂正德三年示寂偽揑三臨濟二十七世祖諱明聰字無聞別號絕學嗣天奇瑞祖住隨州關子嶺龍泉寺癸卯嘉靖二十二年示寂夢說錄載示寂在隆慶六年此偽揑四夢說錄載有生年削而去之載有死年偽筆改之天奇已死九年後明聰未生九年前偽揑付授正法兼以偽栽朝代年甲豈非自誑以誑世乎聶先居士續指月錄無聞傳曰隨州龍泉無聞絕學正聰光澤無聞亦別號絕學特其諱曰明聰正聰號絕學乃館陶人今以二人合為一人禪師邵武光澤人族姓奚母吳氏刪去生正德九年亦為蓋覆遙嗣一事耳髫年出家二十受具習止觀唯識論一日有宿衲詰師曰大通智勝佛十劫坐道場佛法不現前不得成佛道其意云何師依文答之宿譏訶而去師從此激勵疑情頓發坐臥不安經六載一日聞馬嘶大悟此係光澤無聞事實遂往見天奇瑞和尚纔禮拜奇便打師曰某甲適來艸艸觸忤和尚奇曰老僧今日被上座勘破師曰和尚是在世忘世在念忘念某甲豈能勘破此段係夢說錄揑出奇曰在世忘世是如何師曰了物非物曰在念忘念是如何師曰於心無心曰心物俱忘時如何師曰華山高突太行峨此係延安無聞機緣奇頷之遂蒙印可此句係聶先偽揑住後上堂舉僧問雲門如何是一代時教門曰對一說龍泉則不然若有問山僧如何是一代時教劈脊便打曰合取狗口此係際公偽造法語僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也僧問今朝四月八日天下叢林皆慶如來降誕未審如來何處降生師於几上畫圓相示之僧無語此二則機語載夢說錄中師一日忽遁去不知所之門人蹤跡久而不得越二年師復歸山七月朔夕謂眾曰因心不了又遊方吳越山川路渺茫拄杖一條擔日月龍泉寺裏話偏長偈畢以拄杖擲地趺坐而逝傳中刪去生正德九年傳末刪去死隆慶六年令人摸頭腦不著此真為蓋覆遙嗣一事又以光澤館陶延安三無聞混合為一無聞上嗣天奇下出笑巖天奇有三子可也笑巖有三父豈不令天下人絕倒霽崙永禪師五燈全書無聞傳曰隨州關子嶺龍泉寺無聞正聰禪師無聞諱明聰邵武光澤人也正聰號絕學東昌館陶人也今題曰無聞正聰是以邵武之無聞與東昌之正聰混合而為一無聞也邵武奚氏子母吳十七出家二十受具習止觀唯識論一日有宿衲相詰大通智勝佛十劫坐道場佛法不現前不得成佛道其意云何師依文而答宿譏呵之師從此疑情頓發坐臥不安經六載一日聞馬嘶大悟此係邵武無聞事遂往見天奇奇問在世忘世是如何師曰了物非物奇曰在念忘念是如何師曰於心無心奇曰心物俱忘是如何師曰華山高突兀太行峯嵯峨奇曰他日教壞人者乃汝一人以偈印之此係延安無聞聰參天奇問答之機緣載天奇錄中奇付偈曰破情情破破還情云云霽崙既知此偈乃印延安無聞之偈故刪去又不合偷延安無聞之機緣插入傳中為邱武無聞參天奇之機緣也今既偷延安無聞之機緣為邵武無聞之機緣又以東昌絕學之法諱為邵武無聞之法諱是以三無聞混合而為一無聞也後住關子嶺此邵武無聞事上堂舉僧問雲門如何是一代時教門曰對一說龍泉則不然若有人問如何是一代時教便劈脊一棒曰合取狗口此係際公偽造之語載東明祖燈錄存稿不辨真偽引入傳中今霽崙襲取存稿之偽是以偽傳偽也僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也問今朝四月八日天下叢林皆慶如來聖誕未審如來何處降生師於几上畫圓相示之此係邵武無聞事載夢說錄中笑巖參呈前所得見處師隨印之乃至囑曰汝諦受持云云此係笑巖之機緣載笑巖集中而笑巖所參者乃邵武無聞也師一日忽遁去不知所之越二年歸山七月朔夕謂眾曰身心了却好遊方夢說錄云因心不了今改身心了却想是霽崙為無聞了却也吳越山川路渺茫拄杖一條擔日月龍泉寺裏話偏長偈畢以拄杖擲地趺坐而逝塔全身於寺右此係邵武無聞事傳中所紀生緣出處及囑笑巖皆邵武無聞而承嗣天奇則非邵武無聞也何以知之按正宗錄載邵武無聞生正德九年甲戌十二月五日子時曰十七出家則在嘉靖九月庚寅曰二十受具則在嘉靖十二年癸巳曰三十三參天奇則在嘉靖二十五年丙午曰服勤五載始受天奇付囑則在嘉靖三十年辛亥今全書載天奇示寂在弘治十一年戊午正宗錄亦載天奇寂在弘治間二書皆實錄也夫自弘治戊午至嘉靖辛亥計五十有四年也豈已死五十四年之天奇尚能付邵武無聞之法乎今霽崙明知天奇示寂在弘治戊午焉有不知邵武無聞拈香遙嗣者乎故於傳中削去降生出家秉具參師受囑之年甲但曰十七出家二十受具而已天奇錄刻在弘治元年行世二百餘年又焉有不知在世忘世破情情破為延安無聞之機緣法偈乎今但暗偷其機緣而法偈不敢顯然全露但竊其意輕輕點過曰以偈印之而已鏟其踪埋其跡可謂偷天賣日之手叚也然則邵武無聞不但受囑之年相隔五十四載即生正德甲戌去弘治戊午亦相隔十有七年矣天奇死後十七年邵武無聞始生據此則邵武無聞非天奇之嗣明矣十餘年前余曾述六無聞事跡敬問諸方期為考正不意霽崙依舊剽竊成章以三無聞混合為一無聞以之上嗣天奇下出笑巖天奇有三子可也笑巖有三父豈不令天下人噴飯天笠珍禪師辨救無聞曰我南嶽三十一葉無聞聰祖不知何處無聞也又以寶藏東明兩代世次合於其中可謂舉一而兩得參天奇機緣至心物俱忘時如何聰云華山高突太行峨啐元來是延安無聞也又笑巖寶祖再參聰祖問人人有箇本來父母子之父母今在何處寶云一火焚之云云笑巖參者是關子嶺無聞莫冒認延安無聞為笑巖爺老子好後磬山師翁命先師輩作曹溪下三十四世源流頌序有金陵城畔釣得錦鱗此言天奇參峯明瑄於金陵高峯寺關子嶺頭撥開紅燄此言笑巖參關子嶺無聞又何得冒認延安無聞為笑巖之師乎隻履踢出親薦大機之用此言龍池參笑巖之事驢鳴驚起洞明大用之機此言磬山悟由自南嶽至我師翁三十四世祖祖授受遞代皆有機緣明如指掌我也知汝偷延安無聞之機緣作關嶺無聞之機緣明如指掌任爾徧搜諸無聞機緣法語抖亂焉能混我關嶺聰祖之機緣出處乎將謂笑巖之師別有一無聞元來依舊是關嶺無聞邪祖宗有來歷終是有來歷無來歷終是無來歷如興化之於臨濟雪巖之於無準何妨遙嗣蓋人真法真明聰之於天奇本是遙嗣今偷他人機緣作面稟親承殊不知欲親而反疎也吾因見著述家紀載不一故述六無聞一事請質諸方明眼乞為考究畢竟誰為天奇之嗣笑巖之師不意天笠依舊偷延安無聞之機緣為關嶺無聞之機緣以為親承於天奇引上一路野狐精作證據且大言誇張謂我祖祖授受皆有機緣其不怕人羞恥一至於此寶華忍禪師辨無聞夢說錄曰丁丑冬不肖省先師於天童偶見無聞聰祖夢說錄一冊即疑其偽乃白先師云此錄說法庸常機緣沾滯必非聰祖之語觀聰祖接笑巖機緣不忝從上作略此中接查祖恩并印證之說何霄壤也且內有讖語四句云此法兩人真可受次君獨泛月池心密藏藏密誰能解一日木頭顛倒生此以月心讖笑巖真可讖達觀而密藏乃達公之徒也其說尤為背謬達觀可公道風德望隆重一時其無師承一事海內誰不共喻所刻紫柏集共十五卷於中並無以誰為師之說憨山清公與達公生平最為莫逆其作塔銘有云予以師之見地足可遠追臨濟上接大慧之風以前無師派未敢妄推等語明明可考更述其參方事實有過匡山并遊五臺參空巖老宿機緣及參徧融至參笑巖寶翁其機緣雖未詳悉亦云知識笑巖法主暹理諸大老師皆及門曾未有參無聞之說何從得此妄讖先師云從上嫡派共少五祖語錄老僧自住金粟即徧索諸方漸得二三皆據原刻重付諸梓惟此錄乃抄稿近得之姑蘇查氏老僧亦未細閱但求而得即刻之耳今既若此從今止刷即命封版嗣後未知如何而當時已止近日三峯會下有僧樂其讖語可配全不顧真可之說為偽惟取月心密藏藏密字眼自笑巖配下直配其師集為五世法談已為短見又有呵之者著正訛說依然認其讖語為實將真可密藏一一配去獨不許藏密二字為三峯於密藏公之配註為隱語而奪之種種呵罵其暗短尤甚山僧歎笑不已乃發天奇瑞翁焭絕集考之是集刻於弘治元年歲次戊申無聞參天奇機緣已刻於中矣若據夢說錄無聞傳中所載生於正德九年歲次甲戌是刻焭絕集後二十七年無聞方生又據夢說錄無聞傳乃三十三歲參天奇機緣與焭絕集同則焭絕集中無聞參天奇機緣於夢說錄為六十年前事矣豈六十年後又有一天奇又有一無聞師號既同徒號亦同相見機緣又同若是耶又發月心寶翁笑巖集考之笑巖生於正德七年歲次壬申則長於夢說錄之無聞兩年也笑巖二十七歲歲次戊戌季秋已受關子嶺無聞之印明年二月辭入終南若據夢說錄傳中戊戌己亥無聞只廿五六歲正參學時如所謂五六年不言不笑如癡如呆之日尚未參天奇在豈無聞尚未參師尚未發悟尚未住關子嶺已先有囑付笑巖之事耶天奇乃無聞之師也夢說錄既以天奇為師考之焭絕集天奇無此夢說錄之徒矣月心乃無聞之徒也夢說錄亦以月心為徒考之笑巖集月心無此夢說錄之師矣夢說錄之為偽造無疑矣總不過查氏之子專為揑箇一日木頭顛倒生之句讖為查氏屬在己身以渠為先聖所讖之人足以取重當時流芳後世故偽造此錄此讖以成其計也大凡世間讖語乃讖未然之事查氏徒知隆慶六年乃達觀三十歲時正在參方名猶未著故揑無聞讖語之讖作渠一日木頭顛倒生之根據不知隆慶六年笑巖已六十一歲行道二十四年付法弟子亦多人矣此時何用方讖且聲望重於南北所以達憨二公北遊皆趨及門下但未承嗣耳據笑巖集載濟庵與無聞同參嘉靖十五六年歲次丙申丁酉時笑巖參濟庵敘見無聞事庵云我與那老兄相別將四十年據是則同參時約二三十歲相別四十年至此時無聞已六七十歲矣若隆慶壬申無聞猶未去世亦合百餘歲矣夢說錄傳無聞生於正德甲戌至隆慶壬申乃五十九歲者不過約人間五六十壽算來就達觀參學時以造讖語不知有焭絕笑巖二集事實之可考故背謬如此耳又據錄中隆慶壬申無聞扭查祖恩鼻而悟悟後立為印可查祖恩即集夢說錄則此錄乃查氏之家傳手筆矣又據正訛說云查氏親述某於某年販馬陝西抵終南山下遇一老人龐眉皓首問答間頓開心悟將別老人手授聰禪師頂相拄杖及語錄數篇指讖偈示某云此一日木頭顛倒生明明讖在居士查姓無疑矣老僧即密藏也如是則此夢說錄查氏似乎前所未聞今始得見查祖恩必今查丹壑之祖父祖父家傳手筆數十年來不聞不見今反得於密藏之手是何說耶大都千妝萬點要做箇出乎不意鼓惑愚盲掩其揑造不知愈粧愈點愈見漏逗且祖受無聞之印孫受無聞之讖可謂世襲祖師如斯讖記不忝南嶽馬祖之事不知當何如光揚祖道方為合轍今不過一泯泯流俗之子則無聞亦安所用此讖耶查氏偽造法語虛揑悟門假粧祖讖欺世盜名地獄之罪無所逃矣若配讖者與正訛者既無擇法之眼辨語句之瑕瑜又無鑑事之明考讖傳之真偽而如夢如醉受俗漢之欺認空華為實一欲攀為己有一欲奪諸他人僅可供一長笑第聰祖一案乃千古法脈所係是以山僧不敢坐視其盜襲而為之直剖云寶華謂焭絕集刻於弘治元年無聞參天奇機緣已刻於中不考為延安無聞之機緣夢說錄偷來作光澤無聞之機緣也又謂考之焭絕集天奇無此夢說錄之徒考之笑巖集笑巖無此夢說錄之師然則今日為臨濟正傳上嗣天奇下出笑巖畢竟為誰耶又謂夢說錄係查氏偽造夫偽者對真而言今無一字之真遽指查氏偽造查氏未必心服如上所述諸書偏不嫌其偽造概以夢說錄之無聞為源流正傳之祖抑又何耶石源雲禪師闢妄說後附較訛二篇其一曰雲據偶筆載明正德間有無聞明聰禪師姓奚氏邵武光澤人此夢說錄中無聞也年十九隨父宦遊道經真定父因盜故感絕世緣投三河南巖寶鑑花園禮曉庵曙公為師夢說錄中無此說但云生正德九年三歲喪父次年母亡母舅惡其命孤苦乃送於且隱庵念初禪師出家此二說不同之一曙示以萬法歸一話令其參究服勤五載往伏牛參月天同眾打火七有省期畢與大拙盛庵輩為友往峨嵋禮普賢感異瑞留二載一夜因巖石隕崩頓起疑情特造西禪途逢舊友同往參秋林舉大通智勝佛十劫坐道場話即力參數載一日立廊廡間聞馬嘶始得脫然乃述數偈其略曰二十年來錯用工奔馳南北與西東忽然觸破娘生鼻積嶽堆山當下空呈林林扯碎擲之怒目視曰萬法歸一畢竟一歸何處師豎拳曰總在者裏轉身便出林深喜尋書臨濟二十四代源流付師參大通智勝話聞馬嘶大悟皆夢說錄中無聞之事但夢說錄中敘事與此迥異此二說不同之二明年返寶鑑掃曉庵塔眾為擁遮遂開法於寶鑑次遷開封之松竹坐三夏後遷乾明晚移隨州龍泉住隨州龍泉即夢說錄中之無聞也却無許多遷徙此二說不同之三一日忽遁去越二年復歸此又夢說錄中無聞之事於正德庚午二月初旬入寂至壬申七月初二移龕葬於庵右壽五十九夢說錄無聞全身塔於寺右壽五十九與此說同但彼謂生正德九年甲戌此謂死正德五年庚午二說不同之四南宗敘曰臨濟之道二十一傳至天界俊出隆恩悟悟傳西禪瑞我和尚派出西禪秋林入室弟子此實錄也夢說錄中無聞有客牕夜話一篇自敘臨濟至高峯妙十有八傳妙出中峯本本出千巖長長出萬峯蔚蔚出海舟慈慈出寶峯瑄瑄出天奇瑞臨濟一脈不絕如線至我聰矣則為雪巖欽九世孫明矣此敘為斷橋倫八世孫此二說不同之五校訛曰按長曆攷天奇瑞入寂五十五年後無聞聰方出世匡徒緣天奇聯芳偈載號無聞聰者三人西禪瑞下號無聞聰者二人前鐵山下號無聞聰者一人遂以明聰作正聰直改無聞為絕學上承天奇為師下以笑巖為子此訛之所由起也然西禪下之明聰係光澤奚氏子天奇下之正聰係館陶東倉人一在福建一在山東字與地不同世代亦不同正聰下有冒認若干人具眼者不得其人自祖燈正宗至嚴統以下暨諸家源流等皆以訛傳訛惟南澗箬庵和尚續燈存稿知天下後世眼不盡瞎於明聰示化年號上刪正德兩字謬以庚午作壬申刪正德正欲以圖蓋其訛也今寶積錄硬將入寂年月一併削去是何心行蓋因笑巖寶係正德壬申十二月望日誕生故也嗟乎抑知明聰入寂之年笑巖尚未生哉如上諸書有以兩無聞混合為一無聞有以三無聞混合為一無聞有以四無聞混合為一無聞以之上嗣天奇下出笑巖是皆訛書誠非信史然細考館陶絕學臨潼無聞延安無聞雖皆天奇之嗣實非笑巖之師而光澤無聞的係笑巖之師確非天奇之嗣何以明之按正宗錄載光澤無聞生正德九年十七歲剃度二十受戒三十三參天奇服勤五載始受付囑當三十八歲是在嘉靖三十年天奇示寂在弘治十一年至嘉靖三十年計五十有四年豈已死五十四年之天奇尚乃付光澤無聞之法乎則光澤無聞非天奇之嗣明矣何謂的係笑巖之師夫住關子嶺者光澤無聞也據笑巖行實自敘初見關子嶺無聞有省次依襄陽大覺而關嶺無聞嘗有書與大覺欲覺警策笑巖又以書寄勉笑巖二書俱刻夢說錄中未幾笑巖再見關嶺無聞始受記莂况笑巖集中有舉僧問關嶺無聞佛降誕及本來面目兩則機緣與夢說錄中所載相同且著語拈之代之發明其旨據此則關嶺無聞的係笑巖之師明矣寶華謂關嶺無聞不但非天奇之嗣亦非笑巖之師不無其疑今雲公又謂關嶺無聞乃係斷橋後裔其疑愈甚故述以請問海內高明按杭州報先寺亦有一無聞諱道聰寺中現供有像有牌位寺前有塔先年濟下諸師多至報先掃塔認為即源流中之祖又雲棲稽古略中亦有一無聞諱思聰洎儲公所祖玉泉明聰與前四人共七無聞一併述陳於此乞海內高明細心參考畢竟誰為天奇之嗣笑巖之師又安陸府有一無聞聰係元末人魯山縣亦有一無聞聰係明初人俱去天奇遠甚恐其誤認故表於此
