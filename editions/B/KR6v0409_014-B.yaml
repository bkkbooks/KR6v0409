body:
  text: 衡陽後學智楷惟直氏述濟宗世次備考之七龍池師承疑問閔晉公居士與帥石柱年丈書曰前承詢洞濟爭辯之故略言未盡今再書以詳之夫宗門之紊亂也久矣弟向年客問一篇曾將流弊一一指出中止有天皇天王之爭辯一語亦未深論近聞濟宗諸公將已廢之嚴統復行刻布噫何阿師之好事也已而平心衡論雖諸師之好事亦洞宗有以自取耳如王安石行青苗手實等新法一時正人君子不能虛公和衷共相商較利害一味恃氣攻擊以致激成元祐之禍此程子所以深惜也何者昔崇禎庚午天界浪師住夢筆金粟密師受請黃檗道過浦城浪師邀請入山未赴遂以書遺有傳聞座下輕以源流拂子濫付匪人等語當時密師道譽甚盛浪師何得遽以難入耳之言劈面輕唾乎所以密師門人費隱木陳二師次年有世譜之刻而浪師亦有喝粟之草繼而百丈瑞師三判雲巖元師正譜黃元公余集生各出書辯口舌玄黃二十餘年孰非浪師一激而成者哉至順治甲午巖統又出故青原嘯師有熄邪辯棲霞竺師有救蛾說以至三宜百愚諸師各有辯論久而不決遂至諍於公庭而廢其板今又二十餘年費隱已逝後有賢者似亦可以已矣可已而不已非好事而何且弟觀其家可已而已者頗多如寶華朝師之指迷自白三峯漢師之五宗救當日父子兄弟橫戈亞戟今後人俱將原本汰削大半費隱女子入定等頌其語錄俱自刪落何故於嚴統一書曉曉不少休耶豈在自家者可已在人者必不可已耶即不可已不過移雲門法眼二宗歸於南嶽謗顯聖壽昌二枝為未詳法嗣耳但弟平心衡論今日之濟宗已詳法嗣昔日之濟宗亦可謂之未詳法嗣也何以言之如興化存獎之嗣臨濟今諸師少祖也臨濟存日卻未付興化取興化拈香全語推之有無自見拈香語曰此一炷香奉為三聖師兄三聖為我太孤便合承嗣大覺大覺為我大賒我在三聖處會得賓主句若不遇大覺師兄洎乎誤卻我平生我於大覺虛喫棒見得臨濟先師在黃檗處喫棒的道理此一炷香供養臨濟先師此興化拈香之全語也後諸錄則改云此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師中間略去便合承嗣一叚此作者回互妙法以後人眼睛可瞞也嵯乎瞞人即瞞己瞞己即瞞從上佛祖矣要作佛祖兒孫豈可自瞞以瞞人人亦誰肯受其瞞哉據便合承嗣大覺大覺為我太賒我在三聖處會得賓主句若不遇大覺師兄洎乎誤卻我平生則興化徹於大覺棒下可知矣又云我在三聖處會得賓主句則其在臨濟處遠之又遠可知矣末後直云此一炷香供養臨濟先師是孤既不可賒又不願祇於此棒見彼棒的道理遂合承嗣有過乎無過乎可一言而決何從前辯論者第知就事論事不知根究到此豈以興化而遂不敢落筆乎見義不為無勇甚矣或以興化侍臨濟巾缾機緣數則現在故不妨如此拈出何以在密師侍寮如古雪師維那如元白師與興化同一模子諸師反一筆抹殺者何也弟曾見莽丘黃介子作密師塔銘內云已付法者五峯學等一十二人印可未付法者元白可等一十二人今密師門人一手握定除伊等一十二人外盡行抹殺彼豈不知真人難得叢林中培養一二十年猶不見有一箇半箇乃肯峻拒若是其心苗隱隱無非要其人承嗣於己耳如翠巖玉浪已受古師之付拈香上堂刻有語錄矣木師攘而付之如黃龍冰鑑拈香三峯及往掃塔諸門人不納必逼向玄牧處受拂始無議論使大覺同此心行待興化拈香乃云還我臨濟先師拂子來若云我於師處喫棒見得先師喫棒的道理豈不令人一笑噴飯乎由此言之此棒見得彼棒的道理便合承嗣語風雪師覩古雲門三字而悟何獨不許拈雲門香乎不特此也笑巖門下聯芳偈六人幻師不在其列笑巖語錄亦無幻師機緣今日子孫繩繩自命正傳設有向此處下一椎者不妨借抹人之筆以相抹乎總之浪師濫付匪人之書出之太蚤若到二十年後試問密師門人所付曾免得此圈圚否或謂濟宗如是洞宗遂無以上語病乎余應之曰洞宗此病正自不少今因濟宗諸師多事好於詰人故針砭之若人而興化拂子是甚廁籌能為重幾何哉倘諸師肯自虛心熟讀我客問一篇宗門庶乎有救不然任他名滿天下尊推大老語錄攢花簇錦汗牛充棟但向道冶庵者裏未許你𨁝跳在暑中無事草書呈教彼輩見之必云此為洞宗樹幟者耳自有一番扭揑藏頭露尾指東畫西出語抵搪弟不管樹幟不樹幟惟要他將臨濟於興化有拂子無拂子一語便見瓦解冰消矣先聖云君子有諸己而后求諸人無諸己而后非諸人拽好事阿師鼻頭且三復之山足斧禪師南嶽單傳表後敘辯曰歐陽公曰事信言文乃能表見於後世余讀月函潛公南嶽單傳表敘曰我臨濟氏承南嶽之明命兼統五宗於諸宗獨尊此事不信言不文不獨不能表見於後世且徒增是非於今日也達磨大師傳佛心印至曹溪派而為二一青原二南嶽青原出雲門法眼曹洞三宗南嶽出溈仰臨濟二宗此二派五宗大振南天何得黜四宗而獨尊臨濟且臨濟去南嶽五代得黃檗禪板不傳有三又奚從而得明命者歟所謂事不信言不文不得不深為之辯也三不傳者唐懿宗咸通八年臨濟示寂興化即為三聖首座尚未發悟為大覺監院始徹至後唐莊宗時乃拈其香曰三聖太孤大覺太賒不如供養臨濟先師夫不如二字當源流可乎此臨濟不傳者一也月云臨濟到風穴即止念法華是仰山再來此臨濟統溈仰宗余曰再生父母豈可統乎此臨濟不傳者二也幻有禪師遙嗣笑巖而笑巖南北二集並無幻有二字此臨濟不傳者三也有此三端反統他宗以自尊者是遙嗣之不善耳月云睦州為黃檗首座臨濟雲門皆發悟於睦州兩人同步此臨濟統雲門宗余曰既是同步臨濟能統雲門而雲門獨不可統臨濟乎况雲門法眼皆青原下大振雪峯玄沙之道者執月公之見比類發明則雲門可統臨濟而法眼亦可統臨濟矣月云汾陽唯喜曹洞浮山契機大陽此臨濟統曹洞宗余曰兩人為濟下客而歸信曹洞則曹洞統臨濟矣而欲執此以統能統者得非顛倒紊亂乎夫初祖西來破我見之固唱教外之傳此正灑時雨以救枯稿吹涼飈以解炎熱五燈并照萬國同春如臨濟三玄洞山五位法眼六相雲門一字關溈仰九十六種圓相雖門庭有殊其指歸不二謂五宗為一花所統則可謂四宗為臨濟所統則不可而云於諸宗獨尊非事不信言不文徒增是非於今日也耶此皆不參活句唯執我見之病月公明人也如參活句則古今一世塵剎一界黜四宗以尊臨濟何如尊四宗以尊臨濟之為愈乎月公以為然否又曰笑巖寶所付六人聯芳敘不肖上承迦葉六十三世之元祖下繼曹溪三十一葉之真孫又門人三際通敘師北集云師得絕學老人不傳之旨望臨濟二十六代之祖而弗專臨濟之稱唯曰曹溪正脈但所付靈谷芝高庵傑正宗悟天常經三際通素庵志六人無傳禹門遙嗣得剃度之子曰天童悟悟稱曹溪三十三世依此望臨濟二十八代之祖無議矣傑宗元禪師有偈數首其略曰偏廢偏訛說正傳三千里外問機緣買他一頂蕭山笠蓋覆髑髏不見天又曰笑巖六首聯芳偈南北集中千古傳若問龍池第幾位併無名字及機緣鏡愚慧禪師據實錄其略曰巖統謂遙嗣無面稟遠契非當機意難並列試問容公誰非面稟當機者設有而不許入則請遠刪興化近削龍池勘定本支方名嚴統按笑巖聯芳六偈僅付六人六人之外不聞也忞公禪燈世譜於六人之外增收幻有幻也二人聶公續指月錄又增收幻有幻也憨山三人俱不知何所據而然也然則幻也昔蒙忞公收入世譜近又出摘亂說以摘之憨山初蒙聶公收入續錄近又剗而去之竊思三公同一模子幻也可摘憨山可剗幻有豈有獨存之理此所以來諸山之議論也宜矣今幻有後裔安其議任其論不見有出一言以加辯者不審是拈香遙嗣理難加辯耶為復是不采無窮耶不無其疑故述以請問海內高明阿難尊者投佛出家與迦葉尊者兄弟也佛敕附貳傳化故阿難嗣法不之佛而之迦葉蓋遵佛敕也亦重其法也石頭投六祖出家與青原兄弟也祖命尋思去故石頭嗣法不之祖而之青原蓋遵祖命也亦重其法也臨濟雖無敕命而興化能追阿難石頭之風瓣香為大覺拈出豈不名正言順不之大覺而之臨濟豈非私啟法門亂階於是效顰如雪巖明聰幻有古雪輩相繼而出沿襲成風是等攀高之志太過重法之心不及也閔公論天童門人一手握定云者似是實非何也若不握定則濫觴之風何所砥止然則但握定於今人而不握定於古人握定於他人而不握定於本宗猶之乎不握定也或曰興化之遙嗣臨濟雪巖之遙嗣無準明聰之遙嗣天奇且置勿論如幻有之嗣笑巖有契悟機緣笑巖付有斗笠可謂授受有據何謂拈香遙嗣耶曰幻有雖有機緣載幻有錄中笑巖錄中絕無一字可據如古雪輩十餘人於天童誰無一兩則契悟機緣彼十二人一手握定不容一人插足籌室雖木陳忞公間嘗代付古雪而費隱容公責以代父生子輒驅而去之則法門公論未嘗泯也彼曇芝等不幸早死藉使俱在又豈容門外之遊人作入室之真子乎又聯芳六偈與一斗笠若為親疎况笑巖錄中絕無付斗笠之說曇芝等亦無代付之舉而幻有嗣笑巖終難免諸山之議論所以容公嚴統曰統屬道脈攸關豈容纖毫假借自非考訂精嚴將使狐蹤彌布唯是當機契證親承記莂方譜傳燈此道統濫觴不可不防故忞公曰汰虛承存實繼凜乎若峻夷夏之防者此之謂也凡操觚家不可不師之慎之斟之酌之昔古塔主拈香雲門舊錄收入雲門法嗣之末迄今五百餘年矣今霽崙作全書列於未詳論道統不可道不嚴也於法門不可道不公也原其意亦救弊匡時而發也法門際此駁雜之秋若不秉公持正存實汰虛則道統之濫何以砥止邇來有法璽一枝盛於江西謂來自笑巖所以別機清公出驅偽論以驅之吹萬一枝盛於四川謂源出大慧省巖公出書以闢之又有收達觀可嗣無聞聰忞公出閑先錄以閑之是皆出乎秉公持正存實汰虛之心之所發也然達觀吹萬法璽且置勿論而幻有之嗣笑巖法門公論終難自免所以慧公曰遙嗣無面命遠契非當機意難並列則請遠刪興化近削龍池勘定本支方名嚴統妙乎忞公曰天下有道守在四夷嚴外不嚴內猶之乎不嚴也可謂至言也可見天下之公論必不能無也今為霽崙計當預與興化雪巖明聰幻有四公留一退步地可也不然異日有如霽崙者起修明僧史遵霽崙之條例列四公於未詳未嘗不可何也蓋道統不可不嚴也虛承不可不汰也不然則狐蹤彌布自不能免也剪蔓說往讀顯正說見天笠珍濟水洸二禪師辯從上源流良屬苦心第釋聯芳偈及敘則與笑巖意相左辛酉春余以書及備考寄覽珍公隨即批答復出普說稿寄白巖老人老人即其普說逐叚批之後獲普說刻本不惟議論匪公而又虛妄過甚然在明眼諒不為其所惑第初機晚進不免受其鼓惑以致害是亂真不分曲直故余不得不辯之也其論讖諱再參諸公案老人既有批語刻行茲不贅但即其虛妄處略摘數則質諸高明孰是孰非聽其公論古今聖賢立言行事誠篤不妄以不妄故則其言堪為百世師而其行堪為天下法若夫言乃害理行乃悖倫此直名教中德之賊也非所謂聖賢也吾宗自拈花一脈傳至曹溪析為二支二支倫序古有定典故師資契悟機緣前青原後南嶽者定自六祖壇經非外錄也祖殿配享位次左青原右南嶽者定自歷朝敕建非一日也曹溪有唐誌宋誌通誌首青原次南嶽者定自前賢大筆非野史也傳燈錄正宗記兄青原弟南嶽者定自名宿親手非妄作也正珍公所謂宋景德年間道原統集從上佛祖以及五宗諸禪師世系相承機緣出處法語偈頌彙成一書謂之景德傳燈錄然青原南嶽世系相承機緣出處先後位次莫不昭著於傳燈又何責燈統之不合乎且又謬引神秀盧能首座行者以比譬青原南嶽首座侍者之優劣噫珍公失言甚矣夫六祖參五祖時雖為行者其悟處深得其髓故五祖直以衣鉢付之定為六祖而神秀雖為首座當其呈偈之日盧行者謂其為門外漢五祖所以不為印可以悟處有深淺故也至若青原參六祖以聖諦不為一語深器有若二祖不言少林謂之得髓遂令首眾旋命分化故名其山曰七祖山名其塔曰七祖塔豈以得髓之七祖可同門外漢類而語之耶神秀雖首眾黃梅實未穩當所以有南頓北漸之分珍公不分頓漸淺深引譬致辯其謬可勝言哉且燈統紀青原南嶽先後者一以二老參祖機緣契悟受囑有先有後一遵六祖壇經祖殿位次及通誌傳燈諸書非無據而私臆者也夫傳燈為宗門首創之書經聖主賢臣較賜入藏為萬世不易之典嗣後雖廣續聯普相繼而出其條分派列皆遵傳燈未有僭逾私尊之病余考虎丘隆生長出家參訪契悟受囑開法示寂皆在玅喜杲之前大川為妙喜四世孫所以擅改從上五燈為會元列南嶽於青原之前者以私尊己祖為妙喜於虎丘前之張本誠為開後人僭逾私尊亂階之漸天童悟生長出家參訪契悟受囑開法示寂皆在磬山修之前故龍池碑及續略纘續所列二老炳若星日存稿一旦列磬山於天童之前者誠僭逾私尊亂階之終也此皆紊倫悖理在名教有所不容於法門可容乎珍公引會元立論以責燈統無乃黨存稿紊倫悖理之書反謂白巖違佛旨敗名教妄引平侍者以責其過飾其非此在珍公可謂用心極矣殊不知違佛旨敗名教適足以自首其罪也公既歷引傳燈正宗致辯豈有不知二書列青原南嶽之先後耶二書有合其偏私者歷引以濟其臆說有敘其倫理者便諱而置之且又痛抑燈統私黨存稿豈善知識之設心當如此耶傳燈錄正宗記皆列興化於三聖大覺之後正珍公所謂宋仁廟時名宿所集之書也其紀從上世系相承機緣一出一處載在龍藏炳如日星燈統列興化於三聖大覺後者蓋依傳燈正宗二書也至謂透脫重關實得三聖大覺力出世香拈臨濟未必即無內怍者蓋借為今時趨炎棄涼者針砭之不見幻也認笑巖為師者所以摘亂說出矣法璽認笑巖為祖者所以驅偽論行矣然此輩妄認人為祖父其驅之摘之宜矣不可謂非匡時救弊之言也然余更有說焉夫曇芝輩六人為旁出者尚有機緣法偈載之本師集中彼稱為正傳者而本師集中何絕無一機緣法偈之載耶且又駕尊於曇芝輩六人之上殊乖倫理今人於己所出之祖父則尊之飾之於人所出之祖父則驅之摘之其嚴於外不嚴於內責於人不責於己猶之夫不嚴也不責也今珍公憤憤然痛抑燈統且謂為不識向上行履此珍公端的不在救一興化而發蓋借興化鼻孔出氣救彼傳曹溪正脈者而發也於是廣引興化機語謂氣宇如王非得力於三聖大覺殊不知古之學者雖未透脫重關而機下峻利不可觸犯者不可枚舉如大慧未見圓悟時往往與人醻酢與奪非不可觀及見圓悟始得前後際斷其在虎丘閱華嚴打失布袋尚在見圓悟之後古人胸中有一分真疑去不盡終不自欺必到大休歇處始為參學事畢珍公謂興化久為臨濟侍者洛浦參濟時即在旁醻酢與奪可觀然興化與奪雖可觀及乎被臨濟再勘便死於棒下去不得抑又何耶又引興化訪雲居一問居二十年纔答得箇何必以形容雲居機鈍興化機利此又珍公之不究興化訪雲居在何時也當雲居初住靜三峯庵時感天人送供自以為得及被洞山呵責點破後天人送供且無門而興化訪雲居係初住三峯時雲居雖機語遲鈍終無鹵莽之失珍公引以抑揚逐塊之甚然以此鄙洞宗則隱峯五洩俱死機於石頭得不又當鄙濟宗乎又引興化在三聖首眾嘗云我向南方行脚一遭拄杖頭不曾撥著一箇會佛法底人珍公便謂氣宇如王殊不知後生輩開大口說大話往往有之如天平在西院時嘗云莫道會佛法覓箇舉話底人也無其氣宇為何如及乎被西院連下兩錯便見脚出興化雖在三聖處開大口說大話卻被三聖輕輕活埋在萬丈深坑猶自不知說甚氣宇如王及見大覺你一喝我一棒你再喝我再棒彼此便休去則臨濟一宗掃土盡矣如鹿門與楚闍黎相見彼此不知有你坐我立我坐你立或時即賓而主或時即主而賓或是賓主互換乃死死抱定一喝以為賓主句所以被廓侍者點罰興化如不得大覺法堂前再勘焉有今日之兒孫所以後來打同參機用手眼與未見大覺三聖之前天地懸殊謂興化不得三聖大覺力可乎珍公又謂興化要與天下作箇榜樣怪道後人有妄認笑巖為祖稱臨濟正宗者有自謂得曹溪正脈者豈不皆興化之榜樣也為珍公計莫若於文苑英華中表出八百年前興化塔碑謂臨濟在時晚年居興化寺東堂命獎公主席以見其面稟親承非拈香遙嗣豈不更為得也至謂臨濟得悟於大愚不合嗣黃檗雲門得悟於睦州不合嗣雪峯乃至投子得悟於浮山更不合嗣大陽珍公特借臨濟雲門開端以表出投子一以推尊興化一以鄙美洞濟似則似其如失實何臨濟雖得悟於大愚而大愚有命曰汝師黃檗非關我事及回檗處攔腮還掌一與一奪實可觀光及乎被檗曰行者引者風顛漢參堂去到者裏尤不知檗用處故有半夏上黃檗及行數里有疑乃曰此事不得艸艸再上黃檗始有禪板付囑之說則臨濟透脫末後重關實得黃檗力也雲門雖得悟於睦州亦稟州命指參雪峯及參峯時日臻玄奧觀其日臻玄奧則雲門透脫末後重關實得雪峯力也投子雖得悟於浮山然亦稟山命曰代吾續其宗風使浮山如黃龍棄寶峯而就石霜則投子又為大陽孫矣是以浮山以不昧見葉縣之初心故以身嗣之以不忘受大陽十載法乳深恩及躬稟遺命故命投子代續乃若興化嗣臨濟未審稟命何人珍公反責燈統蝮螫用心恨不能置興化於大覺下果使置化於覺下實法門千古慶幸所以近代如黃檗奇之承嗣福嚴容誰敢異議他如翠巖喆能下一輩或承嗣寶華忍或承嗣天界盛豈不名正言順嗣續尤得綿遠而瓣香乃要與天童悟拈出雖不忘久侍之恩其奈巫山不肯點頭何致有自家已開法之嗣子復流而為他家之末裔為諸方所惜此又一天下後世榜樣也又如天井新黃山據輩非未嘗不久侍天童至今秦不收漢不管隱隱然徒有半恩半恨悔之不及此亦天下後世榜樣也古云受恩深處便為家况興化深得大覺之力列為覺嗣於理未嘗不可抑可以為天下後世冒續者作一龜鑑燈統謂興化透脫末後重關實得大覺力而香拈臨濟未必內無所作此實據理而論非矯強也而珍公乃痛抑太甚且多方引譬曲護門庭乘其鋒以刺洞宗豈善知識之設心當如此耶笑巖寶禪師所付法嗣僅六人著有聯芳偈六首又自敘之具載本集其首付曇芝一偈及自敘誠恐後人昧其來源故於從上世次特為詳示余世次備考中又特為表出今珍公云聯芳偈汝世次中謂續略所無乃存稿揑出山僧教汝熟讀笑巖南北集汝知罪不可逭反以聯芳敘塞責余備考中何紙何行曾有此語珍公所以添出續略所無乃存稿揑出之語不過以之激怒同宗罪余為妄殊不知自妄也倍甚備考以萬峯普慈明瑄天奇祖孫四代授受法偈及天奇塔銘無聞客牕夜話笑巖聯芳敘曇芝偈廣通序連絡述來一一伸明何單謂只以聯芳敘塞責耶雖余前書中單舉聯芳敘而論然亦引天童語廣通序伸明笑巖之意珍公非不知也珍公胸臆中唯生滅是懷人我是競只要曲護師說不肯折衷於人乃又肆出普說力爭強辯此等迷中倍人元不屑與辯第後賢不知曲直心志末免惑亂故不得不辯明耳古云一處真則一切處皆真一處不是則一切處皆不是余備考歷述十種祖訓所敘濟宗世次無往不合珍公但舉聯芳偈及敘二種曲辯於前復引先南澗語證之謂玩承繼二字便見夫世出世間辯訛釋誤看在何時曾因何事豈可承其謬言而移害正理先南澗見明末清初以來本宗本支紛紛然辯論海舟一案皆以續高峯七世之句消不去故指天奇為上承迦葉六十三世之元祖無聞為下繼曹溪三十一葉之真孫意謂寶藏東明兩代的在源流內海舟普慈出東明下以合續高峯七世之句此蓋當時未見翼善碑實不知東明下自有嫡嗣海舟永慈屬高峯七世孫也今翼善碑出顯見二海舟各有師承授受法偈世次之別而向之強以海舟普慈出東明下以合續高峯七世及元祖真孫之釋豈不皆謬釋矣珍公今見翼善碑不辯清普慈永慈兩家世次以班正無聞笑巖典型免致流為邪說偽書釐正普慈明瑄嫡祖免致黜為烏有先生而乃反執謬釋害是亂真謂元祖確指天奇真孫確指無聞從上亦確指無聞今將乃笑巖自謂謂將從上無聞之法付與曇芝嗟嗟如此迷中倍迷夢中作夢之夫雖佛出世亦無如之奈何然聯芳敘有上承下繼字眼聯芳偈有今將從上字眼故得父子兄弟胡穿亂鑿以濟其謬說若則萬峯付普慈偈普慈付明瑄偈明瑄付天奇偈與夫東明付永慈偈永慈付智瑄偈又如何解說天奇塔銘載法嗣為高峯第八代孫又如何解說無聞客牕夜話敘從上世次自高峯中峯千巖萬峯普慈明瑄天奇一脈敘來又如何解說廣通序直稱臨濟為笑巖二十六代之祖又如何解說此數種祖訓既謬釋不來則今將從上元祖真孫又如何謬釋得去更可笑者余備考引天童語伸明聯芳敘意且又明明指出係復劉道貞之書載原刻闢妄七書中是書係平陽忞公掌記室時親手記錄親筆作序出在崇禎六年流通徧海內迄今五十餘年有目者莫不皆覩珍公指余揑出天童密伯祖謂從迦葉歷我笑祖為六十三世是誤嗟乎余不知珍公果無目不覩耶抑故意誣余妄揑耶若果額堂無目當謙卑下氣求彼三尺童子指點一指點看豈可遽出謬說若覩而故意誣人為妄揑豈善知識之設心當如此耶濟宗二海舟一諱普慈一諱永慈二公之嗣一曰寶峯明瑄一曰玉峯智瑄今人易玉為寶謂智瑄亦號寶峯甚至以明瑄智瑄混為一寶峯瑄自此嫡庶莫分涇渭莫辨故余備考中詳述二公事蹟先後各別免致埋沒一代嫡祖有功濟宗非小且余明言永慈法嗣一百有四人智忍居首石碑內稱首嗣門人寶峯者乃智忍智忍諱也寶峯其智忍之號也石碑石坊木扁但曰寶峯並無瑄字珍公妄增一瑄字乃云據汝備考謂永慈石碑內原有首嗣門人寶峯瑄呵呵珍公畢竟離不得一瑄字苟離之便謬說不來公既認永慈下智瑄為祖何不辨清存稿不合以明瑄列永慈下又何不辨清正宗不合以明瑄智瑄並列永慈下更不合以天奇列智瑄下而乃妄增一瑄字誇張曰我東山二世諱號明驗臨濟正傳萬峯普慈明瑄天奇為公自出一脈嫡祖吾備考詳述本末不啻揭杲日於中天彼窺鞭影者早已追風千里公猶吠守枯椿不亦陋乎按石碑載永慈為開山第一世智清為第二世智瑄縱有住持當在智清之後况行實碑劄付碑重修翼善碑正公所謂高豎江浙者並無載及智瑄為東山二世也今指智瑄為二世以何憑據若據石碑無此二世之智瑄若據偽塔則又鐫智瑄為翼善第一代非二世也若據房僧破簏中檢出二百餘年前之敗紙此不過當年付智瑄之揭稿耳亦無所謂東山二世也嗟乎本宗碑記絕無所載之住持便妄揑出東山二世之智瑄以修飾之他家塔記鑿鑿可據之年代便妄揑出紹熙年間之雪巖以塗訛之豈善知識之設心當如此耶無聞一案諸書紀載不一故余備考述呈兩宗明眼共為考正復以書寄珍公珍公隨即答書且責余打諢其說不得不再以書復之乃逐一點出曰㷀絕集夢說錄笑巖集皆公祖宗之書也東明祖燈錄係公叔父之書也五宗救係公堂兄之書也闢妄救係公伯祖之書也迅雷集係公伯父之書也續燈存稿正宗語錄係公父兄之書也請將諸書對較以為何如謂余打諢可乎他人之書且置即據公父兄之書論之存稿首紀隨州關子嶺無聞絕學正聰此一號一諱以光澤無聞明聰別號絕學者與館陶絕學正聰者合紀為一人次紀邵武奚氏子乃至聞馬嘶大悟此一段係光澤無聞生緣出處悟由事蹟備載夢說錄中其參天奇機緣法偈明知屬延安無聞之事與光澤無聞全沒交涉故暗自刪去此存稿早自見其疑矣不待余疑之於今日也次紀上堂舉雲門對一說此係際公所述無根之談次紀僧問本來面目及佛降誕兩則機緣係光澤無聞之事一載之夢說錄一載之笑巖集末紀笑巖來參受光澤無聞記莂此存稿所紀以光澤無聞為祖下出笑巖再請觀正宗語錄雖認光澤無聞為祖敢問光澤無聞上嗣何人正宗明載光澤無聞得法之年去天奇示寂之日計五十餘年不審面稟親承耶遙嗣冒續耶謂祖祖相傳以至於今並無代續遙嗣之訛可乎珍公不細心考究乃肆出普說復伸救云我南嶽三十一葉無聞聰祖參天奇機緣至心物俱忘時如何聰云華山高突太行峨又笑巖寶祖再參聰祖問人人有箇本來父母子之父母今在何處寶云一火焚之後磬山師翁命先師輩作曹溪下三十四世源流頌序有金陵城畔釣得錦鱗關子嶺頭撥開紅燄隻履踢翻親薦大機之用驢鳴驚起洞明大用之機自南嶽至我師翁三十四世祖祖授受遞代皆有機緣明如指掌任爾徧諸無聞機緣法語抖亂焉能混我關嶺無聞聰祖之機緣出處呵呵珍公可謂狡猾自謂能暗混二無聞為一無聞以為己祖而稟親承之慶殊不知正公所謂行愈急而迹愈多矣據公所引住關子嶺屬笑巖所參問巖本來父母者豈非光澤無聞乎而參天奇機緣心物俱忘豈非延安無聞之機緣乎盜延安無聞機緣栽為光澤無聞事混二無聞為一無聞以為上嗣天奇下出笑巖之祖復引先南澗序以文其遙嗣冒續之弊將謂瞞卻天下人不知反貽笑天下人也殊不知延安無聞此則機緣載天奇㷀絕集中刻在弘治元年至天啟六年老天童住金粟時重梓流通徧天下萬目共覩盜為光澤無聞機緣可乎珍公驀地盜來箇我南嶽三十一葉無聞聰祖參天奇不妨令人疑著不知是何處之無聞為復是臨潼無聞耶延安無聞耶光澤無聞耶抑亦報先無聞耶適以證龜成鼈卻又自露出箇真贓來乃云任爾徧諸無聞焉能混我關嶺無聞聰啐元來參天奇者乃延安無聞也住關嶺者乃光澤無聞也呵呵看你者癡蠢漢何能作善竊耶按正宗語錄明載天奇弘治間示寂明載關嶺無聞正德九年生十七剃度二十受戒三十三參天奇服勤五載始受付囑當三十八歲是在嘉靖三十年也敢問珍公弘治間至嘉靖三十年已歷五十餘年矣以已死五十餘年之天奇付關嶺無聞之法且道是面稟親承耶遙嗣冒續耶自知上下曠遠莫接乃暗偷六十四年前延安無聞之機緣妄栽為六十四年後關嶺無聞之事謂之祖祖授受代有機緣明如指掌此真明如指掌也既稱祖師後裔自有一言半句流通古今此公語也又何必偷延安無聞機緣栽為關嶺無聞事耶偷他人之機緣為己祖之事實是猶偷張三烏紗戴李四頭上正公所謂打諢其說而反誇張謂我祖機緣從胸襟中流出蓋天蓋地貫古貫今得不絕倒天下耶於本宗本祖明知存稿正宗諸書有訛便文飾之曰吾宗不必藉人筆墨世次灼然見洞宗諸祖代有碑銘高豎祖庭世次昭著皆名公鉅卿所撰便痛抑之曰文人筆墨何足為憑豈善知識之設心當如此耶據實說夫古今大小之事莫不有名有實愚者執名昧實唯智者能推實以擴名發而為論是為公論也木陳忞公唯知浮山為南嶽後裔投子從浮山口生遂謂南嶽真血裔大造於洞宗此蓋泥於名而昧於實也不見大慧宗門武庫云瑯琊廣照公安圓鑑居眾時汾陽禪師令其探明安宗旨明安嘗曰興洞上一宗非遠即覺也又不見黃山谷新豐吟後跋謂浮山受大陽十載深恩乎古人參師必期登堂入奧而後已浮山先受葉縣印可次依汾陽稟命探大陽宗旨因之深相契合依止十年不但登堂入奧且又發明宗旨比在葉縣汾陽處所得深淺可知矣葉縣法嗣雖有六七人皆先浮山化去浮山以葉縣無人故以身嗣之不忘其初心也命投子代己嗣大陽用醻十載法乳之恩也按忞公敦本錄所述浮山遠過大陽與玄語甚相契玄以皮履直裰示之遠曰某甲已自有師當持此衣履求人付之俾續洞上宗風如何玄遂付遠且授偈曰楊廣山前艸憑君待價焞異苗翻茂處深密固靈根後遠得投子青時出洞上宗旨示之青悉妙契遠遂付以大陽衣履曰代吾續洞上宗風據如此說浮山與大陽語甚相契甚相契非登堂入奧而何浮山不以濟上宗旨示投子唯以洞上宗旨示之悉皆妙契觀此不惟投子為青原真血裔則浮山亦實青原真血裔也投子雖未識面大陽實面稟親承於浮山浮山面稟親承於大陽授受源清非拈香遙嗣者比使浮山如黃龍棄寶峯而嗣石霜則投子又大陽之法孫矣且浮山付投子不曰吾代洞上續其宗風而曰代吾續洞上宗風則知投子嗣大陽猶浮山嗣大陽浮山非受大陽十載法乳深恩豈肯以己嗣嗣大陽乎既以己嗣代己嗣大陽用醻十載深恩理也謂之南嶽血裔大造洞宗豈非執名而昧實乎以致湘翁和尚云白巖恥邪解馬足幻成四宗之訛遂刪削讖記謂聖師傳道不傳讖木和尚憤氣竟遷怒於大陽投子夫興洞上宗旨大陽親付浮山衣偈親許接人代續實與從上師資授受之義同木和尚憤氣竟市恩於壽昌雲門市恩責望謂之肖小豈浮山當日所用心哉投子稟大陽記莂道行貫乾坤法蔭填海宇子孫蕃衍以至於今木和尚又憤氣竟舉韓厥立趙武故事妄祭告我投子青祖念念要塗沒洞上世系句句要塗沒洞上兒孫噫嘻木和尚膺世祖睿眷自喜風雲際會喜譚忠孝喜譚仁義喜讀仲尼春秋獨不思忠孝無惡行仁義無惡心春秋闡察著無惡怨於他家祖宗木和尚因白巖兩伸謙牧之辭憤氣吐其宿習所欲為而竟不自知開眼著賊也天地何以覆載日月何以照臨彼狡童亡命更取敦本錄中實言雲門壽昌與天童磬山唱道吳越上符達磨正等云云盡力翻改所謂讒人太甚投之天地日月眼見是糾是殛噫嘻可徵鑑也嗟乎今人只知浮山命投子代續洞宗不知浮山受大陽十載法乳深恩動輒引資辯端真可謂執名昧實之愚夫耳附俍亭挺禪師曹洞源流攷曰大陽玄禪師法嗣二十五人浮山遠禪師實當其一後以投子青禪師屬以自代者也浮山參葉縣省汾陽昭並蒙記莂又參大陽玄契合大陽以頂相衣履付之并授以偈偈曰楊廣山前艸憑君待價焞異苗翻茂處深密固靈根遠拜受在宋真宗天禧之間大陽纔七十餘法嗣二十五人林林鼎立僧寶傳謬云年八十餘歎無可以繼其法者因以皮履直裰寄遠公謬矣謬矣其曰憑君待價者實指遠公以遠公先受葉縣汾陽之囑故稱異苗并謂之曰潛眾十年即密固靈根之意當時法門大公浮山遠天衣懷并承葉縣印可而天衣更嗣雪竇故頂相衣履浮山受之非過也浮山隱居會聖巖著九帶一篇發明洞宗兼帶之旨以報大陽蓋洞宗貴在回互雲巖所稱挾帶挾路者乃是矣一佛正法眼帶謂如來正法眼藏付大迦葉是兼帶意二佛法藏帶謂阿難結集法藏是兼帶意三理貫帶四事貫帶謂石頭參同契云執事原是迷契理亦非悟是兼帶意五理事縱橫帶謂洞山綱要偈云理事俱不涉回照絕幽微是兼帶意六屈曲垂帶七妙叶兼帶謂雲巖寶鏡三昧云正中妙叶鼓唱雙舉曲垂方便為法檀度是兼帶意八金針雙鎖帶謂洞山綱要偈云金針雙鎖備叶路隱全該是兼帶意九平懷常實帶謂大陽三句平常無生句亦名平懷常實句是兼帶意即山堂淳以平懷常實表洞山語要者亦本此矣大陽旨訣先後畢備復於會聖巖中感青鷹之夢得投子青出宗旨示之投子默契於時天衣既歸雲門而葉縣省單弱止浮山尚在不得不歸葉縣故以大陽頂相衣履轉授投子謂之曰代吾續大陽宗風未嘗曰吾代大陽付汝蓋浮山遠實當二十五人之一特請投子自代耳投子契合既真勇於自信見浮山猶見大陽以身任之是也浮山更囑以偈偈曰須彌立太虛日月輔而轉羣峯漸倚他白雲方改變少林風起叢曹溪洞簾捲金鳳宿龍巢宸苔豈車碾曰少林曰曹溪曰洞簾從上相傳實在於此故古今稱曹洞耳鳳宿龍巢蓋引夾山洛浦自擬玉殿苔生天然尊貴夫豈推車碾足傷於觸犯者哉詳符天禧間雪竇大陽葉縣汾陽稱盛浮山親承兩宗面稟三老風徽卓卓華嚴孜五祖演並出其門華嚴明賓主句首主中賓次賓中主次主中主次賓中賓實承大陽遺旨五祖演親依浮山浮山既老復念汾陽無可報效更指演公往依白雲以承汾陽之後演受恩既深潛然出涕而去依白雲端嗣之汾陽一宗於是振起浮山真大聖賢以其身報葉縣以五祖報汾陽以投子報大陽當時三老並不虛付囑矣其後洞濟兩宗悉由浮山指授然則異苗翻茂處深密固靈根豈虛語哉浮山遠嗣法大陽親承授受後屬投子自代非寄也中華民國三十三年甲申八月普慧大藏經刊行會敬刊
