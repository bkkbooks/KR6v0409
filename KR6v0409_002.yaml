body:
  text: 衡陽後學智楷惟直氏述二支五宗來源考之二宋建溪宗永宗門統要集載龍潭因緣三則一曰青原下第三世澧州龍潭崇信禪師嗣天皇悟師未出家時為餅鋪住在寺前日常供餅十枚上天皇皇受已卻留一餅與之曰惠汝以蔭子孫師曰是某持來何返曰惠汝皇曰是汝持來復汝何咎師因有省遂投出家又曰師一日問天皇曰某自到來不蒙和尚指示心要云云又曰師問天皇從上相承底事如何皇曰不是明汝來處不得師曰這箇眼目幾人具得皇曰淺草易為長蘆宋寶鑑法應頌古聯珠集曰青原下第三世澧州龍潭崇信禪師嗣天皇道悟饋餅機緣載存誠録汾陽昭頌曰將去將來事不差龍潭固問勿交加後來多少爭脣吻春鳥喃喃罵落花白雲端頌曰十餅每將留一箇因思何謂蔭兒孫團團將去還將入不覺醍醐到頂門佛國白頌載存誠録無準範頌曰持來持去樣團團覆蔭兒孫義不寒何似當時休擘破渾崙留與後人看橫川珙頌曰受惠當思報將他一餅回出家緣法到當下得心灰又曰龍潭問天皇曰某自到來不蒙指示心要云云白雲端頌曰脫白投師貴苦辛擎茶問訊盡躬親無端再敘三年事笑倒街頭賣餅人月堂昌頌曰據款結案得失過半盡力擔當上船離岸無不指示汝擎茶行食處聖解凡情不過來軒軒頭角起風雷宋大慧宗杲正法眼藏曰天皇和尚問石頭離卻定慧以何法示人頭曰我者裏無奴婢離箇甚麼曰如何明得頭曰汝還撮得虛空麼曰與麼則不從今日去也頭曰未審汝早晚從那邊來曰某甲不是那邊人頭曰你早知汝來處曰和尚何得贓誣於人頭曰汝身見在曰雖然如是畢竟如何示於後人頭曰汝道阿誰是後人天皇從此有省又曰龍潭和尚問天皇某自到來不蒙和尚指示心要皇曰自汝到來吾未嘗不指示汝心要曰何處指示皇曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示汝心要龍潭佇思間皇曰見則直下便見擬思即差龍潭當下開悟乃復問如何保任皇曰任性逍遙隨緣放曠但盡凡心別無聖解元寶洲覺岸釋氏稽古略曰澧州龍潭崇信禪師渚宮人今荊湖北道荊門州家居荊州城東天皇寺巷禮道悟禪師出家既受具服勤左右領悟玄旨後詣澧陽龍潭棲止焉師嗣天皇道悟禪師悟嗣石頭遷禪師遷嗣青原思禪師思嗣六祖尊者信接弟子曰德山宣鑑明瞿汝稷指月録載德山示衆其略曰諸方浩浩地揑怪不休稱楊稱鄭道我是馬大師宗徒德山老漢且不是你羣隊人我見石頭和尚不識好惡老漢所以罵伊唐德山鑑禪師塔銘其略曰自曹溪至吉州思大師南嶽石頭荊州天皇澧州龍潭至先和尚諱宣鑑聞澧州有龍潭大師則石頭之二葉矣攝衣往焉既見喜而歎曰窮諸玄辨如一毫置於太虛云云受業小師文學撰右碑在寺東荊棘中苔蘚剝蝕字多漫滅武陵郡人楊鶴偕男嗣昌禮塔拂拭因録出廣其傳時萬曆四十三年乙卯春日是也百愚和尚彙輯德山語録季超居士序之其略曰余得德山塔銘因緣甚奇余偶讀談友夏文集內有喜楊修齡父子遊古德山一詩云松筠心影內古塔抱虛寂螭纏李唐碑茫茫夕陽歷龍潭大師號已被苔蘚食因緣合天資精神射蒼壁父念子眼光出奇相奪覓或用口吹雲或用手畫荻須臾成誦讀高音覆淅瀝寫寄數千字難矣初搜剔晝劙古今色氣與全山敵坐獲異文觀晴明落霹靂香風電空語何人節不擊深山舊法侶再來建幽績神僧向晦昧且止莫盡滌而詩中有香入其風電入其空二語復自注云此即銘中句也余方擬購全文適濟上一知識曰果有之吾曾見其稿於某禪師笥中直敘為石頭之三葉也余亟覓而梓之附於録後以決數百年未定之疑案與此集全録共稱一時快事云雲門道者後學淨超拜書宋守頤古尊宿語録載鼓山先興聖國師玄要廣集序曰自少室之花開六葉曹溪之胤布諸方爰出石頭號純金鋪蓋以格高調古言簡理幽厥後子孫行步闊大毫釐弗差則有先興聖國師嗣雪峯乃石頭下五葉也竹庵士圭書玄要廣集後曰鼓山和尚名神晏大梁人姓李氏衛州白鹿山受業得法於雪峯存和尚石頭第六世五代晉天福中示寂宋覺範洪石門文字禪載蘄州資福院逢禪師碑銘有序其略曰自達磨入中國授二祖心要而以衣為信故六世為之單傳至曹溪藏其衣故諸方得者輩出其魁壘絶類碩大光明有若衡山觀音廬陵青原者特為學者之所宗仰天下號二甘露門今逢禪師青原九世之嫡孫黃龍機公之高弟也黃龍機乃德山鑑三世孫又禾山寺記內曰妙湛大師法安為雪竇之後乃青原之遠裔云云妙湛嗣法雲秀秀嗣天衣懷懷嗣雪竇顯則湛為青原十三世宋道原傳燈録玄沙章末曰師應機接物僅三十祀致青原石頭之濬流逮今不絶轉導來際宋覺範洪僧寶傳玄沙備章末曰備狀短小然精神可掬閩帥王審知為內外護審知盡禮延至安國禪院衆盈七百石頭之宗至是遂中興之宋余靖曹溪法堂記其略曰大鑑以諸佛大法眼藏傳青原思思傳石頭遷如是展轉相傳至今長老緣師為十世矣緣師得大乘之要於漢東智門祚師初出世住南臺後被朝旨住曹溪六祖之道由是中興矣康定二年十二月日記師諱寶緣於宋仁宗明道二年奉旨住曹溪賜號慈濟大師建說法堂郡人余靖記又慈濟壽塔銘其略曰禪師名寶緣興元人遊方至隨州參智門祚禪師以心印心不煩機接遂為之嗣即雲門之嫡孫也師與雪竇顯為伯仲望龍潭七世望青原十世曹溪通志後跋有曰南嶽讓之開溈仰臨濟也青原思之開雲門法眼曹洞也唐欽山文邃禪師嗣洞山價初與巖頭雪峯同到德山乃問天皇也恁麼道龍潭也恁麼道未審德山作麼生道德曰汝試舉天皇龍潭道底看欽擬進語德便打欽曰是即是打我太煞宋眉州化禪師雲門二世僧問天皇也恁麼道龍潭也恁麼道未審和尚作麼生道化曰汝試道看宋金山寧禪師雲門六世僧問天皇也恁麼道龍潭也恁麼道未審和尚作麼生道寧曰手握白玉鞭驪珠盡擊碎禪林寶訓合注曰明教嵩青原下十世棲賢舜青原下十世圓通訥青原下十世大覺璉青原下十四世云云數公皆雲門後裔道至當不出真僞言至當不出是非智者不在是非真僞之內故能是非真僞之譬如迷人惑東為西智者因而指正若無迷人是非之言無所施矣按高僧傳傳燈録宗門統要聯珠頌古禪宗正脈正法眼藏洎五燈會元佛祖通載指月録九種大典籍所紀龍潭崇信之傳皆曰師本渚宮賣餅家子也初悟和尚為靈鑑潛請居天皇寺人莫之測師家於寺巷常日以十餅饋之天皇受食畢每留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何返遺我耶莫別有旨乎遂造而問焉皇曰是汝持來復汝何咎師聞之頗曉玄旨因投出家皇曰汝昔崇福善今信吾言可名崇信乃至問心要開悟云云此係父子親口親言問答機緣乃千古不磨之鐵案也據此則龍潭嗣天皇明甚德山龍潭之子也其示衆自道不是馬大師宗徒則龍潭嗣天皇明甚文學龍潭之孫也其撰德山塔銘直述自曹溪青原石頭天皇龍潭至先和尚諱宣鑑則龍潭嗣天皇明甚雪峯龍潭之孫也其對閩王自述從先德山石頭以來傳此祕密法門則龍潭嗣天皇明甚道原龍潭八世孫也其纂傳燈不必觀全傳但觀一題目曰行思禪師第二世南嶽石頭希遷禪師法嗣荊州天皇道悟禪師行思禪師第三世荊州天皇道悟禪師法嗣澧州龍潭崇信禪師何等顯明昭著則龍潭嗣天皇明甚明教龍潭八世孫也其述正宗記曰石頭希遷禪師法嗣凡二十一人一曰荊州天皇道悟者荊州天皇道悟禪師法嗣一人曰澧州龍潭崇信者則龍潭嗣天皇明甚又作原宗集序直序雲門雪峯德山龍潭上嗣天皇石頭青原曹溪以及達磨則龍潭嗣天皇明甚佛國龍潭十世孫也其頌饋餅因緣曰南嶽山頭見石頭則以公孫三代授受之事一頌頌出則龍潭嗣天皇明甚此皆龍潭自家一脈骨肉自敍其家譜炳如杲日有如此宗門之有頌古始於汾陽而汾陽白雲無準橫川月堂諸公頌饋餅心要公案燎如指掌則龍潭嗣天皇明甚覺範僧寶傳自序曹洞雲門法眼皆宗於石頭又文字禪敍逢禪師為青原九世妙湛為青原遠裔則龍潭嗣天皇明甚志磐佛祖統紀謂青原下出曹洞雲門法眼又謂石頭後派為三家五世而為洞山七世而為雲門九世而為法眼又謂德山為青原五世雪峯為青原六世雲門為青原七世羅漢為青原八世法眼為青原九世則龍潭嗣天皇明甚覺岸稽古略直述龍潭嗣天皇石頭青原六祖則龍潭嗣天皇明甚守頤古尊宿載鼓山晏為石頭下五葉則龍潭嗣天皇明甚士圭書玄要集後謂晏石頭第六世則龍潭嗣天皇明甚傳燈玄沙章末曰致青原石頭之濬流逮今不絶僧寶傳玄沙章末曰石頭之宗至是遂中興之則龍潭嗣天皇明甚曹溪志謂青原開雲門法眼曹洞三宗則龍潭嗣天皇明甚眉州金山兩則機緣且置欽山問天皇龍潭也恁麼道之話蓋德山望天皇中間止隔龍潭一代欽山親及德山之門備知其來源之事故有此問則龍潭嗣天皇明甚寶訓直注明教諸公為青原下十世則龍潭嗣天皇明甚此皆濟上知識海內名宿所紀龍潭出自天皇之事明之又明有如此長沙侯延慶僧寶傳引直敍曹洞雲門法眼宗石頭則龍潭嗣天皇明甚韶州余靖法堂記直記寶緣為青原十世則龍潭嗣天皇明甚此皆儒家名老其所紀天皇龍潭來源之清又如此今之集全書者動輒曰靡不窮搜極討可曾探討及此乎又曰引證辨解各有根據可曾根據及此乎否則請平心和氣將此諸書折衷參訂以成千古之信史不惟為後人之龜鑑亦可以報皇上衛道深恩之萬一也御製五燈全書序朕惟天生蒸民厥有恆性逮物交私蔽以後遂不能有善而無惡故操治世之權者必兢兢以勸善懲惡為先務焉大易著間邪存誠之義尚書明福善禍淫之旨皆所以啓牖下民使之回心嚮道而勿即於匪彝也間嘗流覽釋氏之書立教雖主於空寂而其戒欺去妄蠲忿窒欲亦與勸善懲惡之道蓋無殊指焉自宗門教興曹溪而下五派迭衍各有撰述宋景德以後裒集為傳燈諸録嗣是又舉挈要領彙成一編是為五燈會元洎乎本朝沙門海寬念其支派繁衍自宋金元明數百年來傳述闕然乃著纘續一書今聖感寺僧超永復慮譜牒漸棼聞見不一用是旁搜博考折衷於二編而參訂之刪其煩蕪增所未備以成全書其用心也可謂勤矣至於簡牘所載互相印證之語罕譬曲喻為說甚夥而其大指要歸亦惟欲袪迷惑以復性真不越乎間邪存誠牖人為善之意匪僅有裨於禪宗教旨而已也故為之序景德傳燈紀六祖慧能大師法嗣曰青原行思禪師南嶽懷讓禪師南嶽讓法嗣第一世馬祖道一禪師南嶽下二世馬祖一法嗣百丈懷海禪師南嶽下三世百丈海法嗣溈山靈祐禪師黃檗希運禪師南嶽下四世溈山祐法嗣仰山慧寂禪師黃檗運法嗣臨濟義玄禪師青原思法嗣第一世石頭希遷禪師青原下二世石頭遷法嗣天皇道悟禪師藥山惟儼禪師青原下三世天皇悟法嗣龍潭崇信禪師藥山儼法嗣雲巖曇晟禪師青原下四世龍潭信法嗣德山宣鑑禪師雲巖晟法嗣洞山良價禪師青原下五世德山鑑法嗣雪峯義存禪師青原下六世雪峯存法嗣玄沙師備禪師雲門文偃禪師青原下七世玄沙備法嗣羅漢桂琛禪師青原下八世羅漢琛法嗣清涼文益禪師按傳燈乃道原禪師所集其載六祖下出青原南嶽是為二支青原出曹洞雲門法眼南嶽出臨濟溈仰是為五宗進呈宋真宗皇帝御覽命翰林楊億裁定賜入皇藏五宗欽遵從無異議此二支五宗之源出自六祖其來舊矣五燈會元曰六祖大鑑禪師法嗣南嶽懷讓禪師南嶽讓法嗣第一世馬祖道一禪師南嶽下二世馬祖一法嗣百丈懷海禪師南嶽下三世百丈海法嗣黃檗希運禪師南嶽下四世黃檗運法嗣臨濟義玄禪師又曰南嶽下三世百丈海法嗣溈山靈祐禪師南嶽下四世溈山祐法嗣仰山慧寂禪師又曰六祖大鑑禪師法嗣青原行思禪師青原思法嗣第一世石頭希遷禪師青原下二世石頭遷法嗣藥山惟儼禪師青原下三世藥山儼法嗣雲巖曇晟禪師青原下四世雲巖晟法嗣洞山良價禪師又曰青原下二世石頭遷法嗣天皇道悟禪師青原下三世天皇悟法嗣龍潭崇信禪師青原下四世龍潭信法嗣德山宣鑑禪師青原下五世德山鑑法嗣雪峯義存禪師青原下六世雪峯存法嗣雲門文偃禪師玄沙師備禪師青原下七世玄沙備法嗣羅漢桂琛禪師青原下八世羅漢琛法嗣法眼文益禪師又列五宗曰溈仰宗南嶽下四世臨濟宗南嶽下四世曹洞宗青原下四世雲門宗青原下六世法眼宗青原下八世按會元乃大川濟禪師所集以前諸燈録會為一書故曰五燈會元既紀青原出曹洞雲門法眼南嶽出臨濟溈仰是遵從上五燈之例其建宗立義條分縷析可謂詳矣五燈纘續曰曹溪之下兩幹並出青原居左南嶽居右其青原下石頭嗣之而曹洞雲門法眼列青原而為昭其南嶽下馬祖嗣之臨濟與夫溈仰列南嶽而為穆古吳金護法之俊序曰粵稽少室花開五葉曹溪胤布諸方於是直指單提之心要一本析為二枝衡山觀音廬陵青原咸為學者之所皈仰天下號二甘露門青原法嗣為石頭雲門曹洞法眼宗之南嶽法嗣為馬祖臨濟溈仰宗之此五家宗派所由始也按纘續乃涌宇寬禪師所集其敘二支之昭穆紀五宗之來源蓋祖述傳燈憲章會元金序又從而申明之辨於簡端可謂盡矣御序傳燈下有諸録二字蓋謂傳燈後有廣燈續燈聯燈普燈洎皇藏諸書故也茲不一一歷引惟曰諸録者有二意也一省文也一該攝包括之詞也序中雖引傳燈會元纘續三書以為文其意具含如上所述之諸書可謂言簡義盡則知我皇上於宗門裏底纖洪洞悉無遺前代帝王留心佛道甚多未有如我皇上優游法海高蹈毗廬則又儒釋融通善惡昭晰啓牖生民回心嚮道信為古佛乘願應世故以斯道覺斯民也然傳燈會元纘續洎前諸書所紀五宗來源歷然昭著序中引說以明諭霽崙折衷參訂以定二支五宗之譜可謂聖意昭然如揭日月矣臣儕安敢不欽此欽遵秉公著述以期報聖恩於萬一乎與聖感霽崙永禪師書久仰德輝渴思道範楷昨抵京華準擬進山奉訪無奈他冗所逼未克如願悵也何如茲啓者郵聞和尚輯五燈全書進呈御覽欽賜序文今古以來不可多見欣羡欣羡但其中條例章次多本嚴統嚴統之書屢經當道有司勘定燬板廢書其事昭昭在人耳目和尚秉公持正成此僧史遭逢聖主宸翰簡端必不蹈此覆轍為法門羞楷與和尚法同骨肉聞此風言是驚是懼故不敢不冒進其說願和尚深垂察焉外衛燈録一部大覺續燈録一部洞濟世次備考一冊辨略草鈔二冊白巖釋誤篇一冊源流頌一冊統塵清覽惟冀和尚大公無我取舍同人成此大全傳遠之書非惟完和尚一生堅苦之心抑以報皇上弘宗之勝意也倘不棄芻蕘之言法門幸甚後學幸甚特啓癸酉中秋後三日
