body:
  text: 衡陽後學智楷惟直氏述洞宗世次備考之一鹿門丹霞並出圖芙蓉下並出鹿門丹霞二支自宋徽宗時至明末五百餘年從無異説本朝順治初遠門柱集五燈續略不細參考誤將鹿門一脈系於如淨之下以致祖孫倒置世次疊訛嗣後繼燈纘續諸書皆本續略以訛傳訛幾三十年康熙壬子白巖輯祖燈大統得青州辨自書塔記因而廣考載籍確知續略諸書之誤於是以鹿門一脈還歸芙蓉下清出丹霞五代釐正洞宗世次迄今二十年矣不意霽崙永公集五燈全書執泥續略諸書以鹿門一脈復系如淨下者大都識見不博參考不廣不免疑誤天下後世關係法門非小茲不得不以古碑文獻與之辨正以釋天下後世之疑誤云爾鹿門丹霞兩家歲月記芙蓉楷出世歷住沂州馬鞍山仙洞山洛陽招提郢州大陽隨州大洪崇寧三年赴詔住東京淨因大觀元年蒙旨升法雲及天寧晚年創華嚴寺於沂之芙蓉湖於徽宗重和元年戊戌示寂載塔銘丹霞淳於徽宗崇寧三年住丹霞政和七年遷大洪宣和元年己亥示寂去芙蓉寂時僅一年載塔銘崇先了於徽宗宣和五年開法長蘆高宗建炎四年住雪峯紹興五年住育王十五年住徑山二十一年辛未六月住崇先十月一日示寂去丹霞寂時三十二年載塔銘天童珏事迹缺載雪竇鑑於南宋光宗紹熙三年壬子示寂載明高僧傳去崇先寂時四十一年歷珏鑑兩代按雪竇錦鏡池記載鑑於孝宗淳熙十一年甲辰住雪竇至壬子示寂僅九年天童淨出世六坐道場未稟承衆有是請淨曰我待涅槃堂裏拈出果臨終拈香曰如淨行腳四十餘年首到乳峯失腳墮於陷穽此香今不免拈鈍置我住雪竇足庵大和尚并書辭世偈曰六十六年罪犯彌天打箇𨁝跳活陷黃泉咦從來生死不相干載續略按淨自謂四十餘年首墮乳峯陷穽則臨終合在理宗紹定末年壬辰癸巳間去智鑑寂時四十一二年壽六十六則受囑時大約二十四五歲時也天童志祖堂木主陶寅齡賦三説皆曰元如淨此訛也浙地以宋亡始稱元至元十六年己卯宋亡去上壬子智鑑寂時計八十七年則三説之訛不辨可知向余亦曾引證今知訛矣故表於此鹿門覺塔記其略曰師諱自覺青州王氏子祖籍長安幼以文章見知於司馬溫公志事高尚無意功名元祐三年落髮受具往參芙蓉楷於郢州大陽問胡笳曲子話師資契合遂蒙記莂元符三年蓉遷隨州大洪師與丹霞淳侍從焉崇寧三年蓉赴詔住東京淨因師赴詔住唐州大乘大觀元年蓉蒙旨升法雲開封尹孝壽李公奏師道行堪補住持特詔師繼主淨因賜號慧定政和元年旨革襄州鹿門律寺為禪寺賜額為政和萬壽禪寺特詔命師主之為開山第一代政和七年丁酉二月十六日示寂建塔鹿門山口別墅按元祐元符皆宋哲宗年號元符三年前自覺已受芙蓉記莂先如淨於紹熙壬子前受智鑑付囑計九十餘年此時不但如淨未曾投胎即智鑑亦未降生也崇寧三年開法大乘先如淨於壬子後出世計百年政和丁酉示寂先芙蓉一年先丹霞二年先崇先三十四年先智鑑七十五年先如淨一百一十餘年况自覺行道與芙蓉同時續略纘續二書收為如淨法嗣其錯誤一也青州辨自書塔記其略曰參自覺和尚於襄州鹿門山政和五年冬承印可隨命見芙蓉尋住泗水龍門宣和間開法青州天寧八載遂至燕京初住奉恩次住華嚴即萬壽寺後住仰山天眷三年復住萬壽皇統六年退歸仰山九年己巳示寂即南宋高宗紹興十九年也去鹿門寂時計三十二年按政和宣和皆徽宗年號政和五年承印可先如淨受囑七十餘年此時如淨尚未投胎宣和間開法先如淨八十餘年皇統己巳示寂先崇先二年先智鑑四十三年先如淨八十餘年二書收為如淨三世孫其錯誤二也甘泉通塔記其略曰辨和尚先參鹿門覺次侍芙蓉楷後方領衆青社師於天會間參辨於仰山承印證為洞宗第十一世辨入滅後師繼席仰山大定五年乙酉住甘泉是年示寂即南宋孝宗乾道元年去青州寂時計十六年按通為鹿門三世孫至謂辨先參鹿門次侍芙蓉則楷覺辨公孫父子親承記莂更何容插入丹霞五代耶至謂印為洞宗十一世則丹霞五代原不在世次中明矣按天會間承印證先如淨得法六十餘年皇統己巳後繼席仰山先如淨出世四十餘年大定乙酉示寂先智鑑二十七年先如淨六十餘年則通寂時如淨尚未降生二書收通三世祖為如淨之嗣其錯誤三也磁州寶雖碑銘不存據王山體塔銘謂先參寶和尚於齊之靈巖及寶遷燕之仰山磁之大明師皆侍從十餘年至正隆五年九月始辭大明正隆乃金主亮年號五年為庚辰即南宋高宗紹興三十年則寶開法靈巖時先智鑑住雪竇三十餘年先如淨開法五十餘年二書收寶為淨四世孫其錯誤四也王山體塔銘其略曰正隆五年重九日辭大明寶和尚以偈付之正隆六年開法大原王山大定五年遷住汾陽天寧即南宋孝宗乾道元年乙酉大定十一年還居王山即乾道七年辛卯十三年九月二日示寂即乾道九年癸巳也去青州寂時計二十五年歷寶體二世按正隆庚辰受囑先如淨三十餘年次年開法先智鑑住雪竇二十四年先如淨三十餘年大定癸巳示寂先智鑑二十年先如淨六十年二書收體為淨五世孫其錯誤五也勝默光事迹載王山寺記內曰大定十三年體和尚示寂監院圓祥與衆請住王山甫七年退去則勝默住王山先智鑑住雪竇十二年先如淨開法二十餘年二書收光為淨六世孫其錯誤六也雪巖滿事迹亦載王山寺記內曰因勝默退去監院圓宗與衆奉兩衙疏亟往敦請住持則雪巖先智鑑住雪竇六年先如淨開法二十餘年二書收滿為淨六世孫其錯誤七也萬松秀初開法邢臺淨上寺明昌四年金章宗詔入宮中説法即南宋紹熙四年載續略萬松嗣雪巖為鹿門六世孫智鑑寂紹熙三年萬松宮中説法相去僅一年則初開法邢臺是與鑑同時在宋金行道可知矣此時如淨尚未受付囑况開法乎是則萬松受囑在如淨前開法在如淨前二書收萬松六世祖為如淨之嗣即其矛刺其盾其錯誤八也已上鹿門丹霞兩家歲月事實所考如此五燈纘續曰青原下十七世天童淨禪師法嗣襄州鹿門覺禪師參長翁值翁上堂參長翁值翁上堂七字係續略揑出一箇烏梅似本形蜘蛛結網打蜻蛉蜻蛉落了兩片翼堪笑烏梅咬鐵釘此係如淨頌靈雲見桃花之語師不覺失笑曰早知燈是火飯熟已多時後承印記出住鹿門此二十四字亦續略揑出示衆盡大地是學人一卷經盡乾坤是學人一隻眼以這箇眼讀如是經千萬億劫常無間斷萬松秀云看讀不易此示衆著語載從容録青原下十八世鹿門覺禪師法嗣青州普照寺一辨禪師參鹿門問如何是盡乾坤是學人一隻眼門曰汝被一卷經遮卻也師擬對門搖手曰不快漆桶去師於是有省得言外旨出住中都萬壽此機緣出載洞燈紀略按如淨語録一箇烏梅似本形是頌靈雲見桃花頌非上堂語也而續略妄以此為鹿門如淨契合事亦猶闢妄救以普慈嗣東明故事同一轍耳今即此示衆機緣為據以證二書之誤立見按鹿門示衆載從容録青州機緣載洞燈紀略可謂徵從有信信從有本非破簏敗紙比按萬松作從容録始於金宣宗興定二年戊寅去紹熙壬子智鑑寂時僅二十七年此時如淨雖弘道宋國卻與萬松於金國作從容録同時準二書收鹿門為如淨之嗣則淨為萬松七世祖鹿門為六世祖六世祖有法語為六世孫收入從容可也七世祖與七世孫同時有是事乎當斯時也宋金敵國不通往來淨雖出世宋浙未必即有法嗣何遽有七世孫在金燕同時弘道耶且萬松受囑在如淨前開法在如淨前况自覺乎自覺自崇寧三年出世至政和七年示寂凡三主大剎歷年僅十四載淨因自覺鹿門自覺先後住持原是一人明矣歷考住持鹿門者並無二自覺會元載淨因自覺者以次主淨因紀住處故也二書以自覺嗣如淨出住鹿門豈不是以一鹿門覺為二鹿門覺其錯誤九也觀鹿門示衆盡乾坤是學人一隻眼青州問如何是盡乾坤是學人一隻眼所謂承機進問因此有省據青州塔記自述政和五年冬承鹿門印可六年往參芙蓉則此示衆機緣出在政和年間二書以政和年間之鹿門為紹定年間如淨之嗣其錯誤十也可見一箇烏梅上堂等語為續略妄引偽捏明甚洞燈紀略曰青原第十三世芙蓉楷禪師法嗣襄州鹿門覺禪師參芙蓉問胡笳曲子不墮五音話得契上堂牛角不用有有也不妨兔角不用無無也不得何故天下事但得其情可恕何妨其理難容青原第十四世鹿門覺禪師法嗣青州希辨禪師參鹿門問如何是盡乾坤是學人一隻眼門曰汝被一卷經遮卻也師擬對門搖手曰不快漆桶去師於是有省按此書係汝州一説濟州普照編集始自鹿門覺收至無方從止出在明朝至本朝康熙庚申楚州南庵和尚補訂寄白巖時燈統業已告成五年矣其間有若干人未經收入致有遺珠之歎觀其載鹿門問胡笳曲子話得契與鹿門塔記所敘相同可謂徵從有據且直紀鹿門為青原十三世則丹霞五代為疊出明矣二書以鹿門嗣如淨妄引偽捏烏梅等語以為契合列為青原下十七世者其錯誤十一也纘續載青州參鹿門機緣出自此書可謂據從有根此書明載青州為芙蓉三世孫二書收為如淨三世孫其錯誤十二也鹿門法燈塔銘洪覺範所撰載石門文字禪中謂法燈自沂州禮辭芙蓉楷和尚復至京師於政和七年夏奉詔繼席襄州鹿門山政和萬壽禪寺初慧定禪師自覺革律為禪開創未半而逝燈為一新靖康二年示寂建塔於山口別墅慧定塔之東按銘謂燈繼席政和萬壽禪寺洎革律為禪建塔別墅與覺辨二祖塔記事迹吻合可謂根從有本燈與覺同嗣芙蓉同住鹿門同係徽宗時人事事可考一一可據二書收鹿門嗣如淨其錯誤十三也又祭法燈文其略曰慧定既化遷住鹿門既孝其師又悌其兄亦載石門文字禪中覺範乃濟宗尊宿也祭文既謂芙蓉為法燈之師鹿門自覺為法燈之兄則鹿門覺嗣芙蓉楷明甚二書以鹿門嗣如淨其錯誤十四也古云一字之真可以決千古之疑以此四句語證已上諸塔記無不可徵可驗證已下源流世次無不可憑可據並無一字可致疑者而纘續續略繼燈諸疑誤之書質之此四句語如片雪投之紅爐不待瞬目已銷矣彼紛紛末流矯強之論何屑與辨第涉詭譎之異伏瞬昧之機不得不與辨明已上據祖父塔碑所考如此佛祖傳法偈碑其略曰六祖下分五派曹洞正傳青原思石頭遷藥山儼雲巖晟洞山價雲居膺同安丕同安志梁山觀大陽玄投子青芙蓉楷鹿門覺青州辨磁州寶王山體雪巖滿萬松秀雪庭裕少林泰少林遇少林才大覺彝云云按此碑在勝果寺大殿前近大覺寺里許彝公嘗住大覺勝果故立此碑碑中述佛祖傳法偈燈録備載茲不贅輪庵和尚有同門月函和尚嘗出洞宗世次疑問一書謂初見雲門澄和尚原本語録拈香稱大覺念和尚為曹洞正宗第二十六世後見翻刻語録稱念為三十一世不知孰是述以問世後得此碑刻附疑問之末有跋其略曰曹洞源流世次之錯訛者只在芙蓉鹿門上下師承之間我法兄輪庵和尚昨從都中來摹得曹洞古源流碑自青原思歷敘至芙蓉楷下即曰鹿門覺青州辨則丹霞淳至天童淨五代原不在源流中明矣雲門澄和尚稱大覺念和尚為曹洞二十六世誠為不錯而曹洞源流中疊出丹霞五代余今日曉然明白無復疑矣月函和尚得此碑刻以遍告天下可謂法門千古之公心公論也不惟洞宗知識稱善即濟下尊宿亦無不稱善也輪庵和尚亦可謂洞宗之功臣也二和尚此心此德直與日月並明於千古之下較彼暗昧之徒惟務掩人之是揭人之非實霄壤矣佛祖來源大萬壽禪寺開山傳法歷代宗師實迹記曰吾曹洞宗自曹溪下正傳法胤青原思石頭遷藥山儼雲巖晟洞山價雲居膺同安丕同安志梁山觀大陽玄投子青芙蓉楷鹿門覺青州辨辨乃萬壽仰山開山初祖也傳法得磁州寶王山體雪巖滿萬松秀雪庭裕云云按萬壽寺在京之南城琉璃廠西明景泰六年敕改永光寺碑之前後文偈不及録月舟載行實碑天童懷讓虛禪師撰碑陰有曹洞正傳宗派圖曰初祖達磨大師二祖慧可大師三祖僧璨大師四祖道信大師五祖弘忍大師六祖慧能大師青原思石頭遷藥山儼雲巖晟洞山價雲居膺同安丕同安志梁山觀大陽玄投子青芙蓉楷鹿門覺青州辨磁州寶王山體雪巖滿萬松秀雪庭裕靈隱泰寶應遇淳拙才松庭嚴凝然改俱空斌無方從幻休潤行實碑記東吳袁了凡居士撰碑陰有洞宗正統圖曰初祖達磨大師二祖慧可大師三祖僧璨大師四祖道信大師五祖弘忍大師六祖慧能大師青原思石頭遷藥山儼雲巖晟洞山價雲居膺同安丕同安志梁山觀大陽玄投子青芙蓉楷鹿門覺青州辨磁州寶王山體雪巖滿萬松秀雪庭裕靈隱泰寶應遇淳拙才松庭嚴凝然改俱空斌無方從月舟載宗鏡書月函和尚曰曹洞源流之錯訛者只在芙蓉鹿門之間據上四碑載芙蓉楷下即曰鹿門覺則丹霞五代疊出明甚而宗鏡書出幻休潤潤出大覺念念出雲門澄此又近代之耳目所昭昭者增集續傳燈其紀雪庭裕來源曰裕嗣萬松秀秀嗣雪巖滿滿嗣王山體體嗣磁州寶寶嗣青州辨辨嗣鹿門覺覺嗣芙蓉楷按增集乃南石琇輯出在永樂年間至順治年間靈巖儲重刻琇儲皆濟下尊宿也據增集直紀鹿門覺嗣芙蓉楷則丹霞五代疊出明甚再考增集紀如淨法嗣惟孤蟾瑩石林秀絶無所謂鹿門覺也此增集及四碑紀洞宗源流逆敘順敘代代皆父子相承毫無所雜二書以鹿門一脈系如淨下其錯誤十五也已上據祖父源流所考如此靈峯慧撰古巖就塔銘曰曹溪下析為二宗青原四傳至洞山價價七傳至芙蓉楷楷六傳至萬松秀月舟載因豎龍潭古山仙行實碑於祖庭碑末署大少林禪寺當代住持嗣曹洞正宗第二十三世金臺文載立宗鏡書撰法王碧潭清道行碑自署少林禪寺嗣曹洞正宗第二十四世宗書撰鄭藩德慶王撰宗鏡書行實及塔銘皆曰住持少林禪寺嗣曹洞正宗第二十四世憨山清撰大方遷塔銘曰元雪庭裕禪師揭洞上一宗於少林二十四傳至大章書禪師中興其道今遷為嫡嗣也載夢遊集大章乃宗鏡書號也華亭陸樹聲居士撰幻休潤塔銘曰敕賜嵩山大少林禪寺傳曹洞正宗第二十五代新安汪道昆居士撰幻休潤塔記曰是為曹洞之正宗歷世二十有五載大涵集無言道建地藏殿碑記自署少林住持傳曹洞正宗第二十六代道嗣幻休潤太倉王錫爵居士撰無言道碑銘曰敕賜嵩山大少林禪寺住持曹洞正宗二十六代耒陽曾鳳儀居士撰無言道行實碑曰少林禪寺住持傳曹洞正宗二十六世華亭董其昌居士撰無言道碑銘曰嵩山少林寺賜紫住持曹洞正宗二十六代載容臺集杭州虞淳熙居士送無言道住少林序曰曹洞宗第二十六代載德園集大覺念付雲門澄法卷曰傳曹洞正宗第二十六世清涼方念書付又塔在顯聖南山題曰傳曹洞正宗第二十六世北京大覺慈舟方念禪師之塔天啓四年甲子歲立雲門澄別號散木於萬歷甲寅開法廣孝明年開法徑山其拈香俱曰供養北京大覺堂上傳曹洞正宗第二十六世清涼大和尚用酬法乳之恩重興雲門顯聖寺碑署傳曹洞正宗第二十七代散木圓澄書明天啓元年秋日立又嘗撰思益經簡注序涅槃經會疏序金剛三昧經注解序重刻正法眼藏序趙州語録序玄沙語録序無趣語録序無幻語録序宗門或問序皆曰傳曹洞正宗第二十七世雲門顯聖寺住持圓澄撰顯聖寺有佛牙鐵塔一座高二丈餘上鑄天啓五年傳曹洞正宗第二十七代圓澄立塔曰傳曹洞正宗第二十七世中興雲門顯聖開山第一代湛然圓澄禪師之塔又付寶壽方辨山雪等法卷皆署傳曹洞正宗第二十七世雲門散木圓澄書付寶壽方初開法天華辨山雪初繼席顯聖其拈香俱稱供雲門顯聖堂上傳洞山正宗第二十七世散木澄和尚用酬法乳之恩香雪具足明有禪師之塔在顯聖南山署明傳曹洞正宗第二十八世崇禎三年庚午歲立歷然相崇禎九年開法梅山拈香稱供辨山龍華堂上傳達磨正宗第三十八世瑞白雪和尚用酬法乳之恩據上三十餘種世次較之核之則丹霞五代疊出明甚二書廁五代於世次之中其錯誤十六也已上據祖父世次所考如此費隱解惑篇曰湛老和尚一支自大覺老宿而上至雲居膺草六世遠門柱出辨惑駁之曰大覺上至洞山二十六世至雲居二十五世而云草六世近處尚不能盡心考究其他可知矣吾師翁廣孝拈香則曰大覺堂上嗣洞山正宗第二十六世清涼大和尚柱公辨惑出在順治甲午夏續略稿成於崇禎末年其壽梓在順治初年辨惑既知大覺為洞山二十六世則妄引一箇烏梅作上堂等語以鹿門系如淨之下置大覺於三十一世其錯誤亦自知矣幸諸祖有靈碑銘文獻多在得以考正不然幾莫能辨茲以柱公之辨惑證柱公之續略其錯誤十七也按纘續首册有在公序曰敕賜靜善禪師續洞宗二十八世同參弟金臺別山釋性在和南謹撰第二册有寬公緣起曰祖庭大少林禪寺傳曹洞正宗第二十八代嗣祖沙門邢襄釋海寬謹述寬在同嗣心悅喜喜嗣無言道道為洞山二十六代具載碑銘見少林寺二公自署二十八代蓋遵祖訓也則丹霞五代疊出明甚及列章次以鹿門一脈系如淨下以致列道為青原下三十四世列在公洎自己為青原下三十六世則又廁丹霞五代於世次中者蓋為續略所誤故也故卷首曰洞宗三十四世支提山釋淨柱採集觀此固知纘續被續略所賺孟浪屬筆以致錯誤十八也續略凡例曰一曹洞宗至宋季尤盛於河北所以元世祖大集沙門惟雪庭裕祖高賢鱗附纘續凡例亦曰曹洞宗至宋季尤盛於河北所以元世祖大集沙門惟雪庭裕祖高賢鱗附洵至盛矣二説皆出自雪庭碑中發言有本夫大集沙門於京師在至元八年辛未即南宋度宗咸淳七年去紹定壬辰癸巳間如淨寂時三十八九年以雪庭之嗣嗣如淨尚不可何也以有宋元敵國之隔二書以雪庭七世祖鹿門嗣如淨其錯誤十九也續略紀雪庭裕參萬松於燕之報恩蒙印可壬辰中興少林壬辰乃金哀宗天興元年即南宋理宗紹定五年此時如淨尚在世與裕同時弘道於宋金之國二書收裕為淨八世孫其錯誤二十也續略紀林泉倫參萬松松奇之出世住萬壽至元九年世祖詔入內殿對御談禪即南宋度宗咸淳八年壬申去如淨寂時雖隔四十年然倫與裕同門二書收倫為淨八世孫其錯誤二十一也續略紀全一溫參萬松得法世祖召見與語大悅錫號佛國普安至元丁卯示寂去如淨寂時只三十四五年二書收為淨八世孫其錯誤二十二也續略紀丞相楚材參萬松三年乃獲印證為序從容録按序從容在金哀宗正大元年甲申去智鑑寂時僅三十二年此時如淨正在宋浙弘道與金燕楚材同時二書收為淨八世孫其錯誤二十三也纘續紀李屏山遇萬松於邢臺歲越二周得造不疑之地屏山乃金世宗朝翰林萬松於世宗大定年間開法邢臺即南宋孝宗淳熙年間於金章宗明昌四年赴詔入燕則屏山遇萬松於邢臺時如淨尚未嗣法輒收為淨八世孫其錯誤二十四也纘續紀弘明照參仙巖德付以衣法出世住燕之歸義次主邢臺淨土十載歲戊戌遷天寧太保劉公學道於師按戊戌乃蒙古太宗十年即南宋理宗嘉熙二年則住淨土時當理宗紹定元年戊子與如淨同時行道收為淨八世孫其錯誤二十五也纘續紀仲復顏投弘明照於淨土下髮後隨照徙天寧遂佩其印照徙天寧在戊戌此仲復佩印時去如淨寂時不過七八年則在淨土下髮時如淨尚在世收為淨九世孫其錯誤二十六也纘續紀太保劉秉忠初從弘明照於天寧為僧遂嗣其法此亦去如淨寂時不過七八年收為淨九世孫其錯誤二十七也纘續紀萬安恩依古冀暉受具兼承心印構開元寺於順德時燕都大萬壽寺開資戒大會萬松延師登壇説戒萬松復奉敕主萬壽在金哀宗正大七年庚寅即南宋理宗紹定三年則恩公説戒洎構開元與如淨同時收為淨七世孫其錯誤二十八也續略紀萬松秀初開法邢臺淨土寺於明昌四年金章宗詔入宮中説法其下小注曰即南宋紹熙四年萬松望鹿門六世祖其在宮中説法去智鑑寂時只隔一年而未被詔前開法邢臺與鑑同時在宋金行道可知矣此時如淨尚未受囑二書收萬松六世祖為如淨之嗣其錯誤二十九也續略紀萬松於金章宗承安二年丁巳奉詔住仰山棲隱寺即南宋寧宗慶元三年去智鑑寂時僅六年此時如淨縱然出世與萬松同時在宋金行道二書收為淨七世孫其錯誤三十也摘欺説表示續略所得諸祖言句出處曰雪巖滿得自從容録下二十紙勝默同參話得自請益録上四十紙上堂得自請益録序第一紙萬松作從容請益二録始於金宣宗興定二年戊寅即南宋寧宗嘉定十一年去智鑑寂時二十六年此時如淨雖弘法於世而萬松初開法邢臺尚與如淨之師智鑑同時況雪巖乃萬松之師其出世先智鑑住雪竇六年二書收為淨六世孫其錯誤三十一也又曰勝默光前一段得自從容録下一百七紙後一段得自從容録上四十七紙勝默與雪巖同門於大定十三年出住王山次住燕京萬壽洎慶壽續略謂萬松過慶壽參勝默老人後參雪巖於磁之大明承付囑開法邢臺與智鑑同時則勝默住慶壽與天童珏同時二書收為如淨六世孫其錯誤三十二也又曰磁州詮得自從容録上七十二紙詮與雪巖勝默同門二書收為如淨六世孫其錯誤三十三也又曰王山體得自請益録上六十六紙三種獅子話得自請益録下十七紙尊貴旨得自請益録上十二紙王山嗣法先如淨三十餘年示寂先如淨六十年二書收為淨五世孫其錯誤三十四也又曰仁山恆得自從容録上四紙仁山與王山同門二書收為如淨五世孫其錯誤三十五也又曰磁州寶示衆得自請益録下九十二紙寶為萬松之曾祖也於皇統間出世靈巖如淨尚未投胎二書收為淨四世孫其錯誤三十六也又曰慈雲覺得自青州百問慈雲與磁州寶同門二書收為如淨四世孫其錯誤三十七也又曰青州辨前一段得自續文獻通考垂問得自本録本録即青州百問也辨於天會六七年間住萬壽時垂百問以勘學者先智鑑住雪竇五十六七年矣此時不但如淨未受智鑑付法即智鑑尚未受天童珏付在二書收為如淨三世孫其錯誤三十八也又曰鹿門覺示衆得自從容録上六紙據覺辨二祖塔記洎法燈塔銘祭文諸古碑文獻參考之則鹿門覺嗣芙蓉楷在哲宗元符初其開法大乘在徽宗崇寧三年萬松作從容録始於金宣宗興定二年去崇寧三年計一百一十七年歷覺辨寶體滿秀六代大凡考事當原之以情斷之以理可也鹿門為萬松六世祖相去有一百一十七年智鑑為萬松八世祖反與松同時弘法有是理乎况興定二年作從容録此時如淨雖正弘道豈其法嗣預於一百餘年前開法於世有此示衆法語為六世孫收入從容録中有是理乎二書收徽宗時之鹿門嗣理宗時之如淨其錯誤三十九也據此則一箇烏梅等語益知為續略妄引偽捏明甚已上據二書所考如此佛祖通載曰金世宗大定二年壬午敕建大慶壽寺成詔請玄冥禪師顗公為開山第一代顗嗣磁州寶望鹿門四世祖壬午即宋紹興三十二年此時如淨尚未投胎二書收顗四世祖嗣淨其錯誤四十也又曰虛明亨出世住嵩山之戒壇韶山之雲門鄭州之普照林溪之大覺嵩山之法王中都之潭柘濟州之普照奉章廟旨主慶壽寺後住少林數年示寂於興定己卯去智鑑寂時二十七年此時如淨雖正弘道而亨公初出世卻與智鑑同時二書收為如淨五世孫其錯誤四十一也又曰金國章宗明昌四年詔請萬松長老於禁庭升座帝親迎禮聞未聞法開悟感慨親奉錦綺大衣后妃貴戚羅拜拱跪各施珍愛以奉供養續略所載本此纘續略之此時如淨受智鑑付囑不二三年二書收萬松六世祖為淨之嗣其錯誤四十二也叉曰丁巳金國特詔萬松住仰山升堂有偈曰蓮宮特作梵宮修聖境還須聖駕遊云云續略以此偈作上堂蓋本此纘續載泰和丙寅住仰山雖去丁巳十年此時如淨不過才出世二書收萬松六世祖嗣如淨其錯誤四十三也日下舊聞曰大定二十年正月敕建仰山棲隱寺命玄冥顗公主之續文獻通考此書乃秀水朱彝尊所輯紀洞宗事數段此其一也凡得之某書小注其下此段得自續文獻通考後倣此他如通載曰金世宗大定二年敕建慶壽寺詔玄冥禪師顗公主之八年遷住東京清安寺二十年遷棲隱顗望鹿門四世祖智鑑於南宋孝宗淳熙十一年甲辰始住雪竇則顗住棲隱先五年矣住清安先十七年矣住慶壽先二十三年矣此時如淨尚未投胎二書收顗四世祖嗣如淨其錯誤四十四也又曰仰嶠叢林為燕京最泰和中主事僧奏請萬松老人住持上許之萬松欣然奉詔云云湛然居士集按李屏山作萬松塔銘謂泰和六年住仰山雖去智鑑寂時十五年而松初開法邢臺卻與鑑同時二書收松六世祖嗣如淨其錯誤四十五也又曰金元間有僧自稱萬松野老居燕京從容庵耶律楚材見之參學三年僧以湛然居士目之帝京景物略萬松因湛然請評宏智頌古以居庵名其書故曰從容録其從事載筆始於金宣宗興定二年此時如淨與松同時收松嗣如淨尚不可以宋金敵國故也二書收松六世祖嗣如淨其錯誤四十六也又曰萬松老人耶律文正王之師也其語文正王曰以儒治國以佛治心王亟稱之謂雲門之宗悟者得之於緊峭迷者失之識情臨濟之宗明者得之於峻拔昧者失之鹵莽曹洞之宗智者得之於綿密愚者失之廉纖獨萬松老人全曹洞之血脈具雲門之善巧備臨濟之機鋒誠宗門之巨匠四海之所式範其傾心至矣淥水亭雜識文正王即湛然居士據此極力稱讚萬松大振曹洞之宗於金燕雖與宋浙如淨同時其先開法邢臺實與智鑑同時二書收為如淨七世孫其錯誤四十七也又曰遼清寧間築義井精舍於開陽門之郭金大定中僧善祖營寺朝廷賜額大覺湛然居士集又曰萬松老人住持大覺寺榜其齋曰昨夢湛然居士集萬松住大覺雖未載有年甲然兩段文俱出湛然集湛然乃萬松弟子係金朝人紀萬松住大覺在金朝明矣二書收為宋季如淨七世孫其錯誤四十八也又曰永光寺元大萬壽寺也曹洞下青州辨公居之寺有大萬壽寺開山傳法歷代宗師實迹碑記又明正統十一年一碑稱萬松秀公居此湛然屏山二居士為其上首外護湛然即耶律文正王楚材屏山金李翰林純甫也析津日記按實迹記述辨和尚乃萬壽仰山開山之初祖也蓋辨自金初來燕獨唱新豐曲子大振鹿門家聲嗣後接拍繼和盡住金國歷傳至萬松為第五葉計百年法道之盛觀此片言可知二書凡例謂洞宗大盛於北地良有以也然收金初之青草辨為宋季如淨三世孫收萬松為淨七世孫收湛然屏山為淨八世孫其錯誤四十九也又曰元初京師禪學分萬松延洪為二門比丘尼智公參萬松者也耶律楚材因請其開堂住報先寺析津日記楚材請智公開堂則智為萬松法嗣明矣智望鹿門七世祖既為金朝楚材請其開堂亦與如淨同時明矣二書收智七世祖嗣如淨其錯誤五十也又曰趙孟俯仰山棲隱寺滿禪師道行碑記略曰師名行滿字萬山俗姓曾氏江右太和人至元庚辰至仰山有會心處遂剃髮禮澤庵璉公為師後繼席仰山聲聞大振元武宗賜號佛慧鏡智普照大禪師洎織錦僧伽大衣蓋棲隱寺始建於遼至師為二十六代松雪齋集京西大覺寺有月巖琩禪師碑按碑中紀世系曰琩嗣棲隱滿滿嗣甘泉璉璉嗣少林英英嗣香山溪溪嗣覺山福福嗣香山俊俊嗣磁州寶則滿望鹿門九世祖滿至元庚辰剃髮去宋季如淨四十餘年二書收滿九世祖嗣如淨其錯誤五十一也藏中有辨偽録言蒙古憲宗時道士丘處機等占梵剎四百餘所歲乙卯少林雪庭裕詣闕陳奏玉音宣諭登殿辨對道士義墮奉旨焚經罷道為僧按乙卯乃憲年即南宋理宗寶祐三年也雖去如淨寂時二十二三年其先中興少林卻與淨同時二書收為淨八世孫其錯誤五十二也又曰由乙卯以來邪説猶妄驚瀆聖情由是至元十八年玉音頒降天下偽經盡燒此是元世祖第三番燒道經也彼時在廷辨對者萬松法嗣居多曰圓福從超曰資聖至溫曰報恩從倫且命倫舉火皆去如淨不遠二書收為淨八世孫其錯誤五十三也佛祖統紀曰淨因自覺禪師初學於司馬光云云按覺祖塔記曰幼以文章見知於司馬溫公正此之謂也會元亦如是載溫公歷相英宗神宗哲宗三朝則自覺學於溫公在哲宗時二書以自覺嗣理宗時之如淨其錯誤五十四也已上據古人文獻所考如此
