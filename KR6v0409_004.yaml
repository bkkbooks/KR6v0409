body:
  text: 衡陽後學智楷惟直氏述二支五宗來源考之四附檗巖黃禪師虎丘徑山長少倫敘考曰五燈會元載昭覺勤祖法嗣徑山杲居首虎丘隆次之蓋會元輯於大川濟公係妙喜四世孫推尊其祖宜乎列徑山於虎丘之前也嚴統諸書亦依會元之舊文先徑山後虎丘則不得不引虎丘塔碑及大慧年譜詳考二祖之年臘著為説以辨正其倫序焉按塔碑隆祖遷化於高宗紹興六年丙辰五月八日住世六十年坐四十五夏則隆祖之示生在神宗熙寧十年丁巳也九歲去家則元豐八年乙丑也又六歲受具則哲宗元祐六年辛未也又五歲而行腳四方首參長蘆淨照次參湛堂次參死心最後從圓悟於夾山當機契悟參隨二十年歸和州省親四衆請開堂於城西開聖寺以建炎之亂南渡宣城郡守李尚書光延居彰教四年而遷虎丘又三年而示寂則住虎丘當在紹興四年甲寅住彰教當在建炎四年庚戌而出世開聖則在建炎二三年間也會元諸書皆載圓悟於建炎初遷金山二年正月奉詔入對揚州賜號圓悟禪師今隆祖語録第一會住開聖開堂日拈香酬法乳稱現住金山佛果圓悟禪師是則正在佛果住金山入對賜號之時也其參隨圓悟二十年則當始於徽宗政和之初年也會元載圓悟崇寧中還里省親開法昭覺政和間復出峽南遊張無盡留居碧巖即夾山也復徙道林而隆祖塔碑謂趨夾山見圓悟會圓悟移道林師從焉參考羣籍定其年甲則隆祖之常隨圓悟自政和而宣和而靖康而建炎前後蓋二十年也此則隆祖之始末合會元諸書所紀以證徐林所撰之塔碑並無纖毫可疑者也按年譜大慧生於哲宗元祐四年己巳則齒少於隆祖一十二年也出家於徽宗崇寧三年甲申則後於隆祖脫白一十九年也請具足戒於崇寧四年乙酉則後於隆祖得戒一十四年也政和年間依湛堂於寶峯至宣和七年乙巳始參圓悟於天寧則契機圓悟亦在隆祖之後十餘年也高宗建炎四年庚戌始住海昏雲門庵則正當隆祖住彰教之年爾時隆祖先已出世於開聖也此則悉依大慧門人祖詠宗演所修之年譜其載筆諒無差謬者也考諸塔碑年譜以定二祖之倫敘豈非虎丘為兄而徑山為弟乎年譜載大慧於建炎元年丁未省侍圓悟於金山偕隆藏主之吳門少憩寶華次虎丘遂館於前資據塔碑隆祖是時已住開聖未住虎丘意者二老皆以省侍圓悟相遇於金山遂同遊吳門館於虎丘耳他書又載應庵華祖先於彰教親依隆祖又隆祖遷住虎丘則華祖為先馳意者隆祖於建炎中先已受虎丘之請至紹興中始來闡法故華祖為前驅耳不然以著草鞋住院之華祖豈其居學地時曾為子夏之先耶會元載應庵住歸宗日大慧在梅陽有僧傳師垂示語句慧見之極口稱歎後以偈寄曰坐斷金輪第一峯千妖百怪盡潛蹤年來又得真消息報道楊岐正脈通其歸重如此年譜載大慧於紹興二十四年甲戌以頌代書答歸宗華侄長老此之謂也會元又載應庵於室中能鍛鍊耆艾故世稱大慧與師居處為二甘露門又載應庵於虎丘忌日拈香有二十年來坐曲彔木之句又載應庵於孝宗隆興改元六月十三日奄然而化年譜載大慧亦於是年八月十日示寂於徑山則知應庵弘法二十餘年實與大慧同時行道也諸書列徑山於虎丘之前實為傳誤久欲正其説以遍告諸方具眼者適樂讀居士從邦上歸出其所編指月續録見示開卷便見虎丘法嗣列於徑山法嗣之前觀其伯仲昭然頓使鴈行成序為功於傳燈無盡矣敢抒管見以附不朽名之曰少長倫敘考云長洲繆彤居士曰豫閲圓悟禪師語録係宋平江府虎丘山門人紹隆等編則知虎丘為圓悟首座也又閲紫柏大師集其序應庵和尚語録云臨濟正宗大於楊岐會盛於五祖演至於圓悟嫡嗣曰虎丘虎丘嫡嗣為應庵則知虎丘為圓悟嫡嗣也及閲會元圓悟法嗣三十餘人首徑山次虎丘則不能無疑今閲檗公辨正一書其考諸塔銘按諸年譜二祖之得法行化年月次序可謂詳矣未有一事徑山在虎丘之先者虎丘為兄徑山為弟斷然無疑也夫兄弟之倫儒釋一理古人雖重嫡而輕庶然庶為兄嫡為弟長幼之序猶不可紊况嫡本兄庶本弟也而可以顛倒其倫次耶會元編於大慧之門人而推崇其祖是誠有之如楚石為大慧五世孫無相錢居士序其語録云圓悟之後分為二宗一為妙喜一為虎丘是亦先徑山而後虎丘者訛傳日久幾莫能辨檗公得法於木陳老人為虎丘二十一世孫辨正二祖倫敘非為推崇其祖實所以較正臨濟之正傳訂定圓悟之宗派公也非私也彤學識淺劣於禪宗未窺一二但宋文憲公為文苑巨公所作禪林碑版之文甚多若育王約之裕公生塔之碑龍池佛心寧公舍利塔銘詳載原委未有不先虎丘而後徑山者是可信也敬書以辨於指月續録之首俾僧史之信從有本云按居士聶先號樂讀作續指月録以釐正虎丘徑山之先後適得此二辨刻載卷首彰明倫理古云物不平則鳴如此違名犯分亂倫悖理之事天下後世自有人為之釐正所謂公論難泯也今三公所辨皆法門千古之公論也楷今例此公論以辨正青原南嶽二祖之倫敘嘯峯然禪師作熄邪辨曰曹溪二派青原南嶽並列五燈後世兒孫修燈録者往往各私所親爭先其祖迄無定論然以兩祖本傳及曹溪坐次考之其序自定雖孝子慈孫百世不能易也考青原本傳云師幼歲出家每羣居論道師惟默然聞曹溪法席即往參禮問當何所務即得不落階級祖曰汝曾作甚麼來師曰聖諦亦不為祖曰落何階級師曰聖諦尚不為何階級之有祖深器之會下學徒雖衆師居首焉亦猶二祖不言少林謂之得髓矣一日祖謂師曰從上衣法雙行師資遞授衣以表信法乃印心吾今得人何患不信衣即留鎮山門汝當分化一方師既得法歸住青原開元二十八年十二月十三日升座告衆跏趺而逝考南嶽本傳云師謁嵩山安和尚安指參六祖祖問甚處來師曰嵩山祖曰甚麼物恁麼來師無語遂經八載忽然有省曰説似一物即不中祖曰還假修證否師曰修證則不無污染即不得祖曰祇此不污染是諸佛之所護念汝既如是我亦如是西天般若多羅讖汝足下出一馬駒踏殺天下人藏在汝心不須速説師執侍一十五年先天二年住衡嶽於天寶三年八月十一日圓寂夫定法嗣之先後者有五一曰機緣二曰位次三曰付囑四曰出世五曰入滅今以機緣論之豈可以直下之承當後八年之有省以位次論之豈可以居首之一座後雖衆之學徒以付囑論之豈可以即命分化之座元後不須速説之侍者以出世論之豈可以從幼得法歸住之青原後一十五秋於先天二年方住之南嶽以入滅論之豈可以開元二十八年之坐亡後天寶三年之圓寂居今之日若以兒孫強弱遂可倒兄弟後先則泰伯雖以姪賢讓弟而未嘗貶泰伯為太季王季雖以子聖有國而未嘗進季歷為伯歷况青原分化原非荊蠻之逃南嶽住居何得先有邰之嗣耶故皇藏中景德傳燈録及傳法正宗記皆以青原先南嶽自有確據而曹溪祖殿坐次則六祖居上青原居左南嶽居右此又歷朝敕建千古流傳萬目共覩者誰得以私意亂之續略之先續青原者蓋以五燈舊本青原之嗣止於十五世南嶽之嗣止於十七世故先續青原之十六七世後續南嶽之十八世例合如此豈如市井小兒以人我爭先後者比今費隱偽撰五燈嚴統乃謂續略為私尊其所出之祖而顛倒其所續之書此何説也甚至於謂西天震旦馬駒兩讖俱主南嶽而青原無聞夫讖緯之學雖世儒不屑道即如讖云汝足下出一馬駒踏殺天下人夫所謂踏殺天下人者正謂死卻人聖凡生滅人我勝負是非知見之心耳豈並舉世之人而踏殺之且并踏殺其嫡祖親傳首座分化之伯父乎如此人我生滅知見之心不能滅卻而妄嗣南嶽噫甚矣馬駒之不靈也若讖果足憑則臨濟一宗讖云遇風即止而風穴之嗣何以不至斷絶耶此邪説之當熄者一也按繆公謂檗公辨正一書考諸塔銘按諸年譜二祖之得法行化年月次序可謂詳矣我嘯公考諸兩家本傳按諸祖殿坐次二祖之得法行化年月次序得不謂詳乎淡歸釋禪師復曹溪心照書曰承諭修曹溪志者顛倒上祖位次已悉尊指濟家主南嶽洞家主青原各尊其祖理則不無既然稱著述之手必具著述之眼便須看此書喚作什麼今此書喚作曹溪志則六祖為主更無二主譬如祖翁在上則青原南嶽各就其位諸孫肅然無敢譁者忽有一孫兒攘臂而前説我父不合讓人要將伯父降作叔父無論伯父不肯祖翁不肯即為之父者又肯乎又如堂頭在上各職事咸侍首座侍者各就本位大衆肅然無敢譁者忽有一學人攘臂向前説我師不合讓人要將第一座作第二座無論首座不肯堂頭不肯即為之師者又肯乎今以己意改舊志置南嶽於青原之上者何以異此大抵一切事先須識主今以弟先兄又以父從子不但失敬宗之禮又失尊祖之義不但於青原為非義之慢亦於南嶽為非禮之恭也即以著述而論志者其體裁不出於史亦惟據實而書傳信於後耳志名曹溪主是六祖譬如作韶州府志則六縣皆其所屬知府為主則各知縣皆其所屬青原作第一座即如曲江某知縣也忽有英德縣的兒子欲尊其父於公見知府時硬差排曲江做第二縣此可謂能尊其父矣爭奈有些説不去數世之後此英德縣又有箇孫子來修韶州府志欲尊其祖於韶州府職官志內改英德縣作首縣此可謂能尊其祖矣爭奈有些寫不去蓋當初令祖原不是首縣當初與令祖同寅的卻是首縣於公見知府時在前行在前立在前坐也青原南嶽之位次何以異此近來法門中人愛炒愛鬧將謂此一移換先後之間便足撑拄門庭光揚法道其實到某眼中不值得一聲冷笑至於雲門法眼向屬青原近入南嶽浙中結訟劈板未休千年已往之嗣續誰能問之古人兩家已絶之宗祧更欲居為奇貨大似見鬼亦如説夢大丈夫獨往獨來終不傍人門戶兒孫尚不靠定祖父祖父豈得仗著兒孫若以馬祖得天皇為重則馬祖不值半文且使臨濟置身何地若以石頭失天皇而輕則石頭不值半文即今曹洞又是何人作此見解搆此是非又將謂此移換彼此之間更足撑拄門庭光揚法道正是屈抑己靈玷辱先聖脊間無骨眼裏無筋卻又向此狹劣場中伏曖昧之機關起瞋忿之劍戟迷中倍人深可憐憫所以古人作者闕疑遠嫌貴於體裁不失亦使心術無偏如今末流難足語此某痛之恥之幾不欲聞之卻笑昔有造三教堂秀才見了將孔子坐第一位道士見了將老子坐第一位僧家見了將釋迦佛坐第一位搬來搬去搬箇不了三聖人相視而笑道我三箇好好的卻被者夥人搬壞雪槱在曹溪方才搬起但雪槱瞎作書獨不見曹溪舊志上載余靖撰慈濟大師重建法堂記並壽塔記二篇説得雲門宗派極明可以家裏話證家裏人不必別尋證據法堂記云大鑑以諸佛大法眼藏傳青原思思傳石頭遷如是展轉相傳至今長老緣師為十世矣緣師得大乘之要於漢東智門祚又壽塔銘云師名寶緣真元人遊方至隨州參智門禪師祚以心印心不煩機接遂為之嗣此是雲門兒孫決無錯認青原作祖宗之理又何勞濟宗於數百年後從傍訂正耶噫出家人喫卻間飯了無端向故紙堆中逞人我尋是非癡絶淡絶按雪槱嗣木陳忞公忞授意借修志以改伯仲倫序以致諸山公書斥之新志成輒燬板依舊志也淡公謂雪槱以己意改舊志置南嶽於青原之上霽崙全書何以異此繆公謂檗公辨正虎丘大慧倫敘非為推崇其祖實所以較正臨濟之正傳訂定圓悟之宗派公也非私也斯言可謂美矣善矣至矣我嘯淡二公辨正青原南嶽之倫敘亦非為推崇其祖實所以較正六祖之正傳訂定七祖之宗派公也非私也楷更述二祖事實以補不逮正霽崙所謂務期支緒詳明亦見引證辨解各有根據也按南嶽本傳曰儀鳳二年丁丑生即六祖開法之次年也曰十五歲出家在天授二年辛卯也曰通天二年受戒是為丁酉即神功元年行年二十有一矣曰先天二年住南嶽時三十有七歲矣先天二年癸丑即開元元年正六祖示寂之年則南嶽離曹溪在祖寂年可知矣南嶽侍祖十五年則參祖之年當在聖歷二年己亥時年二十三也經八載有省則在神龍二年丙午行年三十也按青原本傳云師幼歲出家聞曹溪法席即往參禮六祖於儀鳳元年丙子出世開法即名聞天下則青原參祖之年大約在儀鳳之末調露之初此時南嶽僅二三歲耳此青原參見六祖之先南嶽者二十年矣青原見祖一言之下祖深器重旋命分化此付囑之先南嶽者二十餘年矣師既得法歸住青原此開法之先南嶽者又三十餘年矣此青原南嶽事迹之先後如此按馬祖本傳曰師於唐德宗貞元四年戊辰二月四日示寂壽八十臘六十夫壽八十則生年當在中宗景龍三年己酉至玄宗開元癸丑六祖寂時僅五歲耳曰臘六十則受戒之年當在開元十七年己巳行年二十有一矣按諸燈録洎寶訓皆曰南嶽侍六祖一十五秋馬祖侍讓和尚亦十餘年讓寂天寶三年甲申上至開元己巳僅十六年則馬祖自四川渝州受戒之後而雲遊四方至衡山卓庵習定不知幾何歲月逮讓往顧磨甎啓悟大約在開元二十年已下事則離南嶽確在讓圓寂之後而旋歸故里有古今相傳馬祖還鄉道不香之語正謂此也復出峽隱廬山馬祖洞五年次隱白蓮池十二年載廬山紀事及通志次住靜建陽佛迹嶺次住靜撫州石鞏庵次住靜贛州龔公山至大曆中始開法鍾陵開元寺按石頭本傳曰師投六祖出家祖將示寂稟命見青原之先馬祖遇南嶽已二十年矣一見承印許有一麟足矣之語之先馬祖因喻開悟二十餘年矣尋持書南嶽回得鈯斧出住南臺之先馬祖開法開元三十餘年矣此石頭馬祖事迹之先後又如此費隱解惑篇曰蓋南嶽從來在前青原自屬居後不審以何為據耶想據六祖壇經耶抑以據曹溪祖殿坐次耶據曹溪通志耶據皇藏傳燈諸録耶按是書所列皆青原在前南嶽在後此皆歷朝聖主敕定之典誰得而變亂之耶然費隱所據者不過會元耳會元出宋景定間去壇經五百餘年何妄謂從來耶會元係大川所集乃大慧四世孫按虎丘生長出家秉戒參師受囑開法入滅皆在大慧之前大川所以妄列南嶽於青原之前者以為尊己祖大慧於虎丘之前之條例也故變亂成典不畏公討然其書出在宋末止私行浙地值天下大亂之際雖有秉公之賢者未暇討其罪也迄元末業海重刻亦值英雄並起天下鼎沸雖有執正之賢者亦未暇討其罪也逮明永樂年間金陵報恩淨戒刻續傳燈録古杭徑山南石出增集續傳燈録皆以會元亂倫不足取法乃直遵皇藏傳燈為祖以續其後故曰續傳燈曰增集續傳燈著書立名皆得其體則會元亂倫之書不廢而廢矣費隱不辨清虎丘大慧之先後以正大川之罪而反黨大川以斥歷朝欽定皇藏之成典則其罪較大川不亦倍倍乎而且又云今一旦列青原於南嶽之前既背西天祖讖更將千古聖賢名位倒置是猶以思孟駕於顏曾之上其誰信之不知傳燈所載法系長次渾融之未核亦不知會元建宗立義之深旨已定此何説也夫讖緯之説誠非正論今即讖而論之金雞銜粟足出馬駒縱讖馬祖未嘗讖青原南嶽之先後何妄謂倒置名位耶屈謂傳燈載長次未核然壇經定長次於六祖親手祖殿坐次定長次於歷朝建置曹溪通志定長次於前賢大筆不審核耶否耶子思乃曾子門人孟子後顏曾數輩引譬青原南嶽同輩伯仲是猶以費隱百癡譬天童磬山豈不取笑識者引譬尚且如醉何敢妄議千古之名位耶青原參六祖機緣曰祖深器之曰亦猶二祖不言少林謂之得髓此謂青原得六祖之髓猶二祖嗣初祖之名位乃定自六祖矣曰從上衣法雙行師資遞授衣以表信法乃印心吾今得人何患不信自吾受衣以來已遭多難况後代爭競必深衣宜留鎮山門汝當分化一方六祖所以留衣者以杜後代之爭端也遽命分化者即以祖位授之也觀其囑詞四七二三以來無此囑也二支五派以後無此囑也此六祖直以七祖名位授青原故前賢名其山曰七祖名山名其塔曰七祖塔即佛祖通載亦稱為七祖良有以也石頭雖嗣青原其初與青原南嶽皆昆季也何以知之觀第一座謂石頭曰汝師已逝空坐奚為又曰師言甚直汝自迷耳此定六祖為石頭之師也又曰汝有師兄思和尚今現住青原此定青原為石頭之師兄也青原既曰師兄况南嶽與石頭同執侍六祖又烏得不為師兄耶觀石頭問六祖和尚百年後未審希遷當依附何人六祖不令石頭依附同參應讖之南嶽而直命尋千里外得髓之青原亦猶世尊金口敕阿難附二傳化後先一旨也此又六祖直以八祖名位金口親敕石頭附二傳化也大川肆開僭踰之端妄尊己祖違名犯分亂倫悖理費隱反謂建宗立義深旨已定是誠邪説嘯公曰邪説當熄誠天下萬世之公論也按繆公辨虎丘徑山倫敘曰兄弟之倫儒釋一理古人雖重嫡而輕庶然庶為兄嫡為弟長幼之序猶不可紊况嫡本兄庶本弟也而可以顛倒其倫次耶按纘續凡例曰近代同門昆季並以囑付後先循序編列先得法者居前次得法者居後邇有不遵古訓以先開堂者為長於義未洽以物情譬之人有二子貴顯相等仕籍殊年弟以丑榮兄以辰進而傍觀者議欲伯仲而仲伯非獨其弟羞之厥父亦將操箠而擊之矣二公之論可謂至論也然嚴統取法會元抑兄為弟已經燬板全書根據嚴統駕弟為兄雖不顧南嶽羞恥不懼六祖箠擊只恐國法難容也昔浙省一丸之區處於偏隅司道嚴飾憲網不漏嚴統偽書畢竟燬板况茲京都統御四海賢宰濟濟又豈容其亂倫紊宗之偽書行於輦下乎是以霽崙之書揆之於法律有所不容也吾佛制戒先受戒者在前坐後受戒者在後坐不如法次第坐者謂乖尊卑次序戒夫受戒先後之序佛不許紊何况紹嗣七祖名位之序又豈容紊乎今霽崙首亂七祖名位之序名犯乖尊卑次序戒則其罪又不止輕垢矣是以霽崙之書揆之於佛律有所不容也楷非好辨以此偽書有亂名教關係法門故不避冒犯詳辨於此請質海內高明乞為公評公論知我罪我其唯此書
