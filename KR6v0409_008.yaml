body:
  text: 衡陽後學智楷惟直氏述濟宗世次備考之一五燈全書凡例曰一海舟慈祖是永非普是二非一奈彼迷惑謬見而削我二世豈知慈加普者嗣萬峯沈貫銘中所及者是也慈加永者嗣東明翼善碑中符合者是也其理炳然更復何辨世次道脈攸關豈容纖毫紊亂自非考訂精嚴不免以訛傳訛霽崙永公既據沈銘翼碑考海舟有普慈永慈之分師承有萬峯東明之別理應修明世系班正典型仰答祖父靈明頒示後昆憑式何乃削普慈於世系之外認永慈作正傳之祖自己迷惑深不可解著為全書誤人非小是皆不考祖父舊章後人新條以致紊亂濟宗世次余不忖譾劣僭取舊章新條較其涇渭俾玉石不致俱非金鍮不致互是用佐霽崙探討不備庶幾全書得以取信天下後世也臨濟第二十二世萬峯蔚禪師法嗣東明第二代海舟普慈禪師萬峯有寄海舟慈首座偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親苕溪花城隱士海安同知沈貫撰萬峯塔銘有曰貫才輕德薄不敢污禪師之德自念為師嗣法弟子海舟和尚座下參學久矣一日請問舟曰圓覺經云修多羅教如標月指若復見月了知所標畢竟非月此理如何舟舉手曰經也月也指也貫懵然舟拍案一下曰月落寒潭貫因而有省現載萬峯録中按萬峯録中載普慈先後一段事跡極明非忽略難據也今就其語以申明之按普慈傳言參萬峯問實義於峯棒下開悟此契悟之可稽也峯寄海舟慈首座偈有付囑兒孫之句沈貫銘有嗣法弟子之句此授受之可稽也觀一寄字則知普慈參萬峯契悟之後已有住處矣必峯命人持偈至彼以囑纍之此住處之可稽也觀首座二字則知普慈未住所在之前在峯會下已分座說法矣此分座之可稽也自受囑後出世開法勿論僧衆雲集即士大夫中之海安同知沈貫且親就爐錘況其他乎沈貫尚於言下開悟其為人手眼不待言矣為人手眼既如此則向於萬峯堂中眼目人天又不待言矣沈貫自述海舟和尚座下參學則其道風德譽之盛槩可知矣此弘法之可稽也萬峯寂在洪武十四年春語録刻在十六年春僅兩周年峯寂時門人畢集語録上卷屬普壽集壽求序於淨慈弘智又求銘於沈貫下卷屬普華普慈共集華求序於天界宗泐塔上之銘屬弟子普壽普福普堅普隱同西序普持普華普榮普慈等立石門人普鑑等奉全身瘞於院西瘞全身豈非入塔乎而建塔一事又豈一人所能乎今曰普鑑等然等之一字該括之辭則普慈等既共立塔上之銘安知建塔一事不預焉建塔求銘立碑集録求序刻録許多事總在兩年內得竣其工則知普慈等治萬峯後事未嘗一日離鄧尉也此治後事之可稽也此普慈與萬峯師徒始末事跡如此與今普慈録截然不同今録謂參萬峯有省隨付以偈不久辭去此無乃僞造家伏此以為重印東明張本觀録中被東明問箇萬峯即今在甚麼處便面赤罔然不能對且無論普慈向來事跡而萬峯擇法眼何在萬峯為濟宗一代宗匠濫付有如此又成得個甚麼好萬峯邪可見此語出自後人僞造明矣惜乎天童編刻未見永慈碑致有如此之訛今據永慈碑是永慈紹旵祖百年之踵續高峯七世之燈而普慈原嗣萬峯又何待言臨濟第二十三世東明普慈禪師法嗣南京高峯寺寶峯明瑄禪師蘇州吳江范氏子在俗為木匠因海舟和尚造塔院斧傷己足痛甚索酒喫舟聞之往謂曰適來范作頭傷足猶可假若斫去頭有千石酒與作頭喫作頭能喫否師有省遂求為僧舟即與披剃曰今日汝頭落也師曰頭雖落好喫酒人頭不落乃充火頭一日負薪舟見曰將荊棘作麼師曰是柴舟呵呵大笑師罔然舟曰是柴將去燒卻師疑曰和尚畢竟是甚道理故問我我不能答是夕刻意參究不覺被火燎去眉毛面如刀刈以鏡照之豁然大悟往白舟舟便打師奪拄杖曰者條六尺竿幾年不用今日又要重拈舟大笑師呈偈曰棒頭著處血痕斑笑裏藏刀子細看若是英靈真漢子死人喫棒舞喃喃舟曰即此偈語可紹吾宗乃付以偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深山止後住金陵高峯寺天奇來參師問甚處來奇曰北京師曰只在北京別有去處曰隨方瀟灑師曰曾到四川否曰曾到師曰四川境界與此何如曰江山雖異風月一般師豎起拳曰還有者個麼曰無師曰因甚卻無曰非我境界師曰如何是汝境界曰諸佛不能識誰敢強安名師曰汝豈不是著空曰終不向鬼窟裏作活計師曰西天九十六種外道汝是第一奇拂袖而出成化八年臘月九日示寂塔全身於東明寺左載續略纘續諸燈録臨濟第二十四世高峯寺寶峯明瑄禪師法嗣天奇本瑞禪師年將四十到南京高峯寺見寶峯瑄和尚瑄問甚處來師曰北京云云至拂袖便行瑄留過冬明春師告辭瑄付以衣拂偈曰濟山棒喝如輕觸殺活從茲手眼親聖解凡情俱坐斷曇花猶放一枝新載本録第四卷二十四紙天奇塔銘載法嗣曰高峯第八代遠孫二百餘人塔在衛輝府輝縣白雲寺明瑄傳中機緣與天奇録中機緣相同則天奇嗣明瑄不待辨而自明矣且普慈付明瑄法偈與永慈付智瑄法偈各別可見明瑄一傳前敘親承於普慈後紀躬囑於天奇父子公孫授受有據炳如日星又何淆訛之有天奇法嗣既稱高峯第八代孫則天奇當高峯第七代孫而寶藏東明為疊出明甚臨濟第二十五世天奇瑞禪師法嗣無聞明聰禪師有客窗夜話一篇敘從上源流曰自臨濟至高峯妙十有八傳妙出中峯本本出千巖長長出萬峯蔚蔚出海舟慈慈出寶峯瑄瑄出天奇瑞載原本語録及五宗敕中又序海舟傳法記其略曰幸海舟復振萬峯之將墜明聰善護臨濟之網宗載夢說録二十八紙無聞夢說録有原本有新編據原本客窗夜話所敘源流原無寶藏東明二代故五宗救詳悉甚明宗敕出在崇禎九年與原本所敘俱與天童之自上而下繇後之前世系連絡血脈貫通吻合此語出在崇禎七年則原本原無寶藏東明二代自崇禎十年天童新編遽有寶藏東明二代寶華忍亦嘗質之天童童曰從上嫡派共少五祖語録老僧自住金粟時即遍索諸方漸得二三皆據原刻重付諸梓惟此録近得之姑蘇查氏老僧亦未細閲但求而得之即刻之耳今既若此從今止刷即命封板寶華又以天奇笑巖二録考之以夢說録為查氏僞造若查氏僞造有此寶藏東明二代何宗救與原本所敘而反無此二代乎又宗救以得無聞原本録始列無聞之傳與今天童所編夢說録之傳同況原本所敘名客窗夜話新編刪去其題但曰一晚因虛堂請問云云以此觀之足知天童增入寶藏東明二代明矣然則天童豈無故增入二代歟嘗見龍池源流有寶藏東明二代又見三峯潭吉謂普慈無重嗣東明理乃龍池誤增二代天童不知東明嫡子自有一海舟永慈亦泥於古溪靜庵二說反以龍池為是以三峯潭吉為非故新編無聞録又誤增寶藏東明二代也無聞原本無此二代潭吉宗敕無此二代自天童編刻遽有此二代可知為天童增入又明矣宗救出在崇禎九年夢說録重刻在十年則天童增此二代明之又明矣然則龍池於源流中增入二代天童於夢說録中增入二代要之皆誤也誤在未見永慈碑故也或曰天童編刻有之謂誤增二代恐未必然子無乃要刪寶藏東明二代故強辨如此豈公論歟曰笑巖無聞之子芝通無聞之孫若原本有寶藏東明則笑巖面稟親承焉有不知源流世系之理故聯芳敘曇芝偈廣通序俱與原本不謀而合天童世系連絡語出於崇禎七年宗救出於九年皆與聰寶芝通源流符合則原本實無二代何崇禎十年一經天童編刻便遽有二代蓋天童扶龍池闢潭吉故驅普慈嗣東明藉古溪靜庵二說以證成其事於是闢妄救普慈録夢說録三書俱出天童之手皆為闢宗救之故此乃天童增入二代之始末也況新編夢說録載無聞序傳法記不曰海舟振東明之將墜直謂振萬峯之將墜則為天童增入二代益可想也嗚呼改從上宗祖之源流以折子孫之辨論是非為重世系為輕豈出天童本心哉實佐天童者之為也願高明鑑諸臨濟第二十六世無聞明聰禪師法嗣笑巖德寶禪師有聯芳偈自敘曰不肖上承迦葉六十三世之元祖下繼曹溪三十一葉之真孫臨濟第二十七世笑巖寶禪師法嗣靈谷曇芝禪師笑巖親書付法偈曰微笑拈花第一機相傳八八未知非今將從上非非法分付英賢力荷歸三際廣通禪師作笑巖北集序曰師得絶學老人不傳之旨望臨濟二十六代之祖俱載笑嵓集中曇芝廣通事笑巖最久而偈序皆巖在時所作非無機語廁名其間可同日而語者據聯芳敘自笑巖上承無聞天奇明瑄普慈萬峯至曹溪正三十一世再上至迦葉正六十三世笑巖既為迦葉六十三世孫則曇芝為迦葉相傳八八六十四世孫極顯極明者也據廣通序自笑巖上望無聞天奇明瑄普慈萬峯至臨濟正二十六代以之徵無聞客窗夜話敘從上源流原無寶藏東明二代炳如日星自萬峯至笑巖二百年歷傳六世繩繩有據若萬峯偈沈貫銘明瑄傳天奇録及塔銘無聞客窗夜話傳法記序笑巖聯芳敘曇芝偈廣通序十種證據是名祖訓千古不易之世系遵而行之孝莫大焉天童密雲悟禪師闢妄七書有復墨仙劉道貞書曰夫自世尊傳迦葉歷我笑巖師祖則六十三世自我師祖上遡曹溪則三十一世故曰不肖上承迦葉六十三世之元祖下繼曹溪三十一葉之真孫豈不自上而下繇後之前世系連絡血脈貫通抑何間於臨濟者乎載第二十九紙劉公即三峯藏法嗣又復三峯書引廣通序曰師得絶學老人不傳之旨望臨濟二十六代之祖又曰今老僧特引全序刻於此中用垂天下後世證明果何是而何非載第四十三四紙二書俱出於崇禎七年天童順數是必先迦葉次阿難乃至萬峯普慈明瑄天奇無聞笑巖正六十三世故曰自迦葉歷我師祖則六十三世若逆承必先笑巖次無聞上至曹溪正三十一世故曰自我師祖上遡曹溪則三十一世所以云豈不自上而下繇後之前世系連絡血脈貫通何嘗有寶藏東明二代况此書原為辨明宗旨世系所出平陽嘗敘云天童老人書問不減大慧茲獨見其七者何也蓋為漢月藏公故也及公門人墨仙劉居士論宗旨書遂汪洋萬餘言若鳴鼓而攻之不遺餘力者何也憂宗旨墜滅故也忞小子又何敢贅一言哉唯述其表而出之之意於左後署參學門人道忞記録可見此書出自天童親口録自平陽親筆原為辨明宗旨世系而出今人反不遵信非逆而何梅谷悅公列祖提綱載古雪哲公掃馬大師塔上堂甎鏡臺前打失娘生鼻孔滕王閣畔宏開選佛壇場踏殺天下英靈喚回空中野鴨掀翻窠堀截斷葛藤明大用顯大機電光石火較猶遲藏頭白海頭黑鐵眼銅睛皆罔測燈傳三十二葉道播四海九州腳下不肖兒孫昔日親遭毒手源遠流長則且置到者裏作麼生與祖師相見喝一喝曰無縫塔中藏不得森羅景裏見全身自馬祖歷傳至萬峯普慈明瑄天奇無聞笑巖龍池天童古雪正當三十二葉與上十種祖訓吻合悅公收入提綱蓋為馬祖世系所關此海舟普慈寶峯明瑄天奇本瑞出自萬峯之源流世次如此海舟永慈行實碑其略曰成都余氏子參東明旵有無相福田衣之機緣正統二年出住金陵東山翼善寺景泰二年受東明遺付衣偈祭海舟和尚文其下小注曰門人請古溪和尚作謹以禪悅酥陀蘋蘩之供祭獻於前東山翼善堂上高峯下第七代圓寂本師海舟大和尚永慈也覺靈曰道揚湖海德播神州慈濟隆乎品彙聲名動乎王侯來西蜀永慈也而全提正令坐東山永慈也而大闡玄猷延世壽七旬三載永慈也精僧臘五十餘秋永慈也羅鸑鷟而八方設網釣鯨鯢而四海垂鈎續高峯七世之燈永慈也爍羣昏而獨照紹旵祖百年之踵永慈也吞衆派以周流將入涅槃見衰相而白虹貫日用世尊入滅故事非永慈實事既歸圓寂殮法身而夜壑藏舟金風颯颯兮斂愁雲而未散玉露零零兮垂淚雨而難收吾師長逝兮掩禪關而悄悄弟子永思兮棲夢宅而悠悠昔之不悟兮被鉗鎚而煆煉今之有省兮敲骨髓以當酬此數語代永慈弟子所言是以肅清淨心獻純陀之後供必然出那伽定餐香積之嘉羞不捨慈悲伏惟尚饗據文中來西蜀坐東山紹旵祖後踵續高峯七世皆永慈事實則古溪所祭者祭東明之法嗣金陵東山翼善海舟永慈明甚與普慈無涉霽崙謂慈加普者嗣萬峯沈貫銘中所及者是也慈加永者嗣東明翼善碑中符合者是也正此之謂歟靜庵素聯芳圖敘自西天四七東土二三至高峯妙禪師中峯本禪師千巖長禪師萬峯蔚禪師寶藏持禪師東明旵禪師海舟慈禪師雲溪瑛禪師按永慈碑載法嗣一百有四人雲溪智瑛其一也瑛下出靜庵素素所敘之海舟自是敘東明嫡嗣海舟永慈也與祭文紹旵祖後踵續高峯七世之語符合與普慈無涉前人泥此二說致移普慈一脈系東明下其誤炳然更復何辨此萬峯寶藏東明永慈雲溪靜庵一脈世次有此三種證據是為舊章禪燈世譜木陳道忞禪師編次世譜變亂宗支頗多不暇論茲但就事論事海舟普慈寶峯明瑄天奇瑞一脈出自萬峯其來舊矣一旦改系東明下其訛一東明之嗣自有海舟永慈遺而不收反收普慈嗣東明其訛二以永慈法嗣混收為普慈一人之嗣其訛三笑巖得法於無聞明聰今收嗣正聰其訛四笑巖聯芳偈法嗣止六人今收八人其訛五三際瑞峯一人列為二人其訛六龍池法嗣四人削雪嶠於譜外其訛七去取移易混紀冒承變亂濟宗世次者始於此今之修明僧史者請從此處討得頭腦清楚所謂一清一切清否則一訛一切訛五宗救安隱弘忍述字潭吉出在崇禎十年丁丑臨濟第二十四世海舟普慈禪師據源流列為東明旵公得法弟子然未見其語録惟萬峯録中列為上首今姑依源流列此以俟考證萬峯印記頌云龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親海安同知沈貫居士問師曰圓覺經云修多羅教如標月指若復見月了知所標畢竟非月此理如何師舉手曰經也月也指也士懵然師拍案一下曰月落寒潭士有省乃曰從此知師之道非凡情之所能測三峯藏云藏嘗溯源流一脈自五燈之末所載密庵咸傑禪師而下遞代考之若破庵先無準範寶藏持東明旵海舟慈寶峯瑄無聞聰七尊宿皆未得見其語録今所入頌者則破庵無準語出於千岩録中之一斑然未盡其妙寶藏東明僅得旵公塔銘相見語已見其接人作略之高入道源底之微寶峯見天奇録之參見語無聞見天奇録之印證語已上雖未盡見其堂奧波爛然於源流次第則無奭誤獨海舟慈公出萬峯語録有印證偈而苕溪花城隱士海安同知沈貫撰萬峯禪師塔銘敘在萬峯得法十人大弟子偈中為第一人後自序云自念為師嗣法弟子海舟和尚座下參學久矣况我父祖亦受天目中峯和尚誡諭因往來不徹余一日請問海舟曰圓覺經云修多羅教如標月指若復見月了知所標畢竟非月此理如何舟舉手曰經也月也指也余懵然舟拍案一下曰月落寒潭余因而有省云云則知海舟與寶藏果林為伯仲自是旵公諸父行那復列為旵之徒輩耶豈不數十年間便有二海舟耶或名號之字有誤耶據此不無疑案姑闕以俟得海舟寶峯語録塔銘以正之云救曰源流之設若家譜然所以考定厥祖若宗承接次序俾後代兒孫觀源視流僶勉進道不使厥跡有愧先德非徒彰顯名號而已若夫上下相亂尊卑倒置如寶藏東明海舟三尊宿譜安用哉元季多兵國家至今近三百年僧行稠雜宗祖之道微亦極矣雖有一二大士深韜巖穴名聞未著故其語録無傳焉三峯先師頌臨濟宗至海舟慈公翻覆推求得其梗槩蓋慈公為萬峯蔚禪師得法高弟萬峯有付法偈云云而海安同知沈貫為蔚撰塔銘自序得法於萬峯大弟子海舟和尚則海舟與寶藏為伯仲而東明旵公實舟之法姪也今源流以海舟為東明之嗣豈有二海舟耶丙子冬余救五宗適得五世祖無聞聰禪師語録有客窗夜話一篇序從上源流甚確自臨濟至高峯十有八傳皆與近代所序不異自高峯而下則曰出二人其一為中峯本公其一為斷崖義公義不聞中峯出千巖長長出萬峯蔚蔚出海舟慈慈出寶峯瑄瑄出天奇瑞而略不及寶藏東明則二公為疊出可知矣又據四世祖笑巖月心寶禪師有聯芳偈六首其自序曰不肖上承迦葉六十三世之元祖下繼曹溪三十一葉之真孫今以源流數之自迦葉至笑巖順流而下為六十五世自笑巖至曹溪泝流而上則三十三傳較聯芳自序多二世則聰公不及寶藏東明為是也且聰公為海舟三世孫笑巖又聰公之子蹈踵接武只一二代亦若吾輩之於龍池使年歲稍長猶足望見顏色豈數十年間錯謬遂至此耶實龍池之誤非今日之誤也然則龍池豈無故插入二人歟余嘗見香巖古溪澄和尚祭海舟文有曰續高峯七世之燈紹旵祖百年之踵自高峯至海舟實七世而寶藏東明在焉則東明之下別出一海舟無疑矣不然無聞之親口所說笑巖之親筆所書萬峯之偈沈子之銘俱不足信乎凡事之疑難當委曲而折衷之求其所安而後已今者據師承之偈考銘傳之載合世數之符詳遠祖之說四處咸契獨香巖祭文一疑未決茲可懸解者也且馬祖石頭同時並化既有二道悟於前矣則萬峯東明祖孫繼踵安知無二海舟於後哉此不待辨而依前四說為安矣聞天童師翁有意改政之録此以備採擇而寶藏東明二公依舊不敢擅專也臨濟第二十五世南京高峯寺寶峯明瑄禪師海舟嗣天奇瑞公來參師云甚麼處來云北京師云只在北京別有去處云隨方瀟灑師云曾到四川否云曾到師云見法鑑否云曾見師云見楚山否云曾見師云法鑑會下多少衆云三十師云楚山會下多少衆云三十師云且不一般云本無差別豈分彼此師云四川景界與我此景界如何云江山雖異風月一般師豎起拳頭云還有這箇麼云無師云因甚卻無云非我景界師云如何是你景界云諸佛不能識誰敢強安名師云汝豈不是著空云終不向鬼窟裏作活計師云西天九十六種外道你是第一奇拂袖便出臨濟第二十六世天奇本瑞禪師寶峯嗣章次不録潭吉據萬峯沈貫無聞笑巖四種金石之言證海舟普慈確嗣萬峯可謂詞正理正但以古溪一說銷釋不去故作懸解謂東明下必別有一海舟自翼善碑出果然別有一海舟永慈係東明之嫡嗣屬古溪所祭者則潭吉卓有先見之明也今準翼善碑古溪文靜庵敘三種舊章自是寶藏東明永慈一脈世系準無聞笑巖等十種祖訓自是萬峯普慈明瑄天奇一脈世系兩家世系舊來相安今之修明僧史者請去私裁公心參酌著為定譜不亦美乎闢妄救天童圓悟集字密雲出在崇禎戊寅第一世湖廣南嶽懷讓禪師第二十五世蘇州鄧尉時蔚禪師第二十六世蘇州鄧尉普持禪師第二十七世杭州東明慧旵禪師第二十八世東明海舟普慈禪師第二十九世南京寶峯明瑄禪師第三十世焭絶天奇本瑞禪師第三十一世隨州關子嶺正聰禪師杭州東明海舟普慈禪師蘇之常熟人姓錢世宗儒業出家於破山至慧日寺聽講楞嚴至但有言說都無實義處乃曰言說今日愈多矣遂歸日夜閲經尋思實義面顏日悴有居士問曰師顏色有病師曰佛法不明故爾非病也士曰佛法不明何不往府中鄧尉山問取萬峯和尚去師聞之欣然便詣鄧尉見萬峯峯問曰沙彌何來師禮拜起曰常熟峯曰到此何為師舉前話再拜求示峯便劈頭兩棒攔背一踏以腳兩踢曰只者是實義師有省起曰好只好太費和尚心力峯笑而許之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親又曰子當匿迹護持莫輕為人師範師自以為得乃結庵於洞庭山塢草有九年一日僧至師問曰上座何來曰安溪曰安溪有人麼曰有虛白和尚說法不異高峯曰是誰弟子曰寶藏曰有甚言句僧舉室中驗人語曰心不是佛智不是道三藏不是法是甚麼下語者皆不契舉畢復問曰曾參寶藏否師曰我與寶藏同參萬峯僧曰當日有何所見遂隱於此就不再參人去師曰我昔日問萬峯但有言說都無實義峯便打自從此得悟僧曰請言得之所以師曰但要人知痛癢的是實義是妙心言說盡屬皮毛僧曰若據此見解生死尚未了何得言悟未在未在不見道心不是佛智不是道耶師遂有疑棄庵渡湖往安溪詣東明適有人設齊師至關前問明曰今日齊是甚麼滋味明曰到口方知說即遠矣師曰如何是到口味明即打滅燈曰識得燈光何處著落味即到口師無語次日黎明遣侍者請師師至明問曰曾見人否師曰見只見一人說出恐驚人明曰假使親見釋迦依然是箇俗漢但說何妨師曰萬峯明曰為序先後耶為佛法耶若序先後萬峯會下有千人若論佛法老闍黎未夢見在何驚之有若親見萬峯萬峯即今在什麼處師面赤罔然明曰若如此不曾見萬峯師歸客寮三晝夜寢食俱忘偶值香燈繩斷墮地忽然大悟詣關前呈悟繇明曰老闍黎承嗣萬峯去師曰白公為我打徹何得承嗣萬峯明乃笑遂集衆出關升座曰瞿曇有意向誰傳迦葉無端開笑顏到此豈容七佛長文殊面赤也茫然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一脈續綿綿乃擲下拄杖下座師即入方丈禮謝明曰老僧不出月去也至草七夜辭衆草九日示寂師復欲遁歸洞庭四衆苦留乃繼其席萬峯忌日師拈香指真曰我幾淹殺你甕裏幸是普慈若別人不可救也爇此瓣香堪酬接引喝一喝曰只笑你護短沒頭師佛法當人情展坐具禮拜又拈香曰此一瓣香供養東明長老一片赤心鞭䇿令余洞達宗源連喝兩喝曰受恩深處便為家有乳方知是阿娘禮拜起慟哭歸方丈臨示寂說偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打曰釋迦至我六十二世有不可數老和尚又打曰多向者裏安身咄乃投筆而逝在景泰元年全身塔於東明左側得法十二人五宗救載海舟普慈禪師據源流列為東明旵公得法弟子然未見其語録惟萬峯録中列為上首今姑依源流列此以俟考證萬峯印記頌云龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親海安同知沈貫居士問師曰圓覺經云修多羅教如標月指若復見月了知所標畢竟非月此理如何師舉手曰經也月也指也士懵然師拍案一下云月落寒潭士有省乃云從此知師之道非凡情之所能測救曰源流之設若家譜然所以考定厥祖若宗承接次序俾後代兒孫觀源視流僶俯進道不使厥迹有愧先德非徒彰顯名號而已若夫上下相亂尊卑倒置如寶藏東明海舟三尊宿譜安用哉元季多兵國家至今近三百年僧行稠雜宗祖之道微亦極矣雖有一二大士深韜巖穴名聞未著故其語録無傳焉三峯先師頌臨濟宗至海舟慈公翻覆推求得其梗槩蓋慈公為萬峯蔚禪師得法高弟萬峯有付法偈云云而海安同知沈貫為蔚撰塔銘自序得法於萬峯大弟子海舟和尚則海舟與寶藏為伯仲而東明旵公實海舟之法姪也今源流以海舟為東明之嗣豈有二海舟耶丙子冬余救五宗適得五世祖無聞聰禪師語録有客窗夜話一篇序從上源流甚確自臨濟至高峯十有八傳皆與近代所序不異自高峯而下則曰出二人其一為中峯本公其一為斷崖義公義不聞中峯出千巖長長出萬峯蔚蔚出海舟慈慈出寶峯瑄瑄出天奇瑞而略不及寶藏東明則二公為疊出可知矣又據四世祖笑巖月心寶禪師有聯芳偈六首其自序曰不肖上承迦葉六十三世之元祖下繼曹溪三十一世之真孫以今源流數之自迦葉至笑巖順流而下為六十五世自笑巖至曹溪泝流而上則三十三傳較聯芳自序多二世則聰公不及寶藏東明為是也且聰公為海舟三世孫笑巖又聰公之子蹈踵接武只一二代亦若吾輩之於龍池使年歲稍長猶足望見顏色豈數十年間錯謬遂至此耶實龍池之誤非今日之誤也然則龍池豈無故插入二人歟余嘗見香巖古溪澄和尚祭海舟文有曰續高峯七世之燈紹旵祖百年之踵自高峯至海舟實七世而寶藏東明在焉則東明之下別出一海舟無疑矣不然無聞之親口所說笑巖之親筆所書萬峯之偈沈子之銘俱不足信乎凡事之疑難當委曲而折衷之求其所安而後已今者據師承之偈考銘傳之載合世數之符詳遠祖之說四處咸契獨香巖祭文一疑未決茲可以懸解者也且馬祖石頭同時並化既有二道悟於前矣則萬峯東明祖孫繼踵安知無二海舟於後哉此不待辨而依前四說為安矣聞天童師翁有意改正之録此以備採擇而寶藏東明二公依舊不敢擅專也老僧誠有意探討故刻小字印於語録之前數年竟不能得邇來有法姪山茨將海舟寶峯二祖機緣刻行於世蓋得諸丹壑查居士家藏佛祖源流中者然則萬峯蔚出寶藏持持出東明旵旵出海舟慈慈出寶峯瑄又得靜庵素禪師語録素為海舟二世孫敘聯芳圖云釋迦文佛首傳心印二十八代至菩提達磨東土為初祖二祖慧可大師三祖僧璨大師四祖道信大師五祖弘忍大師六祖慧能大師南嶽讓大師馬祖一禪師百丈海禪師黃檗運禪師臨濟玄禪師興化獎禪師南院顒禪師風穴沼禪師首山念禪師汾陽昭禪師慈明圓禪師楊岐會禪師白雲端禪師東山演禪師佛果勤禪師虎丘隆禪師應庵華禪師密庵傑禪師破庵先禪師無準範禪師雪巖欽禪師高峰妙禪師中峯本禪師千巖長禪師萬峯蔚禪師寶藏持禪師東明旵禪師海舟慈禪師雲溪瑛禪師瑛與寶峯瑄為昆季焉據是益證源流的的相承海舟為東明旵祖之嗣無疑矣潭吉謂無聞語録有客窗夜話一篇序從上源流甚確略不及寶藏東明則二公為疊出可知數十年間錯謬遂至此實龍池之誤但疑香巖祭海舟文有曰續高峯七世之燈紹旵祖百年之踵遂謂東明下別出一海舟引馬祖石頭同時並化既有二道悟於前證萬峯東明祖孫繼踵安知無二海舟於後可見潭吉妄為折衷抹殺寶藏東明二祖不信我龍池老人的的源流即此一案悖逆亦已甚矣何况其他南京高峯寺寶峯明瑄禪師海舟嗣姑蘇吳江人姓范氏在俗為木匠因海舟和尚造塔院斧傷自足痛甚索酒喫舟聞之往謂曰適來范作頭傷足猶可假若斫去頭有千石酒與作頭喫作頭能喫否師有省即止酒遂求為僧舟即與披剃曰今日汝頭落也師曰頭雖落好喫酒人頭不落也乃充火頭一日師負薪舟見曰將刺棘作麼師曰是柴舟呵呵大笑師罔然舟曰是柴將去燒卻師起疑曰和尚畢竟是甚麼道理故問我我不能答是夕刻意參究不覺被火燎去眉毛面如刀割以鏡照之豁然大悟呈悟於舟舟便打師奪拄杖曰者條六尺竿幾年不用今日又要重拈舟大笑師呈偈曰棒頭著處血痕斑笑裏藏刀仔細看若是英靈真漢子死人喫棒舞喃喃舟曰即此偈語可紹吾宗乃付偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深藏止從此名聞遐邇學者雲集得法五人逝於成化八年十二月九日全身塔於東明寺左天奇本瑞禪師寶峯嗣章次不録觀天童以普慈明瑄天奇一脈系東明下者惟據靜庵一聯芳圖敘別無確據也海舟永慈行實碑載法嗣一百有四人雲溪智瑛其一也瑛下出靜庵素素為永慈二世孫天童指為普慈二世孫豈非大錯素所敘者自是寶藏東明永慈雲溪一脈世系與普慈明瑄天奇無涉昔天童作禪燈世譜混收雲溪智瑛與寶峯明瑄同為海舟普慈之嗣已是誤矣今復踵前誤又指靜庵敘中雲溪瑛與寶峯瑄為昆季豈非誤而又誤乎按敘自雲溪瑛禪師已上皆靜庵所敘也其下曰瑛與寶峯瑄為昆季焉據是益證源流的的相承海舟為東明旵祖之嗣無疑矣者非靜庵語也是天童硬證海舟普慈嗣東明決斷之語也今海舟永慈係翼善碑之所載者屬古溪澄之所祭者為靜庵素之所敘者自是東明旵之嫡嗣也天童以海舟普慈重嗣東明錯誤炳然更復何辨天童不遵無聞笑巖嫡祖親宗之祖訓擅改宗譜變亂世次倒置祖孫則悖逆之罪請自領回東明祖燈録東明通際集字山茨東明第二代海舟慈祖傳略海舟普慈禪師蘇之常熟人姓錢世宗儒業出家於破山初至慧日寺聽講楞嚴至但有言說都無實義處乃曰言說今日愈多矣遂歸日夜閲經尋思實義面顏日悴有居士問曰師顏色有病師曰佛法不明故爾非病也士曰佛法不明何不往府中鄧尉山問取萬峯和尚去師聞欣然便詣鄧尉見萬峯峯問曰沙彌何來師禮拜起曰常熟峯曰到此何為師舉前話再拜求示峯便劈頭兩棒攔背一踏以腳兩踢曰只者是實義師有省起曰好只好太費和尚心力峯笑而許之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親又曰子當匿跡護持莫輕為人師範自以為得乃結廬於洞庭山塢草有九年一日僧至師問曰上座從何處來曰安溪曰安溪有人麼曰有虛白和尚說法不異高峯曰是誰弟子曰寶藏曰有何言句僧舉室中驗人語云心不是佛智不是道三藏不是法是甚麼下語者皆不契舉畢復問師曰參寶藏否師曰我與寶藏同參萬峯僧曰當日有何所見遂隱於此就不再參人去師曰問但有言說都無實義峯便打我從此得悟僧曰請言得之所以師曰但要人知痛癢的是實義是妙心言說盡屬皮毛僧笑曰若據此見解生死尚未了何得云悟未在未在不見道心不是佛智不是道耶師遂有疑曰彼處衆中有真大徹者麼僧曰無師即棄庵渡湖往安溪詣東明適有人設齊師至關前問明曰今日齊是甚麼滋味明曰到口方知說即遠矣師曰如何是到口味明即打滅燈曰識得燈光何處著落味即到口師無語次日黎明遣侍者請師師即至明問曰曾見人否師笑曰見只見一人說出恐驚人明曰假使親見釋迦依然是箇俗漢但說何妨師曰萬峯明曰為敘先後耶為佛法耶若敘先後萬峯會下有千人若論佛法老闍黎佛法未夢見在何驚之有若親見萬峯萬峯即今在甚麼處師面赤罔然明曰若如此不曾見萬峯師歸客寮三晝夜寢食俱忘偶值香燈繩斷墮地忽然大悟詣關前呈悟繇明曰老闍黎承嗣萬峯去師曰白公為我打徹豈得承嗣萬峯明乃笑遂集衆出關升座曰瞿曇有意向誰傳迦葉無端開笑顏到此豈容七佛長文殊面赤也茫然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一脈續綿綿乃擲下拄杖曰千斤擔子方全付玄要如今拄杖談以拂子擊三下下座師即入方丈禮謝明曰老僧不出月去也至草七夜辭衆草九日示寂師復欲歸洞庭四衆苦留乃繼其席萬峯忌日師拈香指真曰我幾淹殺你甕裏幸是普慈若是別人不可救也爇此瓣香堪酬接引喝一喝云只笑你護短沒頭師佛法當人情展坐具禮拜又拈香云此一瓣香供養東明長老一片赤心鞭策令余洞達宗源連喝兩喝云一言豈盡普慈心千古兒孫贊報恩又拈香云此一瓣香供養昔日師僧指南之力若不蒙師何繇今日他日到來拄杖三十喫有分堪報不報之恩喝一喝云受恩深處便為家有乳方知是阿娘禮拜起說偈曰源頭只在喝中存三要三玄四主賓五棒當人言下會四料還須句裏明末後真機死活句箇中消息在師承碎形粉骨酬師德將此深心報佛恩慟哭歸方丈臨示寂說偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打曰釋迦至我六十二世有不可數老和尚又打曰多向者裏安身咄乃投筆而逝在景泰元年全身塔於東明左側得法十二人東明第三代寶峯瑄祖傳略寶峯明瑄禪師姑蘇吳江人姓范氏在俗為木匠因海舟和尚造塔院斧傷自足痛甚索酒喫舟聞之往謂曰適來范作頭傷足猶可假若斫去頭有千石酒與作頭喫作頭能喫否師有省即止酒遂求為僧舟即與披剃曰今日汝頭落也師曰頭雖落好喫酒人頭不落也乃充火頭一日師負薪舟見曰將刺棘作麼師曰是柴舟呵呵大笑師罔然舟曰是柴將去燒卻師起疑曰和尚畢竟是甚麼道理故問我我迷不能答是夕刻意參究不覺被火燎去眉毛面如刀割以鏡照之豁然大悟作偈曰負薪和尚喚為棘火𦦨燒眉面皮急祖師妙旨鏡中明一鑑令人玄要得乃呈於舟舟便打師奪拄杖曰者條六尺竿幾年不用今日又要重拈舟大笑師又偈曰棒頭著處血痕斑笑裏藏刀仔細看若非英靈真漢子死人喫棒舞喃喃舟曰即此偈語可紹吾宗果是從緣入者永無退失從疑得者妙用隨機乃付偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深山止從此名聞遐邇學者雲集得法五人逝於成化八年十二月九日全身塔於東明寺左昔先師謂豫曰臨濟歷祖機緣棊布諸書皎如日星唯東明海舟寶峯諸祖出處未詳老僧老矣殆不復見汝其留意焉豫時輒懷探討志居無何領東明院事於破笥廢紙中得旵祖法語偈贊塔銘若干篇即付剞劂時以未得海舟諸祖為憂嗣後每遇緇素即以此告丁丑仲夏豫友古竹客吳門於丹壑查居士家見佛祖源流一書始於釋迦佛終至無聞祖蓋紫柏老人所集也老人罹難其書失傳古公持示豫豫如失故重一旦親逢焚香披閲始知海舟寶峯兩祖皆繼席東明全身靈塔在焉喜躍無既即摘兩祖機緣刻出題曰東明祖燈録咦殆將熄而復明豈非法門幸事也耶謹拜稽首而為之跋通際又識按紫柏塔銘謂燈録未續為法門一大憾焉既有此書何憾之有則此書非紫柏所集明矣寶華忍公曰丙子丁丑間姑蘇查氏突出佛祖源流書稿又出海舟先嗣萬峯後嗣東明一傳兼拈頌古德機緣百則天童先師得之即依原稿刻之云云據此則是書早為天童得之矣何得又有是書為古竹得之耶此無乃天童與際公相為表裏互相刻布以為多得一證據作闢妄救之張本以折辨潭吉故爾海舟普慈禪師語録住明州天童七世孫圓悟編花城弟子沈貫較閲序禪師諱普慈吳郡海虞錢氏子也少讀楞嚴有疑往參萬峯大師得悟印可付以法偈不久辭大師結廬於西洞庭三十年不過湖每嘗自痛未徹法源萬峯久滅寶藏已逝今無其人發明差別法智聞虛白旵公住安溪東明說法親承萬峯祖印作用大有超過古人隨棄廬往叩居旬日大悟深入堂奧洞達濟宗源底纖毫無滯遂嗣旵公始知悟有淺深法無隱祕但有坐定悟境而不肯百尺竿頭策進一步耳嗚呼海舟嗣旵公一事自佛至今無有其人人我四相些微未盡者不能為之師誠古佛再現人間也無奈師年邁臘尊出世無何而入滅宗風未能大暢寰中惟有拈頌古德機緣百則令慧日重開破暗千古其頌或引人詩句出自手眼有合佛祖意者採托而成之箇中意旨是非不敢固必但見師之操履人品為法忘形去名存實自無苟足而其拈頌量不妄意測度謬為撰述者也明眼人見之究之奉行有日在嗟乎今時魔熾法殘拈花一脈寥寥不顯於世真正宗師煨鐺山穴保養道胎俟時待緣暗流枝派使兒孫布揚祖道雲興雨澍潤澤靈根佛祖花開香浮震旦觸聞其香咸令悟入者舍師之裔其誰歟時景泰丁丑三月九日花城弟子沈貫拜序傳海舟普慈禪師蘇之常熟人姓錢世宗儒業出家於破山初至慧日寺聽講楞嚴至但有言說都無實義處乃曰言說今日愈多矣遂歸日夜閲經尋思實義面顏日悴有居士問曰師顏色有病師曰佛法不明故爾非病也士曰佛法不明何不往府中鄧尉山問取萬峯和尚去師聞欣然便詣鄧尉見萬峯峯問沙彌何來師禮拜起曰常熟峯曰到此何為師舉前話再拜求示峯便劈頭兩棒攔背一踏以腳兩踢曰只這是實義師有省起曰好只好太費和尚心力峯笑而許之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親此段敘生緣悟由授受之事可取又曰子當匿跡護持莫輕為人師範師自以為得此段伏此為後假設一僧激參東明之因由乃結廬於洞庭山塢草有九年一日僧至此下一段應子當匿跡莫輕為人師範句師問曰上座何處來曰安溪曰安溪有人麼曰有虛白和尚說法不異高峯曰是誰弟子曰寶藏曰有甚言句僧舉室中驗人語曰心不是佛智不是道三藏不是法是甚麼下語者皆不契舉畢復問師曰參寶藏否師曰我與寶藏同參萬峯僧曰當日有何所見遂隱於此就不再參人去師曰問但有言說都無實義峯便打我從此得悟僧曰請言得之所以師曰但要人知痛癢的是實義是妙心言說盡屬皮毛僧笑曰若據此見解生死尚未了何得云悟未在未在不見道心不是佛智不是道耶師遂有疑曰彼處衆中有真大徹者麼僧曰無者僧有如此手眼不標名姓則為假設可知矣師即棄庵渡湖往安溪詣東明適有人設齊師至關前問明曰今日齊是甚麼滋味明曰到口方知說即遠矣師曰如何是到口味明即打滅燈曰識得燈光何處著落昧即到口人設齊日中時也何有打滅燈之事耶師無語次日黎明遣侍者請師師即至明問曰曾見人否師笑曰見只見一人說出恐驚人明曰假使親見釋迦依然是個俗漢但說何妨師曰萬峯明曰為敘先後耶為佛法耶若敘先後萬峯會下有千人若論佛法老闍黎佛法未夢見在何驚之有若親見萬峯萬峯即今在甚麼處師面赤罔然明曰若如此不曾見萬峯問倒普慈猶可救取萬峯始得師歸客寮三晝夜寢食俱忘偶值香燈繩斷墮地忽然大悟詣關前呈悟繇明曰老闍黎承嗣萬峯去師曰白公為我打徹豈得承嗣萬峯明乃笑遂集衆出關升座曰瞿曇有意向誰傳迦葉無端開笑顏到此豈容七佛長文殊面赤也茫然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一脈續綿綿乃擲下拄杖曰千斤擔子方全付玄要如今拄杖談以拂子擊三下下座付則付矣不審置萬峯於何地若果如此則萬峯濫付非人之責千古不能逃也師即入方丈禮謝明曰老僧不出月去也至草七夜辭衆草九日示寂師復欲遁歸洞庭四衆苦留乃繼其席萬峯忌日師拈香指真曰我幾淹殺你甕裏幸是普慈若是別人不可救也爇此瓣香堪酬接引喝一喝曰只笑你護短沒頭師佛法當人情展具禮拜又拈香曰此一瓣香供養東明長老一片赤心鞭策令我洞達宗源連喝兩喝曰一言豈盡普慈心千古兒孫贊報恩又拈香曰此一瓣香供養昔日師僧指南之力若不蒙師何繇今日他日到來拄杖三十喫有分堪報不報之恩喝一喝曰受恩深處便為家有乳方知是阿娘禮拜起說偈曰源頭只在喝中存三要三玄四主賓五棒當人言下會四料還須句裏明末後真機死活句箇中消息在師承碎形粉骨酬師德將此深心報佛恩慟哭歸方丈萬峯忌日拈香可也又非出世開堂何得東明師僧香一齊拈耶又師僧香有受恩深處便為家有乳方知是阿娘則普慈承嗣師僧可也又承嗣東明一場剛剛學得一喝帶繫後人七喝八喝不知休者真好笑也湘翁和尚云嘗見天童述海舟初受萬峯印契廬洞庭草餘年遇激發再參東明徹證遂承東明記莂有拈香不淹在萬峯𧆌甕等語據此說則東明為萬峯二世孫海舟為萬峯三世孫也世間豈有三世孫而刺其上祖為沒頭師以佛法當人情乎又豈有二世孫而付其上祖所印證草餘年之子乎佛法當人情者則法眼不明萬峯係濟北正傳縱以慈悲之由諒不作此落草之戲而海舟受多乳為娘第不知海舟視東明與萬峯若為親疏也臨示寂說偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打曰釋迦至我六十二世既以善慈嗣東明矣又以寶藏東明合於世次之中其用心也可謂密矣有不可數老和尚又打曰多向者裏安身咄乃投筆而逝臨寂說偈豈有投筆之事在景泰元年全身塔於東明左側得法十二人禪燈世譜以永慈法嗣雲溪智瑛等七人與寶峯明瑄等五人混收為普慈一人之嗣是為十二人此曰得法十二人者蓋本世譜而來也舉興化打克賓拈曰若為濟宗兒孫必要明他家裏事豫昔萬峯老人付我偈便以為得直至今日始知我錯萬峯不錯一遇東明和尚乃明棒頭賞罰言句亦然果然悟在己而法藉師豈曰一悟即為了當如以一悟靈通不求師法正謂威音已前無師可也威音已後師師相授者此也所以克賓識得父師苦心策發已明向上關棙子洞達閫閾中事不在言宣失錢喫棒受罰出院骨碎身粉也難酬報興化萬一况打罰出院乎海長老今日所以不嗣萬峯而嗣東明者亦此也古諺曰養女方知娘受苦生子乃識父辛勤誠哉是言也實是箇中大事豈容草草若與人抽釘拔楔坐獅子座為人天師抉人眼翳紹佛祖位者必須一一透過切莫以悟為是將綱宗抹殺置而勿究何異天魔外道莽蕩招殃悔乎真我兒孫不可忽之慎之究之參之盡之切須透之云云三篇說話同一意旨舛僞多端不必檢辨只消海舟永慈一碑證之則海舟普慈重嗣東明之說盡是僞揑嗟乎為欲折辨一潭吉造出許多僞說自誤誤人迄無砥止可悲可痛寶華忍禪師辨海舟事蹟曰從上源流萬峯蔚祖後即寶藏持東明旵旵後乃續海舟慈寶峯瑄等而海舟慈蔚祖之法嗣亦列三峯藏公常疑其錯誤而無所考曾有闕疑一段載於源流頌稿中後刻全集者刪之耳丙子丁丑間姑蘇查氏突出佛祖源流書稿以為達觀可公所集又出海舟先嗣萬峯後嗣東明一傳兼拈頌古德機緣百則并有景泰丁丑三月九日花城弟子沈貫序天童先師得之亦未究其真僞即依原稿刻之山僧一日偶閲萬峯語録後有塔銘一篇篇首有苕溪花城隱士海安同知沈貫撰諸字銘末有門人普壽敬持行實勉余請銘余才輕德薄不敢污禪師之德自念為師嗣法弟子海舟和尚座下參學久矣復述請益海舟言下有省機緣一段甚為駭然何也萬峯示寂乃洪武十四年歲次辛酉普壽為諸徒之長所以輯録請銘皆渠為首今沈公既親受普壽之請作銘大約不過萬峯寂後數年事耳沈公已休居林下自稱隱士矣自洪武辛酉至景泰丁丑又過七十七年豈復及有海舟録之序乎且據傳中載海舟參東明乃在正統辛酉示寂於景泰庚午時年九十六歲則正統辛酉參東明時已八十七歲矣如何傳中序中又載海舟少聽楞嚴有疑往參萬峯得悟印可付以法偈不久辭萬峯結廬於西洞庭三十年因僧激發是年乃有參東明之事據此則參萬峯時既曰少年不二三十歲時耳不久辭去結廬三十年亦不過五六十歲時耳與後八十七歲參東明之事如何下落且云不久辭去結廬洞庭則海舟結廬時萬峯猶未示寂也即據萬峯示寂於洪武辛酉海舟參東明於正統辛酉已相去六十年矣結廬三十年參東明之事又如何下落總之此稿出於查氏渠不過要使一日木頭顛倒生之讖源流有據見海舟之事可疑乃就萬峯塔銘有沈公自言海舟座下參學之說可證僞作序傳等以海舟繼東明之後為實據不知欲實而反虛也且東明旵祖塔銘乃毗陵忠安公胡濙所撰據山茨際公自述崇禎乙亥住東明於破笥廢紙中所得銘中並無海舟之事僅云師世壽七十僧臘五十五弟子僅百人受戒者請誨益者數萬人而已若嗣東明之海舟果屬萬峯之徒乃法門千古大關係何以銘中不及一言倘海舟一見而去不續住持或有旁人生障或有事煩遺失之事今海舟傳中載見東明於辛酉六月東明即於是月草九示寂海舟復欲遁歸洞庭四衆苦留乃繼其席則海舟乃續旵祖住持矣旵祖銘中云今其上首本寺住持明覺令僧某某齎行狀徵豫為銘則海舟傳云四衆苦留乃繼其席然乎否耶已上種種錯謬如是海舟傳録僞造無疑今按年代并諸不一之論以折衷之據潭吉五宗救中欲截去寶藏持東明旵直以萬峯蔚海舟慈寶峯瑄天奇瑞為一派以萬峯録之有海舟法嗣乃為的據無奈香巖古溪澄和尚有祭海舟文云續高峯七世之燈紹旵祖百年之踵自高峯至海舟實七世而寶藏東明在也且天童先師闢妄救中有云得靜庵素禪師語録素為海舟二世孫敘聯芳圖自西天四七東土二三以至萬峯蔚寶藏持東明旵海舟慈雲溪瑛瑛與寶峯瑄為昆季則東明嗣之有海舟亦為的據矣所以潭吉疑東明下有別出一海舟引馬祖石頭同時並化有二道悟於前證萬峯東明祖孫繼踵安知無二海舟於後者此說甚似第當知吾派所嗣之海舟亦東明之海舟非萬峯之海舟矣不惟有雲溪瑛為寶峯瑄昆季可證且海舟至天奇止隔一寶峯耳萬峯之海舟洪武辛酉萬峯示寂時沈貫已言在海舟座下參學久矣則海舟行化已久天奇熒絶集刻在弘治戊申序中集中並無寂後事似乎天奇猶在洪武辛酉至弘治戊申相去一百零八年中間焉得止有寶峯一代惟東明示寂於正統辛酉海舟已在法嗣之列次而寶峯次而天奇至弘治戊申四十八年祖孫相繼甚為穩當故特識之海舟普慈録傳之僞不待辨而已知矣但指查氏僞造無乃子為父隱至於據靜庵敘證天童之說為必是其錯有三謂寶藏東明在源流中其錯一認東明下海舟為正傳指萬峯下海舟為別出其錯二輕信靜庵敘為的據而反悖逆無聞笑巖嫡祖親宗十種祖訓其錯三終不若潭吉考辨不違祖訓正大光明嗟乎若海舟永慈碑出則證龜成鱉幾莫能辨
