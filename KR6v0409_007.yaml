body:
  text: 衡陽後學智楷惟直氏述洞宗世次備考之三天笠珍公出兩宗決疑因余寄洞濟世次備考而作也洞宗鹿門自覺原出自芙蓉楷下濟宗海舟普慈原出自萬峯蔚下兩宗向有舊章可據後之著述家不從舊章概據新條不惟源流疊出且又混訛紀載故余詳述舊章於備考中逐一點出某祖事蹟出載某碑某集及人名世次朝代歲月如揭杲日於中天高明之士一目了然珍公居覆盆下不覩天日反謂余不必廣引名公鉅卿碑記以證少林繼席宗主為幾十幾世且文人筆墨何足為憑嗟乎何詞與理俱謬至此耶夫世出世間聖聖賢賢一生事業或載之青史或勒之貞珉天下後世有所徵信據珍公謬言謂碑記不足憑公今表出持旵慈瑄靈塔穹碑高豎江浙不審可憑乎否耶本宗殘碑斷簡破簏敗紙悉足為憑他宗貞珉信史俱不可憑嗚乎此語果以欲服人乎服己乎少林為初祖道場歷來皆洞宗諸祖代膺簡命開堂說法珍公概以宗主目之彼奉旨開堂之祖師珍公一言烏足為輕重耶特珍公徒自欺其心耳公欲蓋覆無聞出處年代反謂余何必窮搜深遠莫考之年代生扭南北鹿門覺捏為一人夫考事之遠近不以年代何以知其先後故歷代國史不惟逐年系以甲子且逐日系以甲子使奸宄之徒不能妄栽罔布誣張枉李故也如明聰承嗣已死五十四年前之本瑞此固不可以年代碑記燈錄諸書為憑若藉此為憑便見其非面稟親承也吾芙蓉楷鹿門覺青州辯磁州寶王山體雪巖滿萬松秀雪庭裕一脈師承年代碑記燈錄是俱可考者如宋徽廟時洪覺範濟宗之名宿也其撰鹿門燈塔銘明載燈公於政和七年夏繼襄州鹿門山政和萬壽禪寺慧定禪師自覺法席此鹿門覺係北宋徽宗朝人明矣又祭文明載芙蓉為燈公之師自覺為燈公之兄此鹿門覺出自芙蓉楷下又明矣重修大乘山普嚴寺碑明載自覺於崇寧三年出住大乘劄付碑明載自覺於大觀元年補住淨因塔記明載自覺於政和元年遷住鹿門政和七年春示寂夫崇寧三年出世政和七年示寂凡三主大剎歷年僅十四載則大乘自覺淨因自覺鹿門自覺先後住持原是一人更明矣何謂余以南宋鹿門覺與北宋淨因覺捏為一人耶高宗後為孝宗孝宗後為光宗光宗後為寧宗寧宗後為理宗理宗後為度宗度宗後為恭宗恭宗後為端宗端宗後為帝昺凡九帝歷一百五十三年是為南宋珍公指鹿門覺為南宋人未審載何燈錄憑何碑記在何年代試說說看續略雖誤記鹿門覺為天童淨嗣並無所謂南宋之說而珍公乃妄栽南宋二字別鹿門覺非淨因覺以便誣余扭捏二覺為一覺此等心行在流俗尚不肯用稱人天師範之知識乃甘心用之乎又引續略天童淨上堂一篇云芙蓉楷下二覺可捏為一覺楷與淨豈可復捏為一人迷人之偏執難破者蓋有如此按續傳燈增集續傳燈及禪燈世譜載天童淨法嗣僅石林秀孤蟾瑩雪庵瑾三人而已並無所謂鹿門覺也一箇烏梅語乃頌語現刻天童淨語錄內偈頌中非上堂語也其錄內亦無覺失笑之說續略誤紀為鹿門覺參天童淨事亦猶續略誤紀海舟普慈參東明旵墮燈悟道之機緣及旵出關上堂之偈語故事同一轍耳今存稿正宗俱認海舟永慈為祖未審此墮燈悟道之機緣消歸那一慈下縱續僧寶傳以此機緣偈語可移於翼善慈萬峯付普慈偈豈能移之於東明旵下耶二慈可捏為一慈蔚與旵豈可復捏為一人耶珍公既認永慈下智瑄為祖存稿又不合移普慈下明瑄為永慈之嗣明瑄可移為永慈下普慈付明瑄法偈則難移為永慈事也明瑄在俗時造東明塔院又豈可移之為智瑄事耶珍公辨兩宗世次不揆之於理一昧偏執新條以非舊章徒有見誚識者又不考續略以一百三十年前北宋徽宗朝之鹿門覺為一百三十年後南宋理宗朝天童淨之嗣為誤而反執機緣上堂為不可移易其考究之眼目何在辯難之眼目何在珍公又謂散木老人拈香當法道初興失於稽考後輩翻刻乃定此後拈散木老人香稱三十二代者此時法道已行稽考確實云云余備考詳述三十餘種舊章與散木老祖拈香不謀而合珍公此語拗直為曲害是亂真獨不見永樂時南石琇增集續傳燈紀洞宗世次乎他明載雪庭裕嗣萬松秀秀嗣雪嚴滿滿嗣王山體體嗣磁州寶寶嗣青州辯辯嗣鹿門覺覺嗣芙蓉楷所敘人名世次明如指掌珍公何不考看而謂吾散木老祖拈香失於稽考可乎公無乃欲圖遮掩本宗偽誤反塗訛他家世次智者不為也又云即據青州塔記中辯公金皇統九年去世即南宋紹興十九年云云者此又不考雪巖滿初參鄭州普照寶一則機緣載從容錄下卷二十紙續略列寶為未詳法嗣纘續列寶為青州辯法嗣續略纘續載雪巖參普照寶者係河南開封府鄭州普照寶也辯和尚雖嘗住普照寺者即山東青州府普照也珍公不考分野有山東河南之別梵剎有青州鄭州之別人名有辯寶之別但見雪巖參普照字面即指為參辯和尚是又難怪乎指贈瑄玉峯偈為付琳玉峯偈盜延安無聞機緣為光澤無聞機緣甚矣誤枉之甚有如此也夫金之開國在宋徽宗時元之開國在金章宗時江淮以北盡屬金元自高宗南渡建都杭州歷九帝一百五十餘年是為南宋至元世祖至元十七年宋亡始為一統於一百五十餘年間南宋與金元分為南北朝各守封疆除國家議和外餘則不敢通往來丹霞淳下出真歇了示寂在高宗紹興二十一年其奉旨數處開堂皆在南宋疆內了下出天童珏珏下出雪竇鑑鑑於宋孝宗淳熙十一年甲辰始住雪竇載雪竇錦鏡池記示寂在光宗紹熙三年壬子載高僧傳則鑑住雪竇僅九年耳鑑下出天童淨其開法在南宋寧宗朝示寂在理宗朝此丹霞一支衍於南宋如此鹿門覺下出青州辯據塔記自敘政和五年蒙覺和尚印證稟命至沂州禮見芙蓉尋住泗水龍門山宣和間出世青州天寧寺凡八年金兵破青州遂至燕京初住奉恩次住華嚴即萬壽也後住仰山天眷三年復住萬壽皇統六年退歸仰山九年十二月八日自書塔記十二日示寂觀此則辯和尚受囑禮祖出世皆在北宋徽宗時也宋史載建炎戊申正月十八日金陷青州則辯和尚於南宋高宗建炎二年始入燕京其住奉恩萬壽仰山及示寂皆在金太宗熙宗時當南宋高宗時也辯下出磁州寶於金皇統間住齊之靈巖見王山塔銘中所敘即南宋高宗時寶下出王山體據塔銘曰正隆五年受囑即南宋高宗紹興三十年明年開法王山大定十三年示寂即南宋孝宗乾道九年體下出雪巖滿於大定十九年開法王山載王山寺記即南宋孝宗淳熙六年滿下出萬松秀續略載秀初開法邢臺淨土明昌四年金章宗詔師禁庭上堂當南宋光宗紹熙四年也承安二年詔住仰山當南宋寧宗慶元三年也晚住報恩及從容庵塔銘載示寂在蒙古定宗元年當南宋理宗淳祐六年也秀下出雪庭淳續略載裕壬辰住少林壬辰即金哀宗天興元年當南宋理宗紹定五年也戊申詔住興國戊申即蒙古定宗三年當南宋理宗淳祐八年也庚申元世祖即祚賜光宗正辨之號當南宋理宗景定元年也至元八年元世祖詔集天下沙門雪庭之嗣居三之一當南宋度宗咸淳七年也至元十二年示寂當南宋恭宗德祐元年也此鹿門一支衍於金元如此今珍公偏執續略為據謂鹿門覺的出天童淨下然如淨既係宋季時人豈淨下所出一支得與五世祖丹霞一支並衍於南北朝耶又萬松秀於南宋紹熙初開法邢臺是與雪竇鑑同時豈有一脈所出八世祖孫同時弘法於宋金之國乎又淨公既為南宋寧理二宗時人而脚下所出之子孫反為北宋徽宗時人乎珍公何不智之甚何定要扭捏北宋徽宗朝之鹿門為南宋寧理二宗朝天童之嗣耶且又妄謂紹熙間雪巖參見辯公不知紹熙初萬松雪竇皆同時弘道者據公妄說則雪竇四世孫青州七世孫雪巖八世孫萬松皆紹熙間人豈一母一胎所生者乎至謂參見機緣載之燈錄今考續略纘續並無雪巖參見辯公之事亦無紹熙年間辯公為雪巖參見之年代豈續略纘續外別有所謂燈錄耶燈錄既無所載則公所謂莫考年代無根妄捏適足以自首自證其罪也公無乃要塗抹青州塔記故妄栽一紹熙年代使祖孫上下世次俱不合以誣祖誣人之罪加人曰益彰汝之年號塔記皆是無根捏出嗟乎此等心行指鹿為馬誣天罔地良心可謂喪盡矣天理可謂昧盡矣吾不知天地間乃有此等人耶若實不知鄭州普照非青州普照寶公非辯公則當謙虛下氣著艸鞋博問先知審實州郡人名之別乃為得也若已知人名州郡之殊故意贓誣古人塗訛舊章豈善知識之設心當如此耶芙蓉楷法嗣會元收十三人第一丹霞淳第五淨因自覺第十鹿門法燈十三人之內並無二自覺也余洞濟世次備考中據覺祖塔記曰崇寧三年住大乘大觀元年住淨因政和元年住鹿門則知鹿門自覺即淨因自覺也故引覺範撰法燈塔銘謂燈於政和七年夏繼襄州鹿門慧定自覺法席又祭燈文曰慧定既化遷住鹿門既孝其師又悌其兄故余申明之曰覺範紀芙蓉為法燈之師鹿門慧定自覺為法燈之兄則鹿門自覺即淨因自覺嗣芙蓉楷明矣珍公作存稿增集跋曰以洞宗世次卑下於諸方謬指覺範所撰銘文為證政和初之淨因覺即紹熙末之鹿門覺二覺合為一覺自絕六世淳了珏鑑淨覺正傳之祖據銘文中並無淨因之稱但述惠定禪師自覺革律為禪開剏未半而逝蜂窠蟻穴賴燈公一新之惠定下既有青州辯當時推為入此宗者皆其後學何不即命辯公繼席反藉同門燈公振起而新之灼見政和間惠定下未有辯公無疑矣嗟乎珍公心行用至此極矣不惟謂惠定自覺非淨因自覺亦謂青州辯非惠定之嗣邪說之甚無甚於此準公邪說指政和初之淨因覺為芙蓉之嗣指紹熙末之鹿門覺為如淨之嗣是為二自覺矣連此惠定自覺歷然三自覺也不審此自覺消歸何人若消歸芙蓉下公謂非淨因自覺若消歸如淨下又非紹熙末之自覺又不應於政和初住鹿門也不經之談豈不是邪說銘中無淨因之稱便謂惠定非淨因自覺又不合謂惠定法席藉同門振起自語矛盾豈不是邪說續略纘續以自覺嗣如淨妄引一箇烏梅作上堂語以為契合機緣其錯誤辨見於前按其傳但曰後承印記出住鹿門並無紹熙末鹿門覺之稱汝師存稿亦無此稱無根偽捏紹熙末之鹿門覺非政和初之淨因覺以為誣人以二覺合為一覺欲輩次高出諸方故自絕六世正傳之祖之張本不經之談豈不是邪說公前偽捏紹熙年間辯公三世孫雪巖滿尚及參見機緣載之燈錄今又偽捏紹熙末鹿門覺非政和初淨因覺準公邪說紹熙止有五年鹿門覺出青州辯辯出磁州寶寶出王山體體出雪巖滿祖孫五代參師受囑開法總在紹熙五年之間有是理乎不經之談豈不是邪說按錦鏡池記載智鑑於宋孝宗淳熙十一年甲辰住雪竇高僧傳載鑑於光宗紹熙三年壬子示寂則鑑住雪竇僅九年耳壬子後癸丑甲寅至乙卯改元慶元乃寧宗之年號也汝師存稿於鑑事迹闕載於如淨傳中亦未載受囑開法示寂之年月但曰師六坐道場未稟師承眾有是請師曰我待涅槃堂裏拈出果臨終拈香曰如淨行脚四十餘年首到乳峯失脚墮於陷穽此香今不免拈出鈍置我住雪竇足庵大和尚并書辭世偈曰六十六年罪犯彌天打箇𨁝跳活陷黃泉咦從來生死不相干書畢泊然而逝以此推之則如淨受囑在壬子前開法在寧宗朝示寂在理宗朝明矣據此則其父其子尚在紹熙年間兩相授受而其孫自覺亦於紹熙末年預先出住鹿門有是理乎不經之談豈不是邪說存稿列雪巖滿章次曰初見普照寶照曰兄弟年俊正須參叩老僧當年念念常以佛法為事滿乃避席曰和尚即今作麼生照曰如生冤家相似滿曰若不得和尚此語幾乎枉行千里照便下禪牀握滿手曰作家那復參王山得受記莂繼踵地持此雪巖機緣也載汝師燈錄中但曰初見普照寶不曾曰見普照辯亦無紹熙年間之說珍公誣天罔地偽捏紹熙年間青州辯為雪巖滿所參豈不是邪說法運際宋朝凡梵剎舉住持者皆奉朝命如圓悟大慧住持數剎悉皆奉詔如芙蓉住淨因陞法雲天寧自覺住大乘淨因鹿門悉皆奉詔銘中明說法燈自沂州禮辭芙蓉復至京師奉詔住鹿門朝命也非惠定所命也珍公謂惠定不命辯公繼席便謂辯公非惠定法嗣然則馬祖未繼南嶽法席百丈未繼馬祖法席乃至龍池未繼笑巖法席便謂龍池馬祖非笑巖南嶽法嗣可乎不經之談豈不是邪說又曰况靖國政和天下清寧時也青州百問之雄辯定應流布四方何續燈五燈竟無聞焉若辯公固嗣惠定則與真歇了同為青原下十三世孫矣豈有真歇下珏鑑淨三世四十餘人班班俱載燈錄何獨遺政和間之一辯孰知長翁鹿門大川未及見錄焉能先見青州於會元耶推此辯公確嗣紹熙間之鹿門判然無疑矣珍公真井中蛙不見天日宜乎取笑識者青州通玄二百問合刻與從容請益諸錄流行於世其來舊矣蓮大師行脚至燕得古本翻刻流通板存雲棲嘉興梵受經坊亦刻有板指月錄書目亦有青州百問名古今著語作頌者不知凡幾謂不流布四方可乎據辯祖塔記自述政和六年至沂州禮見芙蓉經年尋住龍門則在政和七年矣明年改重和又明年改宣和辯於宣和間出住青州府天寧寺經八載遂至燕京住奉恩萬壽按京城勝果正緣碑謂辯祖天會六年至燕即南宋高宗建炎二年也今按青州百問曰中都大萬壽禪寺辯和尚問慈雲十身禪寺覺和尚答燕京報恩禪寺林泉老人頌華亭生生道人梓通玄百問曰玉溪通玄庵圓通大禪師設問摩訶菩提蘭若萬松和尚仰答龍巖林泉老人頌華亭生生道人梓慈雲通玄俱辯祖法嗣萬松乃辯祖五世孫通玄四世姪孫林泉乃萬松法嗣生生道人不知嗣法何人據此則百問出在金太宗天會年間明矣今不必廣引古碑文獻為據只此百問署名立决續略錯誤續略明載萬松明昌四年奉詔入宮陞座則初開法邢臺實與智鑑同時而父子與智鑑四五世祖著語作頌可也與四五世孫青州通玄著語作頌無是理也著語作頌俱在金章宗時去上太宗天會時已七八十年矣顯見萬松五世祖青州辯係天會時人明矣續略以高宗建炎紹興間之青州辯為寧理二宗時如淨三世孫其錯誤立決無遺矣準公邪說捏出紹熙間鹿門覺又不合以六十餘年建炎紹興間之青州辯為之嗣而反妄謂判然無疑不經之談豈不是邪說續燈五燈俱出在南宋之季青州辯住在北金之國百問雖流布金國二書終不能入敵國收之也珍公妄謂無聞然則一載汝師存稿一載汝叔續正法眼藏不審聞耶否乎不經之談豈不是邪說真歇下珏鑑淨三世俱住宋浙境內故燈錄備收四十餘人然續燈於淨惟紀空名不列章次會元竟不收汝師存稿列淨章次曰出世閱數剎後遷淨慈復奉敕陞天童據此則如淨出住數剎名聞四方可知矣及遷淨慈奉敕陞天童則其名又聞於九重之內矣迄今尚有語錄行世當大川住靈隱輯會元時密邇淨慈不過數里如此奉敕開堂顯名尊宿於四十餘人班內不見載之抑又何耶况遠在金燕敵國境內之青州辯乎珍公見會元續燈遺辯未收遂偽捏一紹熙間之鹿門覺勒辯嗣之以亂人宗祖訛人世次不經之談豈不是邪說珍公重疊返復矯強邪說扭定青州辯之師鹿門覺確嗣天童淨余更有說焉據汝師存稿曰襄州鹿門覺禪師參長翁值翁上堂曰一箇烏梅似本形蜘蛛結網打蜻蛉蜻蛉落了兩片翼堪笑烏梅齩鐵釘師在眾中不覺失笑曰早知燈是火飯熟幾多時後承印可出住鹿門示眾曰盡大地是學人一卷經盡乾坤是學人一隻眼以者箇眼讀如是經千萬億劫常無間斷報恩秀曰看續不易以如淨語錄檢之一箇烏梅頌靈雲公案非上堂語亦無紹熙間之年代示眾著語出載從容錄作在金宣宗興定二年戊寅去紹熙末年甲寅僅二十五年以二十五年前鹿門覺示眾法語收入從容錄中可也以之為萬松六世祖則不可據珍公考青州辯確嗣紹熙間之鹿門覺然辯出磁州寶寶出王山體體出雪巖滿滿出萬松秀此祖孫六代一脈世系確乎如天地日月之常經不可易卓然如泰山北嶽之雄峙不可拔無容其間增五減五移北歸南以為秦時漢代之人誠謂千古一定之鐵案也據遠門柱公摘欺說表示續略所得諸祖言句出處曰鹿門覺示眾得自從容錄上六紙五位頌得自宗旨緒餘十五紙青州辯前一叚得自續文獻通考垂語得自本錄賓主頌得自宗緒二十紙十六題得自宗緒四卷八紙五位頌得自宗旨十六紙磁州寶示眾得自請益錄下九十二紙五位頌得自緒餘十六紙慈雲覺得自青州百問王山體得自請益錄下六十六紙三種獅子語得自請益錄下十七紙尊貴旨得自請益錄上十二紙五位頌得自宗緒十七紙仁山恆得自從容錄上四紙雪巖滿得自從容錄下二十紙與勝默同參話得自請益錄上四十紙上堂得自請益錄序第一紙五位頌得自宗緒十七紙勝默光前一叚得自從容錄下一百七紙後一則得自從容錄上四十七紙磁州詮得自從容錄上七十二紙以下不及述自覺辯寶體滿五世九人班班俱載從容請益諸錄一一可稽字字可考非破簏敗紙者比準公邪說自紹熙末之鹿門覺至興定初之萬松秀祖孫六世一脈相承凡十人為一母一胎所生總在此二十五年之內一齊出世開堂說法有如許法語為萬松收入從容請益二錄不審有是理乎無是理乎據此則萬松六世祖鹿門覺非南宋紹熙末之鹿門覺係北宋政和初之鹿門覺明矣據此則萬松五世祖青州辯非嗣南宋紹熙末之鹿門覺確嗣北宋政和初之鹿門覺又明矣據此則萬松六世祖鹿門覺確嗣北宋哲宗元符間之芙蓉楷非嗣南宋寧理二宗時之天童淨更明矣據此何須許多古碑文獻為證然後知續略纘續繼燈諸書之錯誤哉只消此存稿一篇示眾如秦鏡當臺彼諸魑魅魍魎逞盡伎倆用盡心行到此立見冰消瓦解所謂一真一切真一偽一切偽今之修明僧史者窮搜極討請先擇此真偽可也鼓山永覺賢禪師作博山來和尚語錄序曰佛祖之道如金剛王寶劍得之不易用之不易付之亦不易以其皆不易也故傳持斯道者實鮮其人而魚目混珠山雞冒鳳者嘗半天下也此語罵盡天下古今善知識不厚道我曹洞一宗盛於唐衰於宋是何言歟如芙蓉楷祖父子皆奉旨開堂大振洞宗何謂衰耶至元似復盛而實衰是何言歟青州辯祖一支衍於北地至萬松雪庭皆賜紫賜號元世祖大集沙門於京師雪庭之嗣居三之一何謂衰耶其故蓋難言之也有何屈事難言耶迨國朝初雪庭裕公奉詔住少林莫亂說裕祖於金哀宗天興元年壬辰住少林至洪武元年一百三十五年何謂國初耶天下學者翕然宗之歷傳至萬曆改元虛白載遷化莫亂說讚續紀月舟載祖於嘉靖三年甲申行年七十三養老於三十六峯烟霞之中萬至曆元年計五十年矣何謂萬曆改元遷化耶詔小山書補其席莫亂說纘續紀宗鏡書祖於隆慶元年示寂何謂萬曆改元詔補其席耶四方之腰包而至者如鳥投林如魚赴壑何其褒也而書公乃講習評唱為事大失眾望何其貶也時有蘊空忠和尚先事虛白老人有年受其密印歸隱旴江之廩山天下不得而物色之於小山前讚後毀此褒貶施於一人小山非自出之祖則毀之廩山乃己所尊親則讚之此褒貶施於兄弟小山奉旨開堂豈有講習評唱為事乎憨山大師謂雪庭裕禪師揭洞上一宗於少林二十四傳至大章書禪師中興其道大章即小山也能中興洞山之道豈評唱流所為耶小山廩山同嗣虛白殊不知譏刺小山即所以譏刺廩山也亦譏刺虛白矣為霖霈禪師以廩山嗣小山改此段文曰萬曆改元小山書遷化莫亂說小山於隆慶改元已遷化矣至萬曆改元豈又遷化耶詔幻休潤補其席四方之腰包而至者如鳥投林如魚赴壑而潤公乃講習評唱為事大失眾望時有蘊空忠和尚先事小山老人有年受其密印歸隱旴江之廩山天下不得而物色之人有二子世所多見人有二父未之聞也廩山為虛白子有年矣又為小山子不但有二父又為二姓家奴矣小山何幸得此高品之子也幻休何辜蒙此無根之毀也史氏於人善善惡惡齊書謂之直筆謂之信史為天下後世之殷鑑毫髮不可移易可易非信史也賢公記小山事可謂善惡齊書是不可移易也霈公既易為幻休事則小山善善惡惡非實事也非信史也係賢公無根偽捏也明矣古云己不欲者勿施於人賢公以小山非己祖造偽揑誣以毀之霈公認小山為嫡祖見此偽誣心實不欲則又移施於幻休父子心行如此瞞他一夥妄吠逐塊之徒往往藉為口實肆謗少林諸祖為評唱之流未明本分斯皆鼓山父子作俑之所致也壽昌先師從其薙落後蒙記莂始為弘揚既得博山來公繼之其道遂大行於世師苦參日久備嘗險阻故其言功夫為獨詳其慧光渾圓辯才無礙波瀾浩蕩莫窺涯際故學者多望洋而退其門庭緊密金鍮立辨高提祖印不妄許可故假雞聲韻者不得冒渡關津而惑亂羣聽也心行何苦與人作死冤家緊閉門戶博山腳下傑出數人如檀度賢者輩出比鼓山殊勝赫弈謂不妄許可可乎又何嘗因此一言以斬絕博山之嗣續耶徒用如許心行既曰不得冒渡關津嘗見霈公作丫山塔銘敘為博山法嗣抑又何耶父子矛盾如此余因先師遷化後曾相依三載雖無所得於師然三載之中未見其一語滲入情識但勉以向上事則師之有造於余也大矣及余隱荷山師自石鼓歸道經建州晤於光孝寺師曰壽昌掃塔也未余曰掃即不廢祇是不許人知師曰恁麼則偷掃去也余曰賢祇如此和尚又作麼生師曰掃即不廢祇是不曾動著余曰和尚却似不曾掃乃一笑而別入此機緣以為承嗣壽昌張本及師滅其語錄浩繁連編累牘流通為難故遐方僻壤聞師之名向師之化而語錄實未嘗觸於目者有之余自壬午秋歸錫石鼓乃因渾朴上人之請僭於全錄中擇其精要類而合之視全錄僅十之三然簡而易行約而易致使天下學者即是窮之可以見其大全使知博山之道其廣深密有如此非癡守一橛者可恍惚其萬一也癡守一橛刺天童以致嚴統削廩山元鏡元謐元賢於譜外列壽昌博山於未詳正所謂為人必自侮然後人侮之悲夫嗚乎廣陵散不復作矣今幸其譜猶存安得於清風白月中再聞斯曲乎時崇禎癸未春正月燈節日住福州鼓山湧泉禪寺傳曹洞正宗沙門元賢題於所居之嚬呻齋鼓山為霖霈禪師出源流辨謬蓋辨白巖不合改洞宗世次其說多不經本不屑與較辨第賺他無眼阿師引資辨端甚至翻刻廣布流言無有砥止今霽崙永公又引以為例以譜洞宗世次關係法門不小不得已聊辨數叚請質高明愚幼失讀不通文理罔知尊卑上下稱呼但每見人子孫為祖父撰述行狀傳記皆曰師諱某某青州辯祖稱鹿門芙蓉曰諱自覺曰諱道楷與撰述何異鼓山略去兩諱字反誣不合於本師及師翁皆直叱其名曰鹿門自覺曰芙蓉道楷竟不為少諱安有這般文理贓誣於人豈不是心行以之闢白巖可也以之正祖碑為偽不智甚矣塔記一碑兩傳辯祖所書者為正傳高刻二字正寂所述者為附傳低刻二字正傳不及述其末曰皇統九年十二月八日病中書此以為塔記辯祖自書止此而已附傳曰師於當年十二月十二日書偈垂誡至亥時怡然而逝十五日荼毘葬於仰山棲隱寺正寂遂於荼毘灰燼中收拾微小靈骨得數十粒復獲牙一枚念先師住持仰山萬壽雖大振宗門而彼二處立為十方唯清水度僧近二百數若不建塔立石切恐向後年深失於依止與眾共議遂建此塔以為久遠之傳天德三年三月十五日陽臺山清水院山主小師比丘正寂建塔立石此正寂述其建塔立石之事附刻碑末如此鼓山略去附傳師於當年十二月日書偈垂誡至怡然一十五字掠取十二亥刻示寂六字接連上正傳十字作一句一氣讀來曰皇統九年臘八親書塔記十二亥刻示寂復曰試問此數語為是未死之先預敘耶抑亦死後復起再敘耶其偽三也觀此則知鼓山盡生平所有生滅心行用至此可謂極矣而又刻告天下不惟智者見之知塔記為偽即三尺童見之無不知為偽也害是亂真何可砥止以之闢白巖可也以之正祖碑為偽不智甚矣此名指有言空指空言有成大妄語檢之四分則犯四棄之律檢之梵網則犯十重之條鼓山生平以開戒為事試問每披如來衣坐如來座宣揚如來寶戒不審心中有愧否若有愧不應自犯如此條章若無愧是自棄佛海邊外矣雪竇鑑於孝宗淳熙十一年甲辰住雪竇載雪竇錦鏡池記示寂在光宗紹熙三年壬子載明高僧傳壬子去甲辰九年則鑑住雪竇僅九年可知矣此千古不磨之鐵案也壬子後三年為寧宗慶元元年乙卯又後三十年為理宗寶慶元年乙酉按續略諸書紀如淨出世六坐道場行道四十餘年則受囑在壬子之前九年之內明甚開法在寧宗時示寂在理宗時明甚續略載萬松初開法邢臺淨土金章宗明昌四年詔入宮中說法其下小註曰即南宋光宗紹熙四年乃智鑑示寂之次年也據此則萬松初開法邢臺與鑑同時明甚此時如淨尚未受囑何遽有淨之法嗣鹿門覺示眾法語為萬松收入從容錄耶况又以之為萬松六世祖以如淨為萬松七世祖以智鑑為萬松八世祖則知續略以從容錄中所收之鹿門覺為寧理二宗時如淨之嗣其錯誤判然明矣固知從容錄中鹿門覺即淨因覺非嗣南宋寧理時之天童淨確嗣北宋哲宗時之芙蓉楷明甚鼓山扭定從容錄中鹿門覺為如淨嗣豈非指鹿為馬乎以之闢白巖可也以之正祖碑為偽不智甚矣纘續載青州辯參鹿門覺問如何是盡乾坤是學人一隻眼覺曰汝被一卷經遮却也辯擬對覺搖手曰不快桼桶去辯於是有省得言外旨出住中都萬壽按此機語出載洞燈紀略大統收入辯祖章中非無據也鼓山兩引纘續以資駁辨難道此機語未寓目耶誣白巖捏出豈公論耶以之闢白巖可也以之正祖碑為偽不智甚矣會元收芙蓉法嗣十三人一曰淨因自覺一曰鹿門法燈十三人內并無二自覺法燈也覺範銘中明敘法燈自沂州禮辭芙蓉復至京師於政和七年夏奉詔繼鹿門自覺法席又祭文明言芙蓉為法燈之師鹿門自覺為法燈之兄則鹿門自覺非淨因自覺而何鼓山謂淨因覺嗣芙蓉楷會元自有列傳與鹿門何涉準高裁則法燈可消歸芙蓉下鹿門自覺消歸何人將莫消歸如淨下始合其臆說耶又謂淨因覺下既傳華嚴蘭若青州果是淨因之嗣豈有遺之之理淨因鹿門可辨為兩人青州之師無二自覺若謂確嗣如淨下之自覺不應為萬松六世祖如淨受囑不應在萬松開法之後智鑑不應與萬松同時真歇不應與青州同時如淨不應出世在寧理二宗時又謂續傳燈載如淨嗣唯石林秀孤蟾瑩遺鹿門覺者一人見聞有限得此遺彼是其常情無足怪者然則會元得此遺彼是其常情又何逞其疑難耶會元失錄非止一人當金元時在燕京弘道者雲門下則有聖安圓通善國師一支臨濟五祖演下則有慶壽璋慶壽簡一支圓悟勤下則有佛日堯廣慧通理一支曹洞下則有青州辯一支非獨遺青州一人鼓山扭定會元收蘭遺辯肆逞難辨豈非心行乎以之闢白巖可也以之正祖碑為偽不智甚矣增集一書出在明初紀洞來源明如指掌上符祖碑無二無別獨與鼓山判然不合斥為背戾殊非雅論以之闢白巖可也以之正祖碑為偽不智甚矣續略一書妄引偽合錯誤多端辨見於前纘續繼燈傳燈正宗悉本續略以訛傳訛額乏智眼胸富私心謬執諸書硬證必是以之闢白巖可也以之正祖碑為偽不智甚矣祖父豐碑卓豎祖庭白巖引證非無據也鼓山未到諸大祖庭焉知祖碑有無真偽株守一隅管窺蠡測只憑臆說誣人捏出以之闢白巖可也以之正祖碑為偽不智甚矣諸士大夫鉅儒名家所作碑銘具載文集又非白巖授意而作致與鼓山世次不合槩指為非豈非邪說以之闢白巖可也以之正祖碑為偽不智甚矣顯聖一支祖孫三代表揚世次昭若日星秦鏡當臺萬象何匿是楚非漢反辨為誤以之闢白巖可也以之正祖碑為偽不智甚矣據鼓山謂壽昌源流先師嘗為余言昔無明師翁得道後行脚至少林始得其詳霈公親稟賢公賢公親稟壽昌父為子言之子為孫言之則壽昌源流豈有不的之理所以賢公以廩山嗣虛白詳書於博山序中者蓋遵壽昌的的詳明之源流也又謂昔遠門柱禪師親至少林蒐訪諸祖履歷片紙皆錄隻字猶傳極為苦心云云固知霈公以廩山嗣小山以丹霞五代列入世次中作曹洞正宗源流譜頒示天下後世者蓋遵遠門的的詳明之源流也試問鼓山此二說為復俱可據耶不可據耶為復確據壽昌耶據遠門耶若俱可據應有二廩山一嗣虛白一嗣小山可也若俱不可據則廩山消歸何人若單據壽昌又不合聽信遠門輕為浮言疑辭所搖惑而昧却祖父親言親筆之源流也若單據遠門又不合誖逆壽昌遠從少林詳考之源流也必何所據始為定譜俾壽昌子孫不致訛誤相承耶智者觀書但體究大頭腦處其餘細瑣不顧也辯祖塔記大頭腦在參鹿門禮芙蓉處祖孫三代顏色親承非如淨脚下所出明甚鼓山得之反於細瑣處求其毛疵搜其漏洞不體究大頭腦處釐正世次著為定譜以致湘翁和尚曰鼓山闢謬借附強釁私啟亂階彼獨不見廩山遭異教之謗壽昌蒙苦行之辱乎鼓山安其謗任其辱不依燈統清理世系仰答祖父靈明無亦浪叔祖竺和尚早逝大人不作徒使家賊難防合笑亦合哭也誠哉斯言也湘和尚此言可謂理無曲斷第不知鼓山別有心事奈緣燈統以能事既畢悉已登載能事未畢以待將來故於鼓山未列章次因茲銜恨特借改世次以闢之洩其私忿耳山曉窺見一斑故將謬闢翻刻廣行以益其心之所快也旋以鼓山語錄收入寶積錄中專僧致之以遂其心之所欲也鼓山不覺不知墮彼計中忙修復書褒貶雙行山曉刻附寶積錄後所謂借刀殺人也故湘和尚曰閱寶積見山曉事鼓山至恭謹笑曰此晉人假虞以伐也然晉雖善謀垂棘屈產之璧乘後果安在哉再見鼓山答山曉至卑睦笑曰此叔孫輒投吳而亂魯也君子不以所惡廢鄉有託則隱圓頂方袍以小惡而欲覆宗親不亦難乎又曰鼓山痛異教與苦行之謗父兄伯叔受人屈抑而莫可誰何今特納假道之璧乘認鄰封之瓜葛擬徼福青原烈祖殄讒患於未來奈棄其所親不義因其所危不仁以亂易整不忠損怨益仇不智有茲四失是謂髦焉而殆將及之也又曰雖寶積明檢我新條暗黷我舊典是枉費心思何益心思既枉費又何害若鼓山讒誣我雲門子孫是蔑視雲門湛祖嫡傳洞上源流義不共戴暫置在言外再聽鯤鵬之自變化也嗟乎欲洩一私忿致取誚於識者一至此乎雲棲達觀憨山三大師明末高僧也有收入洞宗者收入濟宗者略而不收者收於未詳者紛紛紀載迄無定論故燈統收於尊宿一科此所謂千妥萬當也至於年甲一二字之錯誤此乃寫刻較對不細心之故亦無關係法門也鼓山於千妥萬當處卒討頭腦不著刻意於一二錯誤字眼處搜其毛疵捉其漏洞是猶棄醇醴而鐘糟粕也獨不見博山一序乎一錯再錯乃至錯錯層出何父子不酙酌遂至此耶牧堂舒公出正譌一書蓋正燈統洎世次備考之譌也備考詳述祖父之碑銘與夫諸家之文獻不啻數十種為之舊章以續略諸錯誤之書為之新條折衷參訂釐正世次有補法門不小舒公反正續略為舊章燈統備考為新條復引譙周羅泌不經之談以文之飾之豈不是邪說至謂但見其世次不見有源流第一代某乃至二十七代雲門澄既無源流可證非丹霞淳一脈而何此又昧心極矣備考明述曹洞正傳宗派圖洎洞宗正統圖始自達磨歷敘至芙蓉楷下即曰鹿門覺覺下敘至宗鏡書止非源流而何然亦不見有源流第一代洞山乃至第三十代廩山既無源流可證焉知出自丹霞淳一脈耶據鼓山賢以廩山嗣虛白自萬曆改元迄崇禎癸未計七十一年歷載忠經賢四代相傳之源流也據鼓山霈一旦以廩山改嗣小山自癸未迄今五十年歷書忠經賢霈五代相傳之源流也然則上授下受之意不在小山虛白廩山總在鼓山父子之握此廩山來源如此按賢公述壽昌行業記謂昌庚子春徧參西登匡廬上荊襄至少林訪無言而歸明年東遊兩浙三吳抵五臺訪瑞峯旋寶方癸卯始開堂時眾謂昌必嗣少林或嗣臺山及片香拈出乃嗣廩山若壽昌果承廩山付囑何人天大眾有此猜卜是則上授下受不在廩山少林臺山或嗣臺山少林廩山其意總在壽昌此壽昌來源如此按賢公本傳曰萬曆丁巳年四十投壽昌落髮問清淨光明身機緣有疑戊午壽昌化去天啟癸亥舟聞經聲始大悟時壽昌化去六年矣又數年後依博山自言勉以向上事有造於己可謂更上一層樓則向之曰大悟淺深可知矣既在博山處發明向上事片香為博山拈出理也為壽昌拈出豈非類興化之追承乎此鼓山來源如此至於廩山嗣虛白若廁丹霞五代於中則為洞山二十九世嗣小山則為三十世此世次不一如此按壽昌博山東苑鼓山拈酬法乳香不見一人表揚曹洞幾十幾世此世次含糊如此不見舒公正其譌以刻告天下抑又何耶公不見嚴統謂廩山從事異教未曾承嗣宗鏡直筆削去燈統不合將從事異教之廩山收嗣宗鏡此譌當正嚴統謂壽昌未曾承嗣廩山列於未詳燈統不合將未詳之壽昌收嗣廩山此譌當正嚴統謂元鏡元謐元賢未經付囑削置譜外燈統不合將未經付囑之三人收嗣壽昌此譌當正本支有此三大譌自當早正勿使異日為他宗人正之可也芙蓉楷下出丹霞淳鹿門覺二人覺下一支衍於北金至靈隱泰為芙蓉九世孫淳下一支衍於南宋至雪竇證亦芙蓉九世孫燈統齊收為少林二十六世同輩也舒公以年甲正之為譌謂泰死後九年證始生安得為同輩然則世間一母所生有兄夭而亡數年後弟始生者頗多况泰證九世分居之伯仲乎故泰死數年證生是其常情何足怪哉又謂證與泰未必是同行輩乃牽合之列耳觀此說名雖正泰證非同輩其實正鹿門覺必嗣天童淨也準公邪說則泰為證六世孫以六世孫死於六世祖未生九年前可乎請先自正其譌然後正人可也洞燈紀略一書自鹿門覺收止無方從明成化時普照所集也近代南庵和尚得之於前補入丹霞數代於後續收壽昌雲門數代序而刻行之舒公見收鹿門為芙蓉法嗣便謂此書刻於燈統已成之後與燈統同一機軸暗指為白巖偽造公獨不見汝祖浪丈人傳燈正宗兩引洞燈紀略入凡例序文乎又不見遠門柱摘欺說中表出洞燈紀略係普照之所集乎謂刻在燈統後同一機軸為白巖偽造可乎公得此書理應特書正書徧告本支班正典型仰答祖父靈明可也反正之為譌雖蛇虎不若也竊觀法運所行南北不能並盛所以青州辯祖弘法北地子孫繁衍愈昌愈熾而宏智覺真歇了唱道南方雖光大先猷其奈數傳之後無聞矣逮明季幸我壽昌經雲門澄二祖復中興曹洞一宗於南方迄今椎拂之聲徧海內者皆二祖之力也而北地無言道公一支數傳之後漸不聞也可見法運不能並盛有數存焉居今之世洞下兒孫徧天下要之總是壽昌雲門兩支而兩支共祖宗鏡世代非遠宜乎互相推讓讚揚俾石頭馬祖互相推讓讚揚之淳風復振於今日豈不美哉奈何去聖時遙人心不古動輒操戈相待非法運衰兆實法運之大衰也往見濟與洞相非已是大傷法門元氣今洞與洞相非則法門元氣喪之盡矣昔嚴統出改易刪除見聞駭異當此時也法門為之一大變壞幸白巖漸次著書匡時救弊考清譌誤訂正宗譜有功法門誠不小也不意夜光投人人反按劍故余復述洞濟世次備考一書徧告高明咸知兩宗從上祖父舊章可遵漸行改正是非將息不意舒公冷灰豆爆肆出正譌觀其用心不過趨奉風旨於鼓山阿迎逢遇於時輩以成汝師觀濤奇公之成意耳奇公雖未出書攻白巖實有書上鼓山鼓山謬辨實被奇公激怒所出余深為惜之何也鼓山為壽昌一支戶長可謂尊之極矣被奇公搖惑且置勿論彼山曉何等人物而卑辭迎逢一至於此則自己人品何在立步何地然自取其自輕自賤關係法門小而謬讚寶積揀魔辨異撥亂反正禪海奇珍希世至寶關係法門莫此大焉何也按寶積前收雪峯玄沙屬大寂後敘雲門法眼系南嶽以為復行嚴統之先鋒也故今嚴統重刻於水鑑霽崙又改題換目為全書獨不見嚴統謂廩山從事異教未曾承嗣宗鏡元鏡元謐元賢未經付囑一齊削於譜外乎又不見謂壽昌未曾承嗣廩山洎博山列於未詳乎今壽昌子孫縱有賢於竺庵嘯峯二和尚能出救蛾熄邪終不能復阻嚴統之不行也何也蓋有鼓山撥亂反正之書在焉如此則鼓山不惟為洞宗千古罪人且為壽昌千古罪人又不但為壽昌罪人且帶累一支居於譜外作野狐精是皆被奇公所惑致也然寶積非止收雪峯玄沙雲門法眼系南嶽其關係法門頗多當山曉致寶積於鼓山視鼓山如無知小童相似其欺辱鼓山莫此為甚何也若山曉眼裏稍有鼓山又豈敢公然以關係法門之書致之耶今公然致之不但欺鼓山一人實欺壽昌一支無人矣鼓山得之不出一言辨正法門關係反讚為撥亂反正之書則又為洞宗之奸臣賊子也山曉得書附刻流通以為復行嚴統之案則鼓山不惟被山曉所欺又被山曉所賺也法門事不管須一槩莫管落得享一生飽暖癡福沒人笑你阿獃要管須管到底大統不惟有功法門且有功壽昌反闢之寶積不惟有關係法門且有關係壽昌反讚之豈但取笑濟宗直取笑天下後世也今鼓山受天下後世之恥笑受山曉之欺賺自身甘居譜外為洞宗壽昌罪人不但被奇公所惑亦被其所害矣故余深惜者此也廩山向有真世次今特申明不但決鼓山智舒之疑可以決天下後世之疑也廩山在建昌新城妙法亦在新城桂轂禪師為幻休潤祖入室弟子與忠和尚叔姪輩塔建妙法署傳曹洞正宗第二十六世忠和尚塔面向署傳洞山正宗第二十五代故天界盛和尚與吾斷拂老人書有廩山忠嘗自稱洞山二十五代之語故余於十七年前表揚世次備考中冀壽昌子孫同心同志者修明祖系班正典型仰答祖父靈明頒示後昆憑式今忠和尚塔面署洞山三十代者係無可智公住廩山重修殿宇祖塔妄改也鼓山智舒稱廩山天界兒孫不知祖父世次來源反出謬書闢之毀之其悖逆天界廩山之祖系也多矣故余一併述陳於此請質高明乞垂公論俾彼霽崙擇取為例用佐全書期成信史法門幸甚後學幸甚
