body:
  text: 衡陽後學智楷惟直氏述濟宗世次備考之四山曉皙禪師出崇正錄曰海舟普慈者蘇之常熟人姓錢氏嗣法萬峯蔚也觀萬峯錄中所載寄海舟慈首座偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親既曰首座則知在得法大弟子之列矣又觀花城隱士沈貫作萬峯塔銘自敘云余才輕德薄不敢污禪師之德自念為師嗣法弟子海舟和尚座下參學久矣况我祖父亦受天目中峯和尚誡諭因往來不徹余一日請問海舟曰圓覺經云修多羅教如標月指若復見月了知所標畢竟非月此理如何舟舉手云經也月也指也余懵然舟拍案一下云月落寒潭余因而有省據此則知海舟闡化為世仰重如此何得有復嗣東明旵之說乎故白巖不依偽傳直揭為萬峯之嗣皙深服其法眼之灼然何得又依偽傳而以寶峯瑄為普慈之嗣耶若謂寶峯本傳井井有條則普慈嗣東明之偽傳亦井井有條是則俱是非則俱非何一是而一非乎所以知寶峯決非普慈之嗣明矣海舟永慈者西蜀成都人姓余氏嗣法東明旵也觀金陵東山翼善海舟慈禪師行實碑中所載師造武林受具詣古道山直抵關房參見東明老和尚一見相契師禮畢問無相福田衣甚麼人得披明下座摑一掌師曰四大本空五蘊非有作麼生掌明又一掌師曰一掌不作一掌用速道明又一掌師神色不變曰老和尚名不虛譒復展具三拜而立明曰我居古道山三十載今日只見得這僧大眾弗得輕慢據此公案師資契合豈尋常哉後持衣至東山師陞座祝香而受碑中又云首嗣門人寶峯瑄等則知寶峯為永慈之嗣明矣祇因前後兩海舟之語錄失傳於世後代著述家又不能遠涉山川稽考碑碣所以動多誵訛且東山海舟塔院日久流為袈裟子院前者我宗承紹式微有失瞻掃稽查兼之東明偽傳混行於世故致今日筆舌紛爭倘白巖不惜一䩫艸鞋親到東山覩海舟慈寶峯瑄二祖之塔巋然建立其行實碑雖塵埋日久而字畫分明炳若日星我知白巖一見自然冰釋必不以偽傳之明瑄而溷我寶峯之智瑄祖也明矣况天奇參寶峯瑄於金陵則祖瑄為金陵永慈之嗣不尤瞭如指掌哉按世譜源流俱云寶峯瑄而實無明字獨繼燈續略存稿之明瑄亦以偽傳為憑益屬無稽顧不以二百餘年炳若日星之碑文祖塔為真而反以後人采集之偽傳為真雖至愚之人吾知其不應顛倒如是也夫濟宗源流之錯誤者始於龍池傳公次於平陽忞公三於天童悟公龍池於萬曆年間因見古溪祭文有續高峯七世之句故以海舟普慈紹東明以合其七世之數以致疊出寶藏東明二代此源流錯誤之始也平陽於崇禎四年本龍池源流直以萬峯蔚寶藏持東明旵海舟慈寶峯瑄天奇瑞一脈紀為禪燈世譜此源流錯誤之二也幸而俱未列章次潭吉於崇禎九年冬作五宗救直揭龍池源流之誤乃據萬峯沈貫無聞笑巖四種祖訓證海舟普慈確嗣萬峯謂東明下別有一海舟屬古溪之所祭者天童於崇禎十一年作闢妄救以海舟普慈先嗣萬峯以銷釋萬峯沈貫無聞笑巖四種祖訓後嗣東明以符合古溪靜庵二種文敘以闢潭吉謂不遵龍池源流責以誖逆之罪此源流錯誤之三也按闢妄救所列世次人名曰第一世南嶽懷讓乃至第二十五世萬峯時蔚二十六世寶藏普持二十七世東明慧旵二十八世海舟普慈二十九世寶峯明瑄三十世天奇本瑞雖世次中疊出寶藏東明二代而普慈明瑄天奇祖孫三代世次未曾更改一字移易一人嗣後續略繼燈嚴統纘續相繼而出所紀濟宗世次皆本天童闢妄救以天奇本瑞嗣寶峯明瑄以明瑄嗣海舟普慈以普慈嗣東明慧旵以訛傳訛莫之覺也幸祖父有靈致翼善碑出灼見東明自有嫡嗣海舟永慈屬古溪之所祭者為靜庵之所敘者自是萬峯時蔚寶藏普持東明慧旵海舟永慈雲溪智瑛靜庵智素一脈相傳之聯芳圖也彼龍池源流禪燈世譜闢妄救續略繼燈嚴統纘續以普慈明瑄天奇一脈系東明旵下錯誤炳然更復何辨故白巖遵無聞笑巖等十種祖訓依天童親口所說平陽親筆記錄之世系連絡血脈貫通真實之言以普慈明瑄天奇一脈還歸萬峯據翼善碑古溪文靜庵敘三種舊章以永慈智瑛智素一脈紹續東明俾兩家世系各有準繩式憑千古非惟釋龍池天童平陽之錯誤亦使普慈數十年來枉受屈辱之恥得以申之萬峯數十年來蒙此濫付非人之罪得以雪之有功濟宗不小今皙公以普慈還嗣萬峯以永慈承嗣東明高裁極是而又強奪普慈之子明瑄范木匠硬指為寶峯智瑄以之上嗣永慈下出天奇不惟世次疊訛且又亂宗滅祖按永慈碑石刻載法嗣一百有四人智忍居首第十三位為智瑛第二十五位為智瑄據楚山贈智瑄偈原號玉峯而石碑內稱首嗣門人寶峯者非智忍而誰元慧抄梓行實碑妄於寶峯下偽增一瑄字曰首嗣門人寶峯瑄等諸山受其所盲竟認智瑄為寶峯皙公又硬指寶峯明瑄為寶峯智瑄豈不是以明瑄智瑄智忍三人混合為一人乎按廬山誌載智瑛於正統間開法雲溪按永慈付智瑄在景泰五年而正統間智瑄尚未受永慈付囑况倫序又居忍瑛之後何得妄冒寶峯指為首嗣耶又永慈塔前有石坊額曰開山海舟慈之塔書題天順壬午弟子寶峯等建又禪堂後古木扁曰開山塔院書題天順壬午夏嗣法弟子寶峯等立石碑石坊木扁但曰寶峯並無瑄字而刻本首嗣門人寶峯瑄等係元慧偽增明矣按金陵梵剎誌載高峯寺在神策門外正統十四年敕賜為崇化寺天奇自敍到南京高峯寺見寶峯瑄和尚不曰到崇化者灼見天奇參寶峯在正統十四年之前此時智瑄尚未受永慈付囑而指為天奇所參之師可乎是則天奇參寶峯於金陵者乃明瑄明矣况闢妄救曰海舟普慈之嗣寶峯明瑄瑄之嗣天奇本瑞則天奇參寶峯於金陵者係明瑄又明矣皙公指為參智瑄不審據何書憑何碑而知天奇參智瑄邪既無載籍可稽豈不是妄指妄認之臆說乎繼燈續略存稿列章次也故詳書寶峯明瑄世譜源流紀世次也故略書寶峯瑄皙公便謂世譜源流俱云寶峯瑄而實無明字獨繼燈續略存稿之明瑄亦以偽傳為憑益屬無稽然則俱無智字何俱妄指為智瑄邪智瑄之名獨載永慈碑內龍池源流出在萬曆年間禪燈世譜出在崇禎四年彼時尚不知有海舟永慈而預知有寶峯智瑄紀入世譜源流俟公今日認之為天奇之師永慈之嗣正公自謂益屬無稽普慈先嗣萬峯後嗣東明一傳公斥為偽傳是矣若夫明瑄一傳前敍得法於普慈後紀躬囑於天奇一字無虛何偽之有公無乃混指明瑄為智瑄一概斥為偽傳正公所謂雖至愚之人不應顛倒如是况公責白巖必不可以明瑄而溷我寶峯智瑄祖也則智瑄明瑄豈不判然為二人矣何又妄認明瑄為智瑄邪自己顛倒尤甚反謂人顛倒豈公論歟濟宗有兩海舟慈見有成典至若兩寶峯瑄從未之聞今白巖妄以兩寶峯瑄作源流釋誤篇亂我濟宗正傳此誠何心哉請以禪燈諸錄明之則釋誤之妄灼然可見臨濟正傳二十一世萬峯蔚出寶藏普持海舟普慈二人普慈見之萬峯錄及沈貫撰萬峯塔銘中寶藏持傳東明旵旵傳海舟慈永慈慈傳寶峯瑄瑄傳天奇瑞瑞傳無聞聰此見載之洞宗所輯五燈續略徑山五燈嚴統南澗續燈鼓山繼燈及吾家禪燈世譜諸錄中世系分明毫無紊亂並無兩寶峯瑄之說此釋誤之一妄也禪燈諸錄出有先後世譜闢妄表見於前續略成於崇禎末年刻於順治初年繼燈出在順治八年嚴統出在順治十年纘續出在順治十三年永慈行實碑係平陽忞公法孫元慧於順治十四年始獲刻布如續燈存稿續僧寶傳正宗錄續指月錄宗統編年諸書出在順治十四年已後洎康熙年間皆本永慈碑立永慈傳系永慈於東明旵下曰海舟永慈慈下曰寶峯智瑄若夫順治十四年已前之纘續嚴統繼燈續略闢妄救皆本普慈錄立普慈傳系普慈於東明旵下曰海舟普慈慈下曰寶峯明瑄諸書現在緇素披閱者不知凡幾今皙公盜取續略諸書中海舟普慈略去普字惟曰海舟慈又以小字分行註其下曰永慈海舟普慈既盜去為海舟永慈矣則寶峯明瑄不怕不為永慈法嗣也反謂見載之續略諸書中並無兩寶峯瑄之說豈非自謾以謾世乎世又誰肎受汝謾耶公既辨清普慈還嗣萬峯而又盜去普慈子孫明瑄天奇為永慈子孫則自紊亂世系多矣概斥續略諸書為偽傳矣又偷去偽傳中之寶峯明瑄為寶峯智瑄反引諸書為證據不但妄且狂矣白巖必欲以東明旵之孫寶峯瑄硬立為萬峯下普慈之嗣請再以事明之東明之孫寶峯瑄係蘇之吳江范氏子在俗為木匠因海舟和尚造塔院斧傷己足痛甚索酒喫因緣有省遂求為僧後即得法為海舟之嗣此海舟永慈之嗣非普慈之嗣甚明矣若是普慈之嗣普慈乃東明旵之叔白巖謂海舟俾造塔院者乃造東明之塔院則是以師叔俾造師姪之塔院也世豈有是理哉昔天童泥於古溪靜庵二說故移萬峯下海舟普慈寶峯明瑄天奇本瑞一脈系東明下而寶峯明瑄自應為東明之孫今翼善碑出而海舟永慈為東明嫡嗣永慈有子名寶峯智瑄自是東明之嫡孫東明既自有子孫則普慈明瑄天奇一脈理應還歸萬峯皙公要混合明瑄智瑄為一人乃略去一明字惟曰東明之孫寶峯瑄暗暗盜去敍事訖乃明斷曰此海舟永慈之嗣云云雖是老賊慣竊其奈無典籍可據無碑碣可憑欲成一己之說不亦難乎按楚山贈翼善住山瑄玉峯掩關偈有一朝養就金毛力出窟跑哮自逸羣之句又自敍景泰壬申歲至金陵訪月溪海舟二老二老輒虛中寢以待壬申為景泰三年則此偈作在三年可知矣據是則智瑄原號玉峯而寶峯係元慧偽改今亦不與較辨即使號寶峯然受永慈付法在景泰五年按大咸重修退居大殿碑曰天順五年門人智瑄卜此造塔建院云云天順五年去景泰五年計八年去三年計十年據是則智瑄掩關得法在前卜地造塔在後范木匠以俗人身造塔院在未出家之前悟道得法在已出家之後二人事跡判然天壤混合為一人可乎又永慈付智瑄偈曰迷悟猶如空裏雲碧天明淨了無痕歷然世界其中露殺活拈來總現成普慈付范木匠偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深山止二人法偈各別如此盜范木匠為智瑄作永慈之嗣可乎又永慈付智瑄在景泰五年普慈示寂在景泰元年而付范木匠在正統間可知矣二人得法之朝代年號先後各別如此盜范木匠為智瑄作永慈之嗣可乎至於普慈慧旵論班輩有叔姪之分論住持有先後之別後代住持與前代住持造塔院世之常事何足怪哉以此資臆說之談柄硬證范木匠為智瑄作永慈之嗣亂宗滅祖之甚莫甚於此若謂普慈繼住東明即俾造東明之塔則東明旵祖塔銘乃胡濙所撰銘中唯云今其上首本寺住持明覺令僧某某齎行狀徵予為銘並無普慈繼住之事而永慈碑所載東明示寂遺囑住持明白庵曰吾有衣法二物待十年後送至東山海舟和尚受納付囑住持之明白庵豈非徵銘之明覺乎而普慈何與焉俾造東明之塔也今必欲硬奪東明之寶峯為普慈之嗣此釋誤之又一妄也此叚臆說不但盜范木匠為智瑄又以白庵難普慈非繼旵公住持害是亂真誠非小事殊不知安溪鎮有接待寺係旵公所剏而塔銘碑向勒於接待寺至順治年間始移豎東明塔院之後按山茨際公自敍崇禎乙亥住持東明寺偶一日理破笥廢紙得旵祖法語機緣偈贊并塔銘若干篇用付梓行云云據是則知崇禎年間住東明之人尚不知接待有旵公塔銘碑也按碑末署款曰正統十四年歲次己巳秋七月望日本寺徒弟比丘覺淨覺明等徒孫智茂等立石碑中曰今其上首本寺住持覺明令僧智宗智鑑齎天竺靈山住持臨川妙偘狀師行業徵予為銘灼知徵銘之覺明即勒碑之覺明也夫碑既勒於接待而碑中稱本寺住持本寺徒弟則覺明係接待住持明矣若覺明係東明寺之住持其銘碑不勒於東明及塔院反勒於接待可不想而知矣據際公所出東明祖燈明載東明第二代海舟普慈東明第三代寶峯明瑄又謂兩祖皆繼席東明全身靈塔在焉今稽東明塔院後右為旵公塔曰明開山東明旵祖師塔左為慈公塔曰明當山海舟慈祖師塔曰當山非東明第二代住持海舟普慈而何準此數據則繼旵公住持確係普慈明甚至謂旵公銘無普慈繼住之事然亦未見載遺囑住持白庵之事亦未有一字干及永慈抑又何耶普慈非旵公法嗣銘中不載猶可永慈為東明嫡嗣而遺囑乃師資授受一椿大事銘中不載關係非小按永慈劄付碑正統十年賜額翼善寺禮部始給劄與永慈住持土山今永慈行實碑曰正統二年領禮部劄住持翼善其偽一又曰正統五年六月二十八日東明示寂遺囑住持明白庵曰吾有衣法二物待十年後送至土山海舟和尚受納付囑當旵公示寂之時土山尚未興建尚未賜額永慈尚不知棲隱何方謂東明有遺囑猶可謂待十年後送至土山海舟莫是旵公有宿命通預知永慈五年十載後必住土山受納付囑耶據是不但住持明白庵為偽事則遺付永慈衣法亦烏有先生之事可知矣待汝考清永慈授受事再來論普慈繼住事未晚白巖釋誤云海舟普慈常熟錢氏子屬高峯第五世寶峯明瑄之所自出此倡言之妄也據前歷舉燈錄諸書所載濟宗正傳海舟慈屬高峯第七世寶峯瑄之所自出也高峯第七世非永慈其誰乎前此有普慈永慈之未辨者以海舟永慈之碑沉埋未出或以普慈為永慈者有之未見因此而竟刪去吾寶藏東明兩代正傳之祖亦未見有兩寶峯瑄之說也今釋誤倡言謂誤以兩人為一人不可改明瑄為智瑄不可其棄普慈而奉永慈尤為不可在白巖昧心弄筆巧言惑世以沽好奇之名則可在吾濟下兒孫又安肯背吾祖吾父之言及諸禪典中大書特書正傳統系而曲從其妄說乎白巖謂海舟普慈屬高峯五世寶峯明瑄之所自出者據無聞笑巖等十種祖訓洎汝血祖親口所說血父親筆記錄之世系連絡血脈貫通真實之言也續略諸書紀濟宗正傳有寶藏東明二代者依闢妄救也其紀高峯七世曰海舟普慈八世曰寶峯明瑄亦依闢妄救也今公略去普字明字輕輕盜來曰前舉燈錄諸書所載濟宗正傳海舟普慈屬高峯第七世寶峯瑄之所自出此做賊人先虛其心也盜過手而後乃曰高峯第七世非永慈其誰乎永慈固屬高峯七世非公歷舉燈錄諸書中所載之普慈也諸書現在豈可自欺以欺世乎公盜范木匠為智瑄豈不是以兩人為一人公多方文致洗去明字惟曰寶峯瑄硬指為寶峯智瑄豈不是改明瑄為智瑄公以之作臨濟正宗源流世系圖曰萬峯蔚寶藏持東明旵海舟永慈寶峯瑄天奇瑞以海舟普慈列為旁出豈不是棄普慈而奉永慈公胡不思古溪祭文止祭永慈一人未曾祭及永慈以後世次之事靜庵序止敍東明慧旵海舟永慈雲溪智瑛為他家一脈相傳之聯芳圖未曾敍及智瑄天奇世次之事翼善碑止載永慈承嗣東明之事亦未載智瑄天奇世次之事又胡不思萬峯付普慈有偈普慈付明瑄有偈明瑄付天奇有偈天奇之子無聞則以人名世次一脈敍來曰高峯妙出中峯本本出千巖長長出萬峯蔚蔚出海舟慈慈出寶峯瑄瑄出天奇瑞臨濟一脈不絕如線至我聰矣無聞之子笑巖曰上承迦葉六十三世下繼曹溪三十一葉笑巖之子廣通謂笑巖為臨濟二十六代乃至天童親口所說平陽親筆記錄曰自迦葉歷我笑巖師祖則六十三世自我師祖上遡曹溪則三十一世豈不自上而下繇後之前世系連絡血脈貫通斯皆歷代祖父表揚世次昭若日星概以臆說肆毀不顧是背耶非背耶諸禪典中大書特書雖有寶藏東明二代不曾抹殺明瑄改范木匠為智瑄不曾列普慈為旁出不曾更亂普慈明瑄天奇三代世系不曾紀永慈智瑄為天奇祖父如斯四事汝悉為之又盜禪典普慈明瑄為永慈智瑄是背耶非背耶白巖於濟宗何怨何讎令人欲殺欲割而不顧者蓋以輯書責任在躬弗忍濟宗世次訛亂不顧犯忌直為釐正一片血心惟龍天佛祖鑑知反謂倡言惑世誠何心哉自汝狼心狠筆抹殺明瑄改范木匠為智瑄賺他聶先紀蔭超永竟改明瑄范木匠為智瑄上嗣永慈下出天奇著為大部燈錄刻行天下後世以訛傳訛亂宗滅祖莫可砥止皆汝作俑所致最好笑濟下尊宿恬不為怪坐視其亂宗滅祖不急修明世系仰答祖父靈明稱普慈明瑄天奇後裔寧無愧乎白巖縱能於東明寶峯智瑄原范木匠之外揑出一寶峯明瑄然而生緣族氏為何郡何姓之人也耶况同時有兩海舟慈矣安得復有同名同號之兩東明寶峯瑄乎世之做強盜者贓不獲罪不伏若真贓一現其罪自伏蓋其良心未曾泯滅也昔王陽明先生一夜因盜至與說良知盜曰我等做賊之人那裏有甚良知先生令解衣自見盜解衣矣再令解褲盜害羞不能解先生曰即此是汝等良知眾盜感悟而去今皙公於諸禪典大書特書中盜去明瑄范木匠為智瑄矣反謂白巖揑出一明瑄為何郡何姓是猶抱著真贓反問失主是何物事天理可謂昧盡矣良心可謂喪盡矣雖強盜不若也其不害羞如此永慈門人寶峯智瑄開法金陵者即東明旵之孫寶峯瑄也因查公未見行實碑誤以智瑄為明瑄止一明字之誤耳釋誤分為兩人列成兩則妄欲證為兩寶峯瑄硬去我濟宗正傳兩代之祖謂寶峯瑄本嗣普慈今竟為永慈立傳但割寶峯二字綴其下而立行實碑者但曰智瑄未嘗曰寶峯智瑄此等異說祇可自欺自瞞安可欺瞞天下人哉今行實碑文現載首嗣門人寶峯瑄等何謂割寶峯二字綴其下至於立行實碑但稱智瑄不稱寶峯者自是人子之職理宜單名何用書寶峯之號乎如此巧弄筆舌豈不畏拔舌泥犂耶按永慈行實石刻碑內但曰首嗣門人寶峯等永慈塔前石坊曰天順壬午弟子寶峯等建永慈塔院古木扁曰天順壬午夏嗣法弟子寶峯等立三稱寶峯下俱無瑄字石碑內載法嗣一百有四人智忍居首智瑛居第十三位智瑄居第二十五位智璽居第三十八位石碑石坊木扁稱寶峯者非首嗣智忍而何按廬山誌載智瑛於正統間開法雲溪智瑄於景泰五年始受永慈付偈况倫序尚居智瑛之後何得有首嗣之稱耶按楚山贈智瑄掩關偈原號玉峯非寶峯也今元慧抄刻行實碑於寶峯下偽增一瑄字曰首嗣門人寶峯瑄等皙公被元慧所盲竟認為寶峯智瑄據為臆辨之張本此猶可也而又竊盜明瑄范木匠為智瑄反推誤於查公以之而亂宗滅祖祇恐其罪不止拔舌泥犂也白巖謂明瑄固亦嘗住金陵高峯寺天奇參見正在此也與東山翼善何涉此又必專必非之過也豈寶峯一生老住東山翼善不一遷住高峯與東明乎言不該典非君子之所談白巖謂明瑄住高峯為天奇所參者載汝歷舉諸禪典大書特書中汝謂智瑄遷住高峯東明據何典籍憑何碑碣既無典籍可該豈非脫空之妄語乎據瑄祖本傳但云海舟和尚造塔院斧傷己足痛甚索酒喫因緣並無東明之說而白巖謂海舟俾造塔院者造東明之塔院也今金陵東山海舟塔院巋峨殿宇現在揑出東明二字豈非謬斷歟據汝祖闢妄救曰南嶽第二十八世杭州東明海舟普慈禪師云云南嶽第二十九世南京高峯寺寶峯明瑄禪師海舟嗣吳江人姓范氏在俗為木匠因海舟和尚造塔院感悟出家乃至得法夫明瑄之師既曰東明海舟普慈則俾范木匠造東明塔院明矣謂揑出東明二字可乎汝謂范木匠造東山永慈塔院據何書憑何碑而言邪一味無根妄說指鹿為馬豈止揑出東山自誑誑人以之亂宗滅祖其罪不小白巖謂海舟普慈俾造塔院造東明之塔院非造東山之塔院本傳中但云因海舟和尚造塔院斧傷足等語並無普慈之說即造東明之塔院海舟永慈為其師造之范木匠從永慈剃落即得法永慈三代相承甚明何足置辨然以范木匠造東山永慈塔院未訖又以范木匠造東明旵公塔院范木匠亦苦矣白巖謂范木匠造東明塔院公指為揑出公今指范木匠即智瑄造東明塔院又何止揑出東明二字邪明瑄一傳係汝祖天童悟公所立傳中稱號不稱名者自是人孫之職亦是修僧史之體裁如此然則既以海舟普慈列為明瑄之師而俾造塔院之海舟非普慈而何公見傳中無普慈之說即指為海舟永慈為其師造塔院范木匠從永慈剃落不但盜范木匠為智瑄則又盜普慈為永慈矣試問公永慈俾智瑄造旵公塔院係在何年若謂正統六年旵公寂後永慈為其師過東明造塔院白庵胡不於東明堂上出旵公衣偈付之奚必待十年後始專僧送至土山邪况永慈於景泰二年尚在土山受囑不審又何人預過東明為旵公造塔院乎若謂於受囑之後過東明為其師造塔院則智瑄於景泰三年已掩關在東山翼善矣則其剃落在掩關之前可知矣不審又何人隨永慈過東明因造塔院從其剃落得法邪且旵公塔銘碑立在正統十四年己巳則造塔建院非景泰時事明矣正統間永慈尚未受囑謂其預過東明造旵公塔院范木匠從其剃落正公自謂益屬無稽之妄誕也况旵公示寂造塔建院之時永慈尚不知棲隱何方尚未領禮部劄住持東山何得預有范木匠從永慈於東明剃落邪况智瑄原號玉峯為永慈卜地造塔在後受囑在前而范木匠以俗人身造東明塔院在前受普慈囑在己出家之後二人事跡逈別天淵則造塔院之范木匠即寶峯明瑄明矣范木匠即明瑄而明瑄嗣法俾造東明塔院之海舟普慈此又不待辯而明甚公謂智瑄豈一生老住東山而不一遷住東明者蓋伏為此三代相承之張本也準公臆說則智瑄承永慈住持永慈承旵公住持又何遺囑住持明白庵之有邪既承旵公住持可謂面稟親承又何謂景泰二年始受遺囑邪總之普慈永慈事跡各別如何偷合得來明瑄智瑄事跡不同如何盜合得去徒自亂宗滅祖肆出臆說自惑惑世究竟於濟宗世系為害不淺白巖謂今東明海舟普慈塔現在明瑄塔現在海舟塔左而後人欲插入二代者私心將明瑄塔面所署之字鏟去殆盡白巖出此欺心瞞人之言將謂無人曾一過東明者乎東明非千里外即杭之西北鄉安溪去杭不數十里而憧憧衲子未有不至其寺者盡知東明寺右之園地相傳為寶峯瑄祖塔基并無其幢亦非寺左去寺五里許有東明旵祖塔塔左另有一海舟慈塔係海舟之衣鉢塔並無普字而海舟塔羅城內亦並無他塔何謂寶峯字面鏟去殆盡即左右設有殘毀古塔不知何代何人安可妄指為寶峯塔乎况東明係旵祖之祖庭寶峯是其孫也塔又有何礙而必欲鏟去其字面乎如此欺心之言安足與辯哉東明寺左東明塔院祖塔圖皙公可謂善於文字矣前謂永慈相承住持非只奪普慈繼席一事則又為此冒普慈塔為永慈衣鉢塔張本又謂智瑄三代相承非只盜范木匠為智瑄則又為此冒明瑄塔為智瑄塔基張本以東山已有永慈智瑄二石塔故指此為塔基衣鉢乃曰東明係旵祖祖庭寶峯是其孫塔又何礙文辭照應綿密周旋如此所以多方文致洗去明字謂寶峯瑄即智瑄故云永慈門人寶峯智瑄開法金陵者即東明旵之孫寶峯瑄因查公未見行實碑誤以智瑄為明瑄止一明字之誤縱公曲盡文字之妙其奈智瑄原號玉峯何今則不惟鏟沒其塔抹殺明瑄則又連普慈塔亦抹沒矣謂普慈塔無普字然亦無永字何遽冒為永慈衣鉢塔今列塔圖於前按旵公塔面亦無慧字鑑公亦無行字又當指為何人衣鉢塔邪且普慈塔面有明當山三字又如何解說普慈塔羅城內一排五塔何謂並無他塔以左右殘毀古塔以掩飾鏟塔一事何用心細密一至於此東明殿右固有園地一片絕無塔基形跡今易左為右指殿右園地謂相傳為寶峯塔基以掩沒寺左全身祖塔其奈普慈明瑄塔全身於東明寺左載公歷舉諸禪典大書特書中非無據也况際公曰兩祖靈塔在焉今不以諸禪典大書特書為據反以相傳口碑修飾其詞左遮右掩則鏟塔一事欲隱彌露矣嗟乎欲成一己之說將普慈明瑄兩代嫡祖磨滅殆盡是可忍也孰不可忍也
